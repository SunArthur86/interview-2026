<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#9C27B0"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle">并发容器分类与选型对照</text><rect x="20" y="60" width="350" height="200" rx="10" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="5"/><text x="195" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">传统同步容器 (性能低)</text><rect x="50" y="100" width="130" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="115" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">HashMap</text><rect x="210" y="100" width="130" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="275" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">ArrayList</text><rect x="50" y="145" width="130" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="115" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">TreeMap</text><rect x="210" y="145" width="130" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="275" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">LinkedList</text><rect x="130" y="195" width="130" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="195" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">Collections.sync</text><rect x="430" y="60" width="350" height="380" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="5"/><text x="605" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">并发容器 (高并发优化)</text><line x1="180" y1="115" x2="427" y2="115" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="340" y1="160" x2="427" y2="160" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="180" y1="205" x2="427" y2="205" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><rect x="445" y="95" width="320" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="605" y="113" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#4CAF50">ConcurrentHashMap</text><text x="605" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#4CAF50">JDK8: CAS + synchronized 锁桶</text><rect x="445" y="140" width="320" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="605" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#2196F3">CopyOnWriteArrayList/Set</text><text x="605" y="173" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#2196F3">读写分离，仅限读多写少</text><rect x="445" y="185" width="320" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="605" y="203" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#4CAF50">ConcurrentSkipListMap/Set</text><text x="605" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#4CAF50">基于跳表实现并发排序</text><rect x="445" y="230" width="150" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="520" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#FF9800">BlockingQueue</text><text x="520" y="263" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#FF9800">利用ReentrantLock</text><rect x="615" y="230" width="150" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="690" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#4CAF50">ConcurrentLinkedQueue</text><text x="690" y="263" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#4CAF50">利用无锁CAS</text><rect x="445" y="285" width="320" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="605" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#f44336">关键限制：并发容器多不允许</text><text x="605" y="323" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#f44336">存储 null 键或 null 值</text><rect x="445" y="345" width="320" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="605" y="363" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#f44336">复合操作非原子</text><text x="605" y="378" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">需使用 putIfAbsent 等原子方法</text><rect x="20" y="325" width="350" height="80" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="5"/><text x="195" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">并发与安全平衡原则</text><text x="195" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">1. 降低锁粒度 (如 桶级别)</text><text x="195" y="393" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">2. 读写分离 / 无锁CAS优化</text><rect x="20" y="425" width="760" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="450" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#f44336">致命风险：频繁写入大对象至 COW 容器极易导致内存飙升与 Full GC</text></svg>
