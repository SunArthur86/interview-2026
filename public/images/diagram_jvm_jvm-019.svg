<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">方法区（永久代/元空间）</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="720" height="80" rx="6" ry="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><text x="400" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#9C27B0">方法区 Method Area (JVM 规范)</text><text x="400" y="140" text-anchor="middle" font-size="12" font-weight="normal" fill="#4A148C">存储：类信息 / 常量池 / 静态变量 / JIT 编译代码</text><rect x="40" y="200" width="350" height="200" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="40" y="200" width="350" height="40" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="215" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">JDK 7 及之前：永久代 (PermGen)</text><text x="60" y="270" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">- XX:PermSize / -XX:MaxPermSize</text><text x="60" y="295" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">位于 JVM 堆内存</text><text x="60" y="320" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">大小固定，易 OOM</text><text x="60" y="350" text-anchor="start" font-size="10" font-weight="normal" fill="#B71C1C">java.lang.OutOfMemoryError:</text><text x="60" y="368" text-anchor="start" font-size="10" font-weight="normal" fill="#B71C1C">  PermGen space</text><text x="60" y="388" text-anchor="start" font-size="10" font-weight="normal" fill="#B71C1C" font-style="italic">字符串常量池在此 (JDK6-)</text><rect x="410" y="200" width="350" height="200" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="410" y="200" width="350" height="40" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">JDK 8+：元空间 (Metaspace)</text><text x="430" y="270" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">- XX:MetaspaceSize / -XX:MaxMetaspaceSize</text><text x="430" y="295" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">位于本地内存 (Native Memory)</text><text x="430" y="320" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">大小动态，受系统内存限制</text><text x="430" y="350" text-anchor="start" font-size="10" font-weight="normal" fill="#1B5E20">不易 OOM (除非系统内存满)</text><text x="430" y="368" text-anchor="start" font-size="10" font-weight="normal" fill="#1B5E20">类元数据迁移至此</text><text x="430" y="388" text-anchor="start" font-size="10" font-weight="normal" fill="#1B5E20" font-style="italic">字符串常量池 → 堆 (JDK7+)</text><rect x="30" y="410" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="420" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="62.0" y="433" font-size="12" fill="#37474F" text-anchor="start">永久代 PermGen</text><rect x="280.0" y="420" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="302.0" y="433" font-size="12" fill="#37474F" text-anchor="start">元空间 Metaspace</text><rect x="520.0" y="420" width="16" height="16" rx="3" fill="#9C27B0" stroke="#37474F" stroke-width="1"/><text x="542.0" y="433" font-size="12" fill="#37474F" text-anchor="start">方法区(抽象)</text>
</svg>
