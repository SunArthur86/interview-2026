  <rect x="628.8" y="180" width="131.2" height="80" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="694.4" y="217.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">bind()</text>
  <text x="694.4" y="234.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">启动</text>
  <circle cx="640.8" cy="174" r="14" fill="#f44336"/><text x="640.8" y="179" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">5</text>
  <text x="40" y="320" font-size="13" font-weight="700" fill="#37474F">核心要点</text>
  <circle cx="48" cy="339" r="4" fill="#2196F3"/>
  <text x="60" y="342" font-size="11.5" fill="#37474F">Bootstrap=把EventLoopGroup+Channel+Pipeline+Handler组装成可运行应用</text>
  <circle cx="48" cy="365" r="4" fill="#FF9800"/>
  <text x="60" y="368" font-size="11.5" fill="#37474F">服务端用ServerBootstrap+2个Group(Boss接连接/Worker处理I/O)</text>
  <circle cx="48" cy="391" r="4" fill="#4CAF50"/>
  <text x="60" y="394" font-size="11.5" fill="#37474F">客户端用Bootstrap+1个Group</text>
