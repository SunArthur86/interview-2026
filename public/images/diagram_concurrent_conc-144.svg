<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">ThreadLocal 内存泄漏与线程池危机</text><rect x="40" y="50" width="340" height="260" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-dasharray="4"/><text x="210" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#f44336" text-anchor="middle">ThreadLocalMap 泄漏链路 (GC Roots)</text><rect x="80" y="85" width="260" height="35" rx="4" fill="#E3F2FD" stroke="#2196F3"/><text x="210" y="107" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#2196F3" text-anchor="middle">Thread (线程池核心常驻)</text><line x1="210" y1="125" x2="210" y2="145" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="80" y="150" width="260" height="35" rx="4" fill="#E3F2FD" stroke="#2196F3"/><text x="210" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#2196F3" text-anchor="middle">ThreadLocalMap</text><line x1="210" y1="190" x2="210" y2="210" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="80" y="215" width="260" height="35" rx="4" fill="#E3F2FD" stroke="#2196F3"/><text x="210" y="237" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#2196F3" text-anchor="middle">Entry[] (强引用)</text><polygon points="210,257 250,272 210,287 170,272" fill="#ECEFF1" stroke="#607D8B"/><text x="210" y="276" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B" text-anchor="middle">弱引用</text><line x1="250" y1="272" x2="290" y2="272" stroke="#f44336" stroke-width="2" stroke-dasharray="4" marker-end="url(#arr)"/><rect x="290" y="257" width="60" height="30" rx="4" fill="#ECEFF1" stroke="#f44336"/><text x="320" y="276" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f44336" text-anchor="middle">Key=null</text><line x1="210" y1="287" x2="210" y2="305" stroke="#f44336" stroke-width="3" marker-end="url(#arr)"/><rect x="110" y="310" width="200" height="35" rx="4" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="210" y="332" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f44336" text-anchor="middle">Value Object (无法回收)</text><rect x="450" y="80" width="280" height="120" rx="8" fill="#F3E5F5" stroke="#9C27B0"/><text x="590" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#9C27B0" text-anchor="middle">线程池复用危险 (致命风险)</text><rect x="470" y="115" width="240" height="30" rx="4" fill="#ffffff" stroke="#9C27B0"/><text x="590" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">任务A: set(UserContext) 未清理</text><rect x="470" y="155" width="240" height="30" rx="4" fill="#ffffff" stroke="#9C27B0"/><text x="590" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">任务B: get() -> 读到A的数据(脏读)</text><rect x="450" y="220" width="280" height="130" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="590" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4CAF50" text-anchor="middle">解决方案 (防御性编程)</text><rect x="470" y="255" width="240" height="30" rx="4" fill="#ffffff" stroke="#4CAF50"/><text x="590" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">1. 使用 static final 修饰</text><rect x="470" y="295" width="240" height="35" rx="4" fill="#ffffff" stroke="#4CAF50"/><text x="590" y="316" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4CAF50" text-anchor="middle">2. 强制在 finally 中 remove()</text><rect x="40" y="420" width="720" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800"/><text x="400" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#FF9800" text-anchor="middle"><tspan x="400" dy="0">JDK 补救: set/get/remove 时探测清理 Key=null 的 Entry</tspan><tspan x="400" dy="16">注意: 线程空闲时不触发这些方法，垃圾依然滞留！</tspan></text><rect x="20" y="485" width="15" height="10" fill="#FFEBEE" stroke="#f44336"/><text x="45" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">致命风险</text><rect x="110" y="485" width="15" height="10" fill="#E8F5E9" stroke="#4CAF50"/><text x="135" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">最佳实践</text><rect x="200" y="485" width="15" height="10" fill="#F3E5F5" stroke="#9C27B0"/><text x="225" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">核心概念</text></svg>
