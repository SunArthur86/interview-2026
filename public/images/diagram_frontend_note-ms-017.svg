  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">你如何判断候选人真的做过 AI-Native 桌面产品，而不是普通 We…</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">看候选人是否深入思考过桌面特性(文件/窗口/系统权限)与AI能力的结合，而不只是做过Web聊天框。</text>

  <rect x="40" y="95" width="720" height="70" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
  <circle cx="68" cy="130.0" r="16" fill="#2196F3"/>
  <text x="68" y="135.0" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <text x="100" y="134.0" font-size="12" fill="#37474F">是否思考过文件/权限/系统级交互</text>
  <rect x="40" y="173" width="720" height="70" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <circle cx="68" cy="208.0" r="16" fill="#4CAF50"/>
  <text x="68" y="213.0" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="100" y="212.0" font-size="12" fill="#37474F">是否处理过长任务/多窗口/产物管理</text>
  <rect x="40" y="251" width="720" height="70" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <circle cx="68" cy="286.0" r="16" fill="#FF9800"/>
  <text x="68" y="291.0" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
  <text x="100" y="290.0" font-size="12" fill="#37474F">是否做过AI产物的编辑-确认-发布流程</text>
  <rect x="40" y="329" width="720" height="70" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
  <circle cx="68" cy="364.0" r="16" fill="#9C27B0"/>
  <text x="68" y="369.0" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">4</text>
  <text x="100" y="368.0" font-size="12" fill="#37474F">是否有链路追踪/失败恢复经验</text>
  <text x="40" y="465" font-size="11.5" font-weight="700" fill="#37474F">本质：是否思考过文件/权限/系统级交互</text>
