<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">JVM 对象创建完整过程</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="30" y="130" width="146" height="200" rx="6" ry="6" fill="#2196F318" stroke="#2196F3" stroke-width="2" opacity="1.0"/><rect x="30" y="130" width="146" height="34" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="103.0" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">1. 类加载检查</text><text x="103.0" y="200" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">遇到 new 指令</text><text x="103.0" y="224" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">检查常量池符号引用</text><text x="103.0" y="248" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">类是否已加载</text><line x1="176" y1="230.0" x2="180" y2="230.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="180" y="130" width="146" height="200" rx="6" ry="6" fill="#FF980018" stroke="#FF9800" stroke-width="2" opacity="1.0"/><rect x="180" y="130" width="146" height="34" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="253.0" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">2. 分配内存</text><text x="253.0" y="200" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">指针碰撞(Bump)</text><text x="253.0" y="224" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">或 空闲列表(Free List)</text><text x="253.0" y="248" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">CAS+TLAB 并发安全</text><line x1="326" y1="230.0" x2="330" y2="230.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="330" y="130" width="146" height="200" rx="6" ry="6" fill="#00968818" stroke="#009688" stroke-width="2" opacity="1.0"/><rect x="330" y="130" width="146" height="34" rx="6" ry="6" fill="#009688" stroke="#009688" stroke-width="1.5" opacity="1.0"/><text x="403.0" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">3. 初始化零值</text><text x="403.0" y="200" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">内存空间置零</text><text x="403.0" y="224" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">(不含对象头)</text><text x="403.0" y="248" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">字段无需赋初值可用</text><line x1="476" y1="230.0" x2="480" y2="230.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="480" y="130" width="146" height="200" rx="6" ry="6" fill="#9C27B018" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><rect x="480" y="130" width="146" height="34" rx="6" ry="6" fill="#9C27B0" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="553.0" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">4. 设置对象头</text><text x="553.0" y="200" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">类元数据 Klass Pointer</text><text x="553.0" y="224" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">Hash Code / GC Age</text><text x="553.0" y="248" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">锁状态 Mark Word</text><line x1="626" y1="230.0" x2="630" y2="230.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="630" y="130" width="146" height="200" rx="6" ry="6" fill="#4CAF5018" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="630" y="130" width="146" height="34" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="703.0" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">5. 执行 &lt;init&gt;</text><text x="703.0" y="200" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">构造函数</text><text x="703.0" y="224" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">字段赋真实值</text><text x="703.0" y="248" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">对象才真正&quot;可用&quot;</text><rect x="40" y="360" width="350" height="120" rx="6" ry="6" fill="#FFF8E1" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="215" y="385" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">内存分配方式对比</text><text x="70" y="410" text-anchor="start" font-size="12" font-weight="700" fill="#37474F">指针碰撞</text><text x="70" y="428" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B">堆规整 (Serial/ParNew)</text><text x="70" y="445" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B">指针移动分配</text><text x="220" y="410" text-anchor="start" font-size="12" font-weight="700" fill="#37474F">空闲列表</text><text x="220" y="428" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B">堆不规整 (CMS)</text><text x="220" y="445" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B">查找可用块</text><text x="215" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#9C27B0" font-style="italic">并发：CAS 重试 / TLAB</text><rect x="410" y="360" width="350" height="120" rx="6" ry="6" fill="#FCE4EC" stroke="#E91E63" stroke-width="1.5" opacity="1.0"/><text x="585" y="385" text-anchor="middle" font-size="13" font-weight="700" fill="#880E4F">关键陷阱：new 不是原子操作</text><text x="585" y="410" text-anchor="middle" font-size="11" font-weight="normal" fill="#AD1457">步骤 2/3/4 之间可能被重排序</text><text x="585" y="430" text-anchor="middle" font-size="11" font-weight="normal" fill="#AD1457">可能导致&quot;半初始化&quot;对象泄漏</text><text x="585" y="455" text-anchor="middle" font-size="11" font-weight="600" fill="#f44336">经典案例：DCL 单例需 volatile</text></svg>
