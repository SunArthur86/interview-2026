<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">Java 基本类型 vs 包装类型 (Wrapper)</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="60" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">基本类型是数据值，包装类型是对象，差异巨大</text><text x="400" y="148" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">自动装箱/拆箱是编译期语法糖</text><rect x="40" y="190" width="350" height="200" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="40" y="190" width="350" height="36" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="215" y="213" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">基本类型 (Primitive)</text><text x="60" y="240" text-anchor="start" font-size="11" font-weight="700" fill="#1B5E20">存储位置:</text><text x="180" y="240" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">栈 / 方法区 (final)</text><text x="60" y="268" text-anchor="start" font-size="11" font-weight="700" fill="#1B5E20">默认值:</text><text x="180" y="268" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">0 / 0.0 / false</text><text x="60" y="296" text-anchor="start" font-size="11" font-weight="700" fill="#1B5E20">内存占用:</text><text x="180" y="296" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">小 (int=4B)</text><text x="60" y="324" text-anchor="start" font-size="11" font-weight="700" fill="#1B5E20">比较方式:</text><text x="180" y="324" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">== 比较数值</text><text x="60" y="352" text-anchor="start" font-size="11" font-weight="700" fill="#1B5E20">泛型支持:</text><text x="180" y="352" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">不支持 (List&lt;int&gt; 无效)</text><rect x="410" y="190" width="350" height="200" rx="8" ry="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="410" y="190" width="350" height="36" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="585" y="213" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">包装类型 (Wrapper)</text><text x="430" y="240" text-anchor="start" font-size="11" font-weight="700" fill="#B71C1C">存储位置:</text><text x="550" y="240" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">堆 (对象实例)</text><text x="430" y="268" text-anchor="start" font-size="11" font-weight="700" fill="#B71C1C">默认值:</text><text x="550" y="268" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">null (易触发 NPE!)</text><text x="430" y="296" text-anchor="start" font-size="11" font-weight="700" fill="#B71C1C">内存占用:</text><text x="550" y="296" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">大 (对象头+数据)</text><text x="430" y="324" text-anchor="start" font-size="11" font-weight="700" fill="#B71C1C">比较方式:</text><text x="550" y="324" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">== 比较地址</text><text x="430" y="352" text-anchor="start" font-size="11" font-weight="700" fill="#B71C1C">泛型支持:</text><text x="550" y="352" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">支持 (List&lt;Integer&gt;)</text><rect x="40" y="410" width="350" height="140" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="215" y="432" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">Integer 缓存陷阱</text><text x="60" y="458" text-anchor="start" font-size="11" font-weight="700" fill="#BF360C">默认缓存 -128 ~ 127</text><text x="60" y="480" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">Integer a=100, b=100;</text><text x="60" y="498" text-anchor="start" font-size="10" font-weight="700" fill="#4CAF50">  a == b  →  true  (命中缓存)</text><text x="60" y="518" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">Integer a=200, b=200;</text><text x="60" y="536" text-anchor="start" font-size="10" font-weight="700" fill="#f44336">  a == b  →  false (新对象)</text><rect x="410" y="410" width="350" height="140" rx="6" ry="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="585" y="432" text-anchor="middle" font-size="13" font-weight="700" fill="#4A148C">包装类型内存布局</text><text x="430" y="458" text-anchor="start" font-size="11" font-weight="700" fill="#4A148C">栈: 引用 → 堆对象</text><text x="430" y="480" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">[堆 Integer 对象]</text><text x="450" y="498" text-anchor="start" font-size="9" font-weight="normal" fill="#6A1B9A">Mark Word (8B) + Class Ptr (4B)</text><text x="450" y="516" text-anchor="start" font-size="9" font-weight="normal" fill="#6A1B9A">+ int value (4B) = 16B+</text><text x="450" y="534" text-anchor="start" font-size="9" font-weight="700" fill="#f44336">vs 基本类型仅 4B (4x)</text></svg>
