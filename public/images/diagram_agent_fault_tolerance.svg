<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 900" style="max-width:100%;height:auto;font-family:system-ui,sans-serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="900" rx="12" fill="#fafafa" stroke="#e0e0e0"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Agent 容错与回滚完整流程</text>

  <!-- Start -->
  <ellipse cx="410" cy="70" rx="50" ry="22" fill="#4CAF50" stroke="none"/>
  <text x="410" y="75" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">START</text>

  <!-- Arrow to compress check -->
  <line x1="410" y1="92" x2="410" y2="108" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Compress check (diamond) -->
  <polygon points="410,110 500,145 410,180 320,145" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="410" y="142" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">上下文 &gt; 阈值?</text>
  <text x="410" y="158" text-anchor="middle" font-size="10" fill="#999">token 检查</text>

  <!-- Yes → Compress -->
  <rect x="560" y="125" width="180" height="44" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="650" y="145" text-anchor="middle" font-size="12" fill="#1565C0" font-weight="600">历史摘要化压缩</text>
  <text x="650" y="160" text-anchor="middle" font-size="10" fill="#1976D2">只保留关键信息</text>
  <line x1="500" y1="145" x2="556" y2="147" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="525" y="140" font-size="10" fill="#2196F3" font-weight="600">是</text>

  <!-- No → LLM (straight down) -->
  <text x="418" y="195" font-size="10" fill="#4CAF50" font-weight="600">否</text>
  <line x1="410" y1="180" x2="410" y2="218" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Compress back to LLM -->
  <path d="M650 169 Q650 210 470 230" fill="none" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="5,3"/>

  <!-- LLM Decision -->
  <rect x="310" y="220" width="200" height="50" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="410" y="240" text-anchor="middle" font-size="13" fill="#6A1B9A" font-weight="700">LLM 决策：下一步</text>
  <text x="410" y="258" text-anchor="middle" font-size="10" fill="#8E24AA">工具选择 + 参数生成</text>

  <!-- Arrow to finish check -->
  <line x1="410" y1="270" x2="410" y2="288" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Finish check -->
  <polygon points="410,290 490,320 410,350 330,320" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="410" y="325" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">finish?</text>

  <!-- Yes → END -->
  <text x="495" y="316" font-size="10" fill="#4CAF50" font-weight="600">是</text>
  <line x1="490" y1="320" x2="700" y2="320" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <ellipse cx="750" cy="320" rx="40" ry="20" fill="#f44336"/>
  <text x="750" y="325" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">END</text>

  <!-- No → Tool call -->
  <text x="418" y="368" font-size="10" fill="#FF9800" font-weight="600">否</text>
  <line x1="410" y1="350" x2="410" y2="380" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Tool call (retry) -->
  <rect x="300" y="382" width="220" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="410" y="402" text-anchor="middle" font-size="13" fill="#E65100" font-weight="700">⚡ 工具调用（指数退避 ×3）</text>
  <text x="410" y="420" text-anchor="middle" font-size="10" fill="#F57C00">区分可重试/不可重试错误</text>

  <!-- Arrow to success check -->
  <line x1="410" y1="432" x2="410" y2="450" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Success check -->
  <polygon points="410,452 480,478 410,504 340,478" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="410" y="483" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">成功?</text>

  <!-- Success → Checkpoint -->
  <text x="345" y="495" font-size="10" fill="#4CAF50" font-weight="600">是</text>
  <line x1="340" y1="478" x2="180" y2="478" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="30" y="455" width="160" height="48" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="110" y="475" text-anchor="middle" font-size="12" fill="#2E7D32" font-weight="700">✓ 保存 Checkpoint</text>
  <text x="110" y="492" text-anchor="middle" font-size="10" fill="#388E3C">state + 摘要</text>

  <!-- Checkpoint → Continue -->
  <path d="M110 503 Q110 540 300 555" fill="none" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Continue next step -->
  <rect x="280" y="535" width="200" height="48" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="380" y="555" text-anchor="middle" font-size="12" fill="#2E7D32" font-weight="700">继续下一步</text>
  <text x="380" y="572" text-anchor="middle" font-size="10" fill="#388E3C">写入精简上下文</text>

  <!-- Loop back to compress check -->
  <path d="M380 583 Q380 650 410 650 Q200 650 200 145 Q200 110 320 130" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="190" y="400" font-size="9" fill="#999" transform="rotate(-90 190 400)">循环（max_steps=15）</text>

  <!-- Fail → Fallback -->
  <text x="485" y="495" font-size="10" fill="#FF9800" font-weight="600">否</text>
  <line x1="480" y1="478" x2="560" y2="478" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Fallback tool -->
  <rect x="560" y="455" width="180" height="48" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="650" y="475" text-anchor="middle" font-size="12" fill="#E65100" font-weight="700">🔄 工具替换</text>
  <text x="650" y="492" text-anchor="middle" font-size="10" fill="#F57C00">同类 Fallback</text>

  <!-- Fallback check -->
  <line x1="650" y1="503" x2="650" y2="518" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <polygon points="650,520 710,542 650,564 590,542" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="650" y="547" text-anchor="middle" font-size="11" fill="#E65100" font-weight="600">成功?</text>

  <!-- Fallback success → Continue -->
  <text x="570" y="540" font-size="10" fill="#4CAF50" font-weight="600">是</text>
  <path d="M590 542 Q500 542 480 555" fill="none" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Fallback fail → Rollback -->
  <text x="720" y="540" font-size="10" fill="#9C27B0" font-weight="600">否</text>
  <line x1="710" y1="542" x2="750" y2="542" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="750" y1="542" x2="750" y2="600" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Rollback -->
  <rect x="640" y="600" width="180" height="48" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="730" y="620" text-anchor="middle" font-size="12" fill="#6A1B9A" font-weight="700">↩ 状态回滚</text>
  <text x="730" y="637" text-anchor="middle" font-size="10" fill="#8E24AA">Checkpoint 恢复</text>

  <!-- Has checkpoint? -->
  <line x1="730" y1="648" x2="730" y2="665" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <polygon points="730,667 800,690 730,713 660,690" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="730" y="694" text-anchor="middle" font-size="11" fill="#E65100" font-weight="600">有 CP?</text>

  <!-- Yes → Restore -->
  <text x="615" y="688" font-size="10" fill="#9C27B0" font-weight="600">是</text>
  <line x1="660" y1="690" x2="530" y2="690" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="350" y="668" width="180" height="46" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="440" y="686" text-anchor="middle" font-size="12" fill="#6A1B9A" font-weight="700">恢复到安全 CP</text>
  <text x="440" y="702" text-anchor="middle" font-size="10" fill="#8E24AA">重新决策路径</text>
  <path d="M440 714 Q440 760 410 780 Q410 130 320 140" fill="none" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- No → Degrade -->
  <text x="805" y="688" font-size="10" fill="#f44336" font-weight="600">否</text>
  <line x1="730" y1="713" x2="730" y2="755" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="620" y="755" width="200" height="48" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="720" y="775" text-anchor="middle" font-size="12" fill="#C62828" font-weight="700">⚠ 任务降级</text>
  <text x="720" y="792" text-anchor="middle" font-size="10" fill="#E53935">部分结果返回</text>
  <line x1="720" y1="803" x2="720" y2="830" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="720" y1="830" x2="750" y2="830" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Legend -->
  <rect x="30" y="810" width="400" height="70" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <text x="45" y="828" font-size="10" fill="#666" font-weight="700">图例</text>
  <rect x="45" y="836" width="12" height="12" rx="2" fill="#4CAF50"/><text x="62" y="846" font-size="9" fill="#666">成功路径</text>
  <rect x="120" y="836" width="12" height="12" rx="2" fill="#FF9800"/><text x="137" y="846" font-size="9" fill="#666">重试/替换</text>
  <rect x="200" y="836" width="12" height="12" rx="2" fill="#9C27B0"/><text x="217" y="846" font-size="9" fill="#666">回滚恢复</text>
  <rect x="275" y="836" width="12" height="12" rx="2" fill="#f44336"/><text x="292" y="846" font-size="9" fill="#666">降级/结束</text>
  <rect x="350" y="836" width="12" height="12" rx="2" fill="#2196F3"/><text x="367" y="846" font-size="9" fill="#666">上下文压缩</text>
  <rect x="45" y="856" width="12" height="12" rx="2" fill="#FFF3E0" stroke="#FF9800"/><text x="62" y="866" font-size="9" fill="#666">判断节点</text>
</svg>