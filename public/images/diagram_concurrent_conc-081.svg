<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker><marker id="arr_warn" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#f44336"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">TCP 主动关闭方状态流转与优化</text><g font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle"><ellipse cx="100" cy="120" rx="60" ry="30" fill="#ECEFF1" stroke="#607D8B"/><text x="100" y="116" fill="#333" font-weight="700">应用层调用</text><text x="100" y="132" fill="#607D8B">close / shutdown</text><rect x="220" y="90" width="100" height="60" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="270" y="115" font-weight="700" fill="#f44336">FIN_WAIT1</text><text x="270" y="135" fill="#333">发送 FIN</text><rect x="360" y="90" width="100" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800"/><text x="410" y="115" font-weight="700" fill="#FF9800">FIN_WAIT2</text><text x="410" y="135" fill="#333">半关闭状态</text><rect x="500" y="90" width="100" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0"/><text x="550" y="115" font-weight="700" fill="#9C27B0">TIME_WAIT</text><text x="550" y="135" fill="#333">持续 2MSL</text><ellipse cx="680" cy="120" rx="50" ry="30" fill="#E8F5E9" stroke="#4CAF50"/><text x="680" y="124" fill="#333" font-weight="700">CLOSE</text><line x1="160" y1="120" x2="218" y2="120" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="320" y1="120" x2="358" y2="120" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><text x="339" y="110" font-size="10" fill="#607D8B">收到ACK</text><line x1="460" y1="120" x2="498" y2="120" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><text x="479" y="110" font-size="10" fill="#607D8B">收到FIN</text><line x1="600" y1="120" x2="630" y2="120" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/></g><g font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle"><rect x="220" y="180" width="100" height="50" rx="4" fill="#FFF3E0" stroke="#FF9800"/><text x="270" y="198" fill="#FF9800">tcp_orphan</text><text x="270" y="214" fill="#FF9800">_retries</text><text x="270" y="228" fill="#607D8B">控制重传次数</text><rect x="360" y="180" width="100" height="50" rx="4" fill="#FFF3E0" stroke="#FF9800"/><text x="410" y="198" fill="#FF9800">tcp_fin</text><text x="410" y="214" fill="#FF9800">_timeout</text><text x="410" y="228" fill="#607D8B">控制存活时间</text><rect x="500" y="180" width="100" height="50" rx="4" fill="#FFF3E0" stroke="#FF9800"/><text x="550" y="204" fill="#FF9800">tcp_tw_reuse</text><text x="550" y="228" fill="#607D8B">允许复用连接</text><line x1="270" y1="150" x2="270" y2="178" stroke="#FF9800" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="410" y1="150" x2="410" y2="178" stroke="#FF9800" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="550" y1="150" x2="550" y2="178" stroke="#FF9800" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr)"/></g><g font-family="system-ui,-apple-system,sans-serif" font-size="13"><rect x="50" y="260" width="340" height="150" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="220" y="285" font-size="14" font-weight="700" text-anchor="middle" fill="#333">优雅关闭 vs 暴力断开</text><text x="70" y="315" font-size="12" fill="#4CAF50">■ shutdown(SHUT_WR):</text><text x="90" y="335" font-size="12" fill="#333">只关闭写通道，仍可接收对端数据</text><text x="70" y="365" font-size="12" fill="#f44336">■ close / 异常退出:</text><text x="90" y="385" font-size="12" fill="#333">彻底断开，触发孤儿连接直接发送RST</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="13"><rect x="410" y="260" width="340" height="150" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="580" y="285" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">TIME_WAIT 存在意义 (2MSL)</text><text x="430" y="315" font-size="12" fill="#2196F3">1. 防止历史报文干扰新连接</text><text x="450" y="335" font-size="12" fill="#607D8B">确保旧连接数据包在网络中消亡</text><text x="430" y="365" font-size="12" fill="#2196F3">2. 保证被动方正常关闭</text><text x="450" y="385" font-size="12" fill="#607D8B">重发最后的ACK防止对端死等</text></g><g transform="translate(0, 440)" font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect x="50" y="0" width="12" height="12" fill="#FFEBEE" stroke="#f44336"/><text x="68" y="10" fill="#333">发起/风险状态</text><rect x="180" y="0" width="12" height="12" fill="#FFF3E0" stroke="#FF9800"/><text x="198" y="10" fill="#333">中间过渡/警告</text><rect x="310" y="0" width="12" height="12" fill="#F3E5F5" stroke="#9C27B0"/><text x="328" y="10" fill="#333">核心等待状态</text><rect x="440" y="0" width="12" height="12" fill="#E8F5E9" stroke="#4CAF50"/><text x="458" y="10" fill="#333">最终结束</text></g></svg>
