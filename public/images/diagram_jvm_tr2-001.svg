<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">OOM 现场 + MAT 排查流程</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="350" height="220" rx="8" ry="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><rect x="40" y="90" width="350" height="32" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="215" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">保留现场证据</text><text x="60" y="140" text-anchor="start" font-size="11" font-weight="700" fill="#2196F3">• JVM 启动参数</text><text x="220" y="140" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">-XX:+HeapDumpOnOutOfMemoryError</text><text x="60" y="168" text-anchor="start" font-size="11" font-weight="700" fill="#2196F3">• GC 日志</text><text x="220" y="168" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">-Xlog:gc*:file=gc.log</text><text x="60" y="196" text-anchor="start" font-size="11" font-weight="700" fill="#2196F3">• Heap Dump</text><text x="220" y="196" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">.hprof 文件 (自动生成)</text><text x="60" y="224" text-anchor="start" font-size="11" font-weight="700" fill="#2196F3">• Error 日志</text><text x="220" y="224" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">hs_err_pid&lt;pid&gt;.log</text><text x="60" y="252" text-anchor="start" font-size="11" font-weight="700" fill="#2196F3">• 应用日志</text><text x="220" y="252" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">OOM 前后业务日志</text><text x="60" y="280" text-anchor="start" font-size="11" font-weight="700" fill="#2196F3">• 容器快照</text><text x="220" y="280" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">docker top / kubectl describe</text><rect x="410" y="90" width="350" height="220" rx="8" ry="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><rect x="410" y="90" width="350" height="32" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="585" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">MAT 工具快速定位</text><text x="430" y="140" text-anchor="start" font-size="11" font-weight="700" fill="#FF9800">1. 打开 hprof</text><text x="580" y="140" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">MAT 自动解析</text><text x="430" y="168" text-anchor="start" font-size="11" font-weight="700" fill="#FF9800">2. Leak Suspects</text><text x="580" y="168" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">自动报告嫌疑对象</text><text x="430" y="196" text-anchor="start" font-size="11" font-weight="700" fill="#FF9800">3. Dominator Tree</text><text x="580" y="196" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">支配树 - 看保留大小</text><text x="430" y="224" text-anchor="start" font-size="11" font-weight="700" fill="#FF9800">4. Histogram</text><text x="580" y="224" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">按类统计对象数</text><text x="430" y="252" text-anchor="start" font-size="11" font-weight="700" fill="#FF9800">5. Path to GC Roots</text><text x="580" y="252" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">找引用链</text><text x="430" y="280" text-anchor="start" font-size="11" font-weight="700" fill="#FF9800">6. OQL 查询</text><text x="580" y="280" text-anchor="start" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">SQL 风格查对象</text><rect x="40" y="330" width="720" height="240" rx="6" ry="6" fill="#FAFAFA" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="355" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">定位内存泄漏嫌疑对象流程</text><rect x="60" y="390" width="150" height="80" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="2" opacity="1.0"/><rect x="60" y="390" width="150" height="24" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="135" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Histogram</text><text x="135" y="435" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">按 Retained</text><text x="135" y="453" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">Heap 排序</text><line x1="210" y1="430" x2="230" y2="430" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="230" y="390" width="150" height="80" rx="6" ry="6" fill="#FF980022" stroke="#FF9800" stroke-width="2" opacity="1.0"/><rect x="230" y="390" width="150" height="24" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="305" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">→ 找出</text><text x="305" y="435" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">异常大的</text><text x="305" y="453" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">类/对象</text><line x1="380" y1="430" x2="400" y2="430" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="400" y="390" width="150" height="80" rx="6" ry="6" fill="#9C27B022" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><rect x="400" y="390" width="150" height="24" rx="6" ry="6" fill="#9C27B0" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="475" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Dominator</text><text x="475" y="435" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">查看 Path</text><text x="475" y="453" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">To GC Roots</text><line x1="550" y1="430" x2="570" y2="430" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="570" y="390" width="150" height="80" rx="6" ry="6" fill="#f4433622" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="570" y="390" width="150" height="24" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="645" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">→ 引用链</text><text x="645" y="435" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">定位到具体</text><text x="645" y="453" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">代码位置</text><text x="400" y="510" text-anchor="middle" font-size="11" font-weight="600" fill="#9C27B0" font-style="italic">关键指标: Shallow Heap (自身) vs Retained Heap (含引用)</text><text x="400" y="535" text-anchor="middle" font-size="11" font-weight="700" fill="#f44336">深堆 (Retained) 大 = GC 后可释放多 = 重点嫌疑</text></svg>
