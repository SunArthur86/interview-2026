<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">实现一个 LRU Cache，要求 get/put 均为 O(1)。</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">HashMap + 双向链表：HashMap提供O(1)查找，双向链表维护访问顺序，O(1)移动节点到头部。</text>

  <rect x="60" y="100" width="320" height="80" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="220.0" y="137.0" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">HashMap</text>
  <text x="220.0" y="154.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">key → Node (O(1) 查找)</text>
  <rect x="420" y="100" width="320" height="80" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="580.0" y="137.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">双向链表 DoublyList</text>
  <text x="580.0" y="154.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">维护访问顺序</text>
  <rect x="60" y="220" width="60" height="36" rx="18.0" fill="#4CAF50"/><text x="90.0" y="242.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">HEAD</text>
  <rect x="130" y="220" width="60" height="36" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="160" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">A</text>
  <line x1="120" y1="238" x2="130" y2="238" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="200" y="220" width="60" height="36" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="230" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">B</text>
  <line x1="190" y1="238" x2="200" y2="238" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="270" y="220" width="60" height="36" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="300" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">C</text>
  <line x1="260" y1="238" x2="270" y2="238" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="340" y="220" width="60" height="36" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="370" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">D</text>
  <line x1="330" y1="238" x2="340" y2="238" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="410" y="220" width="60" height="36" rx="18.0" fill="#f44336"/><text x="440.0" y="242.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">TAIL</text>
  <rect x="60" y="320" width="200" height="60" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="160.0" y="347.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">get(key)</text>
  <text x="160.0" y="364.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">查找→移到HEAD</text>
  <rect x="290" y="320" width="220" height="60" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="400.0" y="347.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">put(k,v)</text>
  <text x="400.0" y="364.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">新增/更新→移HEAD</text>
  <rect x="540" y="320" width="200" height="60" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="640.0" y="347.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">容量超限</text>
  <text x="640.0" y="364.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">淘汰 TAIL 节点</text>
  <line x1="260" y1="350" x2="290" y2="350" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="510" y1="350" x2="540" y2="350" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="40" y="430" font-size="12" font-weight="700" fill="#37474F">复杂度：get/put 均 O(1) ｜ 空间 O(capacity)</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">HashMap</text>
  <rect x="171" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="191" y="482" font-size="11" fill="#37474F">双向链表</text>
  <rect x="241" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="261" y="482" font-size="11" fill="#37474F">HEAD最近</text>
  <rect x="325" y="470" width="14" height="14" rx="3" fill="#f44336"/>
  <text x="345" y="482" font-size="11" fill="#37474F">TAIL淘汰</text>
</svg>