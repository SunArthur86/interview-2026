</marker>
</defs>
<text x="400" y="102" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="700">CAP 定理</text>
<circle cx="200" cy="136" r="36" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="200" y="130" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="700">C</text>
<text x="200" y="148" font-size="10" fill="#37404F" text-anchor="middle">一致性</text>
