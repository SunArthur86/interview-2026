<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#fafafa"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/>
    </marker>
  </defs>

  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Phaser vs CyclicBarrier：动态多阶段接力赛</text>

  <rect x="40" y="70" width="300" height="380" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="190" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">CyclicBarrier (黑车模式)</text>
  
  <rect x="60" y="120" width="120" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/>
  <text x="120" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">Thread 1</text>
  
  <rect x="200" y="120" width="120" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/>
  <text x="260" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">Thread 2</text>

  <polygon points="120,200 190,240 120,280 50,240" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="120" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">await()</text>
  <text x="120" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#FF9800">人员满载?</text>

  <polygon points="260,200 330,240 260,280 190,240" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="260" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">异常抛出</text>
  <text x="260" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">全员死锁</text>

  <path d="M 120 160 L 120 200" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 260 160 L 260 200" fill="none" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="70" y="310" width="240" height="110" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="190" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">局限性：</text>
  <text x="190" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">1. 构造时固定 parties</text>
  <text x="190" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">2. 无法动态增减线程</text>
  <text x="190" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">3. 单点异常导致破损</text>

  <rect x="460" y="70" width="300" height="380" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="610" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">Phaser (公交车模式)</text>

  <ellipse cx="610" cy="130" rx="50" ry="20" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="610" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">Phase 0</text>

  <rect x="480" y="165" width="100" height="35" rx="5" fill="#ffffff" stroke="#607D8B" stroke-width="1"/>
  <text x="530" y="187" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">Thread A</text>
  
  <rect x="640" y="165" width="100" height="35" rx="5" fill="#ffffff" stroke="#607D8B" stroke-width="1"/>
  <text x="690" y="187" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">Thread B</text>

  <path d="M 530 200 L 530 220 L 580 240" fill="none" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 690 200 L 690 220 L 640 240" fill="none" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <text x="610" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#4CAF50">arrive()</text>

  <ellipse cx="610" cy="260" rx="60" ry="22" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="610" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">Phase 1</text>
  <text x="610" y="273" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#9C27B0">自动推进+1</text>

  <path d="M 540 260 L 480 300 L 420 330" fill="none" stroke="#FF9800" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <rect x="350" y="310" width="120" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="410" y="328" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#FF9800">register()</text>
  <text x="410" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#FF9800">动态注册新任务</text>

  <path d="M 680 260 L 740 300 L 760 330" fill="none" stroke="#f44336" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <rect x="710" y="310" width="140" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1"/>
  <text x="780" y="328" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">arriveAndDeregister()</text>
  <text x="780" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">故障隔离优雅退出</text>

  <rect x="480" y="370" width="240" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="600" y="392" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">核心优势：</text>
  <text x="600" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">1. 支持动态增减参与方</text>
  <text x="600" y="423" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">2. 自动分阶段流水线推进</text>
</svg>
