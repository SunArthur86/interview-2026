<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">进程间通信(IPC)机制全景</text><rect x="80" y="65" width="640" height="350" fill="#ECEFF1" stroke="#607D8B" stroke-width="1" rx="10"/><text x="400" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#607D8B" font-weight="700">解决内存隔离问题：进程A ↔ 内核(内核态) ↔ 进程B</text><rect x="140" y="110" width="110" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="195" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">进程 A</text><rect x="550" y="110" width="110" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="605" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">进程 B</text><path d="M 195 150 L 195 200 L 255 220" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 605 150 L 605 200 L 545 220" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arr)"/><rect x="140" y="210" width="120" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="200" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">管道/匿名管道</text><text x="200" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#607D8B">亲缘进程单向字节流</text><path d="M 260 235 L 300 235" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4"/><rect x="300" y="210" width="120" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="360" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">消息队列</text><text x="360" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#607D8B">内核消息链表解耦</text><path d="M 420 235 L 460 235" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4"/><rect x="460" y="210" width="120" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="520" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">共享内存</text><text x="520" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#4CAF50" font-weight="700">最快! 零拷贝直接访问</text><path d="M 580 235 L 620 235" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4"/><rect x="620" y="210" width="120" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="680" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Socket套接字</text><text x="680" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#607D8B">支持跨网络通信</text><path d="M 470 260 L 400 290 L 330 320" fill="none" stroke="#f44336" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><path d="M 570 260 L 600 290 L 660 320" fill="none" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><rect x="260" y="300" width="140" height="35" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="330" y="323" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">信号量(Semaphore)</text><rect x="490" y="300" width="170" height="35" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="575" y="323" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">配合同步锁防数据竞争</text><rect x="170" y="380" width="460" height="25" rx="4" fill="#FFF3E0" 