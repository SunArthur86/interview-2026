<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">在Agent评测中，轨迹回放与简单的结果指标评估相比，解决了什么核心问题…</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">通过记录中间过程，将黑盒评估转化为白盒调试。</text>

  <rect x="40" y="80" width="340" height="340" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <rect x="420" y="80" width="340" height="340" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="210" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#1565C0">结果指标(黑盒)</text>
  <text x="590" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#E65100">轨迹回放(白盒)</text>
  <circle cx="400" cy="240" r="28" fill="#9C27B0"/>
  <text x="400" y="246" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">VS</text>
  <text x="60" y="138" font-size="11.5" fill="#1565C0">✓ 只看最终输出</text>
  <text x="60" y="170" font-size="11.5" fill="#1565C0">✓ 无法定位失败</text>
  <text x="60" y="202" font-size="11.5" fill="#1565C0">✓ 不可调试</text>
  <text x="440" y="138" font-size="11.5" fill="#E65100">✓ 全链路可观测</text>
  <text x="440" y="170" font-size="11.5" fill="#E65100">✓ 定位具体失败</text>
  <text x="440" y="202" font-size="11.5" fill="#E65100">✓ Prompt优化/纠错</text>
  <text x="40" y="445" font-size="12" font-weight="700" fill="#37474F">本质：结果指标是黑盒，无法定位具体失败原因</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">结果指标(黑盒)</text>
  <rect x="178" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="198" y="482" font-size="11" fill="#37474F">轨迹回放(白盒)</text>
</svg>