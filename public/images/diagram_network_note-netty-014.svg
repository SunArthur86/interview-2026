<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Netty 的编解码器（Codec）机制？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">编解码器（Codec）是特殊的 ChannelHandler——解码器（Decoder）把入站的原始字节流翻译成业务消息（解决粘包/半包、协议解析），编码器（…</text>

  <rect x="40" y="130" width="180" height="60" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="130.0" y="157.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">字节流 ByteBuf</text>
  <text x="130.0" y="174.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">入站</text>
  <rect x="280" y="130" width="200" height="60" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="380.0" y="157.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Decoder 解码器</text>
  <text x="380.0" y="174.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">byte → object</text>
  <rect x="540" y="130" width="220" height="60" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="650.0" y="157.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">业务 Handler</text>
  <text x="650.0" y="174.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Java 对象</text>
  <line x1="220" y1="160" x2="280" y2="160" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <text x="250.0" y="155.0" text-anchor="middle" font-size="11" font-weight="600" fill="#4CAF50">decode</text>
  <line x1="480" y1="160" x2="540" y2="160" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="540" y="260" width="220" height="60" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="650.0" y="287.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">业务对象</text>
  <text x="650.0" y="304.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">出站</text>
  <rect x="280" y="260" width="200" height="60" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="380.0" y="287.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Encoder 编码器</text>
  <text x="380.0" y="304.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">object → byte</text>
  <rect x="40" y="260" width="180" height="60" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="130.0" y="287.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">字节流 ByteBuf</text>
  <text x="130.0" y="304.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">出网</text>
  <line x1="540" y1="290" x2="480" y2="290" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/>
  <text x="510.0" y="285.0" text-anchor="middle" font-size="11" font-weight="600" fill="#FF9800">encode</text>
  <line x1="280" y1="290" x2="220" y2="290" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="40" y="370" font-size="13" font-weight="700" fill="#37474F">Netty 预置 Codec：解决粘包/半包 + 协议解析</text>
  <rect x="40" y="390" width="115" height="40" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
  <text x="97" y="415" text-anchor="middle" font-size="11" fill="#1565C0">分隔符协议</text>
  <rect x="165" y="390" width="115" height="40" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
  <text x="222" y="415" text-anchor="middle" font-size="11" fill="#1565C0">长度字段协议</text>
  <rect x="290" y="390" width="115" height="40" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
  <text x="347" y="415" text-anchor="middle" font-size="11" fill="#1565C0">HTTP</text>
  <rect x="415" y="390" width="115" height="40" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
  <text x="472" y="415" text-anchor="middle" font-size="11" fill="#1565C0">WebSocket</text>
  <rect x="540" y="390" width="115" height="40" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
  <text x="597" y="415" text-anchor="middle" font-size="11" fill="#1565C0">SSL</text>
  <rect x="665" y="390" width="115" height="40" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/>
  <text x="722" y="415" text-anchor="middle" font-size="11" fill="#1565C0">Protobuf</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="100" y="482" font-size="11" fill="#37474F">Decoder</text>
  <rect x="171" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="191" y="482" font-size="11" fill="#37474F">Encoder</text>
  <rect x="262" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="282" y="482" font-size="11" fill="#37474F">字节</text>
  <rect x="318" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="338" y="482" font-size="11" fill="#37474F">业务</text>
</svg>