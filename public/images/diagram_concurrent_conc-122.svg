<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L8,5 z" fill="#607D8B"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#fafafa"/>
  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java 并发容器核心图谱</text>

  <rect x="50" y="70" width="300" height="180" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="200" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#f44336">同步容器 (老旧方案)</text>
  <rect x="80" y="115" width="240" height="40" rx="8" fill="#FFFFFF" stroke="#f44336"/>
  <text x="200" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Vector / Hashtable</text>
  <rect x="80" y="170" width="240" height="60" rx="8" fill="#FFFFFF" stroke="#f44336"/>
  <text x="200" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">锁粒度大 (锁整表)</text>
  <text x="200" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">迭代抛异常</text>

  <line x1="350" y1="160" x2="440" y2="160" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="395" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">性能优化演进</text>

  <rect x="450" y="70" width="300" height="180" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="600" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#4CAF50">并发容器 (JUC并发包)</text>
  <rect x="480" y="115" width="240" height="40" rx="8" fill="#FFFFFF" stroke="#4CAF50"/>
  <text x="600" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">细粒度锁 / CAS无锁</text>
  <rect x="480" y="170" width="240" height="60" rx="8" fill="#FFFFFF" stroke="#4CAF50"/>
  <text x="600" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">允许并发读写</text>
  <text x="600" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">弱一致性迭代不报错</text>

  <rect x="50" y="270" width="700" height="180" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/>
  <text x="400" y="295" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#607D8B">主要分类与适用场景</text>

  <rect x="80" y="315" width="180" height="55" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="170" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#2196F3">Map结构</text>
  <text x="170" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">ConcurrentHashMap</text>

  <rect x="310" y="315" width="180" height="55" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="400" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#9C27B0">List结构</text>
  <text x="400" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">CopyOnWriteArrayList</text>

  <rect x="540" y="315" width="180" height="55" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="630" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#FF9800">Queue结构</text>
  <text x="630" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">BlockingQueue实现类</text>

  <rect x="80" y="380" width="180" height="55" rx="8" fill="#FFFFFF" stroke="#2196F3" stroke-dasharray="3 3"/>
  <text x="170" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">JDK8: Node数组+红黑树</text>
  <text x="170" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">CAS+Sync锁头节点</text>

  <rect x="310" y="380" width="180" height="55" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-dasharray="3 3"/>
  <text x="400" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">读写分离机制</text>
  <text x="400" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">极其适合读多写少场景</text>

  <rect x="540" y="380" width="180" height="55" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-dasharray="3 3"/>
  <text x="630" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">线程池任务传递核心</text>
  <text x="630" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">支持阻塞等待</text>

  <rect x="50" y="460" width="700" height="30" fill="#FFFFFF" stroke="none"/>
  <rect x="80" y="470" width="15" height="10" fill="#FFEBEE" stroke="#f44336"/>
  <text x="105" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#607D8B">劣势对比</text>
  <rect x="200" y="470" width="15" height="10" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="225" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#607D8B">优势特性</text>
  <rect x="310" y="470" width="15" height="10" fill="#ECEFF1" stroke="#607D8B"/>
  <text x="335" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#607D8B">容器分类</text>
</svg>
