<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">桌面 AI 产品接入本地文件和目录时，前端如何设计权限提示？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">按文件/目录/动作区分授权粒度，授权前说明读取什么/产出什么/保留多久，高影响写入要二次确认。</text>

  <text x="400" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">按 文件 / 目录 / 动作 区分授权粒度</text>
  <rect x="40" y="130" width="175" height="80" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="127.5" y="167.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">授权前</text>
  <text x="127.5" y="184.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">说明读取/产出/保留时长</text>
  <line x1="215" y1="170" x2="230" y2="170" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="230" y="130" width="175" height="80" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="317.5" y="167.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">执行中</text>
  <text x="317.5" y="184.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">高影响写入二次确认</text>
  <line x1="405" y1="170" x2="420" y2="170" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="420" y="130" width="175" height="80" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="507.5" y="167.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">执行后</text>
  <text x="507.5" y="184.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">设置页可回看撤销</text>
  <line x1="595" y1="170" x2="610" y2="170" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="610" y="130" width="175" height="80" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="697.5" y="167.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">反馈</text>
  <text x="697.5" y="184.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">用户随时撤回权限</text>
  <text x="40" y="270" font-size="13" font-weight="700" fill="#37474F">提示三要素</text>
  <rect x="40" y="290" width="240" height="60" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="160.0" y="317.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">读取什么</text>
  <text x="160.0" y="334.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">输入范围</text>
  <rect x="295" y="290" width="240" height="60" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="415.0" y="317.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">产出什么</text>
  <text x="415.0" y="334.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">输出文件</text>
  <rect x="550" y="290" width="240" height="60" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="670.0" y="317.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">保留多久</text>
  <text x="670.0" y="334.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">时效策略</text>
  <text x="40" y="400" font-size="12" font-weight="700" fill="#C62828">原则：高影响写入必须二次确认</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">授权前</text>
  <rect x="143" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="163" y="482" font-size="11" fill="#37474F">执行</text>
  <rect x="199" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="219" y="482" font-size="11" fill="#37474F">回看</text>
  <rect x="255" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="275" y="482" font-size="11" fill="#37474F">撤销</text>
</svg>