<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr"markerWidth="10"markerHeight="10"refX="8"refY="5"markerUnits="strokeWidth"orient="auto"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">缓存降级与高可用保护机制</text><polygon points="400,70 480,100 400,130 320,100" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/><text x="400" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">系统触发降级</text><text x="400" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">(自动/人工)</text><path d="M 400 130 L 400 160" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="300" y="165" width="200" height="50" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">触发场景判断</text><text x="400" y="203" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">舍车保帅，保核心系统可用</text><path d="M 350 215 L 150 260" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><path d="M 400 215 L 400 260" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><path d="M 450 215 L 650 260" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="60" y="265" width="180" height="70" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/><text x="150" y="285" text-anchor="middle" fill="#2196F3">高并发峰值压力</text><text x="150" y="305" text-anchor="middle">现象：DB负载飙升</text><text x="150" y="320" text-anchor="middle">对策：关闭推荐/评论</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="310" y="265" width="180" height="70" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/><text x="400" y="285" text-anchor="middle" fill="#2196F3">下游服务故障</text><text x="400" y="305" text-anchor="middle">现象：接口响应超时</text><text x="400" y="320" text-anchor="middle">对策：返回本地静态缓存</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="560" y="265" width="180" height="70" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/><text x="650" y="285" text-anchor="middle" fill="#2196F3">非核心依赖异常</text><text x="650" y="305" text-anchor="middle">现象：第三方挂了</text><text x="650" y="320" text-anchor="middle">对策：返回默认空值</text></g><path d="M 400 335 L 400 370" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><rect x="250" y="375" width="300" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="400" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">保证核心业务可用</text><text x="400" y="413" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">释放资源给：下单/支付等主链路</text><g transform="translate(20, 460)" font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect x="0" y="0" width="12" height="12" fill="#FFF3E0" stroke="#FF9800"/><text x="20" y="10" fill="#333">降级触发器</text><rect x="100" y="0" width="12" height="12" fill="#F3E5F5" stroke="#9C27B0"/><text x="120" y="10" fill="#333">核心策略层</text><rect x="200" y="0" width="12" height="12" fill="#E3F2FD" stroke="#2196F3"/><text x="220" y="10" fill="#333">异常场景类型</text><rect x="320" y="0" width="12" height="12" rx="2" fill="#E8F5E9" stroke="#4CAF50"/><text x="340" y="10" fill="#333">核心链路保障</text></g></svg>
