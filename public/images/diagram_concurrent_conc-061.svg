<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Redis 单线程模型与高并发原理</text><g transform="translate(50, 80)"><circle cx="40" cy="40" r="20" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/><text x="40" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">Client 1</text><circle cx="40" cy="100" r="20" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/><text x="40" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">Client 2</text><circle cx="40" cy="160" r="20" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/><text x="40" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">Client N</text><path d="M 62 40 L 100 90" stroke="#607D8B" stroke-dasharray="4" marker-end="url(#arr)"/><path d="M 62 100 L 100 110" stroke="#607D8B" stroke-dasharray="4" marker-end="url(#arr)"/><path d="M 62 160 L 100 130" stroke="#607D8B" stroke-dasharray="4" marker-end="url(#arr)"/></g><g transform="translate(180, 60)"><rect x="0" y="0" width="200" height="160" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="100" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">I/O 多路复用</text><line x1="20" y1="40" x2="180" y2="40" stroke="#CE93D8" stroke-width="1"/><rect x="30" y="60" width="140" height="40" rx="4" fill="#fff" stroke="#9C27B0"/><text x="100" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">epoll/kqueue/select</text><text x="100" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#9C27B0">监听多个 Socket 事件</text><rect x="30" y="115" width="140" height="30" rx="4" fill="#ECEFF1" stroke="#9C27B0"/><text x="100" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">事件队列 (内存读写就绪)</text></g><path d="M 380 140 L 430 140" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/><g transform="translate(440, 60)"><rect x="0" y="0" width="160" height="160" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="80" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">单线程命令执行器</text><line x1="20" y1="40" x2="140" y2="40" stroke="#90CAF9" stroke-width="1"/><rect x="30" y="60" width="100" height="30" rx="4" fill="#fff" stroke="#2196F3"/><text x="80" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">1. 读取 Socket</text><rect x="30" y="100" width="100" height="30" rx="4" fill="#fff" stroke="#2196F3"/><text x="80" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">2. 解析命令</text><rect x="30" y="140" width="100" height="15" rx="4" fill="#E8F5E9" stroke="#4CAF50"/><text x="80" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#4CAF50">串行执行(无锁)</text></g><g transform="translate(640, 80)"><rect x="0" y="0" width="100" height="120" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="50" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">高效数据结构</text><line x1="10" y1="40" x2="90" y2="40" stroke="#FFCC80" stroke-width="1"/><text x="50" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">SDS</text><text x="50" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">ZSkipList</text><text x="50" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">HashTable</text></g><path d="M 600 140 L 640 140" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><rect x="100" y="260" width="600" height="80" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" stroke-dasharray="6"/><text x="400" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">⚠️ 致命风险：单线程怕阻塞</text><text x="400" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">若执行 O(N) 复杂度命令（如 KEYS *），会阻塞事件循环，导致其他请求全部排队超时。</text><text x="400" y="328" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">替代方案：生产环境应使用 SCAN 命令进行迭代遍历。</text><rect x="100" y="360" width="600" height="50" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/><text x="400" y="382" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#607D8B">版本演进：Redis 6.0 多线程</text><text x="400" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">仅用于网络数据读写和协议解析，核心的“命令执行”依然是单线程。</text><g transform="translate(40, 440)"><rect width="20" height="14" fill="#E3F2FD" stroke="#2196F3"/><text x="30" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">核心流程</text><rect x="110" width="20" height="14" fill="#F3E5F5" stroke="#9C27B0"/><text x="140" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">复用层</text><rect x="200" width="20" height="14" fill="#FFF3E0" stroke="#FF9800"/><text x="230" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">底层支撑</text><rect x="290" width="20" height="14" fill="#FFEBEE" stroke="#f44336"/><text x="320" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">致命风险</text><rect x="380" width="20" height="14" fill="#ECEFF1" stroke="#607D8B"/><text x="410" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">版本演进</text></g></svg>
