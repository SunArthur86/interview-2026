<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">如果桌面端支持多窗口协作，前端怎么避免不同窗口状态打架？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">用统一的全局Store + 窗口级局部状态 + 消息总线同步，避免多窗口并发修改导致状态冲突。</text>

  <rect x="280" y="90" width="240" height="60" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="400.0" y="117.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">全局 Store</text>
  <text x="400.0" y="134.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">任务/产物/权限</text>
  <rect x="60" y="200" width="200" height="55" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="160.0" y="224.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">窗口 #1</text>
  <text x="160.0" y="241.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">局部状态</text>
  <line x1="400" y1="150" x2="160" y2="200" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="300" y="200" width="200" height="55" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="400.0" y="224.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">窗口 #2</text>
  <text x="400.0" y="241.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">局部状态</text>
  <line x1="400" y1="150" x2="400" y2="200" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="540" y="200" width="200" height="55" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="640.0" y="224.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">窗口 #3</text>
  <text x="640.0" y="241.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">局部状态</text>
  <line x1="400" y1="150" x2="640" y2="200" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="280" y="310" width="240" height="50" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="400.0" y="332.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">消息总线</text>
  <text x="400.0" y="349.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">IPC / BroadcastChannel</text>
  <text x="40" y="410" font-size="12" font-weight="700" fill="#2E7D32">并发安全：乐观锁 / 版本号 防止并发覆盖</text>
  <text x="40" y="432" font-size="11" fill="#37474F">窗口局部状态互不干扰，共享变更走总线同步</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="100" y="482" font-size="11" fill="#37474F">Store</text>
  <rect x="157" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="177" y="482" font-size="11" fill="#37474F">窗口</text>
  <rect x="213" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="233" y="482" font-size="11" fill="#37474F">总线</text>
</svg>