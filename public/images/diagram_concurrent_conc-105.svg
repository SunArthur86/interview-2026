<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">读写锁机制</text><rect x="40" y="60" width="340" height="360" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="10"/><text x="210" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">读锁(共享锁)</text><rect x="80" y="105" width="120" height="35" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="140" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">线程1读</text><rect x="210" y="105" width="120" height="35" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="270" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">线程2读</text><rect x="145" y="165" width="120" height="35" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="205" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">线程3读</text><path d="M 140 140 L 180 165" stroke="#607D8B" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><path d="M 270 140 L 230 165" stroke="#607D8B" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><text x="205" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">支持并发执行</text><line x1="120" y1="260" x2="290" y2="260" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4"/><path d="M 140 275 L 180 275 L 205 295 L 230 275 L 270 275 L 245 295 L 230 275 L 205 295 L 190 275" fill="none"/><path d="M 160 290 L 205 320 L 250 290" fill="none" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><text x="205" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#f44336" font-weight="700">互斥排斥写锁</text><rect x="120" y="380" width="170" height="25" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="205" y="398" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">适用: 读多写少场景</text><rect x="420" y="60" width="340" height="360" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="10"/><text x="590" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">写锁(排他锁)</text><rect x="460" y="135" width="120" height="35" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="520" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">线程1写</text><path d="M 520 170 L 520 210" stroke="#607D8B" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><rect x="460" y="210" width="120" height="35" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" stroke-dasharray="3"/><text x="520" y="233" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#607D8B">其他线程阻塞</text><path d="M 580 135 L 620 135 L 620 245 L 580 245" fill="none" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><text x="640" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336" font-weight="700">写写互斥</text><rect x="420" y="380" width="340" height="25" rx="4" fill="#FFEBEE" stroke="#f44336" stroke-width="1"/><text x="590" y="398" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">风险: 写饥饿 / 锁升级易死锁</text></svg>
