<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">Arthas 线上诊断神器</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="720" height="50" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="400" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#2196F3">Attach 到运行 JVM，无需重启即可诊断</text><text x="400" y="132" text-anchor="middle" font-size="11" font-weight="normal" fill="#1565C0" font-style="italic">基于字节码增强 + Instrumentation API</text><rect x="40" y="170" width="350" height="380" rx="6" ry="6" fill="#FAFAFA" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="215" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#37474F">常用命令</text><rect x="55" y="220" width="100" height="90" rx="6" ry="6" fill="#4CAF5018" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><rect x="55" y="220" width="100" height="22" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="105" y="235" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">dashboard</text><text x="105" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#4CAF50">JVM 概览</text><rect x="165" y="220" width="100" height="90" rx="6" ry="6" fill="#2196F318" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><rect x="165" y="220" width="100" height="22" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="215" y="235" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">thread</text><text x="215" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#2196F3">线程分析</text><rect x="275" y="220" width="100" height="90" rx="6" ry="6" fill="#9C27B018" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><rect x="275" y="220" width="100" height="22" rx="6" ry="6" fill="#9C27B0" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="325" y="235" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">jad</text><text x="325" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#9C27B0">反编译</text><rect x="55" y="320" width="100" height="90" rx="6" ry="6" fill="#FF980018" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><rect x="55" y="320" width="100" height="22" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="105" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">watch</text><text x="105" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#FF9800">方法观测</text><rect x="165" y="320" width="100" height="90" rx="6" ry="6" fill="#00968818" stroke="#009688" stroke-width="1.5" opacity="1.0"/><rect x="165" y="320" width="100" height="22" rx="6" ry="6" fill="#009688" stroke="#009688" stroke-width="1.5" opacity="1.0"/><text x="215" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">trace</text><text x="215" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#009688">调用链</text><rect x="275" y="320" width="100" height="90" rx="6" ry="6" fill="#E91E6318" stroke="#E91E63" stroke-width="1.5" opacity="1.0"/><rect x="275" y="320" width="100" height="22" rx="6" ry="6" fill="#E91E63" stroke="#E91E63" stroke-width="1.5" opacity="1.0"/><text x="325" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">stack</text><text x="325" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#E91E63">调用栈</text><rect x="55" y="420" width="100" height="90" rx="6" ry="6" fill="#3F51B518" stroke="#3F51B5" stroke-width="1.5" opacity="1.0"/><rect x="55" y="420" width="100" height="22" rx="6" ry="6" fill="#3F51B5" stroke="#3F51B5" stroke-width="1.5" opacity="1.0"/><text x="105" y="435" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">monitor</text><text x="105" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#3F51B5">统计</text><rect x="165" y="420" width="100" height="90" rx="6" ry="6" fill="#607D8B18" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><rect x="165" y="420" width="100" height="22" rx="6" ry="6" fill="#607D8B" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="215" y="435" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">sc</text><text x="215" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#607D8B">类搜索</text><rect x="275" y="420" width="100" height="90" rx="6" ry="6" fill="#f4433618" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><rect x="275" y="420" width="100" height="22" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="325" y="435" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">heapdump</text><text x="325" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#f44336">堆转储</text><rect x="410" y="170" width="350" height="380" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="585" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">典型排查流程</text><rect x="425" y="220" width="80" height="35" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="465" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#2196F3">1. 启动</text><text x="515" y="242" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">java -jar arthas-boot.jar</text><rect x="425" y="265" width="80" height="35" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="465" y="287" text-anchor="middle" font-size="11" font-weight="700" fill="#2196F3">2. 概览</text><text x="515" y="287" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">dashboard 看整体</text><rect x="425" y="310" width="80" height="35" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="465" y="332" text-anchor="middle" font-size="11" font-weight="700" fill="#2196F3">3. 定位</text><text x="515" y="332" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">thread &lt;id&gt; 看热点</text><rect x="425" y="355" width="80" height="35" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="465" y="377" text-anchor="middle" font-size="11" font-weight="700" fill="#2196F3">4. 反编译</text><text x="515" y="377" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">jad com.xxx.Service</text><rect x="425" y="400" width="80" height="35" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="465" y="422" text-anchor="middle" font-size="11" font-weight="700" fill="#2196F3">5. 观测</text><text x="515" y="422" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">watch 方法 返回值</text><rect x="425" y="445" width="80" height="35" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="465" y="467" text-anchor="middle" font-size="11" font-weight="700" fill="#2196F3">6. 追踪</text><text x="515" y="467" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">trace 方法 耗时</text><rect x="425" y="490" width="80" height="35" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="465" y="512" text-anchor="middle" font-size="11" font-weight="700" fill="#2196F3">7. 退出</text><text x="515" y="512" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">stop / shutdown</text></svg>
