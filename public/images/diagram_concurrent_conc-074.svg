<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Linux 核心机制：内存管理与多路复用</text><g font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle"><rect x="50" y="80" width="330" height="220" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="215" y="100" font-size="14" font-weight="700" fill="#2196F3">虚拟内存与分页机制</text><rect x="70" y="115" width="290" height="25" rx="4" fill="#fff" stroke="#2196F3"/><text x="215" y="132" fill="#333">进程拥有独立虚拟地址空间 (4GB)</text><rect x="70" y="150" width="130" height="25" rx="4" fill="#fff" stroke="#2196F3"/><text x="135" y="167" fill="#333">MMU硬件转换</text><rect x="230" y="150" width="130" height="25" rx="4" fill="#fff" stroke="#2196F3"/><text x="295" y="167" fill="#333">页表映射物理内存</text><rect x="70" y="190" width="130" height="25" rx="4" fill="#F3E5F5" stroke="#9C27B0"/><text x="135" y="207" fill="#9C27B0">TLB加速缓存</text><rect x="230" y="190" width="130" height="25" rx="4" fill="#FFEBEE" stroke="#f44336"/><text x="295" y="207" fill="#f44336">触发缺页中断换入</text><rect x="70" y="230" width="290" height="60" rx="4" fill="#fff" stroke="#2196F3"/><text x="215" y="250" fill="#333" font-weight="700">内存分段布局</text><text x="150" y="270" fill="#607D8B">代码段/数据段</text><text x="285" y="270" fill="#FF9800">堆(向上长) / 栈(向下长)</text><line x1="200" y1="160" x2="228" y2="160" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="135" y1="175" x2="135" y2="188" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="295" y1="175" x2="295" y2="188" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/></g><g font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle"><rect x="420" y="80" width="330" height="220" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="585" y="100" font-size="14" font-weight="700" fill="#4CAF50">I/O多路复用演进</text><rect x="440" y="115" width="290" height="25" rx="4" fill="#FFEBEE" stroke="#f44336"/><text x="585" y="132" fill="#f44336">select: O(n)遍历, FD上限1024</text><rect x="440" y="150" width="290" height="25" rx="4" fill="#FFF3E0" stroke="#FF9800"/><text x="585" y="167" fill="#FF9800">poll: 解决数量限制, 仍需遍历</text><rect x="440" y="185" width="290" height="105" rx="4" fill="#fff" stroke="#4CAF50" stroke-width="2"/><text x="585" y="205" font-size="13" font-weight="700" fill="#4CAF50">epoll: 事件驱动 O(1)</text><text x="585" y="225" fill="#333">红黑树管理监听FD集合</text><text x="585" y="245" fill="#333">就绪链表存放活跃FD</text><text x="585" y="270" fill="#607D8B">支持 LT (水平) 与 ET (边缘) 触发</text><line x1="585" y1="140" x2="585" y2="148" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="585" y1="175" x2="585" y2="183" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/></g><g transform="translate(400, 360)" font-family="system-ui,-apple-system,sans-serif"><rect x="-150" y="-20" width="300" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="0" y="-2" font-size="12" font-weight="700" text-anchor="middle" fill="#607D8B">核心设计哲学</text><text x="0" y="14" font-size="12" text-anchor="middle" fill="#333">事件驱动避免无意义轮询，分页实现按需分配</text></g><g transform="translate(0, 430)" font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect x="50" y="0" width="12" height="12" fill="#E3F2FD" stroke="#2196F3"/><text x="68" y="10" fill="#333">数据/流程主路径</text><rect x="180" y="0" width="12" height="12" fill="#E8F5E9" stroke="#4CAF50"/><text x="198" y="10" fill="#333">成功/高效机制</text><rect x="300" y="0" width="12" height="12" fill="#FFF3E0" stroke="#FF9800"/><text x="318" y="10" fill="#333">警告/次优选择</text><rect x="420" y="0" width="12" height="12" fill="#FFEBEE" stroke="#f44336"/><text x="438" y="10" fill="#333">缺点/致命风险</text><rect x="540" y="0" width="12" height="12" fill="#F3E5F5" stroke="#9C27B0"/><text x="558" y="10" fill="#333">关键抽象概念</text></g></svg>
