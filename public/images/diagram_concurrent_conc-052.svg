尾插与尾删</text><text x="625" y="126" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">putLast/takeLast</text><rect x="100" y="280" width="150" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="175" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13">任务获取端</text><text x="175" y="316" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">Worker线程 (LIFO)</text><rect x="550" y="280" width="150" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="625" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13">任务窃取端</text><text x="625" y="316" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">空闲线程 (FIFO)</text><rect x="300" y="360" width="200" height="60" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="400" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13">单锁保证双向原子性</text><text x="400" y="402" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">mainLock (ReentrantLock)</text><rect x="300" y="430" width="200" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="455" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13">默认无界 (Integer.MAX)</text></svg>
