<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle">操作系统的四大特征与核心关系</text><rect x="30" y="60" width="740" height="130" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5,5"/><text x="400" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">底层基础：多道程序设计技术</text><rect x="150" y="110" width="220" height="30" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="260" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">物理资源受限</text><rect x="430" y="110" width="220" height="30" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="540" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">任务多且需同时处理</text><path d="M 260 140 L 380 160" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 540 140 L 420 160" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><ellipse cx="400" cy="220" rx="30" ry="20" fill="#ECEFF1" stroke="#607D8B"/><rect x="160" y="250" width="100" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="210" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" font-weight="700">并发</text><rect x="540" y="250" width="100" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="590" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" font-weight="700">共享</text><path d="M 210 250 C 210 200, 400 180, 400 240" stroke="#4CAF50" stroke-width="2" fill="none"/><path d="M 590 250 C 590 200, 400 180, 400 240" stroke="#4CAF50" stroke-width="2" fill="none"/><path d="M 260 280 L 540 280" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 540 290 L 260 290" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr)"/><text x="400" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#4CAF50">互为存在条件</text><rect x="60" y="360" width="230" height="70" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="175" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" font-weight="700">虚拟 (空分/时分)</text><text x="175" y="405" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">物理实体 -> 逻辑实体</text><rect x="310" y="360" width="180" height="70" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" font-weight="700">异步</text><text x="400" y="405" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">执行速度不可预知</text><rect x="510" y="360" width="230" height="70" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="625" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" font-weight="700">并发 vs 并行</text><text x="625" y="405" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">交替执行 vs 同时执行(多核)</text><path d="M 210 310 L 175 360" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 210 310 L 400 360" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 590 310 L 625 360" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="10" y="450" width="780" height="40" fill="#FFFFFF" stroke="#ECEFF1"/><rect x="20" y="465" width="12" height="12" fill="#E8F5E9" stroke="#4CAF50"/><text x="38" y="475" font-family="system-ui,-apple-system,sans-serif" font-