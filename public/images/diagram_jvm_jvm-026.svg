<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">Serial Old 收集器 (单线程标记-整理)</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="80" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="400" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#f44336">老年代 单线程 标记-整理算法</text><text x="400" y="155" text-anchor="middle" font-size="12" font-weight="normal" fill="#B71C1C" font-style="italic">Client 模式默认 / CMS 后备方案</text><rect x="60" y="220" width="130" height="80" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" opacity="1.0"/><text x="125" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">标记</text><text x="125" y="270" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Mark</text><text x="125" y="287" text-anchor="middle" font-size="10" font-weight="600" fill="#f44336">单线程</text><line x1="190" y1="260" x2="240" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="240" y="220" width="130" height="80" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="305" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">整理</text><text x="305" y="270" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Compact</text><text x="305" y="287" text-anchor="middle" font-size="10" font-weight="normal" fill="#BF360C">移动对象</text><line x1="370" y1="260" x2="420" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="420" y="220" width="130" height="80" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="485" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">清除</text><text x="485" y="270" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Sweep</text><text x="485" y="287" text-anchor="middle" font-size="10" font-weight="normal" fill="#388E3C">无碎片</text><line x1="550" y1="260" x2="600" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="600" y="220" width="130" height="80" rx="6" ry="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><text x="665" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#4A148C">完成</text><text x="665" y="270" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Done</text><text x="665" y="287" text-anchor="middle" font-size="10" font-weight="700" fill="#f44336">STW</text><rect x="60" y="340" width="340" height="100" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="230" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#4CAF50">优点</text><text x="80" y="390" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 简单稳定</text><text x="80" y="410" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 内存整理无碎片</text><text x="80" y="430" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 单 CPU 效率高</text><rect x="420" y="340" width="340" height="100" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="590" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#f44336">缺点</text><text x="440" y="390" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 单线程停顿时间长</text><text x="440" y="410" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 不适合服务端</text><text x="440" y="430" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">• CMS 失败时退化于此</text></svg>
