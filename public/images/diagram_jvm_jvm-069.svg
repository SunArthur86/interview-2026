<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">ZGC 染色指针 + 读屏障</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="60" y="110" width="680" height="70" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" opacity="1.0"/><text x="400" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#37474F">64-bit 指针布局 (ZGC)</text><rect x="80" y="145" width="100" height="28" rx="6" ry="6" fill="#E0E0E0" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="130" y="163" text-anchor="middle" font-size="11" font-weight="normal" fill="#616161">16 bits 未用</text><rect x="180" y="145" width="60" height="28" rx="6" ry="6" fill="#FFEB3B" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="210" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">4 bits</text><rect x="240" y="145" width="280" height="28" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="380" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="#1B5E20">44 bits 堆地址 (支持 4TB~16TB)</text><text x="530" y="163" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">... (64-bit total)</text><text x="400" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">染色指针 4 bits 元数据 (Marked0/Marked1/Remapped/Finalizable)</text><rect x="70" y="230" width="160" height="100" rx="6" ry="6" fill="#BBDEFB" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="150" y="255" text-anchor="middle" font-size="20" font-weight="700" fill="#212121">M0</text><text x="150" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#37474F">Marked0</text><text x="150" y="300" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">标记阶段 1 引用</text><text x="150" y="320" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B">指针自带状态</text><rect x="245" y="230" width="160" height="100" rx="6" ry="6" fill="#90CAF9" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="325" y="255" text-anchor="middle" font-size="20" font-weight="700" fill="#212121">M1</text><text x="325" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#37474F">Marked1</text><text x="325" y="300" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">标记阶段 2 引用</text><text x="325" y="320" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B">指针自带状态</text><rect x="420" y="230" width="160" height="100" rx="6" ry="6" fill="#C8E6C9" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="500" y="255" text-anchor="middle" font-size="20" font-weight="700" fill="#212121">R</text><text x="500" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#37474F">Remapped</text><text x="500" y="300" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">已转移到新地址</text><text x="500" y="320" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B">指针自带状态</text><rect x="595" y="230" width="160" height="100" rx="6" ry="6" fill="#FFCDD2" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="675" y="255" text-anchor="middle" font-size="20" font-weight="700" fill="#212121">F</text><text x="675" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#37474F">Finalizable</text><text x="675" y="300" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">通过 finalize 创建</text><text x="675" y="320" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B">指针自带状态</text><rect x="60" y="360" width="680" height="170" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="400" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">读屏障工作流程 (并发转移)</text><text x="80" y="415" text-anchor="start" font-size="12" font-weight="700" fill="#37474F">应用读取对象引用</text><line x1="220" y1="410" x2="280" y2="410" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="280" y="395" width="160" height="32" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="360" y="415" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">读屏障拦截</text><line x1="440" y1="410" x2="500" y2="410" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="500" y="395" width="220" height="32" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="610" y="415" text-anchor="middle" font-size="12" font-weight="700" fill="#1B5E20">检查染色 → 转发指针</text><text x="400" y="460" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">若指针过期：自动转发到新地址 (Forwarding Table)</text><text x="400" y="480" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">更新引用 = 即时修正 (Self-healing)</text><text x="400" y="505" text-anchor="middle" font-size="12" font-weight="700" fill="#4CAF50">结果：标记/转移/重定位 全程并发，停顿 &lt; 1ms</text></svg>
