<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#fafafa"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#607D8B"/>
    </marker>
  </defs>
  
  <text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">什么是线程安全？(三大实现方案)</text>

  <!-- 核心保障 -->
  <ellipse cx="400" cy="80" rx="110" ry="25" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/>
  <text x="400" y="85" font-family="system-ui" font-size="14" font-weight="700" fill="#37474F" text-anchor="middle">正确性保障: 原子/可见/有序</text>

  <path d="M 400 105 L 150 150 M 400 105 L 400 150 M 400 105 L 650 150" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 方案1：互斥同步 -->
  <rect x="40" y="150" width="220" height="230" rx="10" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="150" y="180" font-family="system-ui" font-size="15" font-weight="700" fill="#C62828" text-anchor="middle">1. 互斥同步 (阻塞)</text>
  <line x1="60" y1="195" x2="240" y2="195" stroke="#ef9a9a" stroke-width="1"/>
  
  <text x="150" y="225" font-family="system-ui" font-size="13" fill="#C62828" text-anchor="middle">核心：加锁保障排他性</text>
  <text x="150" y="255" font-family="system-ui" font-size="12" font-weight="700" fill="#D32F2F" text-anchor="middle">synchronized</text>
  <text x="150" y="275" font-family="system-ui" font-size="11" fill="#546E7A" text-anchor="middle">JVM实现，自动锁释放</text>
  <text x="150" y="295" font-family="system-ui" font-size="11" fill="#546E7A" text-anchor="middle">存在用户态内核态切换</text>
  
  <text x="150" y="325" font-family="system-ui" font-size="12" font-weight="700" fill="#D32F2F" text-anchor="middle">ReentrantLock</text>
  <text x="150" y="345" font-family="system-ui" font-size="11" fill="#546E7A" text-anchor="middle">基于AQS，支持公平/中断</text>
  <text x="150" y="365" font-family="system-ui" font-size="11" fill="#546E7A" text-anchor="middle">手动lock/unlock灵活控制</text>

  <!-- 方案2：非阻塞同步 -->
  <rect x="290" y="150" width="220" height="230" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="400" y="180" font-family="system-ui" font-size="15" font-weight="700" fill="#E65100" text-anchor="middle">2. 非阻塞同步 (乐观)</text>
  <line x1="310" y1="195" x2="490" y2="195" stroke="#ffcc80" stroke-width="1"/>
  
  <text x="400" y="225" font-family="system-ui" font-size="13" fill="#E65100" text-anchor="middle">核心：CAS 比较并交换</text>
  <text x="400" y="255" font-family="system-ui" font-size="12" font-weight="700" fill="#EF6C00" text-anchor="middle">底层依赖CPU指令</text>
  <text x="400" y="275" font-family="system-ui" font-size="11" fill="#546E7A" text-anchor="middle">无锁竞争不挂起线程</text>
  
  <text x="400" y="305" font-family="system-ui" font-size="12" font-weight="700" fill="#EF6C00" text-anchor="middle">JUC Atomic 原子类</text>
  <text x="400" y="325" font-family="system-ui" font-size="11" fill="#546E7A" text-anchor="middle">如 AtomicInteger</text>
  <text x="400" y="355" font-family="system-ui" font-size="11" font-weight="700" fill="#C62828" text-anchor="middle">缺陷：ABA问题 / 自旋消耗</text>

  <!-- 方案3：无同步方案 -->
  <rect x="540" y="150" width="220" height="230" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="650" y="180" font-family="system-ui" font-size="15" font-weight="700" fill="#2E7D32" text-anchor="middle">3. 无同步方案</text>
  <line x1="560" y1="195" x2="740" y2="195" stroke="#a5d6a7" stroke-width="1"/>
  
  <text x="650" y="225" font-family="system-ui" font-size="13" fill="#2E7D32" text-anchor="middle">核心：规避共享数据竞争</text>
  <text x="650" y="255" font-family="system-ui" font-size="12" font-weight="700" fill="#388E3C" text-anchor="middle">ThreadLocal 线程封闭</text>
  <text x="650" y="275" font-family="system-ui" font-size="11" fill="#546E7A" text-anchor="middle">空间换时间，线程独立副本</text>
  
  <text x="650" y="305" font-family="system-ui" font-size="12" font-weight="700" fill="#388E3C" text-anchor="middle">不可变对象 (Immutable)</text>
  <text x="650" y="325" font-family="system-ui" font-size="11" fill="#546E7A" text-anchor="middle">如 String, final 修饰</text>
  <text x="650" y="355" font-family="system-ui" font-size="11" fill="#546E7A" text-anchor="middle">只读不写，天生绝对安全</text>

  <rect x="100" y="415" width="600" height="60" rx="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
  <text x="400" y="438" font-family="system-ui" font-size="13" font-weight="700" fill="#6A1B9A" text-anchor="middle">避坑指南：不要滥用volatile！</text>
  <text x="400" y="460" font-family="system-ui" font-size="12" fill="#6A1B9A" text-anchor="middle">volatile仅保证可见性，i++等复合操作非原子，必须使用 Atomic 类或锁。</text>
</svg>
