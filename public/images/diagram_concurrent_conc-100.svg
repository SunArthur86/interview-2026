ke-width="1.5"/><text x="730" y="405" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#f44336">执行拒绝策略</text><text x="730" y="422" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">Rejected</text><g transform="translate(20, 460)" font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect x="0" y="0" width="12" height="12" rx="2" fill="#E8F5E9" stroke="#4CAF50"/><text x="20" y="10" fill="#333">正常执行路径</text><rect x="100" y="0" width="12" height="12" fill="#FFF3E0" stroke="#FF9800"/><text x="120" y="10" fill="#333">条件判断分支</text><rect x="200" y="0" width="12" height="12" rx="2" fill="#FFEBEE" stroke="#f44336"/><text x="220" y="10" fill="#333">溢出与拒绝异常</text></g></svg>
