<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr"markerWidth="10"markerHeight="10"refX="8"refY="5"markerUnits="strokeWidth"orient="auto"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">线程池处理任务核心流程</text><ellipse cx="400" cy="70" rx="60" ry="20" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/><text x="400" y="74" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle">新任务到达</text><path d="M 400 90 L 400 110" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><polygon points="400,110 480,140 400,170 320,140" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/><text x="400" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">核心线程满?</text><text x="400" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">否</text><path d="M 320 140 L 200 140 L 200 190" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><rect x="120" y="195" width="160" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><text x="200" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#4CAF50">分配核心线程</text><text x="200" y="232" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">corePoolSize</text><path d="M 480 140 L 600 140 L 600 190" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><text x="500" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">是</text><polygon points="600,190 680,220 600,250 520,220" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/><text x="600" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">