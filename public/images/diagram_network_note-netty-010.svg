  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">EventLoop 的核心原理与线程模型？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">EventLoop 是 Netty 处理连接生命周期内所有事件的核心抽象——它本质上是一个&quot;绑定单一线程、死循环处理任务&quot;的执行器。它的精妙在于串行无锁化设计…</text>

