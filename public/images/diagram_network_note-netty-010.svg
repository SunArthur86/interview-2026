  <text x="400" y="395" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">串行无锁化：一个 Channel 终身绑定一个 EventLoop / 一个线程</text>
  <text x="400" y="418" text-anchor="middle" font-size="11" fill="#37474F">同 Channel 的所有 I/O 串行执行 → 无需加锁</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
