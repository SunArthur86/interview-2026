<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">进程与线程对比架构</text><rect x="50" y="60" width="320" height="340" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="10"/><text x="210" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">进程 (资源分配单位)</text><rect x="80" y="105" width="120" height="30" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/><text x="140" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">PID信息</text><rect x="220" y="105" width="120" height="30" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/><text x="280" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">独立内存空间</text><rect x="80" y="145" width="260" height="30" rx="4" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/><text x="210" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">文件描述符表/全局变量</text><rect x="100" y="195" width="100" height="35" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="150" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">线程1 (私有栈)</text><rect x="210" y="195" width="100" height="35" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="260" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">线程2 (私有栈)</text><rect x="100" y="250" width="260" height="50" rx="4" fill="#FFEBEE" stroke="#f44336" stroke-width="1" stroke-dasharray="4"/><text x="210" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336" font-weight="700">进程间完全隔离</text><text x="210" y="288" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">通信需IPC机制(管道/Socket等)</text><rect x="100" y="320" width="260" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="210" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0" font-weight="700">优点：高隔离性，互相不影响</text><text x="210" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336" font-weight="700">缺点：创建销毁和切换开销大</text><rect x="430" y="60" width="320" height="340" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="10"/><text x="590" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">线程 (CPU调度单位)</text><rect x="480" y="105" width="100" height="30" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/><text x="530" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">程序计数器</text><rect x="600" y="105" width="100" height="30" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/><text x="650" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">寄存器</text><rect x="480" y="145" width="220" height="30" rx="4" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/><text x="590" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">共享进程的内存空间</text><rect x="460" y="200" width="100" height="35" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="510" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">执行流A</text><rect x="620" y="200" width="100" height="35" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="670" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">执行流B</text><rect x="460" y="250" width="260" height="50" rx="4" fill="#FFEBEE" stroke="#f44336" stroke-width="1" stroke-dasharray="4"/><text x="590" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336" font-weight="700">共享资源并发冲突风险</text><text x="590" y="288" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">需同步机制(锁/信号量)防竞争</text><rect x="460" y="320" width="260" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="590" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0" font-weight="700">优点：切换开销极小，通信快</text><text x="590" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336" font-weight="700">缺点：任一线程崩溃致进程挂掉</text><line x1="370" y1="230" x2="450" y2="230" stroke="#9C27B0" stroke-width="2" stroke-dasharray="6" marker-end="url(#arr)" marker-start="url(#arr)"/><text x="410" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">包含</text></svg>
