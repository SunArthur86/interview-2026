<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="max-width:100%;height:auto;font-family:system-ui,-apple-system,'PingFang SC',sans-serif;">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#666"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4CAF50"/>
    </marker>
    <marker id="arro" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f44336"/>
    </marker>
  </defs>

  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">刚性事务：XA模型、XA接口规范、XA实现</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#607D8B">XA是分布式事务的工业标准，通过TM协调RM实现2PC强一致。</text>
  <rect x="50" y="160" width="165" height="130" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="132" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#C62828">2PC</text>
  <text x="132" y="215" text-anchor="middle" font-size="11" fill="#C62828">两阶段提交</text>
  <line x1="65" y1="230" x2="200" y2="230" stroke="#f44336" stroke-width="1"/>
  <text x="132" y="250" text-anchor="middle" font-size="10" fill="#C62828">强一致 · 阻塞</text>
  <line x1="217" y1="225" x2="231" y2="225" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="233" y="160" width="165" height="130" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="316" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#E65100">3PC</text>
  <text x="316" y="215" text-anchor="middle" font-size="11" fill="#E65100">三阶段提交</text>
  <line x1="248" y1="230" x2="383" y2="230" stroke="#FF9800" stroke-width="1"/>
  <text x="316" y="250" text-anchor="middle" font-size="10" fill="#E65100">降低阻塞 · 仍有风险</text>
  <line x1="400" y1="225" x2="414" y2="225" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="416" y="160" width="165" height="130" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="498" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#6A1B9A">TCC</text>
  <text x="498" y="215" text-anchor="middle" font-size="11" fill="#6A1B9A">Try-Confirm-Cancel</text>
  <line x1="431" y1="230" x2="566" y2="230" stroke="#9C27B0" stroke-width="1"/>
  <text x="498" y="250" text-anchor="middle" font-size="10" fill="#6A1B9A">业务侵入 · 最终一致</text>
  <line x1="583" y1="225" x2="597" y2="225" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="599" y="160" width="165" height="130" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="682" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#1565C0">Saga</text>
  <text x="682" y="215" text-anchor="middle" font-size="11" fill="#1565C0">长事务补偿</text>
  <line x1="614" y1="230" x2="749" y2="230" stroke="#2196F3" stroke-width="1"/>
  <text x="682" y="250" text-anchor="middle" font-size="10" fill="#1565C0">最终一致 · 反向补偿</text>
  <line x1="60" y1="350" x2="740" y2="350" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="745" y="354" font-size="10" fill="#78909C">性能 / 可用性</text>
  <text x="70" y="345" font-size="10" fill="#78909C" font-weight="600">弱一致</text>
  <text x="640" y="345" font-size="10" fill="#78909C" font-weight="600">强一致</text>
  <circle cx="700" cy="350" r="5" fill="#f44336"/>
  <text x="688" y="370" font-size="10" font-weight="700" fill="#C62828">2PC</text>
  <circle cx="580" cy="350" r="5" fill="#FF9800"/>
  <text x="568" y="370" font-size="10" font-weight="700" fill="#E65100">3PC</text>
  <circle cx="380" cy="350" r="5" fill="#9C27B0"/>
  <text x="368" y="370" font-size="10" font-weight="700" fill="#6A1B9A">TCC</text>
  <circle cx="180" cy="350" r="5" fill="#2196F3"/>
  <text x="168" y="370" font-size="10" font-weight="700" fill="#1565C0">Saga</text>
  <text x="400" y="486" text-anchor="middle" font-size="10" fill="#999" font-style="italic">分布式事务：强一致（2PC）← 性能权衡 → 最终一致（Saga/TCC）</text>
</svg>
