<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">JS/现代动态语言 内存管理 GC</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="60" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">自动识别并回收不再使用的内存</text><text x="400" y="145" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">现代引擎主要使用 标记-清除 (Mark-Sweep)</text><rect x="40" y="200" width="720" height="200" rx="8" ry="8" fill="#FFFDE7" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="400" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">分代回收 (V8 / JVM 类似)</text><rect x="60" y="250" width="320" height="130" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="220" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">新生代 (Young)</text><text x="220" y="300" text-anchor="middle" font-size="11" font-weight="normal" fill="#388E3C">Scavenger / Cheney 复制算法</text><text x="220" y="325" text-anchor="middle" font-size="11" font-weight="normal" fill="#388E3C">From → To 半区复制</text><text x="220" y="355" text-anchor="middle" font-size="11" font-weight="normal" fill="#388E3C" font-style="italic">短命对象快速回收</text><rect x="400" y="250" width="320" height="130" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="560" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#B71C1C">老年代 (Old)</text><text x="560" y="300" text-anchor="middle" font-size="11" font-weight="normal" fill="#D84315">Mark-Sweep-Compact</text><text x="560" y="325" text-anchor="middle" font-size="11" font-weight="normal" fill="#D84315">标记 → 清除 → 整理</text><text x="560" y="355" text-anchor="middle" font-size="11" font-weight="normal" fill="#D84315" font-style="italic">长寿命对象</text><rect x="40" y="420" width="720" height="60" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="400" y="445" text-anchor="middle" font-size="12" font-weight="700" fill="#f44336">常见内存泄漏源</text><text x="400" y="465" text-anchor="middle" font-size="11" font-weight="normal" fill="#B71C1C">闭包持有 / 全局变量 / 未清理的定时器 / DOM 引用 / 循环引用</text></svg>
