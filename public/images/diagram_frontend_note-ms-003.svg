<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">如果一个 Agent 会生成站点、表格和 PPT，前端怎样组织产物面板？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">按任务分组，再按产物类型展示预览和下一步动作。产物和对话流解耦，支持局部重生成。</text>

  <rect x="80" y="90" width="640" height="56" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="400.0" y="115.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">Task 任务分组</text>
  <text x="400.0" y="132.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">按任务聚合</text>
  <line x1="400" y1="146" x2="400" y2="160" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="80" y="160" width="640" height="56" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="400.0" y="185.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">产物类型分类</text>
  <text x="400.0" y="202.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">站点/表格/PPT</text>
  <line x1="400" y1="216" x2="400" y2="230" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="80" y="230" width="640" height="56" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="400.0" y="255.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">预览 + 下一步</text>
  <text x="400.0" y="272.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">来源/版本/编辑</text>
  <line x1="400" y1="286" x2="400" y2="300" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="80" y="300" width="640" height="56" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="400.0" y="325.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">局部重生成</text>
  <text x="400.0" y="342.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">不整单重跑</text>
  <text x="40" y="380" font-size="12" font-weight="700" fill="#37474F">核心要点</text>
  <circle cx="48" cy="397" r="3" fill="#2196F3"/>
  <text x="58" y="400" font-size="11" fill="#37474F">按任务分组再按产物类型展示</text>
  <circle cx="48" cy="417" r="3" fill="#2196F3"/>
  <text x="58" y="420" font-size="11" fill="#37474F">每个产物带来源/版本/可编辑入口</text>
  <circle cx="48" cy="437" r="3" fill="#2196F3"/>
  <text x="58" y="440" font-size="11" fill="#37474F">支持局部重生成不整单重跑</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">Task 任务分组</text>
  <rect x="185" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="205" y="482" font-size="11" fill="#37474F">产物类型分类</text>
  <rect x="269" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="289" y="482" font-size="11" fill="#37474F">预览 + 下一步</text>
  <rect x="367" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="387" y="482" font-size="11" fill="#37474F">局部重生成</text>
</svg>