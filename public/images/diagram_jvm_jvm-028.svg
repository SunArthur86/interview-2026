<rect x="80" y="150" width="640" height="60" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" opacity="1.0"/><rect x="80" y="150" width="140" height="60" rx="6" ry="6" fill="#607D8B" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="150" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">第 0层</text><text x="150" y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">解释执行</text><text x="310" y="178" text-anchor="start" font-size="12" font-weight="normal" fill="#37474F">启动快，无监控</text><text x="680" y="185" text-anchor="end" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">y=5</text><rect x="80" y="230" width="640" height="60" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="80" y="230" width="140" height="60" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="150" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">第 1层 (C1)</text><text x="150" y="277" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">简单编译</text><text x="310" y="258" text-anchor="start" font-size="12" font-weight="normal" fill="#37474F">可靠优化，无监控</text><text x="680" y="265" text-anchor="end" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">y=4</text><rect x="80" y="310" width="640" height="60" rx="6" ry="6" fill="#DCEDC8" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="80" y="310" width="140" height="60" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="150" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">第 2层 (C1)</text><text x="150" y="357" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">有限监控</text><text x="310" y="338" text-anchor="start" font-size="12" font-weight="normal" fill="#37474F">方法调用/回边次数</text><text x="680" y="345" text-anchor="end" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">y=3</text><rect x="80" y="390" width="640" height="60" rx="6" ry="6" fill="#A5D6A7" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="80" y="390" width="140" height="60" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="150" y="418" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">第 3层 (C1)</text><text x="150" y="437" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">完整监控</text><text x="310" y="418" text-anchor="start" font-size="12" font-weight="normal" fill="#37474F">分支/类型继承信息</text><text x="680" y="425" text-anchor="end" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">y=2</text><rect x="80" y="470" width="640" height="60" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="80" y="470" width="140" height="60" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="150" y="498" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">第 4层 (C2)</text><text x="150" y="517" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">深度优化</text><text x="310" y="498" text-anchor="start" font-size="12" font-weight="normal" fill="#37474F">激进优化，最高性能</text><text x="680" y="505" text-anchor="end" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">y=1</text><line x1="50" y1="175" x2="75" y2="175" stroke="#2196F3" stroke-width="2" marker-end="url(#arrow)"/><text x="35" y="180" text-anchor="end" font-size="11" font-weight="700" fill="#2196F3">启动</text><line x1="400" y1="210" x2="400" y2="230" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/><line x1="400" y1="290" x2="400" y2="310" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/><line x1="400" y1="370" x2="400" y2="390" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/><line x1="400" y1="450" x2="400" y2="470" stroke="#f44336" stroke-width="2.5" marker-end="url(#arrowR)"/><text x="420" y="460" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">热点触发</text><rect x="40" y="90" width="350" height="50" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="215" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#4CAF50">解释器 (Interpreter)</text><text x="215" y="130" text-anchor="middle" font-size="11" font-weight="normal" fill="#1B5E20" font-style="italic">逐行翻译，启动快，性能低</text><rect x="410" y="90" width="350" height="50" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="585" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#f44336">编译器 (JIT Compiler)</text><text x="585" y="130" text-anchor="middle" font-size="11" font-weight="normal" fill="#B71C1C" font-style="italic">编译本地码，启动慢，性能高</text><line x1="700" y1="470" x2="730" y2="470" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/><line x1="730" y1="470" x2="730" y2="180" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/><line x1="730" y1="180" x2="720" y2="180" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/><text x="740" y="320" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">激进优化失败
