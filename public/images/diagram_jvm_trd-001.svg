<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">虚拟线程 vs 平台线程 (JDK 21)</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="350" height="400" rx="8" ry="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><rect x="40" y="90" width="350" height="36" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="215" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Platform Thread (传统)</text><text x="60" y="155" text-anchor="start" font-size="12" font-weight="700" fill="#0D47A1">调度: OS 内核 (1:1)</text><text x="60" y="180" text-anchor="start" font-size="11" font-weight="normal" fill="#1565C0">栈: 固定 (~1MB)</text><text x="60" y="205" text-anchor="start" font-size="11" font-weight="normal" fill="#1565C0">创建成本: 高</text><text x="60" y="230" text-anchor="start" font-size="11" font-weight="normal" fill="#1565C0">上下文切换: 内核态 (~us)</text><text x="60" y="255" text-anchor="start" font-size="11" font-weight="normal" fill="#1565C0">数量: 千级 (受内存限制)</text><text x="60" y="290" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">IO 阻塞:</text><text x="80" y="312" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">整个线程阻塞</text><text x="80" y="332" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">OS 线程被挂起</text><text x="80" y="352" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">需要线程池复用</text><text x="60" y="395" text-anchor="start" font-size="12" font-weight="700" fill="#FF9800">池化焦虑:</text><text x="80" y="418" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">大小难调</text><text x="80" y="438" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">小=排队，大=浪费</text><text x="80" y="458" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">阻塞 = 资源浪费</text><rect x="410" y="90" width="350" height="400" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><rect x="410" y="90" width="350" height="36" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Virtual Thread (JDK 21)</text><text x="430" y="155" text-anchor="start" font-size="12" font-weight="700" fill="#1B5E20">调度: JVM 用户态 (M:N)</text><text x="430" y="180" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C">栈: 动态 (堆上, ~KB)</text><text x="430" y="205" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C">创建成本: 极低</text><text x="430" y="230" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C">上下文切换: 用户态 (~ns)</text><text x="430" y="255" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C">数量: 百万级</text><text x="430" y="290" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">IO 阻塞:</text><text x="450" y="312" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">unmount 载体线程</text><text x="450" y="332" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">栈存堆，让出 OS 线程</text><text x="450" y="352" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">载体线程继续干活</text><text x="430" y="395" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">解决池化焦虑:</text><text x="450" y="418" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">一请求一线程</text><text x="450" y="438" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">同步代码风格</text><text x="450" y="458" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">异步性能</text><rect x="40" y="510" width="720" height="70" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="535" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">M:N 调度模型</text><text x="400" y="555" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">少量 Carrier Thread (ForkJoinPool) ↔ 海量 Virtual Thread</text><text x="400" y="572" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">VirtualThread.block() → unmount → yield → Carrier 跑下一个</text></svg>
