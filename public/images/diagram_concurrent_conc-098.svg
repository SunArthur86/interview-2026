<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr"markerWidth="10"markerHeight="10"refX="8"refY="5"markerUnits="strokeWidth"orient="auto"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">线程属性核心配置</text><rect x="30" y="60" width="740" height="180" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">pthread_attr_t 核心属性体系</text><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="70" y="110" width="160" height="110" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/><text x="150" y="135" text-anchor="middle" font-weight="600" fill="#FF9800">分离状态</text><text x="150" y="160" text-anchor="middle">JOINABLE(默认)</text><text x="150" y="180" text-anchor="middle">DETACHED(分离)</text><text x="150" y="205" text-anchor="middle" fill="#f44336">控制资源自动回收</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="320" y="110" width="160" height="110" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/><text x="400" y="135" text-anchor="middle" font-weight="600" fill="#FF9800">栈空间管理</text><text x="400" y="160" text-anchor="middle">默认大小: 8MB</text><text x="400" y="180" text-anchor="middle">自定义栈地址</text><text x="400" y="205" text-anchor="middle" fill="#f44336">防范栈溢出</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="570" y="110" width="160" height="110" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/><text x="650" y="135" text-anchor="middle" font-weight="600" fill="#FF9800">其他关键属性</text><text x="650" y="160" text-anchor="middle">guardsize(警戒)</text><text x="650" y="180" text-anchor="middle">scope(竞争范围)</text><text x="650" y="205" text-anchor="middle">inheritsched(调度)</text></g><text x="400" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#333">多线程环境致命风险与避坑</text><path d="M 150 290 L 150 320" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><path d="M 400 290 L 400 320" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><path d="M 650 290 L 650 320" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="60" y="325" width="180" height="70" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/><text x="150" y="350" text-anchor="middle" font-weight="600" fill="#f44336">主线程异常退出</text><text x="150" y="375" text-anchor="middle">exit()带崩整个进程</text><text x="150" y="390" text-anchor="middle" fill="#607D8B">应用pthread_exit</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="310" y="325" width="180" height="70" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/><text x="400" y="350" text-anchor="middle" font-weight="600" fill="#f44336">多线程中调用fork</text><text x="400" y="375" text-anchor="middle">复制锁状态引发死锁</text><text x="400" y="390" text-anchor="middle" fill="#607D8B">建议避免或配合exec</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="560" y="325" width="180" height="70" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/><text x="650" y="350" text-anchor="middle" font-weight="600" fill="#f44336">Cache伪共享</text><text x="650" y="375" text-anchor="middle">同缓存行频繁失效</text><text x="650" y="390" text-anchor="middle" fill="#607D8B">alignas(64)对齐</text></g><g transform="translate(20, 440)" font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect x="0" y="0" width="12" height="12" rx="2" fill="#F3E5F5" stroke="#9C27B0"/><text x="20" y="10" fill="#333">核心抽象层</text><rect x="100" y="0" width="12" height="12" rx="2" fill="#FFF3E0" stroke="#FF9800"/><text x="120" y="10" fill="#333">属性分类</text><rect x="200" y="0" width="12" height="12" rx="2" fill="#FFEBEE" stroke="#f44336"/><text x="220" y="10" fill="#333">风险与异常</text></g></svg>
