  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<rect x="40" y="190" width="100" height="60" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="90" y="213" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Producer</text>
<text x="90" y="227" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">生产者</text>
