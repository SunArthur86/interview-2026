<text x="400" y="144" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="700">Kafka Cluster</text>
<text x="180" y="170" font-size="11" fill="#9C27B0" font-weight="700">Topic: order-events  ·  Partition=3  ·  Replication=2</text>
