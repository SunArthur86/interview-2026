<text x="180" y="342" font-size="12" fill="#FF9800" font-weight="700">Consumer Group: 各消费者各自消费不同分区</text>
<rect x="200" y="350" width="120" height="30" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="260" y="359" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Consumer 1</text>
<text x="260" y="371" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">← P0</text>
<rect x="340" y="350" width="120" height="30" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="400" y="359" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Consumer 2</text>
<text x="400" y="371" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">← P1</text>
<rect x="480" y="350" width="120" height="30" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="540" y="359" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Consumer 3</text>
<text x="540" y="371" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">← P2</text>
<line x1="400" y1="300" x2="400" y2="320" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="304" font-size="11" fill="#FF9800" text-anchor="middle" font-weight="600">consume</text>
<rect x="60" y="410" width="680" height="150" rx="8" fill="#FFFFFF" stroke="#607D8B" stroke-width="1.5"/>
<text x="80" y="434" font-size="13" fill="#607D8B" font-weight="700">核心机制</text>
<circle cx="86" cy="456" r="5" fill="#4CAF50"/>
<text x="100" y="460" font-size="12" fill="#37474F"><tspan fill="#4CAF50" font-weight="700">高吞吐：</tspan>顺序写盘 + 零拷贝(sendfile)</text>
<circle cx="426" cy="456" r="5" fill="#2196F3"/>
<text x="440" y="460" font-size="12" fill="#37474F"><tspan fill="#2196F3" font-weight="700">高可用：</tspan>副本机制 + ISR + Leader 选举</text>
<circle cx="86" cy="492" r="5" fill="#FF9800"/>
<text x="100" y="496" font-size="12" fill="#37474F"><tspan fill="#FF9800" font-weight="700">顺序保证：</tspan>单分区内有序，跨分区无序</text>
<circle cx="426" cy="492" r="5" fill="#9C27B0"/>
<text x="440" y="496" font-size="12" fill="#37474F"><tspan fill="#9C27B0" font-weight="700">Exactly-Once：</tspan>幂等+事务</text>
<circle cx="86" cy="528" r="5" fill="#f44336"/>
<text x="100" y="532" font-size="12" fill="#37474F"><tspan fill="#f44336" font-weight="700">Offset 管理：</tspan>__consumer_offsets</text>
<circle cx="426" cy="528" r="5" fill="#607D8B"/>
<text x="440" y="532" font-size="12" fill="#37474F"><tspan fill="#607D8B" font-weight="700">ZK/KRaft：</tspan>Kafka 3.x 去 ZK</text>
</svg>