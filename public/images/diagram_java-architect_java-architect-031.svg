<text x="250" y="224" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Broker 1</text>
<text x="250" y="236" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Leader: P0</text>
<text x="250" y="248" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Follower: P1</text>
<rect x="330" y="186" width="140" height="100" rx="8" fill="#FFFFFF" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="224" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Broker 2</text>
<text x="400" y="236" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Leader: P1</text>
<text x="400" y="248" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Follower: P2</text>
<rect x="480" y="186" width="140" height="100" rx="8" fill="#FFFFFF" stroke="#2196F3" stroke-width="2"/>
<text x="550" y="224" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Broker 3</text>
<text x="550" y="236" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Leader: P2</text>
<text x="550" y="248" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Follower: P0</text>
