<circle cx="180" cy="200" r="50" fill="#9E9E9E" fill-opacity="0.4" stroke="#37474F" stroke-width="2"/><text x="180" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#212121">White</text><text x="180" y="270" text-anchor="middle" font-size="12" font-weight="normal" fill="#616161">未访问</text><text x="180" y="288" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">(候选垃圾)</text><circle cx="400" cy="200" r="50" fill="#9E9E9E" fill-opacity="0.4" stroke="#37474F" stroke-width="2"/><text x="400" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#212121">Gray</text><text x="400" y="270" text-anchor="middle" font-size="12" font-weight="normal" fill="#616161">已标记</text><text x="400" y="288" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">引用未扫完</text><circle cx="620" cy="200" r="50" fill="#212121" fill-opacity="0.4" stroke="#37474F" stroke-width="2"/><text x="620" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Black</text><text x="620" y="270" text-anchor="middle" font-size="12" font-weight="normal" fill="#616161">已标记</text><text x="620" y="288" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">引用全扫完</text><line x1="235" y1="195" x2="348" y2="195" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><text x="290" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="#607D8B">扫描引用</text><line x1="455" y1="195" x2="568" y2="195" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><text x="510" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="#607D8B">处理完引用</text><rect x="40" y="330" width="350" height="230" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="215" y="355" text-anchor="middle" font-size="13" font-weight="700" fill="#f44336">漏标问题 (两个条件同时发生)</text><text x="60" y="385" text-anchor="start" font-size="12" font-weight="normal" fill="#B71C1C">1. 黑色对象 新增 → 白色引用</text><text x="60" y="408" text-anchor="start" font-size="12" font-weight="normal" fill="#B71C1C">2. 灰色对象 断开 → 白色引用</text><text x="60" y="440" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">结果：白色对象被误判为垃圾</text><text x="60" y="460" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">       导致存活对象被回收</text><circle cx="90" cy="510" r="14" fill="#212121" fill-opacity="0.4" stroke="#37474F" stroke-width="2"/><text x="90" y="513" text-anchor="middle" font-size="9" font-weight="700" fill="#FFF">B</text><circle cx="180" cy="510" r="14" fill="#9E9E9E" fill-opacity="0.4" stroke="#37474F" stroke-width="2"/><text x="180" y="513" text-anchor="middle" font-size="9" font-weight="700" fill="#212121">W</text><line x1="104" y1="510" x2="166" y2="510" stroke="#f44336" stroke-width="2" marker-end="url(#arrowR)"/><text x="135" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#f44336">+new</text><rect x="410" y="330" width="350" height="230" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="585" y="355" text-anchor="middle" font-size="13" font-weight="700" fill="#4CAF50">解决方案 (写屏障)</text><rect x="425" y="380" width="320" height="42" rx="6" ry="6" fill="#FF980022" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="440" y="397" text-anchor="start" font-size="12" font-weight="700" fill="#FF9800">CMS</text><text x="440" y="413" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">增量更新</text><text x="740" y="405" text-anchor="end" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">关注黑新增白引用</text><rect x="425" y="430" width="320" height="42" rx="6" ry="6" fill="#9C27B022" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="440" y="447" text-anchor="start" font-size="12" font-weight="700" fill="#9C27B0">G1</text><text x="440" y="463" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">SATB</text><text x="740" y="455" text-anchor="end" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">关注灰断白引用快照</text><rect x="425" y="480" width="320" height="42" rx="6" ry="6" fill="#00968822" stroke="#009688" stroke-width="1.5" opacity="1.0"/><text x="440" y="497" text-anchor="start" font-size="12" font-weight="700" fill="#009688">ZGC</text><text x="440" y="513" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">染色指针+读屏障</text><text x="740" y="505" text-anchor="end" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">并发整理无需 STW</text></svg>
