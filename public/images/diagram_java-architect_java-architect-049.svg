<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】权限模型 RBAC、ABAC 与数据权限</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：RBAC 解决&quot;功能权限&quot;（谁能调什么接口），ABAC 解决&quot;数据权限&quot;（谁能看哪条数据）。RBAC 是&quot;用户-角色-权…</text>
<!-- BODY_TOP=110 -->
<rect x="40" y="114" width="720" height="59" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="56" y="144" font-size="15" fill="#2196F3" font-weight="700" dominant-baseline="middle">接入层</text>
<text x="170" y="144" font-size="13" fill="#263238" dominant="middle">DDoS 防护 / WAF / HTTPS / IP 黑白名单</text>
<rect x="40" y="189" width="720" height="59" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="56" y="218" font-size="15" fill="#4CAF50" font-weight="700" dominant-baseline="middle">网关层</text>
<text x="170" y="218" font-size="13" fill="#263238" dominant="middle">认证(JWT/OAuth2) / 鉴权(RBAC) / 防重放 / 限流</text>
<rect x="40" y="264" width="720" height="59" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="56" y="294" font-size="15" fill="#FF9800" font-weight="700" dominant-baseline="middle">应用层</text>
<text x="170" y="294" font-size="13" fill="#263238" dominant="middle">SQL 注入参数化 / XSS 过滤 / CSRF Token / 越权校验</text>
<rect x="40" y="339" width="720" height="59" rx="8" fill="#9C27B022" stroke="#9C27B0" stroke-width="2"/>
<text x="56" y="368" font-size="15" fill="#9C27B0" font-weight="700" dominant-baseline="middle">数据层</text>
<text x="170" y="368" font-size="13" fill="#263238" dominant="middle">敏感字段加密(AES) / 脱敏 / 哈希(BCrypt) / KMS 密钥</text>
<rect x="40" y="414" width="720" height="59" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="56" y="444" font-size="15" fill="#f44336" font-weight="700" dominant-baseline="middle">审计层</text>
<text x="170" y="444" font-size="13" fill="#263238" dominant="middle">操作日志 / 行为审计 / 完整性校验 / 等保合规</text>
</svg>