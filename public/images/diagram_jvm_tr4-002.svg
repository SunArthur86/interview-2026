<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">MAT: Dominator Tree vs Histogram</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="720" height="60" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="400" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#2196F3">MAT 两大核心视图对比</text><text x="400" y="137" text-anchor="middle" font-size="11" font-weight="normal" fill="#1565C0" font-style="italic">直方图找数量 → 支配树找源头</text><rect x="40" y="180" width="340" height="250" rx="8" ry="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><rect x="40" y="180" width="340" height="32" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="210" y="202" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Histogram (直方图)</text><text x="60" y="235" text-anchor="start" font-size="11" font-weight="700" fill="#E65100">维度: 按 类 分组统计</text><text x="60" y="260" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">关心: 对象 数量 与 浅堆</text><rect x="60" y="280" width="310" height="24" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1" opacity="1.0"/><text x="70" y="297" text-anchor="start" font-size="9" font-weight="700" fill="#37474F">Class</text><text x="220" y="297" text-anchor="start" font-size="9" font-weight="700" fill="#37474F">Objects</text><text x="290" y="297" text-anchor="start" font-size="9" font-weight="700" fill="#37474F">Shallow</text><text x="70" y="308" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">byte[]</text><text x="220" y="308" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">1.2M</text><text x="290" y="308" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">480MB</text><text x="70" y="330" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">java.lang.String</text><text x="220" y="330" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">950K</text><text x="290" y="330" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">45MB</text><text x="70" y="352" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">java.util.HashMap$Node</text><text x="220" y="352" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">800K</text><text x="290" y="352" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">38MB</text><text x="70" y="374" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">char[]</text><text x="220" y="374" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">600K</text><text x="290" y="374" text-anchor="start" font-size="9" font-weight="normal" fill="#37474F">28MB</text><text x="60" y="410" text-anchor="start" font-size="10" font-weight="600" fill="#9C27B0" font-style="italic">适合: 找重复对象多的类</text><rect x="420" y="180" width="340" height="250" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><rect x="420" y="180" width="340" height="32" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="590" y="202" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Dominator Tree (支配树)</text><text x="440" y="235" text-anchor="start" font-size="11" font-weight="700" fill="#1B5E20">维度: 按 支配关系 树状结构</text><text x="440" y="260" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C">关心: 保留堆 (Retained Heap)</text><rect x="560" y="280" width="80" height="24" rx="6" ry="6" fill="#A5D6A7" stroke="#4CAF50" stroke-width="1" opacity="1.0"/><text x="600" y="297" text-anchor="middle" font-size="9" font-weight="700" fill="#1B5E20">ClassLoader</text><line x1="590" y1="304" x2="510" y2="326" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="610" y1="304" x2="690" y2="326" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="470" y="326" width="90" height="24" rx="6" ry="6" fill="#81C784" stroke="#4CAF50" stroke-width="1" opacity="1.0"/><text x="515" y="343" text-anchor="middle" font-size="9" font-weight="700" fill="#1B5E20">HashMap</text><rect x="660" y="326" width="80" height="24" rx="6" ry="6" fill="#81C784" stroke="#4CAF50" stroke-width="1" opacity="1.0"/><text x="700" y="343" text-anchor="middle" font-size="9" font-weight="700" fill="#1B5E20">ArrayList</text><line x1="500" y1="350" x2="480" y2="372" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="440" y="372" width="90" height="22" rx="6" ry="6" fill="#66BB6A" stroke="#4CAF50" stroke-width="1" opacity="1.0"/><text x="485" y="387" text-anchor="middle" font-size="9" font-weight="700" fill="#1B5E20">Node[]</text><text x="590" y="410" text-anchor="start" font-size="10" font-weight="600" fill="#9C27B0" font-style="italic">适合: 找内存占用源头</text><rect x="30" y="430" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="440" width="16" height="16" rx="3" fill="#FF9800" stroke="#37474F" stroke-width="1"/><text x="62.0" y="453" font-size="12" fill="#37474F" text-anchor="start">直方图: 找数量</text><rect x="400.0" y="440" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="422.0" y="453" font-size="12" fill="#37474F" text-anchor="start">支配树: 找源头</text>
</svg>
