<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Channel 的作用是什么？为什么是线程安全的？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">Channel 是 Netty 对&quot;一个开放的网络连接&quot;的抽象（封装了 Socket），大大降低了直接用 Socket 类的复杂性。它的一个关键工程价值是线程…</text>

  <ellipse cx="400" cy="270" rx="100" ry="42" fill="#9C27B0"/>
  <text x="400" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Channel</text>
  <line x1="140" y1="140" x2="400" y2="270" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="70" y="114" width="140" height="52" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="140.0" y="137.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Socket 封装</text>
  <text x="140.0" y="154.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">底层传输</text>
  <line x1="660" y1="140" x2="400" y2="270" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="590" y="114" width="140" height="52" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="660.0" y="137.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">线程安全</text>
  <text x="660.0" y="154.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">同 EventLoop</text>
  <line x1="80" y1="270" x2="400" y2="270" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="10" y="244" width="140" height="52" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="80.0" y="267.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">I/O 操作</text>
  <text x="80.0" y="284.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">bind/connect</text>
  <line x1="720" y1="270" x2="400" y2="270" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="650" y="244" width="140" height="52" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="720.0" y="267.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">广播场景</text>
  <text x="720.0" y="284.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">聊天室</text>
  <text x="40" y="455" font-size="12" font-weight="700" fill="#37474F">Channel=对开放连接(如网络socket)的抽象,封装底层Socket</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">Socket 封装</text>
  <rect x="185" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="205" y="482" font-size="11" fill="#37474F">线程安全</text>
  <rect x="255" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="275" y="482" font-size="11" fill="#37474F">I/O 操作</text>
  <rect x="339" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="359" y="482" font-size="11" fill="#37474F">广播场景</text>
</svg>