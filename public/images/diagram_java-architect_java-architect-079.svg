<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】图片、视频处理任务的异步架构</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：图片视频处理是 CPU/GPU 密集型任务（转码、压缩、加水印），不能在 Web 请求线程同步做（阻塞线程、超时、OOM…</text>
