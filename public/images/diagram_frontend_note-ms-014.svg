<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">如果产品要加更多 Agent，前端怎样保持扩展能力而不是越做越重？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">用插件化架构：Agent能力标准化为插件(Skill接口)，前端通过注册表动态加载，新增Agent=新增插件不改主架构。</text>

  <rect x="280" y="90" width="240" height="60" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="400.0" y="117.0" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">主架构</text>
  <text x="400.0" y="134.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">稳定不变</text>
  <text x="40" y="200" font-size="13" font-weight="700" fill="#37474F">Agent 能力 → 标准化 Skill 接口</text>
  <rect x="280" y="220" width="240" height="50" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="400.0" y="242.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">注册表 Registry</text>
  <text x="400.0" y="259.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">动态加载/卸载</text>
  <line x1="400" y1="150" x2="400" y2="220" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="320" width="165" height="55" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="142.5" y="352.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Agent A</text>
  <line x1="400" y1="270" x2="142" y2="320" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="245" y="320" width="165" height="55" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="327.5" y="352.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Agent B</text>
  <line x1="400" y1="270" x2="327" y2="320" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="430" y="320" width="165" height="55" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="512.5" y="352.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Agent C</text>
  <line x1="400" y1="270" x2="512" y2="320" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="615" y="320" width="165" height="55" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="697.5" y="352.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Agent D (新)</text>
  <line x1="400" y1="270" x2="697" y2="320" stroke="#f44336" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="40" y="425" font-size="12" font-weight="700" fill="#2E7D32">新增 Agent = 新增插件，不改主架构（配置驱动）</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">主架构</text>
  <rect x="143" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="163" y="482" font-size="11" fill="#37474F">注册表</text>
  <rect x="206" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="226" y="482" font-size="11" fill="#37474F">插件</text>
  <rect x="262" y="470" width="14" height="14" rx="3" fill="#f44336"/>
  <text x="282" y="482" font-size="11" fill="#37474F">新插件</text>
</svg>