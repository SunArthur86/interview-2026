<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="max-width:100%;height:auto;font-family:system-ui,-apple-system,'PingFang SC',sans-serif;">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#666"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4CAF50"/>
    </marker>
    <marker id="arro" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f44336"/>
    </marker>
  </defs>

  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Broker 的 HA</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#607D8B">Slave建立长连接拉取Master数据实现备份，支持读写分离。</text>
  <rect x="70" y="185" width="160" height="70" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="150" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">Master</text>
  <text x="150" y="234" text-anchor="middle" font-size="11" fill="#E65100">读写（部分场景）</text>
  <rect x="470" y="100" width="160" height="60" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="550" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Slave-1</text>
  <text x="550" y="144" text-anchor="middle" font-size="11" fill="#1565C0">只读</text>
  <rect x="470" y="190" width="160" height="60" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="550" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Slave-2</text>
  <text x="550" y="234" text-anchor="middle" font-size="11" fill="#1565C0">只读</text>
  <rect x="470" y="280" width="160" height="60" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="550" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Slave-3</text>
  <text x="550" y="324" text-anchor="middle" font-size="11" fill="#1565C0">只读</text>
  <line x1="230" y1="220" x2="470" y2="130" stroke="#FF9800" stroke-width="2" marker-end="url(#arro)"/>
  <line x1="230" y1="220" x2="470" y2="220" stroke="#FF9800" stroke-width="2" marker-end="url(#arro)"/>
  <line x1="230" y1="220" x2="470" y2="310" stroke="#FF9800" stroke-width="2" marker-end="url(#arro)"/>
  <text x="330" y="180" font-size="10" font-weight="600" fill="#FF9800">binlog 复制</text>
  <text x="400" y="380" text-anchor="middle" font-size="12" fill="#666" font-weight="700">三种复制方式对比</text>
  <rect x="80" y="395" width="200" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="180" y="420" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">异步复制</text>
  <text x="180" y="440" text-anchor="middle" font-size="10" fill="#E65100">性能高 · 可能丢</text>
  <rect x="300" y="395" width="200" height="60" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="400" y="420" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">半同步复制</text>
  <text x="400" y="440" text-anchor="middle" font-size="10" fill="#1565C0">至少 1 从 ACK</text>
  <rect x="520" y="395" width="200" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="620" y="420" text-anchor="middle" font-size="12" font-weight="700" fill="#2E7D32">全同步复制</text>
  <text x="620" y="440" text-anchor="middle" font-size="10" fill="#2E7D32">强一致 · 性能低</text>
  <text x="400" y="486" text-anchor="middle" font-size="10" fill="#999" font-style="italic">MySQL 主从：binlog → relay log → 重放；读写分离提升读吞吐</text>
</svg>
