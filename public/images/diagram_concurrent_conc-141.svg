<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-size="18" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">ConcurrentHashMap JDK 8 写流程结构图</text><ellipse cx="150" cy="90" rx="70" ry="25" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="150" y="95" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">put(key, value)</text><line x1="150" y1="115" x2="150" y2="165" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><polygon points="100,165 200,165 250,210 200,255 100,255 50,210" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="150" y="206" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">计算 Hash 定位</text><text x="150" y="224" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">数组桶 (Bucket)</text><line x1="250" y1="185" x2="370" y2="115" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="250" y1="235" x2="370" y2="295" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="370" y="70" width="180" height="80" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="460" y="100" font-size="13" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">路径 A: 空桶</text><text x="460" y="120" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">CAS 插入 Node</text><text x="460" y="140" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#607D8B">无锁化操作, 极高性能</text><rect x="370" y="250" width="180" height="80" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="460" y="280" font-size="13" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">路径 B: Hash 冲突</text><text x="460" y="300" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">synchronized 锁头节点</text><text x="460" y="320" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#607D8B">锁粒度极细, 不影响其他桶</text><line x1="550" y1="110" x2="650" y2="110" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="550" y1="290" x2="650" y2="290" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="650" y="170" width="130" height="60" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="715" y="195" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">链表长度≥8</text><text x="715" y="215" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">转红黑树</text><rect x="50" y="360" width="350" height="100" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="225" y="385" font-size="13" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">为什么弃用 JDK7 Segment?</text><text x="225" y="408" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">1. 分段锁内存冗余, 并发度固定受限</text><text x="225" y="428" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">2. size() 需全局加锁遍历统计</text><text x="225" y="448" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">3. 借助 JDK6+ sync 的偏向锁优化</text><rect x="420" y="360" width="330" height="100" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="585" y="385" font-size="13" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">JDK 8 辅助增强机制</text><text x="585" y="408" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">1. volatile 保证 Node 读完全无锁</text><text x="585" y="428" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">2. 多线程并发协助扩容迁移</text><text x="585" y="448" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">3. CounterCell 分散 size 计数热点</text></svg>
