<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">ThreadLocal 内存泄漏与数据隔离机制</text><rect x="40" y="60" width="200" height="160" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="140" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">Thread 核心线程</text><line x1="60" y1="100" x2="220" y2="100" stroke="#90CAF9" stroke-width="1"/><text x="140" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">属性: ThreadLocalMap</text><rect x="60" y="140" width="160" height="60" rx="4" fill="#fff" stroke="#90CAF9"/><text x="140" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">Entry数组 (线性探测)</text><text x="140" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">Key(弱引用) -> Value(强引用)</text><rect x="320" y="60" width="160" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">ThreadLocal 实例</text><text x="400" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">作为操作的外部句柄</text><path d="M 310 100 L 240 140" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><text x="275" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">GC Root 断开</text><text x="275" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">Key 变 null</text><rect x="560" y="60" width="200" height="160" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="660" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">Thread 业务线程</text><line x1="580" y1="100" x2="740" y2="100" stroke="#90CAF9" stroke-width="1"/><text x="660" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">属性: ThreadLocalMap</text><rect x="580" y="140" width="160" height="60" rx="4" fill="#fff" stroke="#90CAF9"/><text x="660" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">Entry数组</text><text x="660" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">各自独立隔离的副本</text><path d="M 400 120 Q 200 220 140 200" stroke="#2196F3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><text x="200" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">this.get()</text><path d="M 400 120 Q 600 220 660 200" stroke="#2196F3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><text x="600" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">this.get()</text><rect x="150" y="280" width="500" height="130" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" stroke-dasharray="5"/><text x="400" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">⚠️ 线程池复用导致的内存泄漏风险</text><text x="400" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">1. ThreadLocal 外部强引用置空，Key 被 GC 回收变为 null。</text><text x="400" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">2. 核心线程长期存活，Value 强引用链不断开，无法被回收。</text><text x="400" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">3. 可能导致上一个任务的数据污染下一个复用的任务。</text><rect x="270" y="390" width="260" height="30" rx="15" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="400" y="410" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">✅ 解决：finally { threadLocal.remove(); }</text><g transform="translate(40, 440)"><rect width="20" height="14" fill="#E3F2FD" stroke="#2196F3"/><text x="30" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">数据/流程</text><rect x="110" width="20" height="14" fill="#F3E5F5" stroke="#9C27B0"/><text x="140" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">抽象/句柄</text><rect x="220" width="20" height="14" fill="#FFEBEE" stroke="#f44336"/><text x="250" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">风险/异常</text><rect x="330" width="20" height="14" fill="#E8F5E9" stroke="#4CAF50"/><text x="360" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">正确方案</text></g></svg>
