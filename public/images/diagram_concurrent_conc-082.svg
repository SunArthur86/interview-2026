<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker><marker id="arr_fail" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#f44336"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">乐观锁核心：CAS 自旋重试机制</text><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="50" y="90" width="140" height="50" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="120" y="115" text-anchor="middle" font-weight="700" fill="#333">读取数据</text><text x="120" y="132" text-anchor="middle" fill="#607D8B">获取当前版本V</text><rect x="240" y="90" width="140" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="310" y="115" text-anchor="middle" font-weight="700" fill="#333">业务逻辑处理</text><text x="310" y="132" text-anchor="middle" fill="#607D8B">计算新值B</text><polygon points="500,80 580,115 500,150 420,115" fill="#FFF3E0" stroke="#FF9800"/><text x="500" y="112" text-anchor="middle" font-weight="700" fill="#333">CAS操作</text><text x="500" y="128" text-anchor="middle" fill="#333">V == A ?</text><rect x="630" y="90" width="120" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="690" y="110" text-anchor="middle" font-weight="700" fill="#4CAF50">更新成功</text><text x="690" y="128" text-anchor="middle" fill="#607D8B">写入新值B</text><line x1="190" y1="115" x2="238" y2="115" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="380" y1="115" x2="418" y2="115" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="580" y1="115" x2="628" y2="115" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><text x="604" y="105" font-size="11" text-anchor="middle" fill="#4CAF50">是</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><polygon points="300,220 340,260 300,300 260,260" fill="#FFEBEE" stroke="#f44336"/><text x="300" y="255" text-anchor="middle" font-weight="700" fill="#f44336">更新失败</text><text x="300" y="275" text-anchor="middle" fill="#f44336">已被修改</text><line x1="500" y1="150" x2="340" y2="220" stroke="#f44336" stroke-width="2" marker-end="url(#arr_fail)"/><text x="420" y="180" font-size="11" text-anchor="middle" fill="#f44336">否</text><path d="M 260 260 C 100 260, 100 115, 48 115" stroke="#FF9800" stroke-width="1.5" fill="none" stroke-dasharray="5,5" marker-end="url(#arr)"/><text x="80" y="190" text-anchor="middle" fill="#FF9800" font-size="11">自旋重试</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="420" y="230" width="330" height="180" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="585" y="255" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">并发控制策略对比</text><rect x="440" y="270" width="135" height="60" rx="8" fill="#fff" stroke="#9C27B0"/><text x="507" y="290" text-anchor="middle" font-weight="700" fill="#333">乐观锁</text><text x="507" y="308" text-anchor="middle" fill="#4CAF50">优势: 读不加锁</text><text x="507" y="324" text-anchor="middle" fill="#f44336">劣势: 冲突重试耗CPU</text><rect x="595" y="270" width="135" height="60" rx="8" fill="#fff" stroke="#9C27B0"/><text x="662" y="290" text-anchor="middle" font-weight="700" fill="#333">悲观锁</text><text x="662" y="308" text-anchor="middle" fill="#4CAF50">优势: 写操作安全</text><text x="662" y="324" text-anchor="middle" fill="#f44336">劣势: 阻塞并发低</text><text x="585" y="360" text-anchor="middle" font-weight="700" fill="#f44336">CAS 致命痛点</text><text x="585" y="380" text-anchor="middle" fill="#333">ABA问题 (需加版本号)</text><text x="585" y="395" text-anchor="middle" fill="#333">仅保证单个变量原子性</text></g><g transform="translate(0, 450)" font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect