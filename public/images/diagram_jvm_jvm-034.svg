<rect x="40" y="100" width="720" height="60" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#37474F">封装数据与行为的模板</text><text x="400" y="148" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">通过构造器初始化 → 方法暴露功能 → 保护内部状态</text><rect x="150" y="190" width="500" height="280" rx="8" ry="8" fill="#FAFAFA" stroke="#607D8B" stroke-width="2" opacity="1.0"/><rect x="150" y="190" width="500" height="40" rx="6" ry="6" fill="#37474F" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="215" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">class User { }</text><rect x="170" y="250" width="460" height="80" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="190" y="273" text-anchor="start" font-size="12" font-weight="700" fill="#2196F3">字段 (Fields) - 状态</text><text x="190" y="295" text-anchor="start" font-size="11" font-weight="normal" fill="#0D47A1">private String name;</text><text x="190" y="315" text-anchor="start" font-size="11" font-weight="normal" fill="#0D47A1">private int age;  // 封装隐藏</text><rect x="170" y="345" width="460" height="50" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="190" y="368" text-anchor="start" font-size="12" font-weight="700" fill="#E65100">构造器 (Constructor) - 初始化</text><text x="190" y="388" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">public User(name, age) { ... }</text><rect x="170" y="410" width="460" height="50" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="190" y="433" text-anchor="start" font-size="12" font-weight="700" fill="#1B5E20">方法 (Methods) - 行为</text><text x="190" y="453" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C">getter / setter / business logic</text><rect x="30" y="470" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="480" width="16" height="16" rx="3" fill="#2196F3" stroke="#37474F" stroke-width="1"/><text x="62.0" y="493" font-size="12" fill="#37474F" text-anchor="start">状态(字段)</text><rect x="280.0" y="480" width="16" height="16" rx="3" fill="#FF9800" stroke="#37474F" stroke-width="1"/><text x="302.0" y="493" font-size="12" fill="#37474F" text-anchor="start">初始化</text><rect x="520.0" y="480" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="542.0" y="493" font-size="12" fill="#37474F" text-anchor="start">行为(方法)</text>
