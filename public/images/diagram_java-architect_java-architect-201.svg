<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】线上频繁死锁告警：如何用 MySQL 证据链定位死锁</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：线上频繁死锁告警时，架构师要能用 MySQL 自带的&quot;证据链&quot;还原死锁现场——从 SHOW ENGINE INNODB …</text>
<!-- BODY_TOP=110 -->
<rect x="60" y="110" width="680" height="50" rx="8" fill="#f44336"/>
<text x="400" y="142" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="700">死锁 = 两个或多个线程互相等待对方释放资源</text>
<text x="60" y="190" font-size="13" fill="#2196F3" font-weight="700" letter-spacing="0.5">4 大必要条件（缺一不可）</text>
<rect x="60" y="210" width="160" height="80" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="140" y="238" font-size="14" fill="#4CAF50" text-anchor="middle" font-weight="700">互斥</text>
<text x="140" y="266" font-size="11" fill="#37404F" text-anchor="middle">资源独占</text>
<rect x="235" y="210" width="160" height="80" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="315" y="238" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="700">占有并等待</text>
<text x="315" y="266" font-size="11" fill="#37404F" text-anchor="middle">持锁再申请</text>
<rect x="410" y="210" width="160" height="80" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="490" y="238" font-size="14" fill="#FF9800" text-anchor="middle" font-weight="700">不剥夺</text>
<text x="490" y="266" font-size="11" fill="#37404F" text-anchor="middle">不能强行夺走</text>
<rect x="585" y="210" width="160" height="80" rx="8" fill="#9C27B022" stroke="#9C27B0" stroke-width="2"/>
<text x="665" y="238" font-size="14" fill="#9C27B0" text-anchor="middle" font-weight="700">循环等待</text>
<text x="665" y="266" font-size="11" fill="#37404F" text-anchor="middle">环路依赖</text>
<text x="400" y="320" font-size="13" fill="#f44336" text-anchor="middle" font-weight="700">经典示意：线程A 持锁1 等锁2；线程B 持锁2 等锁1</text>
<rect x="140" y="340" width="180" height="50" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="230" y="351" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">线程A</text>
<text x="230" y="365" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">持 Lock1 → 等</text>
<text x="230" y="379" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600"> Lock2</text>
<rect x="480" y="340" width="180" height="50" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="570" y="351" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">线程B</text>
<text x="570" y="365" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">持 Lock2 → 等</text>
<text x="570" y="379" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600"> Lock1</text>
<line x1="320" y1="355" x2="480" y2="355" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="349" font-size="11" fill="#f44336" text-anchor="middle" font-weight="600">等待</text>
<line x1="480" y1="375" x2="320" y2="375" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="369" font-size="11" fill="#f44336" text-anchor="middle" font-weight="600">等待</text>
<rect x="60" y="420" width="680" height="130" rx="10" fill="#FFFFFF" stroke="#4CAF50" stroke-width="1.5"/>
<text x="80" y="444" font-size="13" fill="#4CAF50" font-weight="700">解决方法</text>
<rect x="80" y="460" width="155" height="76" rx="6" fill="#4CAF5022" stroke="#4CAF50" stroke-width="1.5"/>
<text x="158" y="486" font-size="12" fill="#4CAF50" text-anchor="middle" font-weight="700">破坏循环等待</text>
<text x="158" y="512" font-size="10" fill="#37404F" text-anchor="middle">固定锁顺序</text>
<rect x="245" y="460" width="155" height="76" rx="6" fill="#2196F322" stroke="#2196F3" stroke-width="1.5"/>
<text x="323" y="486" font-size="12" fill="#2196F3" text-anchor="middle" font-weight="700">超时放弃</text>
<text x="323" y="512" font-size="10" fill="#37404F" text-anchor="middle">tryLock(timeout)</text>
<rect x="410" y="460" width="155" height="76" rx="6" fill="#FF980022" stroke="#FF9800" stroke-width="1.5"/>
<text x="488" y="486" font-size="12" fill="#FF9800" text-anchor="middle" font-weight="700">死锁检测</text>
<text x="488" y="512" font-size="10" fill="#37404F" text-anchor="middle">JStack / Arthas</text>
<rect x="575" y="460" width="155" height="76" rx="6" fill="#9C27B022" stroke="#9C27B0" stroke-width="1.5"/>
<text x="653" y="486" font-size="12" fill="#9C27B0" text-anchor="middle" font-weight="700">避免</text>
<text x="653" y="512" font-size="10" fill="#37404F" text-anchor="middle">一次性申请所有锁</text>
</svg>