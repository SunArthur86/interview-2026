<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Python异步编程在Agent开发中的应用</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">异步编程让Agent在等待LLM/工具响应时不阻塞，可以同时处理多个请求或并行调用多个工具</text>

  <text x="400" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">asyncio：Agent 等待 LLM/工具时不阻塞</text>
  <rect x="60" y="120" width="330" height="80" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="225.0" y="157.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">同步：阻塞等待</text>
  <text x="225.0" y="174.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">LLM 响应 → 线程空等</text>
  <rect x="420" y="120" width="330" height="80" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="585.0" y="157.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">异步：await 让出</text>
  <text x="585.0" y="174.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">等待时处理其他请求</text>
  <text x="40" y="245" font-size="13" font-weight="700" fill="#37474F">必用异步的场景</text>
  <rect x="40" y="265" width="240" height="65" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="160.0" y="294.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">并行工具调用</text>
  <text x="160.0" y="311.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">多个 Tool 同时</text>
  <rect x="295" y="265" width="240" height="65" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="415.0" y="294.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">流式输出</text>
  <text x="415.0" y="311.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">token 逐个返回</text>
  <rect x="550" y="265" width="240" height="65" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="670.0" y="294.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">多用户并发</text>
  <text x="670.0" y="311.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">不互相阻塞</text>
  <text x="40" y="375" font-size="13" font-weight="700" fill="#C62828">注意</text>
  <rect x="60" y="395" width="680" height="50" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="400.0" y="425.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">CPU 密集型任务不适合 asyncio → …</text>
  <text x="60" y="468" font-size="11" fill="#37474F">关键：await 是"让出控制权"，不是"等待"</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#f44336"/>
  <text x="100" y="482" font-size="11" fill="#37474F">同步</text>
  <rect x="136" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="156" y="482" font-size="11" fill="#37474F">异步</text>
  <rect x="192" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="212" y="482" font-size="11" fill="#37474F">并行</text>
  <rect x="248" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="268" y="482" font-size="11" fill="#37474F">注意</text>
</svg>