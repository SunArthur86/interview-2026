<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】架构图、ADR 与技术决策记录怎么写</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：架构图和 ADR 是架构师的&quot;两支笔&quot;——架构图画给当下看（沟通工具），ADR 写给未来看（决策档案）。好的架构图分层（…</text>
<!-- BODY_TOP=110 -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<rect x="240" y="116" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="104" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">C4 模型：Context（系</text>
<text x="400" y="122" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">统边界）/Container（</text>
<text x="400" y="140" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">进程/服务）/Componen</text>
<text x="400" y="158" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">t（模块）/Code（类）</text>
<text x="400" y="176" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">四层</text>
<rect x="240" y="194" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
<text x="400" y="182" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ADR 四要素：Status（</text>
<text x="400" y="200" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">状态）/Context（背景</text>
<text x="400" y="218" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">）/Decision（决策+替</text>
<text x="400" y="236" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">代方案）/Consequence</text>
<text x="400" y="254" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">s（代价收益）</text>
<rect x="240" y="272" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="400" y="278" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">架构图分层画：高层给</text>
<text x="400" y="296" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">业务看，低层给开发看</text>
<text x="400" y="314" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">，不分层=没人看</text>
<rect x="240" y="350" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-width="2"/>
<text x="400" y="347" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ADR 必写&quot;替代方案否</text>
<text x="400" y="365" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">决理由&quot;，否则未来无</text>
<text x="400" y="383" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">法评估是否需要重新决</text>
<text x="400" y="401" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">策</text>
<rect x="240" y="428" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#f44336" stroke-width="2"/>
<text x="400" y="434" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ADR 入 Git 版本化，</text>
<text x="400" y="452" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">和代码同生命周期，CI</text>
<text x="400" y="470" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600"> 检查核心改动有 ADR</text>
<line x1="400" y1="164" x2="400" y2="194" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="242" x2="400" y2="272" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="320" x2="400" y2="350" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="398" x2="400" y2="428" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
</svg>