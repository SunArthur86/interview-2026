<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle">线程池 execute() 执行流程图</text><ellipse cx="400" cy="75" rx="55" ry="18" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="400" y="79" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">提交新任务</text><polygon points="400,120 510,170 400,220 290,170" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">当前线程数 &lt;</text><text x="400" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">corePoolSize?</text><rect x="80" y="145" width="130" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="145" y="167" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#2196F3">创建核心线程</text><text x="145" y="183" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">执行任务</text><polygon points="400,240 510,290 400,340 290,290" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">任务队列</text><text x="400" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">workQueue 已满?</text><rect x="80" y="265" width="130" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="145" y="28