<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr"markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">BlockingQueue 阻塞队列机制</text><ellipse cx="100" cy="160" rx="60" ry="25" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="100" y="156" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1565C0">生产者</text><text x="100" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">Producer</text><ellipse cx="700" cy="160" rx="60" ry="25" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="700" y="156" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1565C0">消费者</text><text x="700" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">Consumer</text><rect x="180" y="120" width="440" height="80" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#6A1B9A">BlockingQueue 核心操作</text><rect x="200" y="155" width="130" height="35" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><text x="265" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#2E7D32">offer(e, time)</text><text x="265" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#2E7D32">超时入队</text><rect x="340" y="155" width="120" height="35" rx="4" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/><text x="400" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#C62828">put(e)</text><text x="400" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#C62828">满则阻塞</text><rect x="470" y="155" width="130" height="35" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><text x="535" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#2E7D32">poll(time)</text><text x="535" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#2E7D32">超时获取</text><rect x="180" y="225" width="440" height="100" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#E65100">底层实现原理</text><text x="400" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#EF6C00">ReentrantLock 保证线程安全</text><text x="400" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#EF6C00">Condition notFull -> 队列满时 put 阻塞</text><text x="400" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#EF6C00">Condition notEmpty -> 队列空时 take 阻塞</text><rect x="40" y="350" width="240" height="80" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/><text x="160" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1565C0">ArrayBlockingQueue</text><text x="160" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">单锁 ReentrantLock</text><text x="160" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">初始化必须指定容量</text><text x="160" y="424" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">有界，防止内存溢出</text><rect x="280" y="350" width="240" height="80" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/><text x="400" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1565C0">LinkedBlockingQueue</text><text x="400" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">双锁 (putLock, takeLock)</text><text x="400" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">读写分离，吞吐量高</text><text x="400" y="424" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">默认无界(Integer.MAX_VALUE)</text><rect x="520" y="350" width="240" height="80" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/><text x="640" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1565C0">SynchronousQueue</text><text x="640" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">不存储元素的传递队列</text><text x="640" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">take必须等待put发生</text><text x="640" y="424" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#E65100">直接传递，无锁CAS高并发</text><line x1="160" y1="160" x2="175" y2="160" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><line x1="620" y1="160" x2="635" y2="160" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><line x1="400" y1="200" x2="400" y2="220" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/></svg>
