<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">热点代码 (Hot Spot Code)</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="80" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">运行时频繁执行的代码 → JIT 编译为本地机器码</text><text x="400" y="150" text-anchor="middle" font-size="12" font-weight="normal" fill="#BF360C" font-style="italic">两种检测方式</text><rect x="60" y="220" width="340" height="100" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" opacity="1.0"/><rect x="60" y="220" width="340" height="32" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="230" y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">1. 方法调用计数器</text><text x="80" y="275" text-anchor="start" font-size="12" font-weight="normal" fill="#0D47A1">方法被调用次数</text><text x="80" y="295" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">阈值: -XX:CompileThreshold=10000</text><text x="80" y="312" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">(Client) / 10000 (Server)</text><rect x="420" y="220" width="340" height="100" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="420" y="220" width="340" height="32" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="590" y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">2. 回边计数器</text><text x="440" y="275" text-anchor="start" font-size="12" font-weight="normal" fill="#1B5E20">循环体回边次数</text><text x="440" y="295" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">触发 OSR (栈上替换)</text><text x="440" y="312" text-anchor="start" font-size="10" font-weight="normal" fill="#388E3C" font-style="italic">可在循环中即时编译</text><rect x="40" y="360" width="720" height="100" rx="6" ry="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="400" y="385" text-anchor="middle" font-size="13" font-weight="700" fill="#9C27B0">热点代码处理流程</text><rect x="60" y="405" width="140" height="40" rx="6" ry="6" fill="#E1BEE7" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="130" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#4A148C">方法/循环</text><text x="130" y="440" text-anchor="middle" font-size="10" font-weight="normal" fill="#6A1B9A" font-style="italic">频繁执行</text><line x1="200" y1="425" x2="220" y2="425" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrow)"/><rect x="220" y="405" width="140" height="40" rx="6" ry="6" fill="#CE93D8" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="290" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#4A148C">JIT 编译</text><text x="290" y="440" text-anchor="middle" font-size="10" font-weight="normal" fill="#6A1B9A" font-style="italic">C1 → C2</text><line x1="360" y1="425" x2="380" y2="425" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrow)"/><rect x="380" y="405" width="140" height="40" rx="6" ry="6" fill="#BA68C8" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="450" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">本地机器码</text><text x="450" y="440" text-anchor="middle" font-size="10" font-weight="normal" fill="#E1BEE7" font-style="italic">缓存 CodeCache</text><line x1="520" y1="425" x2="540" y2="425" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrow)"/><rect x="540" y="405" width="200" height="40" rx="6" ry="6" fill="#AB47BC" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="640" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">后续直接执行机器码</text><text x="640" y="440" text-anchor="middle" font-size="10" font-weight="normal" fill="#E1BEE7" font-style="italic">跳过解释</text></svg>
