<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10 Z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">JDK 21 虚拟线程底层调度与映射机制</text><rect x="200" y="80" width="400" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0"/><text x="400" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">JVM 虚拟线程调度层</text><text x="400" y="124" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">虚拟线程 N:M 映射 (内存KB级，无限并发)</text><rect x="230" y="170" width="80" height="35" rx="4" fill="#E3F2FD" stroke="#2196F3"/><text x="270" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">VT-1 (Running)</text><rect x="360" y="170" width="80" height="35" rx="4" fill="#E3F2FD" stroke="#2196F3"/><text x="400" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">VT-2 (Running)</text><rect x="490" y="170" width="80" height="35" rx="4" fill="#E3F2FD" stroke="#2196F3"/><text x="530" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">VT-N</text><line x1="270" y1="205" x2="270" y2="250" stroke="#607D8B" marker-end="url(#arr)"/><line x1="530" y1="205" x2="530" y2="250" stroke="#607D8B" marker-end="url(#arr)"/><rect x="230" y="250" width="80" height="40" rx="4" fill="#FFF3E0" stroke="#FF9800"/><text x="270" y="266" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">IO阻塞触发</text><text x="270" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">Continuation</text><text x="530" y="266" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">执行计算逻辑</text><text x="530" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">(非synchronized块)</text><line x1="270" y1="290" x2="180" y2="340" stroke="#607D8B" marker-end="url(#arr)"/><line x1="270" y1="290" x2="620" y2="340" stroke="#607D8B" marker-end="url(#arr)"/><rect x="80" y="340" width="200" height="40" rx="4" fill="#ECEFF1" stroke="#607D8B"/><text x="180" y="364" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">卸载(Unmount)并复制栈帧到堆</text><rect x="520" y="340" width="200" height="40" rx="4" fill="#E8F5E9" stroke="#4CAF50"/><text x="620" y="364" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">释放 Carrier Thread</text><line x1="180" y1="380" x2="180" y2="420" stroke="#607D8B" marker-end="url(#arr)"/><rect x="60" y="420" width="240" height="35" rx="4" fill="#ECEFF1" stroke="#607D8B"/><text x="180" y="442" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">等待IO完成</text><line x1="300" y1="437" x2="395" y2="437" stroke="#607D8B" marker-end="url(#arr)"/><rect x="395" y="420" width="170" height="35" rx="4" fill="#E3F2FD" stroke="#2196F3"/><text x="480" y="442" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">重新挂载(Mount)</text><rect x="660" y="60" width="130" height="90" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="725" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">致命风险</text><text x="725" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">synchronized</text><text x="725" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">会 Pin 住线程</text><text x="725" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">阻塞 OS 线程</text><rect x="660" y="160" width="130" height="90" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="725" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">最佳实践</text><text x="725" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">ReentrantLock</text><text x="725" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">避免 Pinning</text><text x="725" y="236" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">无需线程池池化</text><rect x="40" y="475" width="60" height="15" rx="4" fill="#9C27B0"/><text x="110" y="487" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">JVM调度</text><rect x="200" y="475" width="60" height="15" rx="4" fill="#FF9800"/><text x="270" y="487" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">挂起/卸载</text><rect x="360" y="475" width="60" height="15" rx="4" fill="#4CAF50"/><text x="430" y="487" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">优势/释放</text></svg>
