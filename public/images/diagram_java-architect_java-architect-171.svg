<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】会员权益系统的发放、核销与补偿</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：会员权益系统的核心是&quot;发放 → 核销 → 过期&quot;的生命周期管理 + 补偿一致性。发放是高并发场景（双 11 全站发券），…</text>
<!-- BODY_TOP=110 -->
<rect x="60" y="110" width="680" height="50" rx="8" fill="#2196F3"/>
<text x="400" y="142" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="700">幂等性：多次相同请求 = 一次请求效果（防重复扣款 / 重复下单）</text>
<rect x="60" y="190" width="220" height="100" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="170" y="220" font-size="14" fill="#4CAF50" text-anchor="middle" font-weight="700">唯一索引</text>
<text x="170" y="250" font-size="11" fill="#37474F" text-anchor="middle">DB 层防重</text>
<text x="170" y="266" font-size="11" fill="#37474F" text-anchor="middle">INSERT 冲突即丢弃</text>
<rect x="290" y="190" width="220" height="100" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="220" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="700">Token 令牌</text>
<text x="400" y="250" font-size="11" fill="#37474F" text-anchor="middle">先获取 token</text>
<text x="400" y="266" font-size="11" fill="#37474F" text-anchor="middle">请求携带验证</text>
<rect x="520" y="190" width="220" height="100" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="630" y="220" font-size="14" fill="#FF9800" text-anchor="middle" font-weight="700">乐观锁</text>
<text x="630" y="250" font-size="11" fill="#37474F" text-anchor="middle">version 字段</text>
<text x="630" y="266" font-size="11" fill="#37474F" text-anchor="middle">UPDATE where v=?</text>
<rect x="60" y="310" width="220" height="100" rx="8" fill="#9C27B022" stroke="#9C27B0" stroke-width="2"/>
<text x="170" y="340" font-size="14" fill="#9C27B0" text-anchor="middle" font-weight="700">状态机</text>
<text x="170" y="370" font-size="11" fill="#37474F" text-anchor="middle">业务状态约束</text>
<text x="170" y="386" font-size="11" fill="#37474F" text-anchor="middle">只能单向流转</text>
<rect x="290" y="310" width="220" height="100" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="400" y="340" font-size="14" fill="#f44336" text-anchor="middle" font-weight="700">分布式锁</text>
<text x="400" y="370" font-size="11" fill="#37474F" text-anchor="middle">Redis setnx</text>
<text x="400" y="386" font-size="11" fill="#37474F" text-anchor="middle">互斥执行</text>
<rect x="520" y="310" width="220" height="100" rx="8" fill="#607D8B22" stroke="#607D8B" stroke-width="2"/>
<text x="630" y="340" font-size="14" fill="#607D8B" text-anchor="middle" font-weight="700">防重表</text>
<text x="630" y="370" font-size="11" fill="#37474F" text-anchor="middle">request_id 唯一</text>
<text x="630" y="386" font-size="11" fill="#37474F" text-anchor="middle">先查后处理</text>
<rect x="60" y="430" width="680" height="130" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-width="1.5"/>
<text x="80" y="454" font-size="13" fill="#9C27B0" font-weight="700">选型要点</text>
<circle cx="86" cy="478" r="5" fill="#4CAF50"/>
<text x="100" y="482" font-size="12" fill="#37474F"><tspan fill="#4CAF50" font-weight="700">支付/下单：</tspan>强一致 → Token + DB 唯一索引</text>
<circle cx="86" cy="498" r="5" fill="#2196F3"/>
<text x="100" y="502" font-size="12" fill="#37474F"><tspan fill="#2196F3" font-weight="700">消息消费：</tspan>至少一次 → request_id 防重表</text>
<circle cx="86" cy="518" r="5" fill="#FF9800"/>
<text x="100" y="522" font-size="12" fill="#37474F"><tspan fill="#FF9800" font-weight="700">并发更新：</tspan>乐观锁 version 优选</text>
<circle cx="86" cy="538" r="5" fill="#f44336"/>
<text x="100" y="542" font-size="12" fill="#37474F"><tspan fill="#f44336" font-weight="700">悲观场景：</tspan>分布式锁 + 超时释放</text>
</svg>