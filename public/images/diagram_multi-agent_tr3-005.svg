<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Agent系统中的情景记忆与语义记忆有什么区别？如何设计记忆的遗忘机制？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">情景记流水账，语义记规律；按重要性和时间淘汰旧记忆。</text>

  <rect x="60" y="90" width="320" height="80" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="220.0" y="127.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">情景记忆 Episodic</text>
  <text x="220.0" y="144.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">具体事件 (带时间戳)</text>
  <rect x="420" y="90" width="320" height="80" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="580.0" y="127.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">语义记忆 Semantic</text>
  <text x="580.0" y="144.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">通用知识 (去时间化)</text>
  <text x="40" y="220" font-size="13" font-weight="700" fill="#37474F">遗忘机制 (动态淘汰)</text>
  <rect x="40" y="240" width="240" height="65" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="160.0" y="269.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">时间衰减</text>
  <text x="160.0" y="286.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">旧记忆降权</text>
  <rect x="295" y="240" width="240" height="65" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="415.0" y="269.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">重要性评分</text>
  <text x="415.0" y="286.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">高价值保留</text>
  <rect x="550" y="240" width="240" height="65" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="670.0" y="269.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">访问频率</text>
  <text x="670.0" y="286.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">常用保留</text>
  <text x="40" y="345" font-size="13" font-weight="700" fill="#37474F">技术手段</text>
  <rect x="40" y="365" width="230" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="155" y="395" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">滑动窗口</text>
  <rect x="290" y="365" width="230" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="405" y="395" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">信息合并</text>
  <rect x="540" y="365" width="230" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="655" y="395" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">强化学习筛选</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">情景</text>
  <rect x="136" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="156" y="482" font-size="11" fill="#37474F">语义</text>
  <rect x="192" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="212" y="482" font-size="11" fill="#37474F">遗忘</text>
</svg>