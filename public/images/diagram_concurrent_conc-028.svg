<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#fafafa"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#607D8B"/>
    </marker>
  </defs>
  
  <text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">线程上下文切换流程与优化</text>

  <!-- CPU调度区 -->
  <ellipse cx="100" cy="150" rx="60" ry="35" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/>
  <text x="100" y="145" font-family="system-ui" font-size="14" font-weight="700" fill="#37474F" text-anchor="middle">CPU 核心</text>
  <text x="100" y="163" font-family="system-ui" font-size="11" fill="#546E7A" text-anchor="middle">单核时间片</text>

  <!-- Thread A -->
  <rect x="220" y="90" width="120" height="70" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="280" y="115" font-family="system-ui" font-size="13" font-weight="700" fill="#2E7D32" text-anchor="middle">线程 A (运行)</text>
  <text x="280" y="135" font-family="system-ui" font-size="11" fill="#388E3C" text-anchor="middle">执行逻辑中...</text>
  <text x="280" y="150" font-family="system-ui" font-size="11" fill="#388E3C" text-anchor="middle">PC: 0x1000</text>

  <!-- 保存上下文 -->
  <rect x="380" y="90" width="160" height="70" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="460" y="115" font-family="system-ui" font-size="13" font-weight="700" fill="#E65100" text-anchor="middle">挂起 & 保存现场</text>
  <text x="460" y="135" font-family="system-ui" font-size="11" fill="#EF6C00" text-anchor="middle">存入 TCB / 内核栈</text>
  <text x="460" y="150" font-family="system-ui" font-size="11" fill="#EF6C00" text-anchor="middle">寄存器状态备份</text>

  <!-- 恢复上下文 -->
  <rect x="380" y="220" width="160" height="70" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="460" y="245" font-family="system-ui" font-size="13" font-weight="700" fill="#E65100" text-anchor="middle">调度 & 恢复现场</text>
  <text x="460" y="265" font-family="system-ui" font-size="11" fill="#EF6C00" text-anchor="middle">从 TCB 读入寄存器</text>
  <text x="460" y="280" font-family="system-ui" font-size="11" fill="#EF6C00" text-anchor="middle">TLB 可能刷新</text>

  <!-- Thread B -->
  <rect x="220" y="220" width="120" height="70" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="280" y="245" font-family="system-ui" font-size="13" font-weight="700" fill="#2E7D32" text-anchor="middle">线程 B (运行)</text>
  <text x="280" y="265" font-family="system-ui" font-size="11" fill="#388E3C" text-anchor="middle">抢占CPU执行权</text>
  <text x="280" y="280" font-family="system-ui" font-size="11" fill="#388E3C" text-anchor="middle">PC: 0x2000</text>

  <!-- 切换损耗警告 -->
  <rect x="580" y="120" width="180" height="140" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="670" y="150" font-family="system-ui" font-size="13" font-weight="700" fill="#C62828" text-anchor="middle">切换带来的开销</text>
  <line x1="600" y1="160" x2="740" y2="160" stroke="#ef9a9a"/>
  <text x="670" y="185" font-family="system-ui" font-size="12" fill="#C62828" text-anchor="middle">1. OS调度器执行</text>
  <text x="670" y="210" font-family="system-ui" font-size="12" fill="#C62828" text-anchor="middle">2. 寄存器数据拷贝</text>
  <text x="670" y="235" font-family="system-ui" font-size="12" fill="#C62828" text-anchor="middle">3. CPU缓存失效</text>

  <!-- 流程连线 -->
  <path d="M 160 150 L 215 125" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 340 125 L 375 125" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 460 160 L 460 215" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 380 255 L 345 255" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 220 255 L 165 165" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 优化手段 -->
  <rect x="40" y="360" width="720" height="110" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="400" y="385" font-family="system-ui" font-size="15" font-weight="700" fill="#6A1B9A" text-anchor="middle">如何减少上下文切换？</text>
  
  <rect x="70" y="405" width="140" height="50" rx="6" fill="#ffffff" stroke="#9C27B0"/>
  <text x="140" y="425" font-family="system-ui" font-size="12" font-weight="700" fill="#6A1B9A" text-anchor="middle">无锁并发编程</text>
  <text x="140" y="443" font-family="system-ui" font-size="10" fill="#8E24AA" text-anchor="middle">CAS乐观锁机制</text>

  <rect x="230" y="405" width="140" height="50" rx="6" fill="#ffffff" stroke="#9C27B0"/>
  <text x="300" y="425" font-family="system-ui" font-size="12" font-weight="700" fill="#6A1B9A" text-anchor="middle">使用协程</text>
  <text x="300" y="443" font-family="system-ui" font-size="10" fill="#8E24AA" text-anchor="middle">Goroutine/虚拟线程</text>

  <rect x="390" y="405" width="140" height="50" rx="6" fill="#ffffff" stroke="#9C27B0"/>
  <text x="460" y="425" font-family="system-ui" font-size="12" font-weight="700" fill="#6A1B9A" text-anchor="middle">控制线程数量</text>
  <text x="460" y="443" font-family="system-ui" font-size="10" fill="#8E24AA" text-anchor="middle">合理配置线程池</text>

  <rect x="550" y="405" width="180" height="50" rx="6" fill="#ffffff" stroke="#9C27B0"/>
  <text x="640" y="425" font-family="system-ui" font-size="12" font-weight="700" fill="#6A1B9A" text-anchor="middle">减少I/O阻塞</text>
  <text x="640" y="443" font-family="system-ui" font-size="10" fill="#8E24AA" text-anchor="middle">异步回调/NIO零拷贝</text>
</svg>
