<text x="300" y="279" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Vector</text>
<text x="300" y="291" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(线程安全)</text>
<line x1="110" y1="230" x2="300" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
