<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">JAVA算法</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：利用集合工具类高效处理数据，或实现排序查找等基础逻辑。</text>
<!-- BODY_TOP=110 -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<rect x="330" y="120" width="140" height="40" rx="8" fill="#607D8B22" stroke="#607D8B" stroke-width="2"/>
<text x="400" y="140" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Collection</text>
<rect x="80" y="120" width="140" height="40" rx="8" fill="#9C27B022" stroke="#9C27B0" stroke-width="2"/>
<text x="150" y="140" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Map</text>
<rect x="60" y="190" width="130" height="40" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="125" y="210" font-size="13" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">List</text>
<rect x="220" y="190" width="130" height="40" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="285" y="210" font-size="13" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Set</text>
<rect x="380" y="190" width="130" height="40" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="445" y="210" font-size="13" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Queue</text>
<line x1="380" y1="160" x2="120" y2="190" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="160" x2="280" y2="190" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="420" y1="160" x2="440" y2="190" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="30" y="260" width="100" height="50" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="80" y="279" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ArrayList</text>
<text x="80" y="291" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(数组)</text>
<line x1="110" y1="230" x2="80" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="140" y="260" width="100" height="50" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="190" y="279" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">LinkedList</text>
<text x="190" y="291" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(双向链表)</text>
<line x1="110" y1="230" x2="190" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
