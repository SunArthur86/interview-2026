<text x="350" y="279" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">LinkedHashSet</text>
<text x="350" y="291" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(链表+哈希)</text>
<line x1="280" y1="230" x2="350" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="410" y="260" width="100" height="50" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="460" y="279" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">TreeSet</text>
<text x="460" y="291" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(红黑树)</text>
<line x1="280" y1="230" x2="460" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="350" y="260" width="100" height="50" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="279" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">PriorityQueue</text>
<text x="400" y="291" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(堆)</text>
<line x1="440" y1="230" x2="400" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="460" y="260" width="100" height="50" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="510" y="279" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ArrayDeque</text>
<text x="510" y="291" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(双端数组)</text>
<line x1="440" y1="230" x2="510" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="570" y="260" width="100" height="50" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="620" y="285" font-size="10" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">LinkedList</text>
<line x1="440" y1="230" x2="620" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="540" y="190" width="120" height="50" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="600" y="210" font-size="9" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">HashMap</text>
<text x="600" y="220" font-size="9" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(数组+链表+树)</text>
<line x1="150" y1="145" x2="600" y2="190" stroke="#9C27B0" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
<rect x="670" y="190" width="120" height="50" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="730" y="210" font-size="9" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">LinkedHashMap</text>
<text x="730" y="220" font-size="9" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(链表)</text>
<line x1="150" y1="145" x2="730" y2="190" stroke="#9C27B0" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
<rect x="540" y="260" width="120" height="50" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="600" y="280" font-size="9" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">TreeMap</text>
<text x="600" y="290" font-size="9" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(红黑树)</text>
<line x1="150" y1="145" x2="600" y2="260" stroke="#9C27B0" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
<rect x="670" y="260" width="120" height="50" rx="8" fill="#9C27B022" stroke="#9C27B0" stroke-width="2"/>
<text x="730" y="274" font-size="9" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ConcurrentHash</text>
<text x="730" y="285" font-size="9" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Map</text>
<text x="730" y="296" font-size="9" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(线程安全)</text>
<line x1="150" y1="145" x2="730" y2="260" stroke="#9C27B0" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
<text x="400" y="350" font-size="13" fill="#2196F3" text-anchor="middle" font-weight="700">选型：查多用 HashMap，有序用 Linked，排序用 Tree，并发用 Concurrent</text>
<text x="400" y="378" font-size="12" fill="#607D8B" text-anchor="middle">fail-fast：迭代时 modCount 校验，抛 ConcurrentModificationException</text>
</svg>