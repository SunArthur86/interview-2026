<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr"markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Reactor 线程模型演进</text><rect x="40" y="55" width="220" height="360" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="150" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#1565C0">1. 单线程模型</text><rect x="60" y="110" width="180" height="30" rx="8" fill="#fff" stroke="#2196F3" stroke-width="1.5"/><text x="150" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#1565C0">Client连接请求</text><rect x="60" y="160" width="180" height="45" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="150" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#C62828">单个 NIO 线程</text><text x="150" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#C62828">全能负责: 接收/读写/业务</text><rect x="60" y="225" width="180" height="35" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><text x="150" y="247" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2E7D32">无竞争，实现简单</text><rect x="60" y="280" width="180" height="35" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/><text x="150" y="296" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#C62828">性能瓶颈</text><text x="150" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#C62828">无法利用多核CPU</text><line x1="150" y1="140" x2="150" y2="155" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="150" y1="205" x2="150" y2="220" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="150" y1="260" x2="150" y2="275" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="290" y="55" width="220" height="360" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#E65100">2. 多线程模型</text><rect x="310" y="110" width="180" height="30" rx="8" fill="#fff" stroke="#FF9800" stroke-width="1.5"/><text x="400" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#EF6C00">Client连接请求</text><rect x="310" y="160" width="180" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/><text x="400" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#1565C0">1个 Acceptor 线程</text><text x="400" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">仅负责建立TCP连接</text><rect x="310" y="220" width="180" height="50" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/><text x="400" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#6A1B9A">N个 I/O 工作线程池</text><text x="400" y="256" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#6A1B9A">负责: 读写 + 业务逻辑</text><rect x="310" y="295" width="180" height="35" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><text x="400" y="317" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2E7D32">分离连接建立与读写处理</text><line x1="400" y1="140" x2="400" y2="155" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="400" y1="200" x2="400" y2="215" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="400" y1="270" x2="400" y2="290" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="540" y="55" width="220" height="360" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="650" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2E7D32">3. 主从模型 (Netty默认)</text><rect x="560" y="110" width="180" height="30" rx="8" fill="#fff" stroke="#4CAF50" stroke-width="1.5"/><text x="650" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2E7D32">Client连接请求</text><rect x="560" y="160" width="180" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/><text x="650" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#1565C0">Main Reactor (主)</text><text x="650" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#1565C0">负责接收连接</text><rect x="560" y="220" width="180" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/><text x="650" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#6A1B9A">Sub Reactor (从)</text><text x="650" y="254" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#6A1B9A">负责 I/O 读写操作</text><rect x="560" y="280" width="180" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/><text x="650" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#C62828">Worker 业务线程池</text><text x="650" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#C62828">处理耗时业务逻辑</text><rect x="560" y="340" width="180" height="35" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><text x="650" y="362" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#2E7D32">职责分离，性能极高</text><line x1="650" y1="140" x2="650" y2="155" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="650" y1="200" x2="650" y2="215" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="650" y1="260" x2="650" y2="275" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="650" y1="320" x2="650" y2="335" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="270" y1="150" x2="285" y2="150" stroke="#607D8B" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arr)"/><line x1="520" y1="150" x2="535" y2="150" stroke="#607D8B" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arr)"/></svg>
