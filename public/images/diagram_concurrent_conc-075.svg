<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker><marker id="arr_warn" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#f44336"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Synchronized 锁升级与 Monitor 机制</text><g font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle"><ellipse cx="120" cy="90" rx="60" ry="25" fill="#ECEFF1" stroke="#607D8B"/><text x="120" y="95" fill="#333">无锁状态</text><rect x="230" y="70" width="120" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="290" y="88" fill="#333" font-weight="700">偏向锁</text><text x="290" y="102" fill="#607D8B">单线程访问记ID</text><rect x="380" y="70" width="120" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800"/><text x="440" y="88" fill="#333" font-weight="700">轻量级锁</text><text x="440" y="102" fill="#607D8B">CAS 自旋等待</text><rect x="530" y="70" width="120" height="40" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="590" y="88" fill="#333" font-weight="700">重量级锁</text><text x="590" y="102" fill="#607D8B">OS Mutex 阻塞</text><line x1="180" y1="90" x2="228" y2="90" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="350" y1="90" x2="378" y2="90" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/><text x="365" y="80" font-size="10" fill="#FF9800">竞争</text><line x1="500" y1="90" x2="528" y2="90" stroke="#f44336" stroke-width="1.5" marker-end="url(#arr_warn)"/><text x="515" y="80" font-size="10" fill="#f44336">激烈</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle"><rect x="230" y="150" width="420" height="200" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="440" y="170" font-size="14" font-weight="700" fill="#9C27B0">ObjectMonitor 底层机制 (存储于对象头 Mark Word)</text><rect x="260" y="185" width="140" height="50" rx="8" fill="#fff" stroke="#9C27B0"/><text x="330" y="205" font-weight="700" fill="#333">_owner</text><text x="330" y="225" fill="#607D8B">持有锁的线程</text><rect x="480" y="185" width="140" height="50" rx="8" fill="#fff" stroke="#9C27B0"/><text x="550" y="205" font-weight="700" fill="#333">_count</text><text x="550" y="225" fill="#607D8B">记录重入次数</text><rect x="260" y="250" width="140" height="80" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="330" y="270" font-weight="700" fill="#2196F3">_EntryList</text><text x="330" y="290" fill="#333">阻塞队列</text><text x="330" y="305" fill="#607D8B">等待取锁</text><rect x="480" y="250" width="140" height="80" rx="8" fill="#FFF3E0" stroke="#FF9800"/><text x="550" y="270" font-weight="700" fill="#FF9800">_WaitSet</text><text x="550" y="290" fill="#333">等待队列</text><text x="550" y="305" fill="#607D8B">调用 wait()</text><path d="M 400 230 L 330 248" stroke="#607D8B" stroke-width="1" fill="none" marker-end="url(#arr)"/><path d="M 460 210 L 550 248" stroke="#607D8B" stroke-width="1" fill="none" marker-end="url(#arr)"/><path d="M 400 310 C 420 340, 480 340, 480 310" stroke="#4CAF50" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><text x="440" y="345" font-size="11" fill="#4CAF50">notify() 唤醒</text></g><g transform="translate(0, 400)" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle"><rect x="100" y="0" width="180" height="35" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="190" y="15" font-weight="700" fill="#333">实例方法/代码块</text><text x="190" y="30" fill="#607D8B">锁对象实例</text><rect x="310" y="0" width="180" height="35" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="400" y="15" font-weight="700" fill="#333">静态方法</text><text x="400" y="30" fill="#607D8B">锁 Class 对象</text><rect x="520" y="0" width="180" height="35" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="610" y="15" font-weight="700" fill="#333">底层指令</text><text x="610" y="30" fill="#607D8B">monitorenter / exit</text></g><g transform="translate(0, 460)" font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect x="50" y="0" width="12" height="12" fill="#E3F2FD" stroke="#2196F3"/><text x="68" y="10" fill="#333">基础/开始</text><rect x="150" y="0" width="12" height="12" fill="#FFF3E0" stroke="#FF9800"/><text x="168" y="10" fill="#333">自旋/警告</text><rect x="250" y="0" width="12" height="12" fill="#FFEBEE" stroke="#f44336"/><text x="268" y="10" fill="#333">阻塞/高风险</text><rect x="370" y="0" width="12" height="12" fill="#F3E5F5" stroke="#9C27B0"/><text x="388" y="10" fill="#333">关键底层抽象</text><rect x="500" y="0" width="12" height="12" fill="#E8F5E9" stroke="#4CAF50"/><text x="518" y="10" fill="#333">成功/正常流转</text></g></svg>
