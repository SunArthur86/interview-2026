<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">LLM应用的token成本如何优化？</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：通过模型路由、缓存和上下文压缩等手段降低AI运行开销。</text>
