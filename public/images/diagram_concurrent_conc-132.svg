<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle">Happens-Before 八大规则全景图</text><text x="400" y="55" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="400" text-anchor="middle" fill="#607D8B">JMM 定义的可见性与有序性核心规则</text><ellipse cx="400" cy="100" rx="70" ry="22" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">Happens-Before</text><rect x="60" y="160" width="170" height="55" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="145" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#2196F3">1. 程序顺序规则</text><text x="145" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">同一线程内操作按代码顺序</text><rect x="60" y="230" width="170" height="55" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="145" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#2196F3">2. 监视器锁规则</text><text x="145" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">unlock 操作先于 lock</text><rect x="60" y="300" width="170" height="55" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="145" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#2196F3">3. volatile 规则</text><text x="145" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">写操作先于后续读操作</text><rect x="250" y="160" width="170" height="55" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="335" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">4. 线程启动规则</text><text x="335" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">start() 先于线程内任何操作</text><rect x="250" y="230" width="170" height="55" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="335" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">5. 线程终止规则</text><text x="335" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">所有操作先于 join() 返回</text><rect x="250" y="300" width="170" height="55" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="335" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">6. 线程中断规则</text><text x="335" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">interrupt() 先于检测到中断</text><rect x="440" y="160" width="170" height="55" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="525" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">7. 对象终结规则</text><text x="525" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">初始化完成先于 finalize()</text><rect x="440" y="230" width="170" height="55" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="525" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">8. 传递性规则</text><text x="525" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">A&gt;B 且 B&gt;C，则 A&gt;C</text><rect x="440" y="300" width="170" height="55" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="525" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#607D8B">概念辨析</text><text x="525" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">语义顺序，非绝对时间顺序</text><line x1="145" y1="160" x2="370" y2="122" stroke="#607D8B" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="335" y1="160" x2="400" y2="122" stroke="#607D8B" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="525" y1="160" x2="430" y2="122" stroke="#607D8B" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="525" y1="230" x2="430" y2="122" stroke="#607D8B" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr)"/><rect x="60" y="395" width="550" height="70" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1" stroke-dasharray="5"/><text x="335" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">核心实战场景：DCL 单例模式 (双重检查锁)</text><text x="335" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">未加 volatile：构造函数初始化与引用赋值发生指令重排</text><text x="335" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">加 volatile：底层插入 StoreStore/LoadLoad 屏障，禁止重排序，保证线程安全</text><rect x="640" y="395" width="120" height="70" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1" stroke-dasharray="5"/><text x="700" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">底层实现原理</text><text x="700" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">Memory Barrier</text><text x="700" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">内存屏障机制</text></svg>
