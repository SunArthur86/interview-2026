<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Netty 的核心组件有哪些？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">Netty 用两组组件构建一切：①网络抽象组（Channel 管连接、EventLoop 管控制流、ChannelFuture 管异步通知）负责&quot;如何通信&quot;；…</text>

  <ellipse cx="400" cy="270" rx="100" ry="42" fill="#9C27B0"/>
  <text x="400" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Netty</text>
  <line x1="140" y1="140" x2="400" y2="270" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="70" y="114" width="140" height="52" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="140.0" y="137.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Channel</text>
  <text x="140.0" y="154.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">网络连接抽象</text>
  <line x1="660" y1="140" x2="400" y2="270" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="590" y="114" width="140" height="52" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="660.0" y="137.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">EventLoop</text>
  <text x="660.0" y="154.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">事件执行器</text>
  <line x1="80" y1="270" x2="400" y2="270" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="10" y="244" width="140" height="52" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="80.0" y="267.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">ChannelFuture</text>
  <text x="80.0" y="284.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">异步通知</text>
  <line x1="720" y1="270" x2="400" y2="270" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="650" y="244" width="140" height="52" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="720.0" y="267.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">ChannelHandler</text>
  <text x="720.0" y="284.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">业务逻辑</text>
  <line x1="140" y1="400" x2="400" y2="270" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="70" y="374" width="140" height="52" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="140.0" y="397.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">ChannelPipeline</text>
  <text x="140.0" y="414.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">处理链容器</text>
  <line x1="660" y1="400" x2="400" y2="270" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="590" y="374" width="140" height="52" rx="8" fill="#607D8B" stroke="#607D8B" stroke-width="2"/>
  <text x="660.0" y="397.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">ByteBuf</text>
  <text x="660.0" y="414.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">字节容器</text>
  <text x="40" y="455" font-size="12" font-weight="700" fill="#37474F">网络抽象三件套=Channel(连接)+EventLoop(控制流/并发)+ChannelFuture(异步通知)</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">Channel</text>
  <rect x="171" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="191" y="482" font-size="11" fill="#37474F">EventLoop</text>
  <rect x="276" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="296" y="482" font-size="11" fill="#37474F">ChannelFuture</text>
  <rect x="409" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="429" y="482" font-size="11" fill="#37474F">ChannelHandler</text>
</svg>