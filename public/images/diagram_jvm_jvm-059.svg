<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">Young GC 与 Full GC 触发条件</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="350" height="350" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="40" y="100" width="350" height="36" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="215" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Young GC 触发</text><text x="60" y="165" text-anchor="start" font-size="13" font-weight="700" fill="#1B5E20">主因：Eden 区满</text><text x="60" y="195" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">常见触发：</text><text x="80" y="220" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 新对象分配，Eden 满</text><text x="80" y="245" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• TLAB 分配失败</text><text x="80" y="270" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 分配速率 &gt; 回收速率</text><text x="60" y="310" text-anchor="start" font-size="12" font-weight="700" fill="#FF9800">不触发：</text><text x="80" y="335" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">• 老年代不足时</text><text x="80" y="355" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">   晋升失败 → Full GC</text><text x="60" y="395" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">频率：高 (~秒级)</text><text x="60" y="415" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">耗时：短 (~10-50ms)</text><text x="60" y="435" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">影响：可接受</text><rect x="410" y="100" width="350" height="350" rx="8" ry="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="410" y="100" width="350" height="36" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="585" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Full GC 触发</text><text x="430" y="165" text-anchor="start" font-size="13" font-weight="700" fill="#B71C1C">主因：老年代 / 元空间不足</text><text x="430" y="195" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">常见触发：</text><text x="450" y="220" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 老年代使用率 &gt; 阈值</text><text x="450" y="242" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• Metaspace 空间不足</text><text x="450" y="264" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 空间分配担保失败</text><text x="450" y="286" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• System.gc() 显式调用</text><text x="450" y="308" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• CMS Concurrent Mode Failure</text><text x="450" y="330" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• Promotion Failed (晋升失败)</text><text x="430" y="395" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">频率：低 (异常情况)</text><text x="430" y="415" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">耗时：长 (~秒级)</text><text x="430" y="435" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">影响：致命 (需排查)</text></svg>
