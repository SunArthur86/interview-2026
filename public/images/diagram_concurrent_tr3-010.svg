<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">虚拟线程 Pin 问题原理与缓解</text><ellipse cx="150" cy="100" rx="60" ry="25" fill="#E3F2FD" stroke="#2196F3"/><text x="150" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">VirtualThread</text><rect x="300" y="75" width="180" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800"/><text x="390" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">触发钉住</text><text x="390" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">(synchronized / JNI)</text><line x1="210" y1="100" x2="300" y2="100" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="540" y="75" width="160" height="50" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="620" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">Carrier被钉死阻塞</text><text x="620" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">无法卸载(unmount)</text><line x1="480" y1="100" x2="540" y2="100" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="300" y="165" width="180" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0"/><text x="390" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">ForkJoinPool耗尽</text><line x1="620" y1="125" x2="620" y2="145" stroke="#f44336" stroke-width="2"/><line x1="620" y1="145" x2="390" y2="145" stroke="#f44336" stroke-width="2"/><line x1="390" y1="145" x2="390" y2="1