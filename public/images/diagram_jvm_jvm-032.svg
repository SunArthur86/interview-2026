<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">指令集 (Instruction Set)</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="60" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#37474F">CPU 能识别的命令集合</text><text x="400" y="148" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">JVM 执行引擎: 字节码 → 指令集 → 机器码</text><rect x="40" y="190" width="350" height="250" rx="8" ry="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><rect x="40" y="190" width="350" height="32" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="215" y="212" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">CISC (复杂指令集)</text><text x="60" y="250" text-anchor="start" font-size="12" font-weight="700" fill="#0D47A1">代表: x86/x64</text><text x="60" y="275" text-anchor="start" font-size="12" font-weight="700" fill="#2196F3">特点:</text><text x="80" y="300" text-anchor="start" font-size="11" font-weight="normal" fill="#1565C0">• 指令长度可变</text><text x="80" y="320" text-anchor="start" font-size="11" font-weight="normal" fill="#1565C0">• 指令丰富 (1000+)</text><text x="80" y="340" text-anchor="start" font-size="11" font-weight="normal" fill="#1565C0">• 单指令完成复杂操作</text><text x="80" y="360" text-anchor="start" font-size="11" font-weight="normal" fill="#1565C0">• 内存直接操作</text><text x="60" y="395" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">优势: 编程简单</text><text x="60" y="415" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">劣势: 功耗/解码复杂</text><rect x="410" y="190" width="350" height="250" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><rect x="410" y="190" width="350" height="32" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="212" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">RISC (精简指令集)</text><text x="430" y="250" text-anchor="start" font-size="12" font-weight="700" fill="#1B5E20">代表: ARM/RISC-V</text><text x="430" y="275" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">特点:</text><text x="450" y="300" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C">• 指令长度固定</text><text x="450" y="320" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C">• 指令少 (~100)</text><text x="450" y="340" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C">• Load/Store 架构</text><text x="450" y="360" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C">• 单周期执行</text><text x="430" y="395" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">优势: 低功耗/流水线</text><text x="430" y="415" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">劣势: 指令数多</text></svg>
