<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">偏向锁升级与撤销流程 (Biased Locking)</text><g font-family="system-ui,-apple-system,sans-serif"><rect x="330" y="60" width="140" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="400" y="85" font-size="13" font-weight="700" text-anchor="middle" fill="#607D8B">无锁状态</text><rect x="330" y="130" width="140" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="400" y="150" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">线程1首次加锁</text><text x="400" y="167" font-size="11" text-anchor="middle" fill="#2196F3">CAS修改Mark Word</text><rect x="330" y="210" width="140" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="400" y="230" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">偏向锁(重入)</text><text x="400" y="247" font-size="11" text-anchor="middle" fill="#4CAF50">无CAS,仅比对ID</text><polygon points="400,290 510,330 400,370 290,330" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="335" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">线程2竞争?</text><rect x="100" y="310" width="140" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="170" y="335" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">升级轻量级锁</text><rect x="560" y="310" width="140" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="630" y="330" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">触发撤销(高耗)</text><text x="630" y="347" font-size="11" text-anchor="middle" fill="#f44336">需Safepoint</text><path d="M400,100 L400,130" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><path d="M400,170 L400,210" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><path d="M400,250 L400,290" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><path d="M400,370 L400,410" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="330" y="410" width="140" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="435" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">禁用偏向锁</text><path d="M510,330 L560,330" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><text x="535" y="325" font-size="11" font-weight="700" text-anchor="middle" fill="#FF9800">是</text><path d="M290,330 L240,330" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><text x="265" y="325" font-size="11" font-weight="700" text-anchor="middle" fill="#FF9800">否</text></g><g font-family="system-ui,-apple-system,sans-serif" transform="translate(50, 440)"><rect x="0" y="0" width="12" height="12" fill="#4CAF50"/><text x="18" y="10" font-size="12" text-anchor="start" fill="#333">正常路径</text><rect x="100" y="0" width="12" height="12" fill="#FF9800"/><text x="118" y="10" font-size="12" text-anchor="start" fill="#333">状态判断</text><rect x="200" y="0" width="12" height="12" fill="#f44336"/><text x="218" y="10" font-size="12" text-anchor="start" fill="#333">风险/废弃</text></g></svg>
