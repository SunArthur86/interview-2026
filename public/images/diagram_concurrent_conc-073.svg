<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java 守护线程 (Daemon Thread)</text><g transform="translate(50, 70)"><rect width="350" height="160" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="175" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">应用启动</text><text x="175" y="55" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">Thread thread = new Thread();</text><text x="175" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">thread.setDaemon(true);</text><rect x="35" y="90" width="280" height="50" rx="5" fill="#FFEBEE" stroke="#f44336" stroke-width="1"/><text x="175" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336"><tspan x="175" dy="0">致命风险: 必须在 start() 前调用</tspan><tspan x="175" dy="14">否则抛 IllegalThreadStateException</tspan></text></g><g transform="translate(450, 70)"><rect width="300" height="160" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="150" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">JVM 运行中</text><rect x="20" y="45" width="125" height="90" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/><text x="82" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">用户线程</text><text x="82" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">(主业务逻辑)</text><text x="82" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">执行核心任务</text><rect x="155" y="45" width="125" height="90" rx="5" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/><text x="217" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">守护线程</text><text x="217" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">(GC/后台任务)</text><text x="217" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">伴随运行</text></g><line x1="450" y1="150" x2="400" y2="150" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="425" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">辅助服务</text><g transform="translate(250, 260)"><polygon points="150,0 300,50 150,100 0,50" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="150" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">是否还有</text><text x="150" y="62" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">用户线程?</text></g><line x1="225" y1="230" x2="320" y2="270" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="600" y1="230" x2="380" y2="270" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="345" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">是: 继续</text><line x1="150" y1="310" x2="50" y2="310" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><g transform="translate(0, 360)"><rect x="-50" y="0" width="150" height="80" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="25" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">易错点陷阱</text><text x="25" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#555">守护线程被强制终止时</text><text x="25" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#555">finally 块可能不执行！</text></g><g transform="translate(150, 360)"><rect x="50" y="0" width="250" height="80" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="175" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">否: JVM 自动退出</text><text x="175" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">饭店打烊 (仅剩服务员无用)</text><text x="175" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">守护线程销毁</text></g></svg>
