<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">线程基础：创建与生命周期</text><rect x="40" y="60" width="220" height="200" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="10"/><text x="150" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">Java创建线程方式</text><rect x="60" y="105" width="180" height="25" rx="4" fill="#ECEFF1" stroke="#607D8B"/><text x="150" y="123" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">继承Thread类</text><rect x="60" y="140" width="180" height="25" rx="4" fill="#ECEFF1" stroke="#607D8B"/><text x="150" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">实现Runnable接口</text><rect x="60" y="175" width="180" height="25" rx="4" fill="#ECEFF1" stroke="#607D8B"/><text x="150" y="193" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">实现Callable(带返回值)</text><rect x="60" y="210" width="180" height="35" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="150" y="226" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#4CAF50">使用线程池</text><text x="150" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#4CAF50">(生产环境推荐)</text><line x1="260" y1="160" x2="310" y2="160" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="50" y="280" width="200" height="180" fill="#FFEBEE" stroke="#f44336" stroke-width="2" rx="10"/><text x="150" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">核心禁忌与风险</text><text x="150" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">严禁显式new Thread()</text><text x="80" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#607D8B">- 资源开销大</text><text x="80" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#607D8B">- 无限创建致OOM</text><text x="80" y="405" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#607D8B">- 缺乏统一管理</text><text x="80" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#f44336">- 导致CPU频繁上下文切换</text><rect x="320" y="60" width="440" height="400" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="10"/><text x="540" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">线程生命周期与状态流转 (JVM层面)</text><rect x="460" y="105" width="160" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="540" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">NEW (新建)</text><line x1="540" y1="135" x2="540" y2="160" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="565" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">start()</text><rect x="460" y="160" width="160" height="35" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="540" y="177" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">RUNNABLE</text><text x="540" y="191" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">(OS的就绪+运行态)</text><line x1="450" y1="185" x2="350" y2="250" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><line x1="450" y1="200" x2="350" y2="340" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><rect x="340" y="240" width="110" height="30" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="395" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">BLOCKED</text><text x="395" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#607D8B">等待synchronized锁</text><rect x="340" y="330" width="110" height="30" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="395" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">TIMED_WAITING</text><text x="395" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#607D8B">sleep(t)/wait(t)</text><line x1="630" y1="185" x2="730" y2="250" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><rect x="630" y="240" width="110" height="30" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="685" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">WAITING</text><text x="685" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#607D8B">wait()/join()</text><path d="M 685 270 Q 680 300 620 320 T 540 330 L 540 330" fill="none" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><path d="M 395 270 Q 420 300 480 330 T 540 330" fill="none" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><text x="425" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#607D8B">锁释放/唤醒</text><line x1="540" y1="210" x2="540" y2="400" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="560" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">执行完毕/异常</text><rect x="460" y="400" width="160" height="35" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="540" y="422" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">TERMINATED (终止)</text></svg>
