<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】架构治理委员会如何避免形式主义</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：架构治理委员会（ARB, Architecture Review Board）容易沦为形式主义——评审走过场、决议不跟踪…</text>
<!-- BODY_TOP=110 -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<rect x="240" y="116" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="113" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">分级评审：核心链路/</text>
<text x="400" y="131" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">数据迁移/外部接口必</text>
<text x="400" y="149" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">评审；小改动走 PR re</text>
<text x="400" y="167" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">view 轻流程</text>
<rect x="240" y="194" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
<text x="400" y="200" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">RFC + ADR 是治理的&quot;</text>
<text x="400" y="218" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">两件套&quot;：RFC 讨方案</text>
<text x="400" y="236" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">，ADR 记决策</text>
<rect x="240" y="272" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="400" y="278" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">评审决议与上线门禁挂</text>
<text x="400" y="296" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">钩（无 ADR 不上线）</text>
<text x="400" y="314" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">，否则流于形式</text>
<rect x="240" y="350" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-width="2"/>
<text x="400" y="347" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">委员会 4-7 人：架构</text>
<text x="400" y="365" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">师 + 资深开发 + SRE </text>
<text x="400" y="383" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">+ 安全 + 业务（涉核</text>
<text x="400" y="401" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">心链路时）</text>
<rect x="240" y="428" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#f44336" stroke-width="2"/>
<text x="400" y="434" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">评审否决率健康值 10-</text>
<text x="400" y="452" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">20%，太低是走过场，</text>
<text x="400" y="470" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">太高是预沟通不够</text>
<line x1="400" y1="164" x2="400" y2="194" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="242" x2="400" y2="272" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="320" x2="400" y2="350" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="398" x2="400" y2="428" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
</svg>