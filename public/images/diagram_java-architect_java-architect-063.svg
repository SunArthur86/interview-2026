<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】商品中心模型、类目属性与扩展性</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：商品中心是电商的&quot;数据基座&quot;——所有业务（搜索/推荐/下单/库存/价格）都依赖商品数据。核心挑战是&quot;商品形态多样（手机有…</text>
<!-- BODY_TOP=110 -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<rect x="240" y="116" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="122" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">SPU（标准化产品单元</text>
<text x="400" y="140" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">）：iPhone 15，同类</text>
<text x="400" y="158" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">商品聚合</text>
<rect x="240" y="194" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
<text x="400" y="191" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">SKU（最小存货单元）</text>
<text x="400" y="209" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">：iPhone 15 128G 黑</text>
<text x="400" y="227" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">色，可售卖可库存的最</text>
<text x="400" y="245" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">小单位</text>
<rect x="240" y="272" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="400" y="269" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">类目属性模板：每个类</text>
<text x="400" y="287" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">目有一组属性（手机有</text>
<text x="400" y="305" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">内存/CPU，服装有尺码</text>
<text x="400" y="323" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">/面料）</text>
<rect x="240" y="350" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-width="2"/>
<text x="400" y="347" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">属性扩展：属性表（at</text>
<text x="400" y="365" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">tribute_id + entity_</text>
<text x="400" y="383" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">id + value），动态扩</text>
<text x="400" y="401" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">展不修表结构</text>
<rect x="240" y="428" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#f44336" stroke-width="2"/>
<text x="400" y="416" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">规格属性 vs 参数属性</text>
<text x="400" y="434" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">：规格（内存/颜色）</text>
<text x="400" y="452" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">生成 SKU，参数（重量</text>
<text x="400" y="470" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">/产地）只展示不生成 </text>
<text x="400" y="488" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">SKU</text>
<line x1="400" y1="164" x2="400" y2="194" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="242" x2="400" y2="272" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="320" x2="400" y2="350" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="398" x2="400" y2="428" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
</svg>