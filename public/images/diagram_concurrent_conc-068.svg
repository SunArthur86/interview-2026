<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">CAS (Compare And Swap) 原理与缺陷</text><g font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle"><rect x="100" y="70" width="200" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="200" y="95" fill="#2196F3">1. 读取内存值 V</text><path d="M 200 110 L 200 140" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)" fill="none"/><polygon points="200,140 300,190 200,240 100,190" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="200" y="185" fill="#FF9800" font-weight="bold">V == E ?</text><text x="200" y="205" fill="#FF9800" font-size="11">(内存值是否等于预期)</text><path d="M 100 190 L 50 190 L 50 95 L 100 95" stroke="#f44336" stroke-width="2" marker-end="url(#arr)" fill="none"/><text x="50" y="150" fill="#f44336" font-size="12">否 (自旋重试)</text><path d="M 300 190 L 350 190 L 350 95 L 300 95" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)" fill="none"/><text x="380" y="145" fill="#4CAF50" font-size="12">是</text><rect x="300" y="70" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="400" y="95" fill="#4CAF50">2. 更新为新值 N (原子操作)</text><rect x="550" y="70" width="200" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="650" y="95" fill="#9C27B0">底层: CPU cmpxchg 指令</text><path d="M 500 90 L 550 90" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)" fill="none"/><rect x="100" y="280" width="180" height="80" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="190" y="310" fill="#f44336" font-weight="bold">缺陷1: ABA问题</text><text x="190" y="330" fill="#f44336" font-size="11">值从A变B又变A</text><text x="190" y="350" fill="#f44336" font-size="11">解决: 版本号</text><rect x="310" y="280" width="180" height="80" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="310" fill="#f44336" font-weight="bold">缺陷2: 自旋开销</text><text x="400" y="330" fill="#f44336" font-size="11">竞争激烈CPU飙升</text><text x="400" y="350" fill="#f44336" font-size="11">解决: LongAdder</text><rect x="520" y="280" width="180" height="80" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="610" y="310" fill="#f44336" font-weight="bold">缺陷3: 单变量限制</text><text x="610" y="330" fill="#f44336" font-size="11">无法锁代码块</text><text x="610" y="350" fill="#f44336" font-size="11">解决: AtomicReference</text><rect x="250" y="420" width="300" height="50" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="400" y="445" fill="#607D8B" font-weight="bold">应用场景</text><text x="400" y="460" fill="#607D8B" font-size="11">Atomic类 / AQS状态修改 / ConcurrentHashMap</text></g></svg>
