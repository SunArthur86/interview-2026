<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-size="18" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">CompletableFuture 链式编排原理</text><rect x="50" y="70" width="220" height="60" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="160" y="100" font-size="13" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">supplyAsync</text><text x="160" y="120" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">异步触发任务起点</text><line x1="270" y1="100" x2="310" y2="100" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="310" y="70" width="220" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="420" y="100" font-size="13" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">thenApply (map)</text><text x="420" y="120" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">同步转换: T -> R</text><line x1="530" y1="100" x2="570" y2="100" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="570" y="70" width="180" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="660" y="100" font-size="13" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">thenCompose (flatMap)</text><text x="660" y="120" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">异步串联防嵌套</text><rect x="50" y="180" width="700" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="205" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">⚠️ 警惕风险: 默认使用 ForkJoinPool, IO阻塞易耗尽公共池线程</text><rect x="50" y="250" width="340" height="100" rx="10" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="220" y="275" font-size="14" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">异常处理体系</text><text x="220" y="300" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">exceptionally: 类似 catch, 返回兜底值</text><text x="220" y="320" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">handle: 处理异常并转换结果</text><text x="220" y="340" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">whenComplete: 仅记录日志不改结果</text><rect x="410" y="250" width="340" height="100" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="580" y="275" font-size="14" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">多任务聚合</text><text x="580" y="300" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">thenCombine: 并行汇聚两任务结果</text><text x="580" y="320" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">allOf: 等待所有任务完成 (RT=max)</text><text x="580" y="340" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">anyOf: 任一任务完成即返回</text><rect x="50" y="380" width="700" height="80" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="410" font-size="14" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">生产最佳实践</text><text x="400" y="435" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">1. 务必自定义 ThreadPoolExecutor 传入提交方法</text><text x="400" y="455" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">2. 阻塞获取: join() 抛 unchecked, get() 需捕获 Interrupted</text></svg>
