<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">并发三大辅助工具：Latch / Barrier / Semaphore</text><rect x="20" y="60" width="240" height="340" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="140" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">CountDownLatch</text><text x="140" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">主线程等待 N 个子任务完成</text><ellipse cx="140" cy="135" rx="50" ry="18" fill="#fff" stroke="#4CAF50" stroke-width="2"/><text x="140" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">主线程 await()</text><rect x="70" y="175" width="60" height="30" rx="4" fill="#fff" stroke="#4CAF50" stroke-width="1"/><text x="100" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">Worker1</text><rect x="150" y="175" width="60" height="30" rx="4" fill="#fff" stroke="#4CAF50" stroke-width="1"/><text x="180" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">Worker2</text><path d="M 100 175 L 100 165 L 140 165 L 140 153" stroke="#4CAF50" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><path d="M 180 175 L 180 165 L 140 165 L 140 153" stroke="#4CAF50" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><text x="140" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">不可重置 (一次性)</text><rect x="280" y="60" width="240" height="340" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="400" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">CyclicBarrier</text><text x="400" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">多线程互相等待至齐发</text><rect x="310" y="135" width="60" height="30" rx="4" fill="#fff" stroke="#2196F3" stroke-width="1"/><text x="340" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">Thread1</text><rect x="370" y="135" width="60" height="30" rx="4" fill="#fff" stroke="#2196F3" stroke-width="1"/><text x="400" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">Thread2</text><rect x="430" y="135" width="60" height="30" rx="4" fill="#fff" stroke="#2196F3" stroke-width="1"/><text x="470" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">Thread3</text><line x1="310" y1="195" x2="490" y2="195" stroke="#2196F3" stroke-width="2" stroke-dasharray="5,5"/><text x="400" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">屏障点 ( parties = N )</text><path d="M 340 165 L 340 185" stroke="#2196F3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><path d="M 400 165 L 400 185" stroke="#2196F3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><path d="M 470 165 L 470 185" stroke="#2196F3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><path d="M 400 195 L 400 235" stroke="#2196F3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><rect x="340" y="245" width="120" height="30" rx="4" fill="#fff" stroke="#2196F3" stroke-width="1"/><text x="400" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">触发 barrierAction</text><text x="400" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#4CAF50">支持自动重置 (循环用)</text><text x="400" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">异常导致屏障破损</text><rect x="540" y="60" width="240" height="340" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="660" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#FF9800">Semaphore</text><text x="660" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">资源限流许可控制</text><rect x="570" y="135" width="180" height="30" rx="4" fill="#fff" stroke="#FF9800" stroke-width="1"/><text x="660" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">许可池 ( permits = 3 )</text><rect x="580" y="180" width="40" height="30" rx="4" fill="#fff" stroke="#FF9800" stroke-width="1"/><text x="600" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">T1</text><rect x="640" y="180" width="40" height="30" rx="4" fill="#fff" stroke="#FF9800" stroke-width="1"/><text x="660" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">T2</text><rect x="700" y="180" width="40" height="30" rx="4" fill="#fff" stroke="#FF9800" stroke-width="1"/><text x="720" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">T3</text><path d="M 600 175 L 660 165" stroke="#FF9800" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><path d="M 660 175 L 660 165" stroke="#FF9800" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><path d="M 720 175 L 660 165" stroke="#FF9800" stroke-width="1.5" fill="none" marker-end="url(#arr)"/><rect x="580" y="240" width="40" height="30" rx="4" fill="#ECEFF1" stroke="#FF9800" stroke-width="1" stroke-dasharray="3,3"/><text x="600" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">T4</text><text x="660" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">acquire() 阻塞等待</text><path d="M 600 240 L 660 165" stroke="#f44336" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arr)"/><text x="660" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">连接池 / 限流场景</text></svg>
