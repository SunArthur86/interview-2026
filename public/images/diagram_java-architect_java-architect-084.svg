<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】大表治理、冷热分层与归档</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：大表治理的本质是&quot;把不活跃的历史数据从在线库剥离，让在线表小而快&quot;。核心三步——冷热分层（按时间/状态区分冷热）、归档（…</text>
