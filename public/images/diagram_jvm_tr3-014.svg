<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">Project Leyden: 云原生 Java AOT</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="60" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#2196F3">目标: AOT + 保留完整 Java 特性</text><text x="400" y="148" text-anchor="middle" font-size="11" font-weight="normal" fill="#1565C0" font-style="italic">解决云原生场景下 Java 冷启动慢 + 内存占用高</text><rect x="40" y="200" width="340" height="240" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><rect x="40" y="200" width="340" height="32" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="210" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">云原生痛点</text><text x="60" y="250" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">• 冷启动慢</text><text x="180" y="250" text-anchor="start" font-size="9" font-weight="normal" fill="#B71C1C" font-style="italic">JIT warmup 数秒~分钟</text><text x="60" y="286" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">• 内存占用高</text><text x="180" y="286" text-anchor="start" font-size="9" font-weight="normal" fill="#B71C1C" font-style="italic">运行时数据 + CodeCache</text><text x="60" y="322" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">• 实例频繁扩缩</text><text x="180" y="322" text-anchor="start" font-size="9" font-weight="normal" fill="#B71C1C" font-style="italic">每次冷启动都付代价</text><text x="60" y="358" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">• Serverless 不友好</text><text x="180" y="358" text-anchor="start" font-size="9" font-weight="normal" fill="#B71C1C" font-style="italic">请求超时风险</text><text x="60" y="394" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">• 与 Go/Rust 差距</text><text x="180" y="394" text-anchor="start" font-size="9" font-weight="normal" fill="#B71C1C" font-style="italic">启动/内存落后</text><rect x="420" y="200" width="340" height="240" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><rect x="420" y="200" width="340" height="32" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="590" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Leyden 方案</text><text x="440" y="250" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">• 提前加载/链接</text><text x="580" y="250" text-anchor="start" font-size="9" font-weight="normal" fill="#1B5E20" font-style="italic">Loading/Linking AOT</text><text x="440" y="286" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">• 提前方法解析</text><text x="580" y="286" text-anchor="start" font-size="9" font-weight="normal" fill="#1B5E20" font-style="italic">Method Resolution AOT</text><text x="440" y="322" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">• 代码预热 (CDS)</text><text x="580" y="322" text-anchor="start" font-size="9" font-weight="normal" fill="#1B5E20" font-style="italic">Class Data Sharing 扩展</text><text x="440" y="358" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">• AOT 编译</text><text x="580" y="358" text-anchor="start" font-size="9" font-weight="normal" fill="#1B5E20" font-style="italic">关键方法编译为本地码</text><text x="440" y="394" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">• 保持 JIT 能力</text><text x="580" y="394" text-anchor="start" font-size="9" font-weight="normal" fill="#1B5E20" font-style="italic">运行时仍可优化</text><rect x="30" y="445" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="455" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="62.0" y="468" font-size="12" fill="#37474F" text-anchor="start">云原生痛点</text><rect x="280.0" y="455" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="302.0" y="468" font-size="12" fill="#37474F" text-anchor="start">Leyden 解决</text><rect x="520.0" y="455" width="16" height="16" rx="3" fill="#2196F3" stroke="#37474F" stroke-width="1"/><text x="542.0" y="468" font-size="12" fill="#37474F" text-anchor="start">保留 Java 特性</text>
</svg>
