<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">互斥锁 (Mutex) 与 自旋锁 (Spinlock) 对比</text><g font-family="system-ui,-apple-system,sans-serif"><rect x="80" y="60" width="260" height="360" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="210" y="85" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">互斥锁 (Mutex)</text><rect x="460" y="60" width="260" height="360" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="590" y="85" font-size="14" font-weight="700" text-anchor="middle" fill="#FF9800">自旋锁 (Spinlock)</text><ellipse cx="210" cy="120" rx="40" ry="20" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="210" y="125" font-size="12" font-weight="700" text-anchor="middle" fill="#607D8B">线程请求锁</text><ellipse cx="590" cy="120" rx="40" ry="20" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="590" y="125" font-size="12" font-weight="700" text-anchor="middle" fill="#607D8B">线程请求锁</text><polygon points="210,160 270,190 210,220 150,190" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="210" y="195" font-size="12" text-anchor="middle" fill="#2196F3">竞争成功?</text><polygon points="590,160 650,190 590,220 530,190" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="590" y="195" font-size="12" text-anchor="middle" fill="#FF9800">竞争成功?</text><rect x="160" y="250" width="100" height="35" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="210" y="272" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">进入临界区</text><rect x="540" y="250" width="100" height="35" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="590" y="272" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">进入临界区</text><rect x="160" y="300" width="100" height="35" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="210" y="322" font-size="12" font-weight="700" text-anchor="middle" fill="#607D8B">不占CPU</text><rect x="540" y="300" width="100" height="35" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="590" y="322" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">死循环空转</text><rect x="130" y="360" width="160" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="210" y="378" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">上下文切换开销</text><text x="210" y="394" font-size="11" text-anchor="middle" fill="#9C27B0">适合:长临界区/高并发</text><rect x="510" y="360" width="160" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="590" y="378" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">无切换开销</text><text x="590" y="394" font-size="11" text-anchor="middle" fill="#9C27B0">适合:极短临界区</text><path d="M210,140 L210,160" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M210,220 L210,250" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr)"/><text x="230" y="240" font-size="11" text-anchor="start" fill="#4CAF50">是</text><path d="M210,285 L210,300" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M210,335 L210,360" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M590,140 L590,160" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M590,220 L590,250" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr)"/><text x="610" y="240" font-size="11" text-anchor="start" fill="#4CAF50">是</text><path d="M590,285 L590,300" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M590,335 L590,360" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/></g></svg>
