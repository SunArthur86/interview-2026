<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">Async-Profiler 火焰图分析</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="720" height="50" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="400" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#2196F3">低开销采样 → 生成火焰图 → 定位 CPU 热点</text><text x="400" y="132" text-anchor="middle" font-size="11" font-weight="normal" fill="#1565C0" font-style="italic">基于 async-get-call-tree (无 instrumentation 开销)</text><rect x="40" y="170" width="720" height="280" rx="6" ry="6" fill="#FAFAFA" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">火焰图 (Flame Graph)</text><rect x="40" y="410" width="720" height="25" rx="2" ry="2" fill="#90CAF9" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="400.0" y="427" text-anchor="middle" font-size="10" font-weight="700" fill="#212121">main</text><rect x="40" y="385" width="600" height="25" rx="2" ry="2" fill="#64B5F6" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="340.0" y="402" text-anchor="middle" font-size="10" font-weight="700" fill="#212121">Tomcat.handleRequest</text><rect x="40" y="360" width="500" height="25" rx="2" ry="2" fill="#42A5F5" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="290.0" y="377" text-anchor="middle" font-size="10" font-weight="700" fill="#212121">Controller.process</text><rect x="40" y="335" width="400" height="25" rx="2" ry="2" fill="#2196F3" stroke="#2196F3" stroke-width="1" opacity="1.0"/><text x="240.0" y="352" text-anchor="middle" font-size="10" font-weight="700" fill="#212121">Service.calc</text><rect x="40" y="310" width="200" height="25" rx="2" ry="2" fill="#FF7043" stroke="#FF9800" stroke-width="1" opacity="1.0"/><text x="140.0" y="327" text-anchor="middle" font-size="10" font-weight="700" fill="#212121">DAO.executeQuery</text><rect x="240" y="310" width="150" height="25" rx="2" ry="2" fill="#EF5350" stroke="#f44336" stroke-width="1" opacity="1.0"/><text x="315.0" y="327" text-anchor="middle" font-size="10" font-weight="700" fill="#212121">Regex.match</text><rect x="40" y="285" width="150" height="25" rx="2" ry="2" fill="#FF8A65" stroke="#FF9800" stroke-width="1" opacity="1.0"/><text x="115.0" y="302" text-anchor="middle" font-size="10" font-weight="700" fill="#212121">JDBC.executeQuery</text><rect x="240" y="285" width="120" height="25" rx="2" ry="2" fill="#E57373" stroke="#f44336" stroke-width="1" opacity="1.0"/><text x="300.0" y="302" text-anchor="middle" font-size="10" font-weight="700" fill="#212121">Pattern.compile</text><rect x="240" y="260" width="80" height="25" rx="2" ry="2" fill="#EF5350" stroke="#f44336" stroke-width="1" opacity="1.0"/><text x="280.0" y="277" text-anchor="middle" font-size="10" font-weight="700" fill="#212121">backtrack!</text><line x1="280" y1="250" x2="280" y2="240" stroke="#f44336" stroke-width="2" marker-end="url(#arrowR)"/><text x="310" y="245" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">↑ 栈顶最宽 = CPU 热点</text><rect x="40" y="470" width="720" height="100" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="400" y="495" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">使用步骤</text><rect x="60" y="510" width="220" height="50" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="170" y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#2196F3">1. 启动采样</text><text x="170" y="548" text-anchor="middle" font-size="9" font-weight="normal" fill="#37474F" font-style="italic">./profiler.sh -d 30 -f flame.html &lt;pid&gt;</text><rect x="290" y="510" width="220" height="50" rx="6" ry="6" fill="#4CAF5022" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="400" y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#4CAF50">2. 分析火焰图</text><text x="400" y="548" text-anchor="middle" font-size="9" font-weight="normal" fill="#37474F" font-style="italic">找最宽的栈顶 → 定位方法</text><rect x="520" y="510" width="220" height="50" rx="6" ry="6" fill="#9C27B022" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="630" y="528" text-anchor="middle" font-size="11" font-weight="700" fill="#9C27B0">3. 优化代码</text><text x="630" y="548" text-anchor="middle" font-size="9" font-weight="normal" fill="#37474F" font-style="italic">消除热点 (缓存/算法/批处理)</text></svg>
