<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#fafafa"/>
  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java终止线程的四种方式与核心原理</text>

  <!-- Column 1: Interrupt (Standard Path) -->
  <rect x="30" y="60" width="240" height="360" rx="12" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="150" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">推荐：interrupt() 标准</text>
  <ellipse cx="150" cy="115" rx="45" ry="20" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="150" y="119" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#333">调用 interrupt()</text>
  <polygon points="150,150 220,195 150,240 80,195" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="150" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">线程处于</text>
  <text x="150" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">什么状态？</text>
  <line x1="80" y1="195" x2="30" y2="195" stroke="#607D8B" stroke-width="1.5"/>
  <line x1="30" y1="195" x2="30" y2="290" stroke="#607D8B" stroke-width="1.5"/>
  <line x1="30" y1="290" x2="75" y2="290" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="50" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#FF9800" font-weight="700">阻塞</text>
  <rect x="15" y="270" width="110" height="40" rx="6" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="70" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">抛出</text>
  <text x="70" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">InterruptedExc</text>
  <line x1="220" y1="195" x2="270" y2="195" stroke="#607D8B" stroke-width="1.5"/>
  <line x1="270" y1="195" x2="270" y2="290" stroke="#607D8B" stroke-width="1.5"/>
  <line x1="270" y1="290" x2="225" y2="290" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="250" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#FF9800" font-weight="700">运行</text>
  <rect x="175" y="270" width="110" height="40" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="230" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">中断标志位置</text>
  <text x="230" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">isInterrupted=true</text>
  <line x1="150" y1="310" x2="150" y2="335" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="70" y="335" width="160" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="150" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">catch块处理 / finally释放</text>
  <text x="150" y="372" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">主动退出 run() (安全)</text>

  <!-- Column 2: Other Methods -->
  <rect x="300" y="60" width="200" height="360" rx="12" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="400" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">其他：协作式退出</text>
  <rect x="320" y="110" width="160" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="400" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#333">方式1：正常结束</text>
  <text x="400" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">run() 方法体执行完毕</text>
  <rect x="320" y="190" width="160" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="400" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#333">方式2：标志位退出</text>
  <text x="400" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">volatile boolean exit</text>
  <rect x="320" y="270" width="160" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="400" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#333">扩展：不可中断阻塞</text>
  <text x="400" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">传统 I/O 阻塞 interrupt 无效</text>
  <text x="400" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">需关闭 Socket 强制异常</text>

  <!-- Column 3: Deprecated Methods -->
  <rect x="520" y="60" width="250" height="360" rx="12" fill="#FFEBEE" stroke="#f44336" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="645" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">严禁：stop() 暴力终止</text>
  <rect x="555" y="110" width="180" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="645" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">调用 Thread.stop()</text>
  <line x1="645" y1="160" x2="645" y2="190" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="555" y="190" width="180" height="60" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="645" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#333">致命风险</text>
  <text x="645" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">瞬间强行释放所有锁</text>
  <text x="645" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">操作可能执行了一半</text>
  <line x1="645" y1="250" x2="645" y2="280" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="555" y="280" width="180" height="70" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="645" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#333">导致严重后果</text>
  <text x="645" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">1. 破坏数据原子性</text>
  <text x="645" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">2. 对象状态不一致(脏读)</text>
  <rect x="555" y="370" width="180" height="35" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="645" y="392" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#333">类似拔掉电脑电源</text>
</svg>
