<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10 Z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">AQS (CLH队列) 独占锁获取流程</text><rect x="250" y="60" width="300" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0"/><text x="400" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">AQS 核心：volatile int state</text><text x="400" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">CAS 修改 (0->1 获得锁)</text><line x1="400" y1="120" x2="400" y2="150" stroke="#607D8B" marker-end="url(#arr)"/><polygon points="400,150 460,185 400,220 340,185" fill="#FFF3E0" stroke="#FF9800"/><text x="400" y="181" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">tryAcquire()</text><text x="400" y="197" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">抢锁成功?</text><line x1="340" y1="185" x2="180" y2="185" stroke="#607D8B" marker-end="url(#arr)"/><line x1="460" y1="185" x2="620" y2="185" stroke="#607D8B" marker-end="url(#arr)"/><rect x="60" y="165" width="120" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="120" y="189" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">执行业务逻辑</text><text x="640" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">抢锁失败</text><text x="640" y="191" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">CAS失败</text><line x1="700" y1="205" x2="700" y2="240" stroke="#607D8B" marker-end="url(#arr)"/><rect x="640" y="240" width="120" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="700" y="264" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">addWaiter() 入队</text><line x1="700" y1="280" x2="700" y2="315" stroke="#607D8B" marker-end="url(#arr)"/><rect x="640" y="315" width="120" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="700" y="339" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">acquireQueued() 自旋</text><line x1="700" y1="355" x2="700" y2="380" stroke="#607D8B" marker-end="url(#arr)"/><rect x="640" y="380" width="120" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="700" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">前驱节点为Head?</text><text x="700" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">否则 park 挂起</text><line x1="640" y1="400" x2="520" y2="400" stroke="#607D8B" marker-end="url(#arr)"/><text x="580" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">是(再次抢锁)</text><rect x="280" y="310" width="40" height="40" rx="4" fill="#ECEFF1" stroke="#607D8B"/><text x="300" y="334" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Head</text><line x1="320" y1="330" x2="350" y2="330" stroke="#607D8B" marker-end="url(#arr)"/><line x1="350" y1="330" x2="320" y2="330" stroke="#607D8B" marker-end="url(#arr)"/><rect x="350" y="310" width="80" height="40" rx="4" fill="#E3F2FD" stroke="#2196F3"/><text x="390" y="334" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Node 1</text><line x1="430" y1="330" x2="460" y2="330" stroke="#607D8B" marker-end="url(#arr)"/><line x1="460" y1="330" x2="430" y2="330" stroke="#607D8B" marker-end="url(#arr)"/><rect x="460" y="310" width="80" height="40" rx="4" fill="#E3F2FD" stroke="#2196F3"/><text x="500" y="334" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Node 2</text><text x="400" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">CLH 双向队列 (FIFO)</text><rect x="60" y="310" width="180" height="80" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="150" y="334" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">实战避坑：</text><text x="150" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">临界区内不要执行</text><text x="150" y="372" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">耗时RPC调用导致</text><text x="150" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">队列自旋耗尽CPU</text><rect x="40" y="460" width="60" height="15" rx="4" fill="#9C27B0"/><text x="110" y="472" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">核心状态</text><rect x="200" y="460" width="60" height="15" rx="4" fill="#FF9800"/><text x="270" y="472" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">判断节点</text><rect x="360" y="460" width="60" height="15" rx="4" fill="#2196F3"/><text x="430" y="472" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">阻塞流程</text><rect x="520" y="460" width="60" height="15" rx="4" fill="#f44336"/><text x="590" y="472" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">异常/风险</text></svg>
