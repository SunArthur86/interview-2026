<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">虚拟机栈结构与栈帧组成</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="720" height="380" rx="8" ry="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" opacity="1.0"/><text x="400" y="115" text-anchor="middle" font-size="16" font-weight="700" fill="#2196F3">虚拟机栈 (VM Stack) - 线程私有</text><rect x="80" y="145" width="640" height="70" rx="6" ry="6" fill="#90CAF9" stroke="#2196F3" stroke-width="2" opacity="1.0"/><text x="400" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="#0D47A1">当前方法栈帧 (Top of Stack)</text><text x="400" y="198" text-anchor="middle" font-size="11" font-weight="normal" fill="#1565C0" font-style="italic">push: 方法调用</text><line x1="720" y1="180" x2="745" y2="180" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/><text x="760" y="184" text-anchor="start" font-size="10" font-weight="700" fill="#4CAF50">↑ push</text><rect x="80" y="225" width="640" height="50" rx="6" ry="6" fill="#BBDEFB" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="400" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#0D47A1">上层方法栈帧 (Caller)</text><rect x="80" y="285" width="640" height="50" rx="6" ry="6" fill="#BBDEFB" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="400" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#0D47A1">main() 栈帧 (Bottom)</text><line x1="720" y1="340" x2="745" y2="340" stroke="#f44336" stroke-width="2" marker-end="url(#arrowR)"/><text x="760" y="344" text-anchor="start" font-size="10" font-weight="700" fill="#f44336">↓ pop</text><rect x="80" y="360" width="640" height="100" rx="6" ry="6" fill="#FFFDE7" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="400" y="382" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">栈帧内部结构 (4 组件)</text><rect x="100" y="395" width="130" height="55" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="165" y="418" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">局部变量表</text><text x="165" y="436" text-anchor="middle" font-size="9" font-weight="normal" fill="#BF360C" font-style="italic">Slot[0]=this</text><rect x="240" y="395" width="130" height="55" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="305" y="418" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">操作数栈</text><text x="305" y="436" text-anchor="middle" font-size="9" font-weight="normal" fill="#BF360C" font-style="italic">LIFO</text><rect x="380" y="395" width="130" height="55" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="445" y="418" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">动态链接</text><text x="445" y="436" text-anchor="middle" font-size="9" font-weight="normal" fill="#BF360C" font-style="italic">符号→直接</text><rect x="520" y="395" width="180" height="55" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="610" y="418" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">方法返回地址</text><text x="610" y="436" text-anchor="middle" font-size="9" font-weight="normal" fill="#BF360C" font-style="italic">恢复 PC 寄存器</text><rect x="40" y="490" width="350" height="50" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="215" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#f44336">StackOverflowError</text><text x="215" y="528" text-anchor="middle" font-size="10" font-weight="normal" fill="#B71C1C" font-style="italic">递归过深 / -Xss 过小</text><rect x="410" y="490" width="350" height="50" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="585" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#f44336">OutOfMemoryError</text><text x="585" y="528" text-anchor="middle" font-size="10" font-weight="normal" fill="#B71C1C" font-style="italic">栈扩展无法申请内存</text></svg>
