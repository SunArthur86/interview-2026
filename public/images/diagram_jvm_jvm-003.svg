<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">CMS 收集器工作流程（标记-清除）</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="60" y="130" width="160" height="180" rx="6" ry="6" fill="#f4433622" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="60" y="130" width="160" height="36" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="140.0" y="153" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">初始标记</text><text x="140.0" y="186" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F" font-style="italic">Initial Mark</text><rect x="70" y="205" width="140" height="26" rx="4" ry="4" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="140.0" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">STW</text><text x="140.0" y="255" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">标记 GC Roots 直接关联</text><text x="140.0" y="275" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Step 1</text><line x1="220" y1="220.0" x2="250" y2="220.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="250" y="130" width="160" height="180" rx="6" ry="6" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="250" y="130" width="160" height="36" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="330.0" y="153" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">并发标记</text><text x="330.0" y="186" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F" font-style="italic">Concurrent Mark</text><rect x="260" y="205" width="140" height="26" rx="4" ry="4" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="330.0" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">并发</text><text x="330.0" y="255" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">GC Roots Tracing</text><text x="330.0" y="275" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Step 2</text><line x1="410" y1="220.0" x2="440" y2="220.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="440" y="130" width="160" height="180" rx="6" ry="6" fill="#FF980022" stroke="#FF9800" stroke-width="2" opacity="1.0"/><rect x="440" y="130" width="160" height="36" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="520.0" y="153" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">重新标记</text><text x="520.0" y="186" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F" font-style="italic">Remark</text><rect x="450" y="205" width="140" height="26" rx="4" ry="4" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="520.0" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">STW</text><text x="520.0" y="255" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">修正并发期间变动(SATB)</text><text x="520.0" y="275" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Step 3</text><line x1="600" y1="220.0" x2="630" y2="220.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="630" y="130" width="160" height="180" rx="6" ry="6" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="630" y="130" width="160" height="36" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="710.0" y="153" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">并发清除</text><text x="710.0" y="186" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F" font-style="italic">Concurrent Sweep</text><rect x="640" y="205" width="140" height="26" rx="4" ry="4" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="710.0" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">并发</text><text x="710.0" y="255" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">清除死亡对象</text><text x="710.0" y="275" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Step 4</text><rect x="60" y="360" width="680" height="60" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="400" y="385" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">特性：低停顿 (并发执行)，但产生内存碎片 + 浮动垃圾</text><text x="400" y="405" text-anchor="middle" font-size="12" font-weight="600" fill="#f44336">退化风险：碎片过多 → Promotion Failed → Serial Old 单线程 Full GC</text><rect x="30" y="430" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="440" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="62.0" y="453" font-size="12" fill="#37474F" text-anchor="start">STW 停顿</text><rect x="400.0" y="440" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="422.0" y="453" font-size="12" fill="#37474F" text-anchor="start">并发执行</text>
</svg>
