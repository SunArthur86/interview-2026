<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">volatile 轻量级同步机制</text><rect x="60" y="70" width="280" height="260" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" stroke-dasharray="4 2"/><text x="200" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">底层原理 (JMM层面)</text><rect x="80" y="110" width="240" height="60" rx="8" fill="#fff" stroke="#2196F3" stroke-width="1.5"/><text x="200" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2196F3">强制刷主内存</text><text x="200" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">跳过 CPU Cache 读写</text><rect x="80" y="190" width="240" height="60" rx="8" fill="#fff" stroke="#2196F3" stroke-width="1.5"/><text x="200" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2196F3">插入内存屏障</text><text x="200" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">Store-Load 屏障</text><rect x="80" y="270" width="240" height="50" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/><text x="200" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#666">不阻塞线程，性能优于锁</text><text x="200" y="308" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">只保单次读/写原子</text><rect x="380" y="70" width="160" height="120" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="460" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">优势与能力</text><rect x="395" y="110" width="130" height="30" rx="5" fill="#fff" stroke="#4CAF50" stroke-width="1"/><text x="460" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">保证可见性</text><rect x="395" y="145" width="130" height="30" rx="5" fill="#fff" stroke="#4CAF50" stroke-width="1"/><text x="460" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">禁止指令重排</text><rect x="580" y="70" width="160" height="120" rx="10" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="660" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">限制与风险</text><rect x="595" y="110" width="130" height="30" rx="5" fill="#fff" stroke="#f44336" stroke-width="1"/><text x="660" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">不保证原子性</text><rect x="595" y="145" width="130" height="30" rx="5" fill="#fff" stroke="#f44336" stroke-width="1"/><text x="660" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">i++ 丢失更新</text><rect x="380" y="210" width="360" height="120" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="560" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">经典实战场景 (高频考点)</text><rect x="400" y="250" width="320" height="60" rx="8" fill="#fff" stroke="#9C27B0" stroke-width="1.5"/><text x="560" y="273" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#9C27B0">单例模式的双重检查锁 (DCL)</text><text x="560" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">防：对象未初始化完被其他线程引用</text><text x="560" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">标志位更新通知 (volatile boolean)</text><rect x="60" y="350" width="680" height="110" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#FF9800">原理拓展：指令重排风险演示</text><rect x="100" y="390" width="140" height="60" rx="8" fill="#fff" stroke="#FF9800" stroke-width="1.5"/><text x="170" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">1. 分配内存空间</text><text x="170" y="428" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">2. 初始化对象</text><text x="170" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">3. 指向引用地址</text><polygon points="290,420 320,400 350,420 320,440" fill="#fff" stroke="#FF9800" stroke-width="1.5"/><text x="320" y="425" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#FF9800">重排?</text><rect x="400" y="390" width="140" height="60" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/><text x="470" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">1. 分配内存空间</text><text x="470" y="428" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">3. 指向引用地址</text><text x="470" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">2. 初始化对象</text><rect x="580" y="390" width="140" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><text x="650" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">加 volatile</text><text x="650" y="428" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">插入 Load-Store</text><text x="650" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">禁止 2,3 步乱序</text><line x1="240" y1="420" x2="285" y2="420" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="355" y1="420" x2="395" y2="420" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="540" y1="420" x2="575" y2="420" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/></svg>
