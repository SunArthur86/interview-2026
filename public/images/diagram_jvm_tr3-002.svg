<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">ZGC Generational 分代优化</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="720" height="60" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="400" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#2196F3">JDK 21: ZGC 引入分代模式</text><text x="400" y="137" text-anchor="middle" font-size="11" font-weight="normal" fill="#1565C0" font-style="italic">减少扫描范围 + 保持低停顿 + 兼顾吞吐量</text><rect x="40" y="180" width="350" height="180" rx="8" ry="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><rect x="40" y="180" width="350" height="32" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="215" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">非分代 ZGC (旧)</text><text x="60" y="240" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">问题:</text><text x="80" y="265" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 全堆并发标记</text><text x="80" y="285" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 朝生夕灭对象也要扫</text><text x="80" y="305" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 标记成本随堆增大</text><text x="80" y="325" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 吞吐量损失较大</text><text x="80" y="345" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• barrier 开销大</text><rect x="410" y="180" width="350" height="180" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><rect x="410" y="180" width="350" height="32" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Generational ZGC (新)</text><text x="430" y="240" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">优化:</text><text x="450" y="265" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 物理分代 (Young/Old)</text><text x="450" y="285" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• Young GC 只扫新生代</text><text x="450" y="305" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 90%+ 对象短命 → 快速回收</text><text x="450" y="325" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 减少 remembered set 维护</text><text x="450" y="345" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• barrier 优化 (双层指针)</text><rect x="40" y="390" width="720" height="180" rx="6" ry="6" fill="#FAFAFA" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="415" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">关键指标对比</text><rect x="60" y="440" width="160" height="110" rx="6" ry="6" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="140" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#4CAF50">GC 停顿</text><text x="140" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">&lt; 1ms (保持)</text><text x="140" y="530" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">亚毫秒</text><rect x="230" y="440" width="160" height="110" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="2" opacity="1.0"/><text x="310" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#2196F3">吞吐量</text><text x="310" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">+10~20%</text><text x="310" y="530" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">吞吐回升</text><rect x="400" y="440" width="160" height="110" rx="6" ry="6" fill="#9C27B022" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><text x="480" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#9C27B0">堆扫描量</text><text x="480" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">大幅减少</text><text x="480" y="530" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Young GC 快</text><rect x="570" y="440" width="160" height="110" rx="6" ry="6" fill="#FF980022" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="650" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#FF9800">屏障开销</text><text x="650" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">降低</text><text x="650" y="530" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">barrier 简化</text></svg>
