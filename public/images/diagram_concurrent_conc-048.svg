<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java 创建线程的四种方式</text><rect x="20" y="60" width="370" height="130" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="205" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">1. 继承 Thread 类</text><text x="205" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">重写 run() 方法，调用 start() 启动</text><text x="205" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">优势：写法简单直接</text><text x="205" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">劣势：受单继承限制，无法再继承其他类</text><text x="205" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#666">场景：简单无共享资源的单任务</text><rect x="410" y="60" width="370" height="130" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="595" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">2. 实现 Runnable 接口</text><text x="595" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">实现 run() 方法，交由 Thread 代理执行</text><text x="595" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">优势：打破继承限制，易于实现资源共享</text><text x="595" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">劣势：无返回值，不能抛出受检异常</text><text x="595" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#666">场景：多线程处理同一份数据</text><rect x="20" y="210" width="370" height="130" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="205" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">3. 实现 Callable 接口</text><text x="205" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">配合 FutureTask，可获取异步执行结果</text><text x="205" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">优势：有返回值，支持 throws 异常抛出</text><text x="205" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">劣势：编码稍显复杂，需处理 Future 包装</text><text x="205" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#666">场景：报表计算、需要汇总结果的任务</text><rect x="410" y="210" width="370" height="130" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="595" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">4. 线程池 (推荐)</text><text x="595" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">使用 ThreadPoolExecutor 统一管理</text><text x="595" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">优势：复用线程，控制并发，避免 OOM</text><text x="595" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">严禁：直接使用 Executors 工具类创建</text><text x="595" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#666">场景：生产环境所有的并发异步任务</text><line x1="400" y1="350" x2="400" y2="400" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><polygon points="400,400 320,440 400,480 480,440" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">高频踩坑考点</text><text x="400" y="452" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">必须调 start() 启动</text><text x="400" y="469" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">调 run() 只是普通方法</text></svg>
