<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr"markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">数据库锁机制：悲观锁 vs 乐观锁</text><rect x="40" y="60" width="340" height="380" rx="10" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="210" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#C62828">悲观锁 (Pessimistic Lock)</text><rect x="60" y="105" width="300" height="30" rx="8" fill="#fff" stroke="#f44336" stroke-width="1.5"/><text x="210" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#C62828">SELECT ... FOR UPDATE</text><rect x="60" y="150" width="300" height="35" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/><text x="210" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#37474F">先占座再操作 (阻塞强一致)</text><text x="210" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#37474F">依赖DB底层排他锁(X锁)</text><polygon points="210,205 260,235 210,265 160,235" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="210" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#EF6C00">适用场景</text><rect x="60" y="285" width="300" height="70" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/><text x="210" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1565C0">写多读少 / 冲突率高</text><text x="210" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#1565C0">秒杀扣库存</text><text x="210" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#1565C0">金融转账</text><rect x="60" y="370" width="300" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/><text x="210" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#C62828">优缺点对比</text><text x="210" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#C62828">优: 强一致 缺: 并发低/死锁风险</text><rect x="420" y="60" width="340" height="380" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="590" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#2E7D32">乐观锁 (Optimistic Lock)</text><rect x="440" y="105" width="300" height="30" rx="8" fill="#fff" stroke="#4CAF50" stroke-width="1.5"/><text x="590" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2E7D32">UPDATE ... SET version=version+1</text><rect x="440" y="150" width="300" height="35" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/><text x="590" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#37474F">先改再提交 (无锁高性能)</text><text x="590" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#37474F">版本号机制 / CAS思想</text><polygon points="590,205 640,235 590,265 540,235" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="590" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#EF6C00">适用场景</text><rect x="440" y="285" width="300" height="70" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5"/><text x="590" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1565C0">读多写少 / 冲突率低</text><text x="590" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#1565C0">商品详情页读取</text><text x="590" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#1565C0">配置信息更新</text><rect x="440" y="370" width="300" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><text x="590" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#2E7D32">优缺点对比</text><text x="590" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#2E7D32">优: 无死锁 缺: 高冲突致重试风暴</text></svg>
