<rect x="40" y="100" width="220" height="300" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" opacity="1.0"/><text x="150" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">Step 1: 分配前</text><rect x="60" y="150" width="80" height="230" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="100" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#1B5E20">From</text><rect x="70" y="195" width="60" height="25" rx="6" ry="6" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5" opacity="1.0"/><rect x="70" y="225" width="60" height="25" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><rect x="70" y="255" width="60" height="25" rx="6" ry="6" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5" opacity="1.0"/><rect x="70" y="285" width="60" height="25" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><rect x="70" y="315" width="60" height="25" rx="6" ry="6" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5" opacity="1.0"/><rect x="70" y="345" width="60" height="25" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="100" y="400" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">混杂存活/死亡</text><rect x="160" y="150" width="80" height="230" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="200" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#607D8B">To</text><text x="200" y="280" text-anchor="middle" font-size="12" font-weight="normal" fill="#607D8B" font-style="italic">(空)</text><rect x="290" y="100" width="220" height="300" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">Step 2: 复制存活</text><rect x="310" y="150" width="80" height="230" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="350" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#1B5E20">From</text><line x1="390" y1="280" x2="410" y2="280" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow)"/><rect x="410" y="150" width="80" height="230" rx="6" ry="6" fill="#FFF8E1" stroke="#FF9800" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="450" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">To</text><rect x="420" y="195" width="60" height="25" rx="6" ry="6" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5" opacity="1.0"/><rect x="420" y="225" width="60" height="25" rx="6" ry="6" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5" opacity="1.0"/><rect x="420" y="255" width="60" height="25" rx="6" ry="6" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5" opacity="1.0"/><text x="350" y="400" text-anchor="middle" font-size="10" font-weight="normal" fill="#BF360C" font-style="italic">存活→To 连续排列</text><rect x="540" y="100" width="220" height="300" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="650" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">Step 3: 清空+互换</text><rect x="560" y="150" width="80" height="230" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="600" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#607D8B">From</text><text x="600" y="280" text-anchor="middle" font-size="12" font-weight="normal" fill="#607D8B" font-style="italic">(清空)</text><line x1="640" y1="280" x2="660" y2="280" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/><rect x="660" y="150" width="80" height="230" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="700" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#1B5E20">To→新From</text><rect x="670" y="195" width="60" height="25" rx="6" ry="6" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5" opacity="1.0"/><rect x="670" y="225" width="60" height="25" rx="6" ry="6" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5" opacity="1.0"/><rect x="670" y="255" width="60" height="25" rx="6" ry="6" fill="#4CAF50" stroke="#1B5E20" stroke-width="1.5" opacity="1.0"/><text x="650" y="400" text-anchor="middle" font-size="10" font-weight="normal" fill="#1B5E20" font-style="italic">角色互换，无碎片</text><rect x="30" y="400" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="410" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="62.0" y="423" font-size="12" fill="#37474F" text-anchor="start">存活</text><rect x="280.0" y="410" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="302.0" y="423" font-size="12" fill="#37474F" text-anchor="start">垃圾</text><rect x="520.0" y="410" width="16" height="16" rx="3" fill="#607D8B" stroke="#37474F" stroke-width="1"/><text x="542.0" y="423" font-size="12" fill="#37474F" text-anchor="start">空闲</text>
<text x="400" y="465" text-anchor="middle" font-size="12" font-weight="600" fill="#9C27B0" font-style="italic">优点：无碎片 / 缺点：浪费一半空间 (新生代优化为 8:1:1)</text></svg>
