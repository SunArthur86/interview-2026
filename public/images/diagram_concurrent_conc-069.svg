<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">I/O 模型与流分类对比</text><g transform="translate(20, 60)"><rect width="230" height="200" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="115" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">流的分类</text><rect x="20" y="50" width="190" height="40" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="115" y="74" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">字节流: 处理二进制(图片/视频)</text><rect x="20" y="100" width="190" height="40" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="115" y="124" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">字符流: 处理文本(解决编码)</text><rect x="20" y="150" width="190" height="40" rx="5" fill="#FFEBEE" stroke="#f44336" stroke-width="1"/><text x="115" y="166" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336"><tspan x="115" dy="0">致命风险: 字符流处理</tspan><tspan x="115" dy="14">非文本会导致数据损坏</tspan></text></g><g transform="translate(270, 60)"><rect width="250" height="410" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" stroke-dasharray="5,5"/><text x="125" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">I/O 网络模型 (并发能力)</text><rect x="25" y="50" width="200" height="70" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="125" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">BIO (阻塞)</text><text x="125" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555"><tspan x="125" dy="0">一连接一线程</tspan><tspan x="125" dy="14">专人专送，高并发差</tspan></text><line x1="125" y1="125" x2="125" y2="165" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="25" y="170" width="200" height="70" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="125" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#FF9800">NIO (非阻塞)</text><text x="125" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555"><tspan x="125" dy="0">线程不断轮询</tspan><tspan x="125" dy="14">消耗大量 CPU 资源</tspan></text><line x1="125" y1="245" x2="125" y2="285" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="25" y="290" width="200" height="90" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="125" y="312" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">I/O 多路复用</text><text x="125" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555"><tspan x="125" dy="0">单线程管理多连接</tspan><tspan x="125" dy="14">前台代管，高并发核心</tspan></text><text x="125" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Redis / Nginx 基础</text></g><g transform="translate(540, 100)"><rect width="230" height="130" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="115" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">易错点: AIO</text><text x="115" y="55" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555"><tspan x="115" dy="0">多路复用本质上仍是</tspan><tspan x="115" dy="14">同步I/O模型</tspan><tspan x="115" dy="30">数据拷贝阶段依然阻塞</tspan></text></g><g transform="translate(270, 490)"><rect width="20" height="10" fill="#FFEBEE" stroke="#f44336"/><text x="30" y="9" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#333">致命风险/异常</text><rect x="120" width="20" height="10" fill="#FFF3E0" stroke="#FF9800"/><text x="150" y="9" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#333">警告/消耗</text><rect x="230" width="20" height="10" fill="#E8F5E9" stroke="#4CAF50"/><text x="260" y="9" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#333">优势/核心</text></g></svg>
