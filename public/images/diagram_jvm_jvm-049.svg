<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">Java 对象内存布局</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="60" y="100" width="680" height="280" rx="8" ry="8" fill="#FAFAFA" stroke="#607D8B" stroke-width="2" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="#37474F">Java Object</text><rect x="80" y="150" width="640" height="80" rx="6" ry="6" fill="#E1F5FE" stroke="#2196F3" stroke-width="2" opacity="1.0"/><text x="400" y="175" text-anchor="middle" font-size="14" font-weight="700" fill="#0D47A1">对象头 (Object Header)</text><rect x="90" y="188" width="290" height="36" rx="6" ry="6" fill="#BBDEFB" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="235" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#0D47A1">Mark Word (8B): hash/age/lock</text><rect x="420" y="188" width="290" height="36" rx="6" ry="6" fill="#90CAF9" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="565" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#0D47A1">Klass Pointer (4B 压缩): 类型元数据</text><rect x="80" y="250" width="640" height="80" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="400" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#1B5E20">实例数据 (Instance Data)</text><text x="400" y="300" text-anchor="middle" font-size="12" font-weight="normal" fill="#2E7D32">各字段值 (基本类型 / 引用)</text><text x="400" y="320" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">longs/doubles → ints → shorts/chars → bytes → refs</text><rect x="80" y="350" width="640" height="20" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="400" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">对齐填充 (Padding) → 8 字节整数倍</text><rect x="60" y="410" width="680" height="70" rx="6" ry="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="400" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#4A148C">Mark Word 锁状态复用</text><text x="400" y="452" text-anchor="middle" font-size="11" font-weight="normal" fill="#9C27B0">无锁 → 偏向锁 → 轻量级锁 → 重量级锁 → GC 标记</text><text x="400" y="470" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">同一块内存动态复用，实现锁升级</text></svg>
