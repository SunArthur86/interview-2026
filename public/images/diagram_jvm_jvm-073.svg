<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">CPU 占用过高排查流程</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="720" height="50" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">从进程 → 线程 → 代码栈 三层定位</text><text x="400" y="132" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">核心命令: top → top -Hp → printf %x → jstack</text><rect x="100" y="170" width="130" height="200" rx="6" ry="6" fill="#f4433618" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="100" y="170" width="130" height="30" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="165" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Step 1</text><text x="165" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#f44336">top</text><text x="165" y="260" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">找到 CPU 高的</text><text x="165" y="280" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">Java 进程 PID</text><text x="165" y="350" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">→ 结果</text><line x1="230" y1="270" x2="250" y2="270" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="240" y="170" width="130" height="200" rx="6" ry="6" fill="#FF980018" stroke="#FF9800" stroke-width="2" opacity="1.0"/><rect x="240" y="170" width="130" height="30" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="305" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Step 2</text><text x="305" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#FF9800">top -Hp &lt;pid&gt;</text><text x="305" y="260" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">查看进程内</text><text x="305" y="280" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">各线程 CPU</text><text x="305" y="350" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">→ 结果</text><line x1="370" y1="270" x2="390" y2="270" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="380" y="170" width="130" height="200" rx="6" ry="6" fill="#9C27B018" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><rect x="380" y="170" width="130" height="30" rx="6" ry="6" fill="#9C27B0" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="445" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Step 3</text><text x="445" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#9C27B0">printf &quot;%x&quot; &lt;tid&gt;</text><text x="445" y="260" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">线程 ID 转</text><text x="445" y="280" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">16 进制</text><text x="445" y="350" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">→ 结果</text><line x1="510" y1="270" x2="530" y2="270" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="520" y="170" width="130" height="200" rx="6" ry="6" fill="#2196F318" stroke="#2196F3" stroke-width="2" opacity="1.0"/><rect x="520" y="170" width="130" height="30" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="585" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Step 4</text><text x="585" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#2196F3">jstack &lt;pid&gt;</text><text x="585" y="260" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">找 nid=0xXXX</text><text x="585" y="280" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">对应线程栈</text><text x="585" y="350" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">→ 结果</text><rect x="40" y="400" width="720" height="160" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="400" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#f44336">常见 CPU 高的根因</text><rect x="60" y="445" width="160" height="90" rx="6" ry="6" fill="#f4433622" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="140" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#f44336">死循环</text><text x="140" y="495" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">while(true) 漏 break</text><rect x="235" y="445" width="160" height="90" rx="6" ry="6" fill="#FF980022" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="315" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#FF9800">频繁 GC</text><text x="315" y="495" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">Full GC 频繁触发</text><rect x="410" y="445" width="160" height="90" rx="6" ry="6" fill="#9C27B022" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><text x="490" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#9C27B0">正则灾难</text><text x="490" y="495" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">恶意输入导致回溯</text><rect x="585" y="445" width="160" height="90" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="2" opacity="1.0"/><text x="665" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#2196F3">序列化</text><text x="665" y="495" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">深拷贝/反射过多</text><rect x="30" y="555" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="565" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="62.0" y="578" font-size="12" fill="#37474F" text-anchor="start">进程级</text><rect x="280.0" y="565" width="16" height="16" rx="3" fill="#FF9800" stroke="#37474F" stroke-width="1"/><text x="302.0" y="578" font-size="12" fill="#37474F" text-anchor="start">线程级</text><rect x="520.0" y="565" width="16" height="16" rx="3" fill="#9C27B0" stroke="#37474F" stroke-width="1"/><text x="542.0" y="578" font-size="12" fill="#37474F" text-anchor="start">栈定位</text>
</svg>
