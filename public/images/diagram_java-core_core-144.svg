<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">CDN 原理是什么？</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：通过边缘节点缓存和智能调度，让用户就近获取资源，降低延迟。</text>
<!-- BODY_TOP=110 -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<rect x="240" y="116" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="127" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">核心是智能DNS解析和</text>
<text x="400" y="145" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">边缘缓存</text>
<rect x="240" y="180" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
<text x="400" y="191" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">命中缓存直接响应，未</text>
<text x="400" y="209" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">命中才回源</text>
<rect x="240" y="244" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="400" y="255" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">解决跨运营商和地域访</text>
<text x="400" y="273" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">问慢的问题</text>
<rect x="240" y="308" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-width="2"/>
<text x="400" y="319" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">提升并发处理能力和用</text>
<text x="400" y="337" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">户体验</text>
<rect x="240" y="372" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#f44336" stroke-width="2"/>
<text x="400" y="383" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">智能DNS指引用户访问</text>
<text x="400" y="401" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">最近边缘节点</text>
<rect x="240" y="436" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#607D8B" stroke-width="2"/>
<text x="400" y="447" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">命中缓存直接返回，未</text>
<text x="400" y="465" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">命中则回源拉取</text>
<line x1="400" y1="156" x2="400" y2="180" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="220" x2="400" y2="244" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="284" x2="400" y2="308" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="348" x2="400" y2="372" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="412" x2="400" y2="436" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
</svg>