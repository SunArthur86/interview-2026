<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">Synchronized 锁升级与 JIT 优化架构</text><rect x="30" y="50" width="230" height="260" rx="8" fill="#F3E5F5" stroke="#9C27B0"/><text x="145" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9C27B0" text-anchor="middle">JIT 编译器优化 (基础)</text><rect x="50" y="95" width="190" height="40" rx="4" fill="#ffffff" stroke="#9C27B0"/><text x="145" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">逃逸分析</text><text x="145" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B" text-anchor="middle">栈上分配 / 锁消除</text><rect x="50" y="145" width="190" height="40" rx="4" fill="#ffffff" stroke="#9C27B0"/><text x="145" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">标量替换</text><text x="145" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B" text-anchor="middle">拆解聚合对象免堆分配</text><rect x="50" y="195" width="190" height="40" rx="4" fill="#ffffff" stroke="#9C27B0"/><text x="145" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">公共子表达式消除</text><text x="145" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B" text-anchor="middle">边界检查消除</text><rect x="50" y="245" width="190" height="45" rx="4" fill="#E8F5E9" stroke="#4CAF50"/><text x="145" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4CAF50" text-anchor="middle">效果: 减少锁开销</text><text x="145" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4CAF50" text-anchor="middle">大幅提升并发吞吐量</text><rect x="300" y="50" width="470" height="260" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="535" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#2196F3" text-anchor="middle">Synchronized 锁升级过程 (不可逆)</text><ellipse cx="335" cy="140" rx="35" ry="25" fill="#ffffff" stroke="#607D8B"/><text x="335" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">无锁</text><line x1="370" y1="140" x2="410" y2="140" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><rect x="410" y="115" width="80" height="50" rx="4" fill="#E8F5E9" stroke="#4CAF50"/><text x="450" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">偏向锁</text><text x="450" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B" text-anchor="middle">替换ThreadID</text><line x1="490" y1="140" x2="530" y2="140" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><rect x="530" y="115" width="80" height="50" rx="4" fill="#FFF3E0" stroke="#FF9800"/><text x="570" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">轻量级锁</text><text x="570" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B" text-anchor="middle">CAS自旋</text><line x1="610" y1="140" x2="650" y2="140" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><rect x="650" y="115" width="100" height="50" rx="4" fill="#FFEBEE" stroke="#f44336"/><text x="700" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f44336" text-anchor="middle">重量级锁</text><text x="700" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B" text-anchor="middle">OS Monitor</text><text x="535" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Monitor 底层依赖 (ObjectMonitor)</text><rect x="330" y="230" width="130" height="35" rx="4" fill="#ffffff" stroke="#2196F3"/><text x="395" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">_owner (持有者)</text><rect x="470" y="230" width="130" height="35" rx="4" fill="#ffffff" stroke="#2196F3"/><text x="535" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">_WaitSet (等待)</text><rect x="610" y="230" width="130" height="35" rx="4" fill="#ffffff" stroke="#2196F3"/><text x="675" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">_EntryList (阻塞)</text><rect x="30" y="330" width="740" height="60" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="400" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle"><tspan x="400" dy="0">Java 对象头结构:</tspan><tspan x="400" dy="18">[ Mark Word (HashCode, GC分代年龄, 锁标志位) ] -- [ Class Pointer ]</tspan></text><rect x="30" y="405" width="740" height="70" rx="8" fill="#F3E5F5" stroke="#9C27B0"/><text x="400" y="425" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#9C27B0" text-anchor="middle"><tspan x="400" dy="0">Synchronized 特征:</tspan><tspan x="400" dy="16">1. 保证原子性、可见性 (Monitor Exit 刷主存)、有序性</tspan><tspan x="400" dy="14">2. 可重入锁 (计数器+1避免死锁) / JVM 层自动释放</tspan></text><rect x="20" y="485" width="15" height="10" fill="#F3E5F5" stroke="#9C27B0"/><text x="45" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">核心抽象</text><rect x="110" y="485" width="15" height="10" fill="#E8F5E9" stroke="#4CAF50"/><text x="135" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">性能优化</text><rect x="200" y="485" width="15" height="10" fill="#FFEBEE" stroke="#f44336"/><text x="225" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">系统开销</text></svg>
