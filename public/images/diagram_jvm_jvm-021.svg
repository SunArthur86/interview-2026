<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">JVM 解释器工作原理</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="60" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" opacity="1.0"/><text x="400" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#2196F3">逐行读取字节码 → 翻译为机器指令执行</text><text x="400" y="150" text-anchor="middle" font-size="11" font-weight="normal" fill="#1565C0" font-style="italic">启动快，无需编译等待</text><rect x="100" y="220" width="130" height="100" rx="6" ry="6" fill="#2196F322" stroke="#2196F3" stroke-width="2" opacity="1.0"/><rect x="100" y="220" width="130" height="28" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="165" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">字节码</text><text x="165" y="270" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">.class 文件</text><text x="165" y="288" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">0x B2 00 02...</text><line x1="230" y1="270" x2="250" y2="270" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="250" y="220" width="130" height="100" rx="6" ry="6" fill="#00968822" stroke="#009688" stroke-width="2" opacity="1.0"/><rect x="250" y="220" width="130" height="28" rx="6" ry="6" fill="#009688" stroke="#009688" stroke-width="1.5" opacity="1.0"/><text x="315" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">字节码读取</text><text x="315" y="270" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">Bytecode Reader</text><text x="315" y="288" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">按 PC 取指令</text><line x1="380" y1="270" x2="400" y2="270" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="400" y="220" width="130" height="100" rx="6" ry="6" fill="#FF980022" stroke="#FF9800" stroke-width="2" opacity="1.0"/><rect x="400" y="220" width="130" height="28" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="465" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">字节码翻译</text><text x="465" y="270" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">Interpreter</text><text x="465" y="288" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">解释为机器码</text><line x1="530" y1="270" x2="550" y2="270" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="550" y="220" width="130" height="100" rx="6" ry="6" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="550" y="220" width="130" height="28" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="615" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">执行</text><text x="615" y="270" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">CPU 执行</text><text x="615" y="288" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">机器指令</text><rect x="40" y="360" width="720" height="100" rx="6" ry="6" fill="#FFFDE7" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="400" y="385" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">执行示例: int a = 1 + 2</text><text x="60" y="410" text-anchor="start" font-size="11" font-weight="normal" fill="#5D4037">iconst_1   (0x04)</text><text x="60" y="428" text-anchor="start" font-size="11" font-weight="normal" fill="#5D4037">iconst_2   (0x05)</text><text x="60" y="446" text-anchor="start" font-size="11" font-weight="normal" fill="#5D4037">iadd       (0x60)</text><text x="400" y="410" text-anchor="start" font-size="11" font-weight="700" fill="#2196F3">→ 解释器翻译每条指令</text><text x="400" y="428" text-anchor="start" font-size="11" font-weight="700" fill="#FF9800">→ 操作数栈计算</text><text x="400" y="446" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">→ 结果存局部变量表</text></svg>
