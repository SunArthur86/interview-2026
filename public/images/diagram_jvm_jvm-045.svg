<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">JDK 1.8 为何用元空间替代永久代？</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="60" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" opacity="1.0"/><text x="400" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#2196F3">核心动机：解决 PermGen OOM 调优困难</text><text x="400" y="150" text-anchor="middle" font-size="11" font-weight="normal" fill="#1565C0" font-style="italic">同时为 HotSpot 与 JRockit 融合铺路</text><rect x="40" y="180" width="340" height="240" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="40" y="180" width="340" height="32" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="210" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">永久代 痛点</text><text x="60" y="240" text-anchor="start" font-size="12" font-weight="normal" fill="#B71C1C">1. 大小固定，需手动调优</text><text x="60" y="265" text-anchor="start" font-size="11" font-weight="normal" fill="#D84315" font-style="italic">   -XX:MaxPermSize 难预估</text><text x="60" y="295" text-anchor="start" font-size="12" font-weight="normal" fill="#B71C1C">2. 动态生成类易 OOM</text><text x="60" y="320" text-anchor="start" font-size="11" font-weight="normal" fill="#D84315" font-style="italic">   CGLIB/Spring AOP/反射代理</text><text x="60" y="350" text-anchor="start" font-size="12" font-weight="normal" fill="#B71C1C">3. 字符串常量池占用大</text><text x="60" y="375" text-anchor="start" font-size="11" font-weight="normal" fill="#D84315" font-style="italic">   JDK6- intern 都进 PermGen</text><text x="60" y="400" text-anchor="start" font-size="12" font-weight="normal" fill="#B71C1C">4. GC 效率低</text><rect x="420" y="180" width="340" height="240" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="420" y="180" width="340" height="32" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="590" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">元空间 优势</text><text x="440" y="240" text-anchor="start" font-size="12" font-weight="normal" fill="#1B5E20">1. 使用本地内存</text><text x="440" y="265" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C" font-style="italic">   突破 JVM 堆上限</text><text x="440" y="295" text-anchor="start" font-size="12" font-weight="normal" fill="#1B5E20">2. 大小动态伸缩</text><text x="440" y="320" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C" font-style="italic">   -XX:MaxMetaspaceSize 兜底</text><text x="440" y="350" text-anchor="start" font-size="12" font-weight="normal" fill="#1B5E20">3. 字符串常量池移到堆</text><text x="440" y="375" text-anchor="start" font-size="11" font-weight="normal" fill="#388E3C" font-style="italic">   可被 GC 正常回收</text><text x="440" y="400" text-anchor="start" font-size="12" font-weight="normal" fill="#1B5E20">4. 类卸载更高效</text><rect x="30" y="425" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="435" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="62.0" y="448" font-size="12" fill="#37474F" text-anchor="start">PermGen 缺点</text><rect x="280.0" y="435" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="302.0" y="448" font-size="12" fill="#37474F" text-anchor="start">Metaspace 优点</text><rect x="520.0" y="435" width="16" height="16" rx="3" fill="#2196F3" stroke="#37474F" stroke-width="1"/><text x="542.0" y="448" font-size="12" fill="#37474F" text-anchor="start">动机</text>
</svg>
