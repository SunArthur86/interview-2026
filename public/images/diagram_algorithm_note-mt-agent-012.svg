<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">手撕：重排链表（LeetCode 143）</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">将链表重排为L0到Ln到L1到Ln-1到L2到Ln-2交替排列。</text>

  <rect x="40" y="180" width="168.0" height="80" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="124.0" y="217.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">找中点</text>
  <text x="124.0" y="234.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">快慢指针</text>
  <line x1="208.0" y1="220.0" x2="224.0" y2="220.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="216.0" y="215.0" text-anchor="middle" font-size="11" font-weight="600" fill="#607D8B">→</text>
  <circle cx="52" cy="174" r="14" fill="#2196F3"/><text x="52" y="179" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">1</text>
  <rect x="224.0" y="180" width="168.0" height="80" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="308.0" y="217.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">反转</text>
  <text x="308.0" y="234.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">后半段</text>
  <line x1="392.0" y1="220.0" x2="408.0" y2="220.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="400.0" y="215.0" text-anchor="middle" font-size="11" font-weight="600" fill="#607D8B">→</text>
  <circle cx="236.0" cy="174" r="14" fill="#FF9800"/><text x="236.0" y="179" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">2</text>
  <rect x="408.0" y="180" width="168.0" height="80" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="492.0" y="217.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">交错合并</text>
  <text x="492.0" y="234.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">双指针</text>
  <line x1="576.0" y1="220.0" x2="592.0" y2="220.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="584.0" y="215.0" text-anchor="middle" font-size="11" font-weight="600" fill="#607D8B">→</text>
  <circle cx="420.0" cy="174" r="14" fill="#9C27B0"/><text x="420.0" y="179" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">3</text>
  <rect x="592.0" y="180" width="168.0" height="80" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="676.0" y="217.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">结果</text>
  <text x="676.0" y="234.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">L0,Ln,L1,...</text>
  <circle cx="604.0" cy="174" r="14" fill="#4CAF50"/><text x="604.0" y="179" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">4</text>
  <text x="40" y="320" font-size="13" font-weight="700" fill="#37474F">核心要点</text>
  <circle cx="48" cy="339" r="4" fill="#2196F3"/>
  <text x="60" y="342" font-size="11.5" fill="#37474F">快慢指针找中点</text>
  <circle cx="48" cy="365" r="4" fill="#FF9800"/>
  <text x="60" y="368" font-size="11.5" fill="#37474F">反转链表后半段</text>
  <circle cx="48" cy="391" r="4" fill="#9C27B0"/>
  <text x="60" y="394" font-size="11.5" fill="#37474F">双指针交错合并</text>
  <circle cx="48" cy="417" r="4" fill="#4CAF50"/>
  <text x="60" y="420" font-size="11.5" fill="#37474F">时间On空间O1</text>
