<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">ThreadLocal 与 synchronized 对比机制</text><rect x="60" y="60" width="300" height="310" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="210" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">ThreadLocal (空间换时间)</text><line x1="80" y1="100" x2="340" y2="100" stroke="#90CAF9" stroke-width="1"/><rect x="100" y="120" width="220" height="50" rx="8" fill="#fff" stroke="#2196F3"/><text x="210" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#555">Thread 1 -> 独立副本A</text><text x="210" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">无锁并发，互不干扰</text><rect x="100" y="190" width="220" height="50" rx="8" fill="#fff" stroke="#2196F3"/><text x="210" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#555">Thread 2 -> 独立副本B</text><text x="210" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">避免参数层层传递</text><rect x="100" y="260" width="220" height="50" rx="8" fill="#fff" stroke="#2196F3"/><text x="210" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#555">Thread 3 -> 独立副本C</text><text x="210" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">非线程安全对象封闭</text><rect x="110" y="330" width="200" height="30" rx="15" fill="#FFEBEE" stroke="#f44336" stroke-width="1" stroke-dasharray="4"/><text x="210" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">内存开销大，需防泄漏</text><rect x="440" y="60" width="300" height="310" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="590" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#FF9800">synchronized (时间换空间)</text><line x1="460" y1="100" x2="720" y2="100" stroke="#FFCC80" stroke-width="1"/><ellipse cx="590" cy="140" rx="50" ry="20" fill="#fff" stroke="#FF9800" stroke-width="2"/><text x="590" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">共享资源</text><path d="M 480 200 L 550 160" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 590 200 L 590 160" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 700 200 L 630 160" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/><rect x="450" y="200" width="70" height="35" rx="4" fill="#fff" stroke="#FF9800"/><text x="485" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#555">Thread 1</text><rect x="555" y="200" width="70" height="35" rx="4" fill="#fff" stroke="#FF9800"/><text x="590" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#555">Thread 2</text><rect x="660" y="200" width="70" height="35" rx="4" fill="#fff" stroke="#FF9800"/><text x="695" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#555">Thread 3</text><path d="M 485 235 Q 530 280 550 295" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 695 235 Q 650 280 630 295" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/><rect x="480" y="290" width="220" height="35" rx="4" fill="#ECEFF1" stroke="#FF9800"/><text x="590" y="312" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#555">Thread 2 (阻塞等待排队)</text><rect x="450" y="345" width="280" height="30" rx="15" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4"/><text x="590" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">内存开销小，保证强一致性</text><g transform="translate(40, 400)"><rect width="20" height="14" fill="#E3F2FD" stroke="#2196F3"/><text x="30" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">数据隔离方案</text><rect x="140" width="20" height="14" fill="#FFF3E0" stroke="#FF9800"/><text x="170" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">互斥同步方案</text><rect x="280" width="20" height="14" fill="#E8F5E9" stroke="#4CAF50"/><text x="310" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">优势</text><rect x="360" width="20" height="14" fill="#FFEBEE" stroke="#f44336"/><text x="390" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">代价/劣势</text></g><text x="400" y="460" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#607D8B">扩展：MDC (日志追踪)、SimpleDateFormat 线程安全包装均基于 ThreadLocal 实现。</text></svg>
