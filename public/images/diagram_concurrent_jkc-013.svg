<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#fafafa"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/>
    </marker>
  </defs>

  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">ThreadLocalMap 线程隔离与内存泄漏机制</text>

  <rect x="30" y="80" width="280" height="300" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="170" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">Thread-1 (工人A)</text>
  <rect x="60" y="130" width="220" height="100" rx="8" fill="#ffffff" stroke="#9C27B0" stroke-width="2"/>
  <text x="170" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">ThreadLocalMap</text>
  <rect x="80" y="170" width="80" height="40" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
  <text x="120" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">Key(弱引用)</text>
  <rect x="180" y="170" width="80" height="40" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="220" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">Value(强引用)</text>
  <rect x="60" y="250" width="220" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/>
  <text x="170" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">userContext.get()</text>

  <rect x="490" y="80" width="280" height="300" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="630" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">Thread-2 (工人B)</text>
  <rect x="520" y="130" width="220" height="100" rx="8" fill="#ffffff" stroke="#9C27B0" stroke-width="2"/>
  <text x="630" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">ThreadLocalMap</text>
  <rect x="540" y="170" width="80" height="40" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
  <text x="580" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">Key(弱引用)</text>
  <rect x="640" y="170" width="80" height="40" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="680" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">Value(强引用)</text>
  <rect x="520" y="250" width="220" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/>
  <text x="630" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">transactionId.get()</text>

  <rect x="310" y="410" width="180" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="400" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">务必 remove() 防数据污染</text>

  <path d="M 190 310 L 190 390 L 310 410" fill="none" stroke="#f44336" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arr)"/>
  <path d="M 610 310 L 610 390 L 490 410" fill="none" stroke="#f44336" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arr)"/>

  <rect x="20" y="460" width="760" height="30" rx="5" fill="#ffffff" stroke="#ECEFF1"/>
  <rect x="30" y="470" width="15" height="10" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="50" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">正常路径</text>
  <rect x="130" y="470" width="15" height="10" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="150" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">机制判断</text>
  <rect x="230" y="470" width="15" height="10" fill="#F3E5F5" stroke="#9C27B0"/>
  <text x="250" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">核心结构</text>
  <rect x="330" y="470" width="15" height="10" fill="#FFEBEE" stroke="#f44336"/>
  <text x="350" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">致命风险</text>
  <rect x="430" y="470" width="15" height="10" fill="#E3F2FD" stroke="#2196F3"/>
  <text x="450" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">线程隔离</text>
</svg>
