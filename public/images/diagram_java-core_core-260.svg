<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">什么是注解处理器？</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：在运行时或编译时解析注解信息并执行相应逻辑。</text>
<!-- BODY_TOP=110 -->
<text x="60" y="120" font-size="13" fill="#2196F3" font-weight="700" letter-spacing="0.5">5 大元注解</text>
<rect x="60" y="140" width="130" height="80" rx="6" fill="#4CAF5022" stroke="#4CAF50" stroke-width="1.5"/>
<text x="125" y="166" font-size="12" fill="#4CAF50" text-anchor="middle" font-weight="700">@Target</text>
<text x="125" y="188" font-size="10" fill="#37404F" text-anchor="middle">作用位置</text>
<text x="125" y="202" font-size="10" fill="#37404F" text-anchor="middle">TYPE/METHOD/FI</text>
<text x="125" y="216" font-size="10" fill="#37404F" text-anchor="middle">ELD</text>
<rect x="200" y="140" width="130" height="80" rx="6" fill="#2196F322" stroke="#2196F3" stroke-width="1.5"/>
<text x="265" y="166" font-size="12" fill="#2196F3" text-anchor="middle" font-weight="700">@Retention</text>
<text x="265" y="188" font-size="10" fill="#37404F" text-anchor="middle">保留策略</text>
<text x="265" y="202" font-size="10" fill="#37404F" text-anchor="middle">SOURCE/CLASS/R</text>
<text x="265" y="216" font-size="10" fill="#37404F" text-anchor="middle">UNTIME</text>
<rect x="340" y="140" width="130" height="80" rx="6" fill="#FF980022" stroke="#FF9800" stroke-width="1.5"/>
<text x="405" y="166" font-size="12" fill="#FF9800" text-anchor="middle" font-weight="700">@Documented</text>
<text x="405" y="188" font-size="10" fill="#37404F" text-anchor="middle">Javadoc 包含</text>
<rect x="480" y="140" width="130" height="80" rx="6" fill="#9C27B022" stroke="#9C27B0" stroke-width="1.5"/>
<text x="545" y="166" font-size="12" fill="#9C27B0" text-anchor="middle" font-weight="700">@Inherited</text>
<text x="545" y="188" font-size="10" fill="#37404F" text-anchor="middle">子类可继承</text>
<rect x="620" y="140" width="130" height="80" rx="6" fill="#f4433622" stroke="#f44336" stroke-width="1.5"/>
<text x="685" y="166" font-size="12" fill="#f44336" text-anchor="middle" font-weight="700">@Repeatable</text>
<text x="685" y="188" font-size="10" fill="#37404F" text-anchor="middle">可重复使用</text>
<text x="60" y="260" font-size="13" fill="#9C27B0" font-weight="700" letter-spacing="0.5">RetentionPolicy 三阶段</text>
<rect x="60" y="280" width="220" height="80" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="170" y="308" font-size="14" fill="#4CAF50" text-anchor="middle" font-weight="700">SOURCE</text>
<text x="170" y="334" font-size="11" fill="#37404F" text-anchor="middle">源码期</text>
<text x="170" y="348" font-size="11" fill="#37404F" text-anchor="middle">如 @Override</text>
<line x1="280" y1="320" x2="290" y2="320" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<text x="285" y="314" font-size="11" fill="#607D8B" text-anchor="middle" font-weight="600">衰减</text>
<rect x="290" y="280" width="220" height="80" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="400" y="308" font-size="14" fill="#FF9800" text-anchor="middle" font-weight="700">CLASS</text>
<text x="400" y="334" font-size="11" fill="#37404F" text-anchor="middle">字节码期(默认)</text>
<text x="400" y="348" font-size="11" fill="#37404F" text-anchor="middle">几乎不用</text>
<line x1="510" y1="320" x2="520" y2="320" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<text x="515" y="314" font-size="11" fill="#607D8B" text-anchor="middle" font-weight="600">衰减</text>
<rect x="520" y="280" width="220" height="80" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="630" y="308" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="700">RUNTIME</text>
<text x="630" y="334" font-size="11" fill="#37404F" text-anchor="middle">运行期可反射读取</text>
<text x="630" y="348" font-size="11" fill="#37404F" text-anchor="middle">框架基石</text>
<rect x="60" y="390" width="680" height="160" rx="10" fill="#FFFFFF" stroke="#f44336" stroke-width="1.5"/>
<text x="80" y="414" font-size="13" fill="#f44336" font-weight="700">自定义注解 + 处理</text>
<rect x="80" y="430" width="120" height="60" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="140" y="453" font-size="11" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">@interface 定</text>
<text x="140" y="467" font-size="11" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">义</text>
<rect x="210" y="430" width="120" height="60" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="270" y="453" font-size="11" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">元注解标注</text>
<text x="270" y="467" font-size="11" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(RUNTIME)</text>
<line x1="200" y1="460" x2="210" y2="460" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="340" y="430" width="120" height="60" rx="8" fill="#9C27B022" stroke="#9C27B0" stroke-width="2"/>
<text x="400" y="453" font-size="11" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">反射 isAnnotat</text>
<text x="400" y="467" font-size="11" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ionPresent</text>
<line x1="330" y1="460" x2="340" y2="460" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="470" y="430" width="120" height="60" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="530" y="460" font-size="11" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">getAnnotation</text>
<line x1="460" y1="460" x2="470" y2="460" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="600" y="430" width="120" height="60" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="660" y="460" font-size="11" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">业务处理</text>
<line x1="590" y1="460" x2="600" y2="460" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="526" font-size="12" fill="#607D8B" text-anchor="middle">框架应用：Spring(@Component/@Autowired)  MyBatis  Lombok  编译期 apt</text>
</svg>