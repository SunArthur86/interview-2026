<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">什么是注解处理器？</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：在运行时或编译时解析注解信息并执行相应逻辑。</text>
<!-- BODY_TOP=110 -->
<rect x="60" y="110" width="680" height="50" rx="8" fill="#9C27B0"/>
<text x="400" y="142" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="700">反射：运行期动态获取类信息 + 操作对象（Spring/MyBatis/JSON 序列化基石）</text>
<rect x="310" y="180" width="180" height="60" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="202" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">Class&lt;?&gt;</text>
<text x="400" y="218" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">类对象入口</text>
<rect x="60" y="280" width="170" height="70" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="145" y="301" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">获取 Field</text>
<text x="145" y="315" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">getDeclaredFie</text>
<text x="145" y="329" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ld()</text>
<line x1="400" y1="240" x2="145" y2="280" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="230" y="280" width="170" height="70" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="315" y="301" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">获取 Method</text>
<text x="315" y="315" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">getDeclaredMet</text>
<text x="315" y="329" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">hod()</text>
<line x1="400" y1="240" x2="315" y2="280" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="400" y="280" width="170" height="70" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="485" y="293" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">获取 Construct</text>
<text x="485" y="308" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">or</text>
<text x="485" y="322" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">getConstructor</text>
<text x="485" y="337" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">()</text>
<line x1="400" y1="240" x2="485" y2="280" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="570" y="280" width="170" height="70" rx="8" fill="#9C27B022" stroke="#9C27B0" stroke-width="2"/>
<text x="655" y="308" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">创建实例</text>
<text x="655" y="322" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">newInstance()</text>
<line x1="400" y1="240" x2="655" y2="280" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="280" y="390" width="240" height="60" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="400" y="397" font-size="13" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">setAccessible(</text>
<text x="400" y="412" font-size="13" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">true)</text>
<text x="400" y="428" font-size="13" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">突破 private </text>
<text x="400" y="443" font-size="13" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">访问限制</text>
<rect x="60" y="470" width="320" height="80" rx="8" fill="#4CAF5011" stroke="#4CAF50" stroke-width="1.5"/>
<text x="80" y="494" font-size="13" fill="#4CAF50" font-weight="700">优势</text>
<text x="80" y="514" font-size="11" fill="#37474F">动态 / 灵活 / 框架基石</text>
<text x="80" y="532" font-size="11" fill="#37474F">运行期扩展（插件机制）</text>
<rect x="420" y="470" width="320" height="80" rx="8" fill="#f4433611" stroke="#f44336" stroke-width="1.5"/>
<text x="440" y="494" font-size="13" fill="#f44336" font-weight="700">劣势</text>
<text x="440" y="514" font-size="11" fill="#37474F">性能差（JIT 后仍 1.5x）</text>
<text x="440" y="532" font-size="11" fill="#37474F">破坏封装 / 安全风险</text>
</svg>