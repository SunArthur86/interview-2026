<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L9,5 z" fill="#f44336"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#fafafa"/>
  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">newFixedThreadPool 任务提交流程</text>
  
  <ellipse cx="250" cy="90" rx="60" ry="25" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="250" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">execute(任务)</text>
  
  <polygon points="250,140 320,190 250,240 180,190" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="250" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">core &lt; 核心数?</text>
  <text x="250" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#FF9800">(固定大小)</text>
  
  <rect x="120" y="275" width="130" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="185" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">执行任务</text>
  <text x="185" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">线程永驻复用</text>
  
  <rect x="360" y="275" width="220" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="470" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">加入无界队列</text>
  <text x="470" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">(LinkedBlockingQueue)</text>
  
  <path d="M 220 240 L 185 275" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <text x="170" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="end" fill="#4CAF50">是</text>
  
  <path d="M 290 210 Q 360 210 400 275" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/>
  <text x="340" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">否</text>
  
  <rect x="280" y="370" width="260" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="410" y="393" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">致命风险: 任务无限堆积</text>
  <text x="410" y="410" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">导致 OOM (内存溢出)</text>
  
  <path d="M 470 325 L 410 370" stroke="#f44336" stroke-width="2" marker-end="url(#arr-red)"/>
  
  <line x1="250" y1="335" x2="250" y2="365" stroke="#607D8B" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <rect x="50" y="365" width="200" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/>
  <text x="150" y="388" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">执行完毕取下一个任务</text>
  
  <rect x="610" y="450" width="180" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="700" y="468" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">生产建议:</text>
  <text x="700" y="483" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">有界队列+拒绝策略</text>
  
  <g transform="translate(20, 450)">
    <rect width="12" height="12" fill="#E8F5E9" stroke="#4CAF50"/>
    <text x="18" y="11" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333">正常执行</text>
    <rect x="80" width="12" height="12" fill="#FFEBEE" stroke="#f44336"/>
    <text x="98" y="11" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333">风险/异常</text>
  </g>
</svg>
