<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">volatile 关键字作用与底层原理</text><g font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle"><rect x="60" y="80" width="200" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="160" y="110" fill="#2196F3">Thread A (工作内存)</text><rect x="60" y="250" width="200" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="160" y="280" fill="#2196F3">Thread B (工作内存)</text><rect x="540" y="160" width="200" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="640" y="185" fill="#9C27B0">主内存</text><text x="640" y="205" fill="#9C27B0" font-weight="bold">volatile int state</text><rect x="290" y="145" width="150" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="365" y="170" fill="#FF9800">StoreLoad 内存屏障</text><rect x="290" y="255" width="150" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="365" y="280" fill="#FF9800">LoadLoad 内存屏障</text><path d="M 260 100 L 290 160" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)" fill="none"/><path d="M 440 170 L 540 180" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)" fill="none"/><path d="M 540 200 L 440 260" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)" fill="none"/><path d="M 290 270 L 260 270" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)" fill="none"/><rect x="290" y="340" width="220" height="60" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="365" fill="#f44336" font-weight="bold">风险：不保证原子性</text><text x="400" y="385" fill="#f44336">i++ 并发下会丢失更新</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle"><rect x="150" y="450" width="500" height="25" rx="4" fill="#ECEFF1" stroke="#607D8B"/><text x="400" y="466" fill="#607D8B">底层：lock指令触发MESI协议强制刷主存 + 禁止指令重排 (DCL单例必加)</text></g></svg>
