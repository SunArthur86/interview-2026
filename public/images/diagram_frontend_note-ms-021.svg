<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">如果产品要扩到更多桌面能力，哪层前端架构最该先做成平台？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">任务编排层最该先平台化——它是所有Agent能力的公共底座，抽象为统一的Task-Context-Product模型后，新增能力只需实现接口。</text>

  <rect x="280" y="90" width="240" height="60" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="400.0" y="117.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">任务编排层 (优先)</text>
  <text x="400.0" y="134.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">最该先平台化</text>
  <rect x="280" y="200" width="240" height="50" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="400.0" y="222.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Task-Context-Product …</text>
  <text x="400.0" y="239.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">抽象公共底座</text>
  <line x1="400" y1="150" x2="400" y2="200" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="40" y="310" width="240" height="70" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="160.0" y="342.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">产物管理层</text>
  <text x="160.0" y="359.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">类型无关预览/编辑/导出</text>
  <rect x="295" y="310" width="240" height="70" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="415.0" y="342.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">权限层</text>
  <text x="415.0" y="359.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">统一授权框架</text>
  <rect x="550" y="310" width="240" height="70" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="670.0" y="342.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">日志追踪层</text>
  <text x="670.0" y="359.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">全链路可观测</text>
  <text x="40" y="430" font-size="12" font-weight="700" fill="#37474F">新增能力 = 实现接口，不改主架构</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#f44336"/>
  <text x="100" y="482" font-size="11" fill="#37474F">编排</text>
  <rect x="136" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="156" y="482" font-size="11" fill="#37474F">统一模型</text>
  <rect x="206" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="226" y="482" font-size="11" fill="#37474F">产物</text>
  <rect x="262" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="282" y="482" font-size="11" fill="#37474F">日志</text>
</svg>