<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">JVM synchronized 锁升级与优化路径</text><ellipse cx="100" cy="100" rx="50" ry="20" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="100" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">无锁状态</text><rect x="250" y="80" width="120" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="310" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">偏向锁</text><text x="310" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">记录线程ID</text><rect x="450" y="80" width="120" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="510" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">轻量级锁</text><text x="510" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">CAS + 自旋</text><rect x="650" y="80" width="120" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="710" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">重量级锁</text><text x="710" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">OS Mutex 阻塞</text><path d="M 150 100 L 245 100" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="197" y="93" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">首个线程进入</text><path d="M 370 100 L 445 100" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="407" y="93" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">出现竞争</text><path d="M 570 100 L 645 100" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="607" y="93" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">自旋失败</text><path d="M 740 100 L 760 100 L 760 150 L 400 150 L 400 300 L 310 300 L 310 125" stroke="#f44336" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arr)"/><text x="555" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#f44336">不可降级！只能升级不能退回</text><rect x="30" y="190" width="360" height="270" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="210" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">JIT 编译器级优化</text><rect x="50" y="240" width="150" height="40" rx="8" fill="#fff" stroke="#9C27B0" stroke-width="1"/><text x="125" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">锁消除</text><text x="125" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">逃逸分析去掉无竞争锁</text><rect x="220" y="240" width="150" height="40" rx="8" fill="#fff" stroke="#9C27B0" stroke-width="1"/><text x="295" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">锁粗化</text><text x="295" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">合并相邻的同步代码块</text><rect x="50" y="310" width="320" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1"/><text x="210" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">致命风险：调用 hashCode() </text><text x="210" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">Mark Word 没位置存 Hash，强制撤销升级！</text><rect x="50" y="380" width="320" height="60" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/><text x="210" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#607D8B">实战避坑：高并发网关</text><text x="210" y="418" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">撤销偏向锁导致 STW 性能下降</text><text x="210" y="432" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">建议使用 -XX:-UseBiasedLocking</text><rect x="410" y="190" width="360" height="270" rx="10" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="590" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">应用场景对比与指导</text><rect x="430" y="240" width="150" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/><text x="505" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">基本无竞争 (单线程)</text><rect x="600" y="240" width="150" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/><text x="675" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">少量线程交替执行</text><rect x="430" y="310" width="320" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1"/><text x="590" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">高并发重度竞争 (长时间阻塞)</text></svg>
