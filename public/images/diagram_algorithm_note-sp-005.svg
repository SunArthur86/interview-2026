<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">验证二叉搜索树（LeetCode 98）</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">验证BST = 检查每个节点是否满足&quot;左子树所有节点 &lt; 当前节点 &lt; 右子树所有节点&quot;。关键陷阱是只检查直接子节点不够，必须确保整棵左子树的最大值 &lt; 当前…</text>

  <rect x="40" y="80" width="340" height="340" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <rect x="420" y="80" width="340" height="340" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="210" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#1565C0">错误做法</text>
  <text x="590" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#E65100">正确做法</text>
  <circle cx="400" cy="240" r="28" fill="#9C27B0"/>
  <text x="400" y="246" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">VS</text>
  <text x="60" y="138" font-size="11.5" fill="#1565C0">✓ 只比直接子节点</text>
  <text x="60" y="170" font-size="11.5" fill="#1565C0">✓ 左&lt;根&lt;右 局部判断</text>
  <text x="60" y="202" font-size="11.5" fill="#1565C0">✓ 忽略孙子节点违反</text>
  <text x="440" y="138" font-size="11.5" fill="#E65100">✓ 递归传(min,max)值域</text>
  <text x="440" y="170" font-size="11.5" fill="#E65100">✓ 中序遍历严格递增</text>
  <text x="440" y="202" font-size="11.5" fill="#E65100">✓ O(n) 时间 / O(h) 空间</text>
  <text x="40" y="445" font-size="12" font-weight="700" fill="#37474F">本质：方法1: 中序遍历必须严格递增 → 最直观</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">错误做法</text>
  <rect x="150" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="170" y="482" font-size="11" fill="#37474F">正确做法</text>
</svg>