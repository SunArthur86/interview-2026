<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">ChannelHandler 和 ChannelPipeline 的关系…</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">ChannelHandler 是&quot;处理一个事件的业务逻辑单元&quot;，ChannelPipeline 是&quot;把多个 Handler 串成处理链的容器&quot;。两者合起来就是…</text>

  <rect x="40" y="220" width="80" height="36" rx="18.0" fill="#2196F3"/><text x="80.0" y="242.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">HEAD</text>
  <rect x="140" y="200" width="140" height="76" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="210.0" y="235.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Decoder</text>
  <text x="210.0" y="252.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">解码</text>
  <line x1="120" y1="238" x2="140" y2="238" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <text x="130.0" y="233.0" text-anchor="middle" font-size="11" font-weight="600" fill="#4CAF50">入站</text>
  <line x1="280" y1="250" x2="140" y2="250" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <text x="210.0" y="245.0" text-anchor="middle" font-size="11" font-weight="600" fill="#f44336">出站</text>
  <rect x="300" y="200" width="140" height="76" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="370.0" y="235.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">BizHandler</text>
  <text x="370.0" y="252.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">业务</text>
  <line x1="280" y1="238" x2="300" y2="238" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <text x="290.0" y="233.0" text-anchor="middle" font-size="11" font-weight="600" fill="#4CAF50">入站</text>
  <line x1="440" y1="250" x2="300" y2="250" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <text x="370.0" y="245.0" text-anchor="middle" font-size="11" font-weight="600" fill="#f44336">出站</text>
  <rect x="460" y="200" width="140" height="76" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="530.0" y="235.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Encoder</text>
  <text x="530.0" y="252.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">编码</text>
  <line x1="440" y1="238" x2="460" y2="238" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <text x="450.0" y="233.0" text-anchor="middle" font-size="11" font-weight="600" fill="#4CAF50">入站</text>
  <line x1="600" y1="250" x2="460" y2="250" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <text x="530.0" y="245.0" text-anchor="middle" font-size="11" font-weight="600" fill="#f44336">出站</text>
  <rect x="620" y="220" width="80" height="36" rx="18.0" fill="#2196F3"/><text x="660.0" y="242.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">TAIL</text>
  <text x="40" y="120" font-size="13" font-weight="700" fill="#2E7D32">入站事件：HEAD → TAIL (字节流→对象)</text>
  <line x1="40" y1="140" x2="760" y2="140" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <text x="40" y="350" font-size="13" font-weight="700" fill="#C62828">出站事件：TAIL → HEAD (对象→字节流)</text>
  <line x1="760" y1="370" x2="40" y2="370" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <text x="40" y="430" font-size="12" font-weight="700" fill="#37474F">责任链模式：ChannelPipeline 编排多个 ChannelHandler 的顺序</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="100" y="482" font-size="11" fill="#37474F">入站</text>
  <rect x="136" y="470" width="14" height="14" rx="3" fill="#f44336"/>
  <text x="156" y="482" font-size="11" fill="#37474F">出站</text>
  <rect x="192" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="212" y="482" font-size="11" fill="#37474F">HEAD/TAIL</text>
  <rect x="297" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="317" y="482" font-size="11" fill="#37474F">编解码</text>
</svg>