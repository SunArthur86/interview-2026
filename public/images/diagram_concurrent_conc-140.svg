<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-size="18" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">ReentrantLock 与 synchronized 对比选型</text><rect x="30" y="60" width="340" height="370" rx="10" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="200" y="85" font-size="15" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#607D8B">synchronized (自动挡)</text><rect x="70" y="105" width="260" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="200" y="135" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">JVM底层实现(自动加/释放锁)</text><rect x="70" y="170" width="260" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="200" y="200" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">非公平锁、不可中断</text><rect x="70" y="235" width="260" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="200" y="262" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">死锁风险: 阻塞无法主动退出</text><rect x="70" y="300" width="260" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="200" y="330" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">单条件变量(wait/notify)</text><rect x="430" y="60" width="340" height="370" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="600" y="85" font-size="15" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#9C27B0">ReentrantLock (手动挡)</text><rect x="470" y="105" width="260" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="600" y="130" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">tryLock(timeout) 防死锁</text><rect x="470" y="155" width="260" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="600" y="180" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">lockInterruptibly() 可中断</text><rect x="470" y="205" width="260" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="600" y="230" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">构造器传true启用公平锁</text><rect x="470" y="255" width="260" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="600" y="280" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">newCondition() 多条件变量</text><rect x="470" y="310" width="260" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="600" y="335" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">⚠️ 必须在 finally 中 unlock()</text><rect x="60" y="445" width="680" height="35" rx="6" fill="#ECEFF1" stroke="#607D8B"/><text x="400" y="468" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">图例: <tspan fill="#2196F3">蓝(基础)</tspan> / <tspan fill="#4CAF50">绿(高级优势)</tspan> / <tspan fill="#f44336">红(风险注意)</tspan> / <tspan fill="#FF9800">橙(特性限制)</tspan></text></svg>
