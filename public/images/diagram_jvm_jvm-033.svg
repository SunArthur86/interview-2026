<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">AOT 提前编译 vs JIT 即时编译</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="350" height="350" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="40" y="100" width="350" height="36" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="215" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">JIT 即时编译</text><text x="60" y="165" text-anchor="start" font-size="12" font-weight="700" fill="#1B5E20">时机：运行时</text><text x="60" y="190" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">原理：边运行边编译</text><text x="60" y="220" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">优点：</text><text x="80" y="245" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 基于运行数据优化</text><text x="80" y="265" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 激进优化 (逃逸分析)</text><text x="80" y="285" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 峰值性能高</text><text x="60" y="315" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">缺点：</text><text x="80" y="340" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 启动慢 (warmup)</text><text x="80" y="360" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 内存占用大</text><text x="80" y="380" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 优化可能退化</text><text x="60" y="415" text-anchor="start" font-size="11" font-weight="600" fill="#9C27B0">场景：长期运行服务</text><text x="60" y="435" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">默认 HotSpot 模式</text><rect x="410" y="100" width="350" height="350" rx="8" ry="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" opacity="1.0"/><rect x="410" y="100" width="350" height="36" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="585" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">AOT 提前编译</text><text x="430" y="165" text-anchor="start" font-size="12" font-weight="700" fill="#0D47A1">时机：构建时</text><text x="430" y="190" text-anchor="start" font-size="11" font-weight="normal" fill="#0D47A1">原理：编译期生成机器码</text><text x="430" y="220" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">优点：</text><text x="450" y="245" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 启动极快</text><text x="450" y="265" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 内存占用小</text><text x="450" y="285" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 包体积小</text><text x="430" y="315" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">缺点：</text><text x="450" y="340" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 不能动态优化</text><text x="450" y="360" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 反射需配置</text><text x="450" y="380" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 峰值不如 JIT</text><text x="430" y="415" text-anchor="start" font-size="11" font-weight="600" fill="#9C27B0">场景：云原生 / 短任务</text><text x="430" y="435" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">GraalVM Native Image</text></svg>
