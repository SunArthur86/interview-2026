<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="max-width:100%;height:auto;font-family:system-ui,-apple-system,'PingFang SC',sans-serif;">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#666"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4CAF50"/>
    </marker>
    <marker id="arro" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f44336"/>
    </marker>
  </defs>

  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">面对消息队列的严重积压，线上应急处理的排查思路与解决方案是什么？</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#607D8B">利用临时转发将积压数据“搬运”至扩容分区，以并行度换时间。</text>
  <rect x="80" y="150" width="260" height="80" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="210" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">固定窗口计数</text>
  <text x="210" y="205" text-anchor="middle" font-size="11" fill="#1565C0">简单 · 临界突刺</text>
  <rect x="460" y="150" width="260" height="80" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="590" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">滑动窗口</text>
  <text x="590" y="205" text-anchor="middle" font-size="11" fill="#2E7D32">平滑 · 推荐使用</text>
  <rect x="80" y="270" width="260" height="80" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="210" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">漏桶 Leaky</text>
  <text x="210" y="325" text-anchor="middle" font-size="11" fill="#E65100">恒定速率 · 平滑</text>
  <rect x="460" y="270" width="260" height="80" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="590" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#6A1B9A">令牌桶 Token</text>
  <text x="590" y="325" text-anchor="middle" font-size="11" fill="#6A1B9A">允许突发 · 最常用</text>
  <text x="400" y="395" text-anchor="middle" font-size="12" fill="#666" font-weight="700">令牌桶原理：固定速率投放令牌 → 请求消耗令牌</text>
  <rect x="95" y="410" width="130" height="40" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="160" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#6A1B9A">令牌生成器</text>
  <text x="160" y="444" text-anchor="middle" font-size="11" fill="#6A1B9A">r 个/秒</text>
  <rect x="335" y="410" width="130" height="40" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="400" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">令牌桶</text>
  <text x="400" y="444" text-anchor="middle" font-size="11" fill="#E65100">容量 N</text>
  <rect x="575" y="410" width="130" height="40" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="640" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">请求</text>
  <text x="640" y="444" text-anchor="middle" font-size="11" fill="#2E7D32">无令牌拒绝</text>
  <line x1="225" y1="430" x2="335" y2="430" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="465" y1="430" x2="575" y2="430" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="400" y="486" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Sentinel：滑动窗口统计 QPS，配合预热/排队策略</text>
</svg>
