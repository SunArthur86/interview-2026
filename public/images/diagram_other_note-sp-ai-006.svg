<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Python的GIL是什么？什么是进程？什么是协程？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">GIL是CPython的全局解释器锁，同一时刻只允许一个线程执行Python字节码</text>

  <rect x="40" y="80" width="220" height="320" rx="10" fill="b" stroke="#2196F3" stroke-width="2" opacity="0.4"/>
  <rect x="40" y="80" width="220" height="40" rx="10" fill="#2196F3"/>
  <rect x="40" y="110" width="220" height="10" fill="#2196F3"/>
  <text x="150" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">进程 Process</text>
  <circle cx="55" cy="142" r="3" fill="#2196F3"/>
  <text x="65" y="145" font-size="11.5" fill="#37474F">资源分配最小单位</text>
  <circle cx="55" cy="174" r="3" fill="#2196F3"/>
  <text x="65" y="177" font-size="11.5" fill="#37474F">独立内存</text>
  <circle cx="55" cy="206" r="3" fill="#2196F3"/>
  <text x="65" y="209" font-size="11.5" fill="#37474F">可利用多核</text>
  <circle cx="55" cy="238" r="3" fill="#2196F3"/>
  <text x="65" y="241" font-size="11.5" fill="#37474F">开销大</text>
  <rect x="290" y="80" width="220" height="320" rx="10" fill="b" stroke="#FF9800" stroke-width="2" opacity="0.4"/>
  <rect x="290" y="80" width="220" height="40" rx="10" fill="#FF9800"/>
  <rect x="290" y="110" width="220" height="10" fill="#FF9800"/>
  <text x="400" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">线程 Thread</text>
  <circle cx="305" cy="142" r="3" fill="#FF9800"/>
  <text x="315" y="145" font-size="11.5" fill="#37474F">共享内存</text>
  <circle cx="305" cy="174" r="3" fill="#FF9800"/>
  <text x="315" y="177" font-size="11.5" fill="#37474F">受 GIL 限制</text>
  <circle cx="305" cy="206" r="3" fill="#FF9800"/>
  <text x="315" y="209" font-size="11.5" fill="#37474F">不能并行 CPU</text>
  <circle cx="305" cy="238" r="3" fill="#FF9800"/>
  <text x="315" y="241" font-size="11.5" fill="#37474F">轻量</text>
  <rect x="540" y="80" width="220" height="320" rx="10" fill="b" stroke="#4CAF50" stroke-width="2" opacity="0.4"/>
  <rect x="540" y="80" width="220" height="40" rx="10" fill="#4CAF50"/>
  <rect x="540" y="110" width="220" height="10" fill="#4CAF50"/>
  <text x="650" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">协程 Coroutine</text>
  <circle cx="555" cy="142" r="3" fill="#4CAF50"/>
  <text x="565" y="145" font-size="11.5" fill="#37474F">用户态轻量</text>
  <circle cx="555" cy="174" r="3" fill="#4CAF50"/>
  <text x="565" y="177" font-size="11.5" fill="#37474F">适合高并发 IO</text>
  <circle cx="555" cy="206" r="3" fill="#4CAF50"/>
  <text x="565" y="209" font-size="11.5" fill="#37474F">单线程切换</text>
  <circle cx="555" cy="238" r="3" fill="#4CAF50"/>
  <text x="565" y="241" font-size="11.5" fill="#37474F">async/await</text>
  <text x="40" y="430" font-size="12" font-weight="700" fill="#37474F">本质：GIL是CPython特有的，同一时刻只有一个线程执行字节码</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">进程 Process</text>
  <rect x="192" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="212" y="482" font-size="11" fill="#37474F">线程 Thread</text>
  <rect x="297" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="317" y="482" font-size="11" fill="#37474F">协程 Coroutine</text>
</svg>