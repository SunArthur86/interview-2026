<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">final 字段的线程安全初始化</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="60" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#4CAF50">final 利用 JMM 内存屏障禁止构造期间重排序</text><text x="400" y="148" text-anchor="middle" font-size="11" font-weight="normal" fill="#1B5E20" font-style="italic">保证构造完成后所有线程可见正确状态</text><rect x="40" y="200" width="350" height="240" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><rect x="40" y="200" width="350" height="32" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="215" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">普通字段 (无 final)</text><text x="60" y="255" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">可能重排序:</text><text x="80" y="280" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">1. 分配内存</text><text x="80" y="300" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">2. 设置引用 (publish)</text><text x="80" y="320" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">3. 初始化字段</text><text x="60" y="355" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">风险:</text><text x="80" y="380" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">其他线程看到 &quot;半初始化&quot; 对象</text><text x="80" y="400" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">字段为 null 或 0</text><text x="80" y="420" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">经典: DCL 单例模式</text><rect x="410" y="200" width="350" height="240" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><rect x="410" y="200" width="350" height="32" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">final 字段</text><text x="430" y="255" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">保证顺序:</text><text x="450" y="280" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">1. 分配内存</text><text x="450" y="300" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">2. 初始化字段 (frozen)</text><text x="450" y="320" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">3. 设置引用 (publish)</text><text x="430" y="355" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">保证:</text><text x="450" y="380" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">构造完成 → 字段对所有线程可见</text><text x="450" y="400" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">不需 synchronized / volatile</text><text x="450" y="420" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">不可变对象天然线程安全</text><rect x="40" y="460" width="720" height="30" rx="4" ry="4" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="480" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F" font-style="italic">final vs volatile: final 一次性写+读屏障, volatile 每次读写都屏障</text></svg>
