<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700">进程的状态有哪些 (五状态模型)</text><ellipse cx="80" cy="250" rx="50" ry="30" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="80" y="246" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#9C27B0">创建状态</text><text x="80" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#9C27B0">(新建进程)</text><rect x="220" y="220" width="120" height="60" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="280" y="246" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#2196F3">就绪状态</text><text x="280" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#2196F3">(等待CPU调度)</text><rect x="380" y="220" width="120" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="440" y="246" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4CAF50">运行状态</text><text x="440" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4CAF50">(占用CPU执行)</text><rect x="540" y="220" width="120" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="600" y="246" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#FF9800">阻塞状态</text><text x="600" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#FF9800">(等待资源/IO)</text><ellipse cx="760" cy="250" rx="50" ry="30" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="760" y="246" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#607D8B">终止状态</text><text x="760" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#607D8B">(资源回收)</text><path d="M 130 250 L 220 250" stroke="#9C27B0" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="175" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9C27B0">提交</text><path d="M 500 250 L 710 250" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="605" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4CAF50">完成/释放</text><path d="M 340 240 L 380 240" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="360" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4CAF50">调度</text><path d="M 380 260 L 340 260" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="360" y="280" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#FF9800">时间片到/抢占</text><path d="M 500 260 L 540 260" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="520" y="280" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#FF9800">请求资源</text><path d="M 600 220 Q 440 120 280 220" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="440" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#2196F3">资源到位/IO完成 (重回就绪队列)</text><rect x="80" y="350" width="680" height="90" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" stroke-dasharray="5"/><text x="420" y="380" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#f44336">致命规则 (不可违背)</text><text x="420" y="406" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f44336">阻塞状态恢复后，绝对不能直接回运行状态！</text><text x="420" y="424" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f44336">必须先重回就绪状态，等待系统调度分配 CPU。</text></svg>
