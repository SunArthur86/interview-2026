<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">CMS vs G1 对比与选择</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="350" height="400" rx="8" ry="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="40" y="90" width="350" height="36" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="215" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">CMS (Concurrent Mark Sweep)</text><text x="60" y="155" text-anchor="start" font-size="12" font-weight="700" fill="#B71C1C">算法: 标记-清除</text><text x="60" y="180" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">内存碎片: 有 (致命)</text><text x="60" y="205" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">停顿时间: 低 (但不可预测)</text><text x="60" y="230" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">堆要求: 小到中等 (&lt;8G)</text><text x="60" y="255" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">回收粒度: 整个老年代</text><text x="60" y="280" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">浮动垃圾: 有</text><text x="60" y="305" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">CPU 占用: 高 (并发)</text><text x="60" y="335" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">退化风险:</text><text x="80" y="358" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">Concurrent Mode Failure</text><text x="80" y="378" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">→ Serial Old (单线程)</text><text x="60" y="415" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">JDK 9 起废弃</text><text x="60" y="440" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">JDK 14 移除</text><text x="60" y="470" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">场景: 老系统</text><rect x="410" y="90" width="350" height="400" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="410" y="90" width="350" height="36" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">G1 (Garbage First)</text><text x="430" y="155" text-anchor="start" font-size="12" font-weight="700" fill="#1B5E20">算法: 标记-整理 + 复制</text><text x="430" y="180" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">内存碎片: 无</text><text x="430" y="205" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">停顿时间: 可预测 (设定目标)</text><text x="430" y="230" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">堆要求: 大堆 (&gt;6G 优势明显)</text><text x="430" y="255" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">回收粒度: Region (部分)</text><text x="430" y="280" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">浮动垃圾: 较少</text><text x="430" y="305" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">CPU 占用: 适中</text><text x="430" y="335" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">特色: </text><text x="450" y="358" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">Region 化堆布局</text><text x="450" y="378" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">Mature GC + Mixed GC</text><text x="450" y="398" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">Garbage First 策略</text><text x="430" y="435" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">JDK 9+ 默认</text><text x="430" y="460" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">主推选择</text><text x="430" y="480" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20" font-style="italic">场景: 服务端主流</text><rect x="40" y="510" width="720" height="60" rx="6" ry="6" fill="#FFFDE7" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="400" y="535" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">选择建议</text><text x="400" y="555" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F">小堆 (&lt;4G) / 老系统 → CMS  |  大堆 / 新项目 → G1 (默认)</text></svg>
