<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">synchronized 锁升级与 Monitor 原理</text><g transform="translate(100, 80)"><rect x="0" y="0" width="120" height="50" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="60" y="20" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#555">无锁状态</text><text x="60" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">(初始)</text></g><line x1="160" y1="105" x2="200" y2="125" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="175" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">首选获取</text><g transform="translate(220, 80)"><rect x="0" y="0" width="140" height="100" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="70" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">偏向锁</text><line x1="20" y1="40" x2="120" y2="40" stroke="#CE93D8" stroke-width="1"/><text x="70" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">MarkWord 记录</text><text x="70" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">当前线程 ID</text></g><path d="M 360 130 L 410 150" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="385" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">出现竞争</text><g transform="translate(430, 80)"><rect x="0" y="0" width="140" height="100" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="70" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">轻量级锁</text><line x1="20" y1="40" x2="120" y2="40" stroke="#FFCC80" stroke-width="1"/><text x="70" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">栈帧 Lock Record</text><text x="70" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">CAS 自旋尝试</text></g><path d="M 570 130 L 620 150" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="595" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">自旋失败</text><g transform="translate(640, 80)"><rect x="0" y="0" width="140" height="100" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="70" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">重量级锁</text><line x1="20" y1="40" x2="120" y2="40" stroke="#EF9A9A" stroke-width="1"/><text x="70" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">依赖 OS Monitor</text><text x="70" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">内核态，线程挂起</text></g><g transform="translate(100, 230)"><rect x="0" y="0" width="680" height="160" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" stroke-dasharray="5"/><text x="340" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">重量级锁底层：ObjectMonitor 模型</text><line x1="150" y1="40" x2="530" y2="40" stroke="#90A4AE" stroke-width="1"/><rect x="180" y="60" width="100" height="40" rx="4" fill="#fff" stroke="#607D8B"/><text x="230" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#4CAF50">Owner</text><text x="230" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#555">(持有者)</text><rect x="340" y="60" width="100" height="40" rx="4" fill="#fff" stroke="#607D8B"/><text x="390" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#FF9800">EntryList</text><text x="390" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#555">(阻塞排队)</text><rect x="500" y="60" width="100" height="40" rx="4" fill="#fff" stroke="#607D8B"/><text x="550" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#9C27B0">WaitSet</text><text x="550" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#555">(wait 等待)</text><path d="M 280 80 L 340 80" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><text x="310" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#555">unlock</text><path d="M 440 80 L 500 80" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><text x="470" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#555">wait()</text><text x="180" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#555">- 代码块：monitorenter / monitorexit 指令</text><text x="180" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#555">- 方法：ACC_SYNCHRONIZED 标志位隐式实现</text></g><text x="400" y="425" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#f44336">注：锁升级是不可逆的（单向），为了在极少竞争到激烈竞争的不同场景下平衡性能。</text><g transform="translate(40, 450)"><rect width="20" height="14" fill="#ECEFF1" stroke="#607D8B"/><text x="30" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">初始/注释</text><rect x="110" width="20" height="14" fill="#F3E5F5" stroke="#9C27B0"/><text x="140" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">乐观/低竞争</text><rect x="230" width="20" height="14" fill="#FFF3E0" stroke="#FF9800"/><text x="260" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">中等竞争</text><rect x="340" width="20" height="14" fill="#FFEBEE" stroke="#f44336"/><text x="370" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">激烈竞争/高风险</text></g></svg>
