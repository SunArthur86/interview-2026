<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">STW (Stop-The-World) 与 减少策略</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="60" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="400" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#f44336">STW：暂停所有应用线程</text><text x="400" y="150" text-anchor="middle" font-size="12" font-weight="normal" fill="#B71C1C" font-style="italic">保证 GC 一致性，但影响响应时间</text><rect x="60" y="200" width="680" height="50" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="400" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#1B5E20">应用运行 (用户线程)</text><rect x="180" y="200" width="60" height="50" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="210" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">STW</text><rect x="380" y="200" width="80" height="50" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="420" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">STW</text><rect x="580" y="200" width="60" height="50" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="610" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">STW</text><text x="60" y="275" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">← 时间 →</text><rect x="40" y="310" width="720" height="150" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#37474F">减少 STW 的策略</text><rect x="60" y="360" width="160" height="80" rx="6" ry="6" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="140" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#4CAF50">分代回收</text><text x="140" y="405" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">减少扫描范围</text><text x="140" y="425" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B">复制算法</text><rect x="230" y="360" width="160" height="80" rx="6" ry="6" fill="#FF980022" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="310" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#FF9800">并发标记</text><text x="310" y="405" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">CMS/G1/ZGC</text><text x="310" y="425" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B">标记-清除</text><rect x="400" y="360" width="160" height="80" rx="6" ry="6" fill="#9C27B022" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><text x="480" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#9C27B0">Region 化</text><text x="480" y="405" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">部分回收</text><text x="480" y="425" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B">可预测停顿</text><rect x="570" y="360" width="160" height="80" rx="6" ry="6" fill="#00968822" stroke="#009688" stroke-width="2" opacity="1.0"/><text x="650" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#009688">读屏障</text><text x="650" y="405" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">ZGC 染色指针</text><text x="650" y="425" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B">亚毫秒级</text><rect x="30" y="455" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="465" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="62.0" y="478" font-size="12" fill="#37474F" text-anchor="start">应用运行</text><rect x="400.0" y="465" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="422.0" y="478" font-size="12" fill="#37474F" text-anchor="start">STW 停顿</text>
</svg>
