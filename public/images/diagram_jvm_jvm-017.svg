<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">JVM 垃圾回收四大基础算法</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="350" height="200" rx="8" ry="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" opacity="1.0"/><rect x="40" y="100" width="350" height="36" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="215" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">1. 标记-清除 (Mark-Sweep)</text><text x="60" y="165" text-anchor="start" font-size="12" font-weight="700" fill="#0D47A1">流程：标记存活 → 清除垃圾</text><text x="60" y="190" text-anchor="start" font-size="11" font-weight="normal" fill="#4CAF50">优点：实现简单</text><text x="60" y="210" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">缺点：</text><text x="80" y="230" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 内存碎片化严重</text><text x="80" y="250" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 分配大对象易失败</text><text x="80" y="270" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 效率不稳定</text><text x="60" y="290" text-anchor="start" font-size="11" font-weight="600" fill="#9C27B0">使用：CMS 老年代</text><rect x="410" y="100" width="350" height="200" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="410" y="100" width="350" height="36" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">2. 复制 (Copying)</text><text x="430" y="165" text-anchor="start" font-size="12" font-weight="700" fill="#1B5E20">流程：分两半 → 复制存活 → 清空</text><text x="430" y="190" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">优点：</text><text x="450" y="210" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 无内存碎片</text><text x="450" y="230" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 分配快 (指针碰撞)</text><text x="430" y="255" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">缺点：浪费 50% 内存</text><text x="430" y="280" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">存活多时效率低</text><text x="430" y="300" text-anchor="start" font-size="11" font-weight="600" fill="#9C27B0">使用：新生代 (Eden+S0+S1)</text><rect x="40" y="320" width="350" height="200" rx="8" ry="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" opacity="1.0"/><rect x="40" y="320" width="350" height="36" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="215" y="344" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">3. 标记-整理 (Mark-Compact)</text><text x="60" y="385" text-anchor="start" font-size="12" font-weight="700" fill="#E65100">流程：标记存活 → 整理到一端</text><text x="60" y="410" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">优点：</text><text x="80" y="430" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 无内存碎片</text><text x="80" y="450" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 不浪费内存</text><text x="60" y="475" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">缺点：移动对象开销大</text><text x="60" y="495" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">更新引用耗时</text><text x="60" y="515" text-anchor="start" font-size="11" font-weight="600" fill="#9C27B0">使用：老年代 (Serial Old)</text><rect x="410" y="320" width="350" height="200" rx="8" ry="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><rect x="410" y="320" width="350" height="36" rx="6" ry="6" fill="#9C27B0" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="585" y="344" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">4. 分代收集 (Generational)</text><text x="430" y="385" text-anchor="start" font-size="12" font-weight="700" fill="#4A148C">思想：按对象生命周期分代</text><text x="430" y="410" text-anchor="start" font-size="11" font-weight="700" fill="#4A148C">新生代 (存活少):</text><text x="450" y="430" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">复制算法</text><text x="430" y="455" text-anchor="start" font-size="11" font-weight="700" fill="#4A148C">老年代 (存活多):</text><text x="450" y="475" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">标记-清除/整理</text><text x="430" y="500" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">现代 JVM 默认策略</text><text x="430" y="520" text-anchor="start" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">HotSpot / G1 / ZGC</text></svg>
