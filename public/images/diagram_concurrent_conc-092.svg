<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#2196F3"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle">操作系统核心架构与态切换</text><rect x="20" y="55" width="760" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="400" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#4CAF50">四大特征</text><text x="400" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#4CAF50">并发 (交替) vs 并行 (同时)  |  共享  |  虚拟  |  异步</text><rect x="50" y="135" width="700" height="100" rx="10" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="5"/><text x="400" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">应用程序层 (用户空间)</text><rect x="100" y="175" width="140" height="45" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="170" y="193" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#2196F3">用户进程</text><text x="170" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#2196F3">受OS监控与服务</text><rect x="310" y="175" width="180" height="45" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="193" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#FF9800">系统调用 (唯一合法桥梁)</text><text x="400" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#FF9800">请求OS服务/硬件操作</text><rect x="560" y="175" width="140" height="45" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="630" y="193" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#2196F3">用户进程</text><text x="630" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#2196F3">不可直接操作硬件</text><line x1="400" y1="235" x2="400" y2="270" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><line x1="380" y1="270" x2="380" y2="240" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><rect x="50" y="275" width="700" height="80" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="5"/><text x="400" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">操作系统内核层 (内核态 Kernel Space)</text><rect x="80" y="315" width="180" height="30" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/><text x="170" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">进程调度与生命周期</text><rect x="310" y="315" width="180" height="30" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/><text x="400" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">内存分配与地址越界保护</text><rect x="540" y="315" width="180" height="30" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/><text x="630" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">I/O驱动与中断处理</text><line x1="400" y1="355" x2="400" y2="380" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/><rect x="200" y="385" width="400" height="40" rx="8" fill="#607D8B" fill-opacity="0.2" stroke="#607D8B" stroke-width="2"/><text x="400" y="405" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#607D8B">底层硬件 (CPU / 内存 / 磁盘 / 网卡)</text><rect x="50" y="445" width="700" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="470" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#f44336">致命风险：用户态直接执行特权指令会触发硬件异常，严重可导致系统崩溃损坏</text></svg>
