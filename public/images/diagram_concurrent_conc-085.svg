<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">单例模式的6种实现与演进</text><rect x="30" y="60" width="150" height="50" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="8"/><text x="105" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">1. 饿汉式</text><text x="105" y="98" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">类加载即初始化</text><rect x="190" y="60" width="150" height="50" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/><text x="265" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">2. 懒汉式(不安全)</text><text x="265" y="98" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">延迟加载，多线程并发风险</text><rect x="350" y="60" width="150" height="50" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/><text x="425" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">3. 懒汉式(安全)</text><text x="425" y="98" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">synchronized加锁，性能差</text><rect x="510" y="60" width="150" height="50" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/><text x="585" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">4. 双重检查锁(DCL)</text><text x="585" y="98" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">减小锁粒度，需volatile</text><rect x="670" y="60" width="100" height="50" fill="#FFEBEE" stroke="#f44336" stroke-width="2" rx="8"/><text x="720" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">反射攻击</text><text x="720" y="98" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#f44336" text-anchor="middle">破坏单例</text><rect x="670" y="140" width="100" height="50" fill="#FFEBEE" stroke="#f44336" stroke-width="2" rx="8"/><text x="720" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">反序列化</text><text x="720" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#f44336" text-anchor="middle">产生新对象</text><line x1="180" y1="85" x2="185" y2="85" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="340" y1="85" x2="345" y2="85" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="500" y1="85" x2="505" y2="85" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="30" y="180" width="280" height="60" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" rx="8"/><text x="170" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">私有构造函数 + 私有静态变量</text><text x="170" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">公有静态 getInstance() 方法</text><rect x="340" y="180" width="150" height="60" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="8"/><text x="415" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">5. 静态内部类</text><text x="415" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">利用类加载机制保安全</text><rect x="510" y="180" width="150" height="60" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="8"/><text x="585" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">6. 枚举单例</text><text x="585" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">JVM底层保证唯一</text><line x1="310" y1="210" x2="335" y2="210" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="490" y1="210" x2="505" y2="210" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="30" y="280" width="340" height="130" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" stroke-dasharray="5" rx="8"/><text x="200" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#FF9800" text-anchor="middle">🔥 关键限制与隐患</text><text x="50" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="start">- 反射攻击：可通过 setAccessible 破坏单例</text><text x="50" y="352" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="start">- 反序列化：会绕过构造创建新实例</text><text x="50" y="374" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="start">- 克隆：若实现 Cloneable 需重写 clone()</text><text x="50" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="start">- DCL隐患：必须配合 volatile 防指令重排</text><rect x="390" y="280" width="380" height="130" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="8"/><text x="580" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4CAF50" text-anchor="middle">✨ 最佳实践：枚举单例</text><text x="410" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="start">优点：</text><text x="425" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="start">1. 写法极简，线程安全由JVM保证</text><text x="425" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="start">2. 天然防御反射攻击</text><text x="425" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="start">3. 自动防御反序列化攻击</text></svg>
