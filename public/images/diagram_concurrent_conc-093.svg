<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#2196F3"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle">条件变量机制与防虚假唤醒</text><rect x="50" y="60" width="200" height="220" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="5"/><text x="150" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">线程 A (如: 消费者)</text><rect x="70" y="110" width="160" height="30" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="150" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">1. 获取互斥锁 Mutex</text><polygon points="150,160 230,200 150,240 70,200" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="150" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">while(条件不满足)</text><text x="150" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">检查状态</text><line x1="150" y1="240" x2="150" y2="285" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><rect x="60" y="290" width="180" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="150" y="308" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">2. pthread_cond_wait</text><text x="150" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">原子性释放锁并阻塞</text><rect x="550" y="60" width="200" height="220" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="5"/><text x="650" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">线程 B (如: 生产者)</text><rect x="570" y="110" width="160" height="30" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="650" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">1. 获取互斥锁 Mutex</text><rect x="570" y="160" width="160" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="650" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">2. 修改共享状态</text><text x="650" y="193" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">(条件现已满足)</text><rect x="560" y="220" width="180" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="650" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">3. pthread_cond_signal</text><text x="650" y="254" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">通知唤醒等待线程</text><rect x="560" y="290" width="180" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="650" y="308" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">4. 释放互斥锁 Mutex</text><text x="650" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">移交执行权</text><line x1="650" y1="260" x2="240" y2="305" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><text x="420" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#4CAF50">发送唤醒信号</text><line x1="150" y1="330" x2="150" y2="370" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><rect x="40" y="375" width="220" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="150" y="393" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">3. 重新竞争并获取锁</text><text x="150" y="409" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">继续向下执行业务逻辑</text><rect x="40" y="435" width="720" height="45" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#f44336">致命风险：必须使用 while 循环检查条件以防“虚假唤醒”</text><text x="400" y="472" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#f44336">若使用 if，虚假唤醒会导致在状态不满足时强行执行操作</text></svg>
