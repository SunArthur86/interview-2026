<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">ByteBuf 相比 ByteBuffer 的优势？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">ByteBuf 是 Netty 重新设计的字节容器，解决 JDK ByteBuffer&quot;用起来过于复杂繁琐&quot;的痛点。它的核心改进是：读写用两个独立指针（不用 …</text>

  <rect x="60" y="110" width="100" height="80" rx="8" fill="#607D8B" stroke="#607D8B" stroke-width="2"/>
  <text x="110.0" y="147.0" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">废弃区</text>
  <text x="110.0" y="164.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">discard</text>
  <rect x="160" y="110" width="280" height="80" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="300.0" y="147.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">可读区</text>
  <text x="300.0" y="164.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">readerIndex → writerIndex</text>
  <rect x="440" y="110" width="300" height="80" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="590.0" y="147.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">可写区</text>
  <text x="590.0" y="164.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">writerIndex → capacity</text>
  <text x="60" y="220" font-size="11" fill="#455A64">↓ 0</text>
  <text x="160" y="220" font-size="11" fill="#2E7D32">↓ readerIndex</text>
  <text x="440" y="220" font-size="11" fill="#1565C0">↓ writerIndex</text>
  <text x="40" y="270" font-size="13" font-weight="700" fill="#37474F">vs JDK ByteBuffer</text>
  <rect x="40" y="290" width="230" height="45" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="155.0" y="309.5" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">读写双索引</text>
  <text x="155.0" y="326.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">无需 flip()</text>
  <rect x="290" y="290" width="230" height="45" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="405.0" y="309.5" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">池化</text>
  <text x="405.0" y="326.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">重复利用内存</text>
  <rect x="540" y="290" width="230" height="45" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="655.0" y="309.5" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">引用计数</text>
  <text x="655.0" y="326.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">精确释放</text>
  <rect x="40" y="345" width="230" height="45" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="155.0" y="364.5" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">复合缓冲区</text>
  <text x="155.0" y="381.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">零拷贝</text>
  <rect x="290" y="345" width="230" height="45" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="405.0" y="364.5" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">按需扩容</text>
  <text x="405.0" y="381.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">动态容量</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="100" y="482" font-size="11" fill="#37474F">可读</text>
  <rect x="136" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="156" y="482" font-size="11" fill="#37474F">可写</text>
  <rect x="192" y="470" width="14" height="14" rx="3" fill="#607D8B"/>
  <text x="212" y="482" font-size="11" fill="#37474F">废弃</text>
</svg>