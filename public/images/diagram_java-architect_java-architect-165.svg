<text x="400" y="122" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">（通用 benchmark）+ </text>
<text x="400" y="140" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">业务评测（真实 query</text>
<text x="400" y="158" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600"> 标注）+ 安全评测（</text>
<text x="400" y="176" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">红队对抗）</text>
<rect x="240" y="194" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
<text x="400" y="191" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">评测指标：accuracy、</text>
<text x="400" y="209" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">faithfulness、helpfu</text>
<text x="400" y="227" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">lness、safety、laten</text>
<text x="400" y="245" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">cy、cost</text>
<rect x="240" y="272" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="400" y="269" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">灰度策略：1% → 5% </text>
<text x="400" y="287" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">→ 25% → 100%，每档</text>
<text x="400" y="305" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">观察 3 天，任一指标</text>
<text x="400" y="323" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">退化回滚</text>
