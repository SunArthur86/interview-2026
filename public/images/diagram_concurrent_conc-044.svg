<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker><marker id="arr_fail" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#f44336"/></marker></defs><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java Atomic 包：CAS 原理与进阶机制</text><rect x="50" y="50" width="250" height="100" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="175" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">核心基础：CAS 乐观锁</text><text x="175" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">V (内存值) == E (预期值) ?</text><text x="175" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">是 -> 更新为 N (新值)</text><text x="175" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">否 -> 不操作或自旋重试</text><rect x="500" y="50" width="250" height="100" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="625" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">基础实现：volatile + CAS</text><text x="625" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">volatile int value; // 保证可见</text><text x="625" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">循环不断尝试 compareAndSet</text><text x="625" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">底层调用 Unsafe + cmpxchg</text><polygon points="400,180 300,250 400,320 500,250" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">CAS 是否成功?</text><rect x="150" y="200" width="100" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="200" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">CAS 成功</text><text x="200" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">更新内存值</text><path d="M 300 250 L 250 220" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="285" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4CAF50">Yes</text><rect x="550" y="200" width="100" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="600" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">CAS 失败</text><text x="600" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">被其它线程修改</text><path d="M 500 250 L 550 220" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arr_fail)"/><text x="515" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f44336">No</text><path d="M 600 240 L 650 240 L 650 380 L 400 380 L 400 322" stroke="#f44336" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arr_fail)"/><text x="525" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">无限自旋循环重试</text><rect x="50" y="390" width="250" height="90" rx="10" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="175" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">致命风险：ABA 隐患</text><text x="175" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">值从 A 变 B 再变 A，无法感知</text><text x="175" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">解决：AtomicStampedReference</text><text x="175" y="470" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">加版本号控制</text><rect x="500" y="390" width="250" height="90" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="625" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">性能进化：LongAdder</text><text x="625" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">分散热点到多个 Cell 数组</text><text x="625" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">不同线程操作不同 Cell</text><text x="625" y="470" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">最终 sum() 汇总</text></svg>
