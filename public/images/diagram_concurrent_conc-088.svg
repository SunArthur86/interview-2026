<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">进程与多线程内存模型与协作</text><rect x="40" y="60" width="460" height="360" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" stroke-dasharray="8" rx="8"/><text x="270" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#607D8B" text-anchor="middle">进程边界</text><rect x="60" y="105" width="420" height="70" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="8"/><text x="270" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9C27B0" text-anchor="middle">共享区域</text><text x="160" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">堆内存 (Heap)</text><text x="380" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">方法区 (Method Area)</text><rect x="60" y="195" width="190" height="200" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/><text x="155" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#2196F3" text-anchor="middle">线程 1</text><rect x="75" y="235" width="160" height="40" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" rx="4"/><text x="155" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">独立栈空间</text><rect x="75" y="285" width="160" height="40" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" rx="4"/><text x="155" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">程序计数器 (PC)</text><rect x="75" y="335" width="160" height="40" fill="#FFEBEE" stroke="#f44336" stroke-width="1" rx="4"/><text x="155" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">并发操作共享资源</text><rect x="270" y="195" width="190" height="200" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/><text x="365" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#2196F3" text-anchor="middle">线程 2</text><rect x="285" y="235" width="160" height="40" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" rx="4"/><text x="365" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">独立栈空间</text><rect x="285" y="285" width="160" height="40" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" rx="4"/><text x="365" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">程序计数器 (PC)</text><rect x="285" y="335" width="160" height="40" fill="#FFEBEE" stroke="#f44336" stroke-width="1" rx="4"/><text x="365" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">并发操作共享资源</text><line x1="155" y1="335" x2="200" y2="175" stroke="#f44336" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="365" y1="335" x2="320" y2="175" stroke="#f44336" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><rect x="530" y="60" width="240" height="120" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="8"/><text x="650" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FF9800" text-anchor="middle">CPU调度与切换</text><text x="545" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">线程是CPU调度的最小单位</text><text x="545" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">进程是资源分配的最小单位</text><text x="545" y="154" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">线程切换开销远小于进程切换</text><line x1="530" y1="155" x2="490" y2="245" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/><line x1="530" y1="155" x2="490" y2="140" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/><rect x="530" y="200" width="240" height="110" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="8"/><text x="650" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4CAF50" text-anchor="middle">多线程优势</text><text x="545" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- 各线程间内存共享通信快</text><text x="545" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- 提升多核CPU的并行效率</text><text x="545" y="288" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- IO阻塞时让出CPU增加吞吐</text><rect x="530" y="330" width="240" height="90" fill="#FFEBEE" stroke="#f44336" stroke-width="2" rx="8"/><text x="650" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f44336" text-anchor="middle">⚠️ 引发的问题与挑战</text><text x="545" y="378" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- 线程安全问题(i++非原子)</text><text x="545" y="398" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- 死锁与上下文切换开销</text></svg>
