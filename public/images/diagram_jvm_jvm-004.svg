<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">永久代 (PermGen) vs 元空间 (Metaspace)</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="350" height="320" rx="8" ry="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="215" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="#f44336">永久代 PermGen</text><text x="215" y="150" text-anchor="middle" font-size="11" font-weight="normal" fill="#B71C1C" font-style="italic">(JDK 7 及之前)</text><rect x="60" y="175" width="310" height="40" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="215" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#B71C1C">位置：JVM 堆内存</text><rect x="60" y="225" width="310" height="40" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="215" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#B71C1C">大小：固定 (-XX:MaxPermSize)</text><rect x="60" y="275" width="310" height="40" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="215" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#f44336">易 OOM: PermGen space</text><rect x="60" y="325" width="310" height="40" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="215" y="350" text-anchor="middle" font-size="11" font-weight="normal" fill="#B71C1C">存：类信息/常量池/静态变量</text><rect x="60" y="375" width="310" height="30" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="215" y="395" text-anchor="middle" font-size="11" font-weight="normal" fill="#E65100" font-style="italic">字符串常量池 (JDK6-)</text><rect x="410" y="100" width="350" height="320" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="585" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="#4CAF50">元空间 Metaspace</text><text x="585" y="150" text-anchor="middle" font-size="11" font-weight="normal" fill="#1B5E20" font-style="italic">(JDK 8+)</text><rect x="430" y="175" width="310" height="40" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#1B5E20">位置：本地内存 (Native)</text><rect x="430" y="225" width="310" height="40" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#1B5E20">大小：动态 (系统内存限制)</text><rect x="430" y="275" width="310" height="40" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#4CAF50">不易 OOM</text><rect x="430" y="325" width="310" height="40" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="585" y="350" text-anchor="middle" font-size="11" font-weight="normal" fill="#1B5E20">存：类元数据 (Klass)</text><rect x="430" y="375" width="310" height="30" rx="6" ry="6" fill="#FFF8E1" stroke="#FF9800" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="585" y="395" text-anchor="middle" font-size="11" font-weight="normal" fill="#E65100" font-style="italic">字符串常量池 → 堆 (JDK7+)</text><text x="400" y="450" text-anchor="middle" font-size="12" font-weight="600" fill="#9C27B0" font-style="italic">迁移原因：调优困难 + 便于与 JRockit 融合</text></svg>
