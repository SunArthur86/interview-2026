<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#607D8B"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#fafafa"/>

  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Interrupt 协作式中断机制</text>
  <text x="400" y="55" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">按暂停键让任务自己收拾东西走人，而非拔电源</text>

  <!-- 入口 -->
  <ellipse cx="400" cy="95" rx="50" ry="22" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="400" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">thread.interrupt()</text>

  <path d="M 400 117 L 400 140" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- 分支判断 -->
  <polygon points="400,140 500,180 400,220 300,180" fill="#E3F2FD" stroke="#2196F3"/>
  <text x="400" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">检查线程状态</text>
  <text x="400" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">(是否在阻塞?)</text>

  <!-- 左侧：运行中 -->
  <path d="M 300 180 L 200 180" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="250" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">非阻塞(运行中)</text>

  <rect x="100" y="210" width="220" height="80" rx="8" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="210" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">正常协作退出</text>
  <text x="210" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">仅设置标志位 = true</text>
  <text x="210" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">主动检查 isInterrupted()</text>

  <!-- 右侧：阻塞中 -->
  <path d="M 500 180 L 600 180" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="550" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">阻塞(sleep/wait)</text>

  <rect x="480" y="210" width="220" height="80" rx="8" fill="#FFEBEE" stroke="#f44336"/>
  <text x="590" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">触发异常退出</text>
  <text x="590" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">抛出 InterruptedException</text>
  <text x="590" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">清除标志位 (重置为 false)</text>

  <!-- 汇聚处理 -->
  <path d="M 210 290 L 210 330 L 320 330" stroke="#607D8B" stroke-width="2" stroke-dasharray="4" fill="none" marker-end="url(#arr)"/>
  <path d="M 590 290 L 590 330 L 480 330" stroke="#607D8B" stroke-width="2" stroke-dasharray="4" fill="none" marker-end="url(#arr)"/>

  <rect x="300" y="310" width="200" height="50" rx="8" fill="#F3E5F5" stroke="#9C27B0"/>
  <text x="400" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">最佳实践</text>
  <text x="400" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">重新 interrupt() 恢复中断状态</text>

  <!-- 底部对照 -->
  <rect x="60" y="400" width="320" height="80" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="220" y="425" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">禁用: thread.stop()</text>
  <text x="220" y="445" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">暴力终止并立即释放所有锁</text>
  <text x="220" y="462" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">导致对象状态不一致 (如转账数据丢失)</text>

  <rect x="420" y="400" width="320" height="80" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="580" y="425" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">推荐: thread.interrupt()</text>
  <text x="580" y="445" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">仅设置标志位请求停止</text>
  <text x="580" y="462" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">由线程自行决定安全点退出</text>
</svg>
