<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700">什么是线程死亡 (TERMINATED / DEAD)</text><ellipse cx="120" cy="100" rx="60" ry="25" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="120" y="105" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#2196F3">RUNNABLE (运行中)</text><polygon points="300,75 380,100 300,125 220,100" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="300" y="105" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#FF9800">执行结果判定</text><rect x="500" y="75" width="100" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="550" y="103" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#4CAF50">run() 正常结束</text><rect x="620" y="75" width="100" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="670" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f44336">抛出未捕获异常</text><text x="670" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f44336">(如 NullPointerException)</text><rect x="500" y="175" width="220" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="610" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f44336">调用废弃的 stop() 方法</text><ellipse cx="410" cy="310" rx="80" ry="35" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="410" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#607D8B">TERMINATED</text><text x="410" y="326" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">(线程死亡)</text><path d="M 180 100 L 220 100" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 380 95 L 500 95" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 380 105 L 620 105" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 300 125 L 300 200 L 500 200" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 550 125 L 490 280" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 670 125 L 430 280" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 610 225 L 440 285" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><polygon points="410,360 490,390 410,420 330,390" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="410" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f44336">尝试再次调用</text><text x="410" y="404" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f44336">start() ?</text><rect x="330" y="440" width="160" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="410" y="465" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f44336">IllegalThreadStateException</text><path d="M 410 345 L 410 360" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 410 420 L 410 440" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arr)" stroke-dasharray="4"/></svg>
