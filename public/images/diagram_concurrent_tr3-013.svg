<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">延时任务队列：堆 vs 时间轮</text><rect x="20" y="60" width="360" height="400" rx="12" fill="#FFEBEE" stroke="#f44336" stroke-dasharray="4,4"/><rect x="420" y="60" width="360" height="400" rx="12" fill="#E8F5E9" stroke="#4CAF50" stroke-dasharray="4,4"/><text x="200" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">ScheduledThreadPool (堆结构)</text><text x="600" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">HashedWheelTimer (时间轮)</text><rect x="120" y="110" width="160" height="40" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="200" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">海量任务并发插入</text><rect x="520" y="110" width="160" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="600" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">海量任务并发插入</text><line x1="200" y1="150" x2="200" y2="180" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><line x1="600" y1="150" x2="600" y2="180" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><path d="M 200 180 L 140 230 L 200 280 L 260 230 Z" fill="#FFEBEE" stroke="#f44336"/><text x="200" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">全局队列锁竞争</text><text x="200" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">O(log N) 调整</text><path d="M 600 180 L 540 230 L 600 280 L 660 230 Z" fill="#E8F5E9" stroke="#4CAF50"/><text x="600" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">定位槽位挂载链表</text><text x="600" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">O(1) 定位</text><line x1="200" y1="280" x2="200" y2="310" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><line x1="600" y1="280" x2="600" y2="310" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><rect x="100" y="310" width="200" height="40" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="200" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">频繁上下文切换与CPU飙高</text><rect x="500" y="310" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="600" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">指针按tick固定间隔转动</text><line x1="200" y1="350" x2="200" y2="380" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><line x1="600" y1="350" x2="600" y2="380" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><rect x="100" y="380" width="200" height="30" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="200" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">吞吐量瓶颈，任务延迟</text><rect x="500" y="380" width="200" height="30" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="600" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">无锁竞争，低延迟稳定</text><rect x="100" y="420" width="200" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="200" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">适用：高精度少量任务</text><rect x="500" y="420" width="200" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="600" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">适用：海量短周期低延迟</text></svg>
