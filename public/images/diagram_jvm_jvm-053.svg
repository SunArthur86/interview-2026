<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">逃逸分析 与 三大优化</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="250" height="280" rx="8" ry="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" opacity="1.0"/><text x="165" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#37474F">方法内对象</text><rect x="60" y="150" width="210" height="50" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="165" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">未逃逸 (No Escape)</text><text x="165" y="195" text-anchor="middle" font-size="10" font-weight="normal" fill="#2E7D32" font-style="italic">局部使用，方法结束即销毁</text><rect x="60" y="220" width="210" height="50" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="165" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">方法逃逸 (Method Escape)</text><text x="165" y="265" text-anchor="middle" font-size="10" font-weight="normal" fill="#BF360C" font-style="italic">返回/被外部引用</text><rect x="60" y="290" width="210" height="50" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="165" y="315" text-anchor="middle" font-size="13" font-weight="700" fill="#B71C1C">线程逃逸 (Thread Escape)</text><text x="165" y="335" text-anchor="middle" font-size="10" font-weight="normal" fill="#B71C1C" font-style="italic">赋值给静态/全局字段</text><text x="165" y="365" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">JIT 编译期分析对象作用域</text><text x="490" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#4CAF50">未逃逸 → 三种优化</text><line x1="290" y1="175" x2="350" y2="230" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/><rect x="350" y="150" width="410" height="80" rx="6" ry="6" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="365" y="175" text-anchor="start" font-size="14" font-weight="700" fill="#4CAF50">栈上分配</text><text x="365" y="192" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Stack Allocation</text><text x="540" y="172" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">对象分配到栈帧</text><text x="540" y="190" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">随栈帧弹出回收</text><text x="540" y="208" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">减少 GC 压力</text><rect x="350" y="250" width="410" height="80" rx="6" ry="6" fill="#9C27B022" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><text x="365" y="275" text-anchor="start" font-size="14" font-weight="700" fill="#9C27B0">锁消除</text><text x="365" y="292" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Lock Elision</text><text x="540" y="272" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">同步块无竞争</text><text x="540" y="290" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">自动去掉 synchronized</text><text x="540" y="308" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">经典: string concat</text><rect x="350" y="350" width="410" height="80" rx="6" ry="6" fill="#FF980022" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="365" y="375" text-anchor="start" font-size="14" font-weight="700" fill="#FF9800">标量替换</text><text x="365" y="392" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">Scalar Replacement</text><text x="540" y="372" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">对象拆解为字段</text><text x="540" y="390" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">分散到寄存器</text><text x="540" y="408" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">避免内存分配</text></svg>
