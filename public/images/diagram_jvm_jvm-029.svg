ight="16" rx="3" fill="#2196F3" stroke="#37474F" stroke-width="1"/><text x="62.0" y="473" font-size="12" fill="#37474F" text-anchor="start">线程私有</text><rect x="220.0" y="460" width="16" height="16" rx="3" fill="#FF9800" stroke="#37474F" stroke-width="1"/><text x="242.0" y="473" font-size="12" fill="#37474F" text-anchor="start">堆共享</text><rect x="400.0" y="460" width="16" height="16" rx="3" fill="#9C27B0" stroke="#37474F" stroke-width="1"/><text x="422.0" y="473" font-size="12" fill="#37474F" text-anchor="start">方法区</text><rect x="580.0" y="460" width="16" height="16" rx="3" fill="#607D8B" stroke="#37474F" stroke-width="1"/><text x="602.0" y="473" font-size="12" fill="#37474F" text-anchor="start">直接内存</text>
