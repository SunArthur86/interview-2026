<rect x="40" y="100" width="720" height="320" rx="8" ry="8" fill="#FFFDE7" stroke="#607D8B" stroke-width="2" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="#5D4037">Java Heap（堆）</text><rect x="60" y="150" width="440" height="240" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="280" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#4CAF50">新生代 Young Generation</text><rect x="80" y="200" width="240" height="170" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="200" y="225" text-anchor="middle" font-size="15" font-weight="700" fill="#1B5E20">Eden (8)</text><text x="200" y="250" text-anchor="middle" font-size="12" font-weight="normal" fill="#2E7D32">新对象首次分配</text><text x="200" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#f44336">Minor GC 触发点</text><text x="200" y="305" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">≈ 80% 新生代空间</text><rect x="340" y="200" width="70" height="170" rx="6" ry="6" fill="#DCEDC8" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="375" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#33691E">S0</text><text x="375" y="248" text-anchor="middle" font-size="11" font-weight="normal" fill="#558B2F">(1)</text><text x="375" y="280" text-anchor="middle" font-size="11" font-weight="normal" fill="#558B2F">From</text><rect x="420" y="200" width="70" height="170" rx="6" ry="6" fill="#F1F8E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="455" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#33691E">S1</text><text x="455" y="248" text-anchor="middle" font-size="11" font-weight="normal" fill="#558B2F">(1)</text><text x="455" y="280" text-anchor="middle" font-size="11" font-weight="normal" fill="#558B2F">To</text><rect x="520" y="150" width="220" height="240" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="630" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#f44336">老年代 Old Gen</text><text x="630" y="210" text-anchor="middle" font-size="13" font-weight="normal" fill="#B71C1C">长期存活对象</text><text x="630" y="240" text-anchor="middle" font-size="13" font-weight="normal" fill="#B71C1C">大对象直接分配</text><text x="630" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#9C27B0">GC Age &gt;= 15</text><text x="630" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#f44336">Full GC / Major GC</text><line x1="280" y1="410" x2="540" y2="290" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow)"/><text x="410" y="360" text-anchor="middle" font-size="12" font-weight="600" fill="#FF9800">晋升 (Promotion)</text><rect x="30" y="440" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="450" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="62.0" y="463" font-size="12" fill="#37474F" text-anchor="start">新生代 复制算法</text><rect x="220.0" y="450" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="242.0" y="463" font-size="12" fill="#37474F" text-anchor="start">老年代 标记整理</text><rect x="400.0" y="450" width="16" height="16" rx="3" fill="#FF9800" stroke="#37474F" stroke-width="1"/><text x="422.0" y="463" font-size="12" fill="#37474F" text-anchor="start">对象晋升</text><rect x="580.0" y="450" width="16" height="16" rx="3" fill="#9C27B0" stroke="#37474F" stroke-width="1"/><text x="602.0" y="463" font-size="12" fill="#37474F" text-anchor="start">GC年龄阈值</text>
