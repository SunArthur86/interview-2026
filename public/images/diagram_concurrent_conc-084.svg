<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">JVM对象内存布局与访问定位</text><rect x="40" y="80" width="340" height="360" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="8"/><text x="210" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#9C27B0" text-anchor="middle">JVM堆内存 (对象布局)</text><rect x="70" y="120" width="280" height="110" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/><text x="210" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">1. 对象头</text><text x="90" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- 运行时元数据</text><text x="105" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="start">Mark Word (锁, GC年龄, Hash)</text><text x="90" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- 类型指针</text><text x="105" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="start">Class Pointer (指向类元数据)</text><rect x="70" y="240" width="280" height="80" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="8"/><text x="210" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">2. 实例数据</text><text x="210" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">父类字段优先，同宽字段分配在一起</text><text x="210" y="303" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">CompactFields 节省空间</text><rect x="70" y="330" width="280" height="60" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" rx="8"/><text x="210" y="352" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">3. 对齐填充</text><text x="210" y="372" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">8字节的整数倍 (保证CPU读取效率)</text><rect x="30" y="465" width="250" height="25" fill="#F3E5F5" stroke="#9C27B0" rx="4"/><text x="155" y="482" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9C27B0" text-anchor="middle">紫：概念</text><rect x="290" y="465" width="250" height="25" fill="#E3F2FD" stroke="#2196F3" rx="4"/><text x="415" y="482" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#2196F3" text-anchor="middle">蓝：流程/主路径</text><rect x="530" y="465" width="240" height="25" fill="#FFEBEE" stroke="#f44336" rx="4"/><text x="650" y="482" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f44336" text-anchor="middle">红：风险/优势对比</text><rect x="450" y="120" width="280" height="110" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/><text x="590" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">句柄访问方式</text><text x="470" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">优点：稳定</text><text x="470" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">引用指向句柄池，对象移动只改句柄</text><text x="470" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">缺点：</text><text x="485" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f44336" text-anchor="start">需二次指针定位，速度稍慢</text><rect x="450" y="240" width="280" height="110" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="8"/><text x="590" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">直接指针访问</text><text x="470" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">优点：速度快</text><text x="470" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">引用直接指向对象实例</text><text x="470" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">缺点：</text><text x="485" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f44336" text-anchor="start">GC移动对象时需修改所有引用</text><rect x="580" y="360" width="160" height="40" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="20"/><text x="660" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#333" text-anchor="middle">HotSpot 采用</text><line x1="450" y1="180" x2="360" y2="165" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="450" y1="290" x2="360" y2="275" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="590" y1="350" x2="660" y2="355" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/></svg>
