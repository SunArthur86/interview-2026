<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java 锁分类与 Synchronized 锁升级机制</text><rect x="30" y="50" width="210" height="150" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="135" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">锁策略分类</text><text x="50" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">1. 并发度：</text><text x="70" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#666">悲观锁(独占) / 乐观锁(CAS)</text><text x="50" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">2. 等待方式：</text><text x="70" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#666">阻塞锁(OS切换) / 自旋锁(空转)</text><text x="50" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">3. 公平性：</text><text x="70" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#666">公平锁(排队) / 非公平锁(抢夺)</text><rect x="260" y="50" width="220" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="370" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">Synchronized 同步锁</text><text x="370" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">基于对象 Monitor 机制 (可重入/非公平)</text><rect x="500" y="50" width="270" height="60" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="635" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">实战坑点：ABA 与 自旋消耗</text><text x="635" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#666">CAS 需防 ABA，自旋过久极度浪费 CPU</text><line x1="370" y1="110" x2="370" y2="150" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="420" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">锁升级(不可逆)</text><rect x="30" y="300" width="740" height="180" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="400" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">Synchronized 锁升级流程 (因竞争加剧而升级)</text><ellipse cx="110" cy="390" rx="55" ry="30" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="110" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">无锁状态</text><text x="110" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">初始</text><line x1="165" y1="390" x2="205" y2="390" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><ellipse cx="260" cy="390" rx="55" ry="30" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="260" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">偏向锁</text><text x="260" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">单线程访问</text><line x1="315" y1="390" x2="355" y2="390" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><ellipse cx="410" cy="390" rx="55" ry="30" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="410" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">轻量级锁</text><text x="410" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">CAS 自旋</text><line x1="465" y1="390" x2="505" y2="390" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><ellipse cx="560" cy="390" rx="55" ry="30" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="560" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">重量级锁</text><text x="560" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">OS 阻塞排队</text><rect x="650" y="360" width="100" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/><text x="700" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">竞争极度</text><text x="700" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">加剧触发</text></svg>
