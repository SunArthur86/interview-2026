<circle cx="86" cy="262" r="5" fill="#4CAF50"/>
<text x="100" y="266" font-size="11" fill="#37474F"><tspan fill="#4CAF50" font-weight="700">慢调用比例</tspan> RT 阈值+比例触发</text>
<circle cx="256" cy="262" r="5" fill="#2196F3"/>
<text x="270" y="266" font-size="11" fill="#37474F"><tspan fill="#2196F3" font-weight="700">异常比例</tspan> 异常率 &gt; 50%</text>
