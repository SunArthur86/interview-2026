<circle cx="256" cy="294" r="5" fill="#607D8B"/>
<text x="270" y="298" font-size="11" fill="#37474F"><tspan fill="#607D8B" font-weight="700">Sentinel</tspan> 阿里主流</text>
<circle cx="426" cy="294" r="5" fill="#4CAF50"/>
<text x="440" y="298" font-size="11" fill="#37474F"><tspan fill="#4CAF50" font-weight="700">Resilience4j</tspan> 函数式</text>
<circle cx="596" cy="294" r="5" fill="#2196F3"/>
<text x="610" y="298" font-size="11" fill="#37474F"><tspan fill="#2196F3" font-weight="700">降级</tspan> 兜底返回</text>
<text x="400" y="366" font-size="13" fill="#2196F3" text-anchor="middle" font-weight="700">熔断保护下游  ·  限流保护自身  ·  降级保用户体验</text>
