<text x="305" y="140" font-size="11" fill="#f44336" text-anchor="middle" font-weight="600">失败率&gt;阈值</text>
<line x1="510" y1="146" x2="600" y2="146" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow)"/>
<text x="555" y="140" font-size="11" fill="#FF9800" text-anchor="middle" font-weight="600">超时时间到</text>
<line x1="600" y1="186" x2="180" y2="186" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/>
<text x="390" y="180" font-size="11" fill="#4CAF50" text-anchor="middle" font-weight="600">探测成功</text>
<rect x="60" y="216" width="680" height="120" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-width="1.5"/>
