<text x="440" y="266" font-size="11" fill="#37474F"><tspan fill="#FF9800" font-weight="700">异常数</tspan> 异常次数阈值</text>
<circle cx="596" cy="262" r="5" fill="#9C27B0"/>
<text x="610" y="266" font-size="11" fill="#37474F"><tspan fill="#9C27B0" font-weight="700">恢复时间</tspan> 默认 10s</text>
<circle cx="86" cy="294" r="5" fill="#f44336"/>
