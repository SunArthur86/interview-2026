<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">PCB与“切换帧”机制</text><rect x="50" y="60" width="700" height="90" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="85" font-family="system-ui,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#9C27B0">PCB (进程控制块) - 进程存在的唯一标识</text><rect x="80" y="100" width="150" height="40" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="155" y="125" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#2196F3">PC (指令地址)</text><rect x="250" y="100" width="150" height="40" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="325" y="125" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#2196F3">通用寄存器</text><rect x="420" y="100" width="150" height="40" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="495" y="125" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#2196F3">SP (栈指针)</text><rect x="590" y="100" width="130" height="40" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="655" y="125" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#2196F3">PSW (状态字)</text><text x="400" y="180" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#607D8B">发生调度 / 时间片耗尽 / 阻塞挂起</text><path d="M 250 190 L 250 210" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 550 190 L 550 210" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><rect x="100" y="210" width="300" height="160" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="250" y="240" font-family="system-ui,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#4CAF50">线程切换 (轻量级)</text><text x="120" y="270" font-family="system-ui,sans-serif" font-size="13" fill="#333">1. 保存当前线程执行现场</text><text x="120" y="295" font-family="system-ui,sans-serif" font-size="13" fill="#333">2. 同进程内共享虚拟地址空间</text><text x="120" y="320" font-family="system-ui,sans-serif" font-size="13" fill="#333">3. 无需切换页表 (不刷TLB)</text><text x="120" y="345" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#4CAF50">优势：开销极小，速度快</text><rect x="440" y="210" width="300" height="160" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="590" y="240" font-family="system-ui,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#f44336">进程切换 (重量级)</text><text x="460" y="270" font-family="system-ui,sans-serif" font-size="13" fill="#333">1. 保存当前进程执行现场</text><text x="460" y="295" font-family="system-ui,sans-serif" font-size="13" fill="#333">2. 切换独立的虚拟地址空间</text><text x="460" y="320" font-family="system-ui,sans-serif" font-size="13" fill="#333">3. 刷新TLB & 重建L1/L2缓存</text><text x="460" y="345" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#f44336">风险：开销巨大，吞吐量骤降</text><rect x="50" y="400" width="700" height="80" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" stroke-dasharray="5"/><text x="400" y="425" font-family="system-ui,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#FF9800">实战风险：锁竞争激烈 / CAS自旋失败</text><text x="400" y="450" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#333">引发大量用户态 <-> 内核态频繁切换 (重量级锁膨胀)</text><text x="400" y="470" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">排查建议：Linux下使用 vmstat 1 命令监控 cs (上下文切换次数) 字段</text></svg>
