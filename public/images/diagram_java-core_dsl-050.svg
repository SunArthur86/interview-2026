<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">CSS选择器</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：CSS 选择器通过标签、类、ID、属性及层级关系精确定位元素。</text>
<!-- BODY_TOP=110 -->
<rect x="60" y="110" width="680" height="50" rx="8" fill="#2196F3"/>
<text x="400" y="142" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="700">Java 泛型 = 编译期类型检查 + 运行期类型擦除（擦除到 Object / 边界）</text>
<rect x="80" y="190" width="200" height="80" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="180" y="213" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">List&lt;String&gt;</text>
<text x="180" y="230" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">List&lt;Integer&gt;</text>
<text x="180" y="247" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(源码)</text>
<line x1="280" y1="230" x2="320" y2="230" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<text x="300" y="224" font-size="11" fill="#455A64" text-anchor="middle" font-weight="600">javac</text>
<rect x="320" y="190" width="200" height="80" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="420" y="222" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">编译期检查</text>
<text x="420" y="238" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">保证类型安全</text>
<line x1="520" y1="230" x2="560" y2="230" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<text x="540" y="224" font-size="11" fill="#455A64" text-anchor="middle" font-weight="600">擦除</text>
<rect x="560" y="190" width="180" height="80" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="650" y="213" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">字节码 List</text>
<text x="650" y="230" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">T→Object</text>
<text x="650" y="247" font-size="14" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">(运行时)</text>
<text x="60" y="310" font-size="13" fill="#9C27B0" font-weight="700" letter-spacing="0.5">三种通配符</text>
<rect x="60" y="330" width="210" height="100" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="165" y="360" font-size="14" fill="#4CAF50" text-anchor="middle" font-weight="700">&lt;? extends T&gt;</text>
<text x="165" y="392" font-size="11" fill="#37474F" text-anchor="middle">上界：只能读</text>
<text x="165" y="408" font-size="11" fill="#37474F" text-anchor="middle">(生产者 Producer)</text>
<rect x="290" y="330" width="210" height="100" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="395" y="360" font-size="14" fill="#FF9800" text-anchor="middle" font-weight="700">&lt;? super T&gt;</text>
<text x="395" y="392" font-size="11" fill="#37474F" text-anchor="middle">下界：只能写</text>
<text x="395" y="408" font-size="11" fill="#37474F" text-anchor="middle">(消费者 Consumer)</text>
<rect x="520" y="330" width="210" height="100" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="625" y="360" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="700">&lt;?&gt;</text>
<text x="625" y="392" font-size="11" fill="#37474F" text-anchor="middle">无界：不确定类型</text>
<text x="625" y="408" font-size="11" fill="#37474F" text-anchor="middle">只读 Object</text>
<text x="400" y="470" font-size="14" fill="#f44336" text-anchor="middle" font-weight="700">PECS 原则：Producer Extends, Consumer Super</text>
<text x="400" y="498" font-size="12" fill="#607D8B" text-anchor="middle">类型擦除影响：无法 new T() / 无法 instanceof T / 静态字段不能是泛型 / 不支持基本类型泛型</text>
</svg>