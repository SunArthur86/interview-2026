<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="max-width:100%;height:auto;font-family:system-ui,-apple-system,'PingFang SC',sans-serif;">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#666"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4CAF50"/>
    </marker>
    <marker id="arro" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f44336"/>
    </marker>
  </defs>

  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">如何利用布隆过滤器解决缓存穿透问题？</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#607D8B">访问前用布隆过滤器拦截，绝不存在则绝不通达数据库。</text>
  <rect x="80" y="130" width="200" height="180" rx="10" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="180" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#C62828">缓存穿透</text>
  <line x1="100" y1="180" x2="260" y2="180" stroke="#f44336" stroke-width="1"/>
  <text x="180" y="210" text-anchor="middle" font-size="11" fill="#C62828">现象</text>
  <text x="180" y="232" text-anchor="middle" font-size="10" fill="#C62828">查不存在的 key</text>
  <text x="180" y="265" text-anchor="middle" font-size="11" fill="#C62828">解决方案</text>
  <text x="180" y="290" text-anchor="middle" font-size="10" fill="#C62828">布隆过滤器 / 空值缓存</text>
  <rect x="320" y="130" width="200" height="180" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="420" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">缓存击穿</text>
  <line x1="340" y1="180" x2="500" y2="180" stroke="#FF9800" stroke-width="1"/>
  <text x="420" y="210" text-anchor="middle" font-size="11" fill="#E65100">现象</text>
  <text x="420" y="232" text-anchor="middle" font-size="10" fill="#E65100">热点 key 过期</text>
  <text x="420" y="265" text-anchor="middle" font-size="11" fill="#E65100">解决方案</text>
  <text x="420" y="290" text-anchor="middle" font-size="10" fill="#E65100">互斥锁 / 永不过期</text>
  <rect x="560" y="130" width="200" height="180" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="660" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#6A1B9A">缓存雪崩</text>
  <line x1="580" y1="180" x2="740" y2="180" stroke="#9C27B0" stroke-width="1"/>
  <text x="660" y="210" text-anchor="middle" font-size="11" fill="#6A1B9A">现象</text>
  <text x="660" y="232" text-anchor="middle" font-size="10" fill="#6A1B9A">大量 key 同时过期</text>
  <text x="660" y="265" text-anchor="middle" font-size="11" fill="#6A1B9A">解决方案</text>
  <text x="660" y="287" text-anchor="middle" font-size="10" fill="#6A1B9A">随机 TTL / 多级缓</text>
  <text x="660" y="300" text-anchor="middle" font-size="10" fill="#6A1B9A">存</text>
  <text x="400" y="360" text-anchor="middle" font-size="12" fill="#666" font-weight="700">请求 → 缓存层 → DB 层（缺失导致直击 DB）</text>
  <rect x="115" y="378" width="130" height="45" rx="10" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/>
  <text x="180" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">请求</text>
  <text x="180" y="414" text-anchor="middle" font-size="11" fill="#37474F">Request</text>
  <rect x="335" y="378" width="130" height="45" rx="10" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#C62828">Redis 缓存</text>
  <text x="400" y="414" text-anchor="middle" font-size="11" fill="#C62828">MISS 命中 DB</text>
  <rect x="555" y="378" width="130" height="45" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="620" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#6A1B9A">DB</text>
  <text x="620" y="414" text-anchor="middle" font-size="11" fill="#6A1B9A">压力源</text>
  <line x1="245" y1="400" x2="335" y2="400" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="465" y1="400" x2="555" y2="400" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <text x="400" y="486" text-anchor="middle" font-size="10" fill="#999" font-style="italic">区分：穿透=不存在 / 击穿=单热点 / 雪崩=批量同时失效</text>
</svg>
