<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">各种 OOM 排查与解决</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="350" height="130" rx="6" ry="6" fill="#f4433618" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="40" y="100" width="350" height="28" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="215" y="119" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">OutOfMemoryError: Java heap space</text><text x="60" y="150" text-anchor="start" font-size="13" font-weight="700" fill="#f44336">堆内存溢出</text><text x="60" y="175" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">原因: 对象太多/内存泄漏</text><text x="60" y="200" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">解决:</text><text x="100" y="200" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">-Xmx / MAT 分析</text><rect x="40" y="250" width="350" height="130" rx="6" ry="6" fill="#9C27B018" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><rect x="40" y="250" width="350" height="28" rx="6" ry="6" fill="#9C27B0" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="215" y="269" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">OutOfMemoryError: Metaspace</text><text x="60" y="300" text-anchor="start" font-size="13" font-weight="700" fill="#9C27B0">元空间溢出</text><text x="60" y="325" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">原因: 动态生成类过多</text><text x="60" y="350" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">解决:</text><text x="100" y="350" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">-XX:MaxMetaspaceSize</text><rect x="40" y="400" width="350" height="130" rx="6" ry="6" fill="#FF980018" stroke="#FF9800" stroke-width="2" opacity="1.0"/><rect x="40" y="400" width="350" height="28" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="215" y="419" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">OutOfMemoryError: GC overhead</text><text x="60" y="450" text-anchor="start" font-size="13" font-weight="700" fill="#FF9800">GC 回收失败</text><text x="60" y="475" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">原因: 98% 时间 GC</text><text x="60" y="500" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">解决:</text><text x="100" y="500" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">通常堆将满/加大堆</text><rect x="410" y="100" width="350" height="130" rx="6" ry="6" fill="#00968818" stroke="#009688" stroke-width="2" opacity="1.0"/><rect x="410" y="100" width="350" height="28" rx="6" ry="6" fill="#009688" stroke="#009688" stroke-width="1.5" opacity="1.0"/><text x="585" y="119" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">OutOfMemoryError: Direct memory</text><text x="430" y="150" text-anchor="start" font-size="13" font-weight="700" fill="#009688">直接内存溢出</text><text x="430" y="175" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">原因: NIO ByteBuf 未释放</text><text x="430" y="200" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">解决:</text><text x="470" y="200" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">-XX:MaxDirectMemorySize</text><rect x="410" y="250" width="350" height="130" rx="6" ry="6" fill="#2196F318" stroke="#2196F3" stroke-width="2" opacity="1.0"/><rect x="410" y="250" width="350" height="28" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="585" y="269" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">OutOfMemoryError: StackOverflow</text><text x="430" y="300" text-anchor="start" font-size="13" font-weight="700" fill="#2196F3">栈溢出</text><text x="430" y="325" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">原因: 递归过深 / -Xss 小</text><text x="430" y="350" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">解决:</text><text x="470" y="350" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">-Xss 增大栈</text><rect x="40" y="550" width="720" height="40" rx="6" ry="6" fill="#E91E6322" stroke="#E91E63" stroke-width="2" opacity="1.0"/><text x="60" y="575" text-anchor="start" font-size="12" font-weight="700" fill="#E91E63">Unable to create: 无法创建线程</text><text x="440" y="575" text-anchor="start" font-size="10" font-weight="normal" fill="#37474F">原因: 线程数超系统限制</text><text x="720" y="575" text-anchor="end" font-size="10" font-weight="600" fill="#4CAF50">解决: ulimit -u / 减线程</text></svg>
