<text x="420" y="323" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ConcreteStrate</text>
<text x="420" y="337" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">gyB</text>
<line x1="420" y1="300" x2="420" y2="270" stroke="#9C27B0" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
<rect x="560" y="300" width="220" height="60" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="670" y="323" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ConcreteStrate</text>
<text x="670" y="337" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">gyC</text>
