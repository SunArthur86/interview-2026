<text x="170" y="323" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ConcreteStrate</text>
<text x="170" y="337" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">gyA</text>
