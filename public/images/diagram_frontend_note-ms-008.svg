<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">桌面端为什么要把结果编辑、确认和发布拆成三步？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">拆三步确保用户对AI产出的完全控制：编辑(修改)→确认(审核)→发布(落地)，防止AI直接产出造成不可逆操作。</text>

  <rect x="40" y="180" width="229.33333333333334" height="80" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="154.66666666666669" y="217.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">编辑 Edit</text>
  <text x="154.66666666666669" y="234.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">用户可修改</text>
  <line x1="269.33333333333337" y1="220.0" x2="285.33333333333337" y2="220.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="277.33333333333337" y="215.0" text-anchor="middle" font-size="11" font-weight="600" fill="#607D8B">→</text>
  <circle cx="52" cy="174" r="14" fill="#2196F3"/><text x="52" y="179" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">1</text>
  <rect x="285.33333333333337" y="180" width="229.33333333333334" height="80" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="400.00000000000006" y="217.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">确认 Confirm</text>
  <text x="400.00000000000006" y="234.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">审核通过</text>
  <line x1="514.6666666666667" y1="220.0" x2="530.6666666666667" y2="220.0" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="522.6666666666667" y="215.0" text-anchor="middle" font-size="11" font-weight="600" fill="#607D8B">→</text>
  <circle cx="297.33333333333337" cy="174" r="14" fill="#FF9800"/><text x="297.33333333333337" y="179" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">2</text>
  <rect x="530.6666666666667" y="180" width="229.33333333333334" height="80" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="645.3333333333334" y="217.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">发布 Publish</text>
  <text x="645.3333333333334" y="234.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">落地文件/站点</text>
  <circle cx="542.6666666666667" cy="174" r="14" fill="#4CAF50"/><text x="542.6666666666667" y="179" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">3</text>
  <text x="40" y="320" font-size="13" font-weight="700" fill="#37474F">核心要点</text>
  <circle cx="48" cy="339" r="4" fill="#2196F3"/>
  <text x="60" y="342" font-size="11.5" fill="#37474F">编辑: 用户可修改AI产出</text>
  <circle cx="48" cy="365" r="4" fill="#FF9800"/>
  <text x="60" y="368" font-size="11.5" fill="#37474F">确认: 审核后再进入下一步</text>
  <circle cx="48" cy="391" r="4" fill="#4CAF50"/>
  <text x="60" y="394" font-size="11.5" fill="#37474F">发布: 落地到文件/站点/系统</text>
  <circle cx="48" cy="417" r="4" fill="#2196F3"/>
  <text x="60" y="420" font-size="11.5" fill="#37474F">防止AI直接产出造成不可逆</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">核心</text>
  <rect x="136" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="156" y="482" font-size="11" fill="#37474F">流程</text>
  <rect x="192" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="212" y="482" font-size="11" fill="#37474F">输入</text>
</svg>