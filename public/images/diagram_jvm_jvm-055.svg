<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">内存溢出 (OOM) vs 内存泄漏 (Leak)</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="350" height="350" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="215" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#4CAF50">内存泄漏 (Memory Leak)</text><text x="215" y="138" text-anchor="middle" font-size="11" font-weight="normal" fill="#1B5E20" font-style="italic">无用对象未释放，逐渐累积</text><rect x="80" y="180" width="250" height="200" rx="6" ry="6" fill="#FAFAFA" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="95" y="200" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B">内存使用</text><polyline points="80,370 110,360 140,345 170,335 200,310 230,290 260,260 290,220 320,180" fill="none" stroke="#f44336" stroke-width="3"/><line x1="80" y1="380" x2="330" y2="380" stroke="#607D8B" stroke-width="1" marker-end="url(#arrow)"/><line x1="80" y1="380" x2="80" y2="175" stroke="#607D8B" stroke-width="1" marker-end="url(#arrow)"/><text x="205" y="397" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B">时间 →</text><text x="70" y="280" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B">内存</text><text x="360" y="180" text-anchor="end" font-size="12" font-weight="700" fill="#f44336">OOM!</text><text x="215" y="425" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">静态集合/未关闭资源/ThreadLocal</text><rect x="410" y="90" width="350" height="350" rx="8" ry="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="585" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#f44336">内存溢出 (OOM)</text><text x="585" y="138" text-anchor="middle" font-size="11" font-weight="normal" fill="#B71C1C" font-style="italic">分配时内存不够 (一次事件)</text><rect x="450" y="180" width="250" height="200" rx="6" ry="6" fill="#FAFAFA" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="465" y="200" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B">内存使用</text><rect x="470" y="320" width="100" height="50" rx="6" ry="6" fill="#90CAF9" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="520" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#0D47A1">正常</text><line x1="570" y1="345" x2="600" y2="240" stroke="#f44336" stroke-width="2.5" marker-end="url(#arrowR)"/><text x="590" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#f44336">申请大对象</text><rect x="600" y="200" width="90" height="60" rx="6" ry="6" fill="#EF5350" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="645" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">超限</text><text x="645" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">OOM!</text><line x1="450" y1="380" x2="700" y2="380" stroke="#607D8B" stroke-width="1" marker-end="url(#arrow)"/><text x="575" y="397" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B">时间 →</text><text x="585" y="425" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">堆/元空间/栈/直接内存</text><rect x="30" y="450" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="460" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="62.0" y="473" font-size="12" fill="#37474F" text-anchor="start">泄漏=慢性病</text><rect x="280.0" y="460" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="302.0" y="473" font-size="12" fill="#37474F" text-anchor="start">溢出=急性病</text><rect x="520.0" y="460" width="16" height="16" rx="3" fill="#2196F3" stroke="#37474F" stroke-width="1"/><text x="542.0" y="473" font-size="12" fill="#37474F" text-anchor="start">正常使用</text>
</svg>
