<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker><marker id="arr_red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#f44336"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle">线程生命周期与新建状态 (NEW)</text><rect x="30" y="70" width="150" height="60" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="105" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">new Thread()</text><text x="105" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">分配内存</text><rect x="40" y="170" width="130" height="70" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="3"/><text x="105" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="14" text-anchor="middle" font-weight="700">NEW (新建)</text><text x="105" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">仅创建对象</text><text x="105" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">无CPU资源</text><path d="M 105 130 L 105 170" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="235" y="80" width="140" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="305" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">调用 start()</text><path d="M 170 100 L 235 100" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><rect x="235" y="180" width="140" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="305" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" font-weight="700">RUNNABLE</text><text x="305" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">(就绪 + 运行中)</text><path d="M 305 120 L 305 180" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="425" y="80" width="140" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="495" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">重复调用 start()</text><text x="495" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">或启动已终止线程</text><path d="M 170 195 C 300 130, 380 130, 425 100" stroke="#f44336" stroke-width="1.5" stroke-dasharray="4,4" fill="none" marker-end="url(#arr_red)"/><rect x="425" y="160" width="140" height="60" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="495" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" font-weight="700">抛出异常</text><text x="495" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">IllegalThreadState</text><path d="M 495 120 L 495 160" stroke="#f44336" stroke-width="2" marker-end="url(#arr_red)"/><rect x="615" y="160" width="140" height="60" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="685" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle">调用 run()</text><text x="685" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">普通方法,主线程执行</text><path d="M 170 220 C 300 280, 500 280, 615 190" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,4" fill="none" marker-end="url(#arr)"/><rect x="350" y="320" width="100" height="50" rx="25" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" font-weight="700">BLOCKED</text><path d="M 375 230 C 250 260, 280 300, 360 320" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="470" y="320" width="120" height="50" rx="25" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="530" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" font-weight="700">WAITING</text><path d="M 375 230 C 500 260, 520 280, 500 320" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="470" y="400" width="120" height="40" rx="20" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="530" y="425" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">TIMED_WAITING</text><path d="M 530 320 L 530 360 L 530 400" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="620" y="320" width="130" height="50" rx="25" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="685" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" font-weight="700">TERMINATED</text><path d="M 375 230 C 600 260, 680 280, 680 320" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="20" y="460" width="760" height="35" rx="4" fill="#FFFFFF" stroke="#ECEFF1"/><rect x="30" y="473" width="12" height="12" rx="6" fill="#FFF3E0" stroke="#FF9800"/><text x="48" y="483" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="start" fill="#607D8B">关注态/阻塞</text><rect x="140" y="473" width="12" height="12" rx="6" fill="#E3F2FD" stroke="#2196F3"/><text x="158" y="483" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="start" fill="#607D8B">运行态</text><rect x="230" y="473" width="12" height="12" rx="6" fill="#FFEBEE" stroke="#f44336"/><text x="248" y="483" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="start" fill="#607D8B">异常/终止</text><rect x="330" y="473" width="12" height="12" rx="6" fill="#E8F5E9" stroke="#4CAF50"/><text x="348" y="483" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="start" fill="#607D8B">动作触发</text><text x="500" y="483" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="start" fill="#f44336">红线代表致命错误或重复启动限制</text></svg>
