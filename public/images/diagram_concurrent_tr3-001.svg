<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">虚拟线程结构化并发与 Future 对比</text><rect x="20" y="60" width="360" height="420" rx="12" fill="#ECEFF1" stroke="#607D8B" stroke-dasharray="4,4"/><rect x="420" y="60" width="360" height="420" rx="12" fill="#E3F2FD" stroke="#2196F3" stroke-dasharray="4,4"/><text x="200" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">传统 Future.get()</text><text x="600" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">结构化并发 StructuredTaskScope</text><rect x="120" y="110" width="160" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="200" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">手动提交线程池</text><rect x="520" y="110" width="160" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="600" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">开启作用域代码块</text><line x1="200" y1="150" x2="200" y2="180" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="600" y1="150" x2="600" y2="180" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><rect x="110" y="180" width="80" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="150" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">子任务1</text><rect x="210" y="180" width="80" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="250" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">子任务2</text><rect x="510" y="180" width="80" height="30" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="550" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">fork子线程1</text><rect x="610" y="180" width="80" height="30" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="550" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333"></text><text x="650" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">fork子线程2</text><path d="M 150 210 L 120 250 L 150 290 L 180 250 Z" fill="#FFF3E0" stroke="#FF9800"/><text x="150" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">任务1</text><text x="150" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">成功</text><path d="M 250 210 L 220 250 L 250 290 L 280 250 Z" fill="#FFEBEE" stroke="#f44336"/><text x="250" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">任务2</text><text x="250" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">异常</text><path d="M 550 210 L 520 250 L 550 290 L 580 250 Z" fill="#E8F5E9" stroke="#4CAF50"/><text x="550" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">任务1</text><text x="550" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">成功</text><path d="M 650 210 L 620 250 L 650 290 L 680 250 Z" fill="#FFEBEE" stroke="#f44336"/><text x="650" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">任务2</text><text x="650" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">异常</text><line x1="250" y1="290" x2="250" y2="320" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="650" y1="290" x2="650" y2="320" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><rect x="120" y="320" width="160" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="200" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">其余任务继续运行</text><rect x="500" y="320" width="200" height="30" rx="8" fill="#F3E5F5" stroke="#9C27B0"/><text x="600" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">自动级联取消其余任务</text><line x1="200" y1="350" x2="200" y2="380" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="600" y1="350" x2="600" y2="380" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><rect x="110" y="380" width="180" height="30" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="200" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">易泄漏，需手动get管理</text><rect x="520" y="380" width="160" height="30" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="600" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">自动等待与异常安全</text><line x1="200" y1="410" x2="200" y2="440" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="600" y1="410" x2="600" y2="440" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><rect x="120" y="440" width="160" height="30" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="200" y="460" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">主线程散乱不可控</text><rect x="520" y="440" width="160" height="30" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="600" y="460" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">调用栈与执行流对齐</text></svg>
