<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java 线程安全实现与锁升级</text><g transform="translate(30, 60)"><rect width="370" height="390" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="185" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">Synchronized 锁升级 (单向)</text><rect x="85" y="55" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="185" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">偏向锁 (记录线程ID)</text><line x1="185" y1="95" x2="185" y2="120" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="260" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#FF9800">出现竞争</text><rect x="85" y="120" width="200" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="185" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">轻量级锁 (CAS自旋)</text><line x1="185" y1="160" x2="185" y2="185" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="255" y="177" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#FF9800">自旋失败</text><rect x="85" y="185" width="200" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="185" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">重量级锁 (OS阻塞)</text><g transform="translate(20, 250)"><rect width="330" height="120" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="165" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">易错点陷阱</text><text x="165" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555"><tspan x="165" dy="0">1. 锁不支持降级</tspan><tspan x="165" dy="16">2. volatile保证可见性、有序性</tspan><tspan x="165" dy="16">3. volatile绝不保证原子性(i++)</tspan></text></g></g><g transform="translate(420, 60)"><rect width="350" height="390" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="175" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">三种线程安全策略</text><g transform="translate(20, 50)"><rect width="310" height="90" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="155" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">1. 互斥同步 (悲观锁)</text><text x="155" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">synchronized / ReentrantLock</text><text x="155" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">阻塞，涉及内核态切换</text></g><g transform="translate(20, 160)"><rect width="310" height="90" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="155" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">2. 非阻塞同步 (乐观锁)</text><text x="155" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">CAS 硬件指令 (Compare And Swap)</text><text x="155" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">缺陷: ABA问题 / 自旋开销大</text></g><g transform="translate(20, 270)"><rect width="310" height="90" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="155" y="25" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">3. 无同步方案</text><text x="155" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">ThreadLocal (线程本地存储)</text><text x="155" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">可重入代码 (不依赖共享资源)</text></g></g></svg>
