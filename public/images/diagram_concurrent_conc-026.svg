<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#fafafa"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#607D8B"/>
    </marker>
  </defs>
  
  <text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">什么是水平分表？</text>
  
  <!-- 原始大表 -->
  <rect x="50" y="90" width="150" height="310" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="125" y="115" font-family="system-ui" font-size="14" font-weight="700" fill="#1565C0" text-anchor="middle">超大订单表</text>
  <text x="125" y="135" font-family="system-ui" font-size="11" fill="#1565C0" text-anchor="middle">(单表千万级)</text>
  
  <!-- 大表行示意 -->
  <line x1="60" y1="170" x2="190" y2="170" stroke="#90CAF9" stroke-width="1"/>
  <line x1="60" y1="210" x2="190" y2="210" stroke="#90CAF9" stroke-width="1"/>
  <line x1="60" y1="250" x2="190" y2="250" stroke="#90CAF9" stroke-width="1"/>
  <line x1="60" y1="290" x2="190" y2="290" stroke="#90CAF9" stroke-width="1"/>
  <line x1="60" y1="330" x2="190" y2="330" stroke="#90CAF9" stroke-width="1"/>
  <line x1="60" y1="370" x2="190" y2="370" stroke="#90CAF9" stroke-width="1"/>
  <text x="125" y="195" font-family="system-ui" font-size="10" fill="#546E7A" text-anchor="middle">ID: 101</text>
  <text x="125" y="235" font-family="system-ui" font-size="10" fill="#546E7A" text-anchor="middle">ID: 102</text>
  <text x="125" y="275" font-family="system-ui" font-size="10" fill="#546E7A" text-anchor="middle">ID: 103</text>
  <text x="125" y="315" font-family="system-ui" font-size="10" fill="#546E7A" text-anchor="middle">ID: 104</text>
  <text x="125" y="355" font-family="system-ui" font-size="10" fill="#546E7A" text-anchor="middle">ID: 105</text>
  
  <!-- 路由策略 -->
  <rect x="300" y="170" width="160" height="120" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="380" y="200" font-family="system-ui" font-size="14" font-weight="700" fill="#E65100" text-anchor="middle">路由规则策略</text>
  <text x="380" y="225" font-family="system-ui" font-size="12" fill="#EF6C00" text-anchor="middle">1. Hash (ID取模)</text>
  <text x="380" y="248" font-family="system-ui" font-size="12" fill="#EF6C00" text-anchor="middle">2. Range (ID区间)</text>
  <text x="380" y="271" font-family="system-ui" font-size="12" fill="#EF6C00" text-anchor="middle">3. 地理/业务列表</text>
  
  <path d="M 200 245 L 295 230" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- 分表 -->
  <rect x="580" y="90" width="170" height="130" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="665" y="115" font-family="system-ui" font-size="14" font-weight="700" fill="#2E7D32" text-anchor="middle">分表 0 (order_0)</text>
  <text x="665" y="150" font-family="system-ui" font-size="11" fill="#388E3C" text-anchor="middle">ID: 102</text>
  <text x="665" y="175" font-family="system-ui" font-size="11" fill="#388E3C" text-anchor="middle">ID: 104</text>

  <rect x="580" y="240" width="170" height="130" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="665" y="265" font-family="system-ui" font-size="14" font-weight="700" fill="#2E7D32" text-anchor="middle">分表 1 (order_1)</text>
  <text x="665" y="300" font-family="system-ui" font-size="11" fill="#388E3C" text-anchor="middle">ID: 101</text>
  <text x="665" y="325" font-family="system-ui" font-size="11" fill="#388E3C" text-anchor="middle">ID: 103</text>

  <rect x="580" y="390" width="170" height="90" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="665" y="415" font-family="system-ui" font-size="14" font-weight="700" fill="#2E7D32" text-anchor="middle">分表 2 (order_2)</text>
  <text x="665" y="450" font-family="system-ui" font-size="11" fill="#388E3C" text-anchor="middle">ID: 105</text>

  <path d="M 460 230 L 575 155" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 460 230 L 575 300" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 460 230 L 575 415" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>

  <text x="460" y="320" font-family="system-ui" font-size="11" font-weight="700" fill="#f44336" text-anchor="middle">痛点: 跨表Join/分页/全局ID</text>

  <rect x="200" y="455" width="400" height="30" rx="4" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/>
  <text x="400" y="475" font-family="system-ui" font-size="12" fill="#37474F" text-anchor="middle">结构不变，按行拆分，解决单表 IO 与性能瓶颈</text>
</svg>
