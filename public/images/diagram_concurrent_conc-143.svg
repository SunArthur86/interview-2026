<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-size="18" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">ReentrantReadWriteLock vs StampedLock</text><rect x="40" y="60" width="330" height="310" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="205" y="85" font-size="15" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">ReentrantReadWriteLock</text><rect x="60" y="105" width="130" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="125" y="135" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">读锁(共享)</text><rect x="220" y="105" width="130" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="285" y="135" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">写锁(排他)</text><rect x="60" y="180" width="290" height="60" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="205" y="205" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">劣势: 悲观排队</text><text x="205" y="225" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">高频读导致写饥饿现象</text><rect x="60" y="260" width="290" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="205" y="285" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">场景: 读多写少, 逻辑复杂可重入</text><rect x="60" y="315" width="290" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="205" y="340" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">支持 newCondition (条件变量)</text><rect x="430" y="60" width="330" height="310" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="595" y="85" font-size="15" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">StampedLock (JDK 8引入)</text><rect x="450" y="105" width="290" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="595" y="135" font-size="13" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">核心: 乐观读 (tryOptimisticRead)</text><line x1="595" y1="155" x2="595" y2="185" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><polygon points="545,185 645,185 695,220 645,255 545,255 495,220" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="595" y="215" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">validate(stamp)</text><text x="595" y="235" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">版本号未被篡改?</text><line x1="495" y1="220" x2="440" y2="270" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="320" y="270" width="120" height="40" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/><text x="380" y="295" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#FFF">是: 无锁读取</text><line x1="695" y1="220" x2="740" y2="270" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="680" y="270" width="120" height="40" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/><text x="740" y="295" font-size="13" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#FFF">否: 升级悲观读</text><rect x="450" y="325" width="290" height="30" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="595" y="345" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">⚠️坑: 不可重入, 不支持中断与Condition</text><rect x="60" y="395" width="680" height="65" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="400" y="420" font-size="13" font-weight="700" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">什么时候用乐观读?</text><text x="400" y="440" font-size="12" font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" fill="#333">适用于 QPS 极高且读逻辑极短 (如路由缓存读取), 冲突极少发生时性能碾压传统读写锁</text></svg>
