<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#607D8B"/></marker></defs><text x="400" y="30" font-size="18" font-weight="700" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">ReentrantLock (AQS) 加锁与解锁流程</text><rect x="50" y="60" width="200" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="150" y="85" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13">线程请求 lock()</text><line x1="150" y1="100" x2="150" y2="135" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><polygon points="150,140 220,180 150,220 80,180" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="150" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12">公平锁?</text><text x="150" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">检查前驱节点</text><line x1="220" y1="180" x2="335" y2="180" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="275" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">是/非公平直接跳过</text><line x1="150" y1="220" x2="150" y2="255" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="165" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">否</text><polygon points="400,140 470,180 400,220 330,180" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12">CAS竞争</text><text x="400" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">state: 0 -> 1</text><line x1="400" y1="220" x2="400" y2="255" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><polygon points="400,260 470,300 400,340 330,300" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12">成功获锁?</text><text x="400" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">/重入+1</text><line x1="470" y1="300" x2="600" y2="300" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><text x="530" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4CAF50">成功</text><line x1="400" y1="340" x2="400" y2="375" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><text x="415" y="360" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f44336">失败</text><rect x="600" y="275" width="150" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="675" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13">执行业务逻辑</text><text x="675" y="311" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">设置持有线程</text><line x1="400" y1="375" x2="400" y2="410" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="300" y="410" width="200" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13">封装Node入队阻塞</text><text x="400" y="446" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">LockSupport.park()</text><line x1="600" y1="325" x2="675" y2="380" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><text x="665" y="355" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#2196F3">unlock</text><rect x="600" y="380" width="150" height="60" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="675" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13">释放锁 state-1</text><text x="675" y="416" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">若减至0则唤醒</text><text x="675" y="432" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11">后续阻塞节点</text><rect x="50" y="110" width="110" height="30" rx="8" fill="none" stroke="#9C27B0" stroke-width="1" stroke-dasharray="3,3"/><rect x="50" y="240" width="150" height="70" rx="8" fill="none" stroke="#9C27B0" stroke-width="1" stroke-dasharray="3,3"/><text x="125" y="125" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9C27B0">FairSync 公平锁</text><text x="125" y="275" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9C27B0">严格遵循FIFO先来后到</text><text x="125" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9C27B0">吞吐量略低</text><line x1="675" y1="440" x2="450" y2="460" stroke="#2196F3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/></svg>
