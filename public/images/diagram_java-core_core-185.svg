<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">proxy_pass请求转发是什么？</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：Nginx接收请求并转发给后端服务器集群的指令。</text>
<!-- BODY_TOP=110 -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<rect x="240" y="116" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="131" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">proxy_pass用于指定转</text>
<text x="400" y="149" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">发地址或upstream组</text>
<rect x="240" y="194" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
<text x="400" y="209" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">upstream定义后端服务</text>
<text x="400" y="227" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">器组及负载策略</text>
<rect x="240" y="272" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="400" y="287" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">max_fails和fail_time</text>
<text x="400" y="305" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">out实现简易健康检查</text>
<rect x="240" y="350" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-width="2"/>
<text x="400" y="365" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">backup服务器作为热备</text>
<text x="400" y="383" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">仅在主节点挂了时启用</text>
<rect x="240" y="428" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#f44336" stroke-width="2"/>
<text x="400" y="443" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">支持权重分配实现负载</text>
<text x="400" y="461" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">均衡</text>
