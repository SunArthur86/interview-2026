<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">JVM 运行时数据区域划分</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="340" height="360" rx="10" ry="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" opacity="1.0"/><text x="210" y="115" text-anchor="middle" font-size="17" font-weight="700" fill="#2196F3">线程私有（Per-Thread）</text><rect x="70" y="140" width="280" height="80" rx="6" ry="6" fill="#BBDEFB" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="210" y="165" text-anchor="middle" font-size="15" font-weight="700" fill="#0D47A1">虚拟机栈 (VM Stack)</text><text x="210" y="188" text-anchor="middle" font-size="12" font-weight="normal" fill="#1565C0">栈帧：局部变量表 / 操作数栈</text><text x="210" y="205" text-anchor="middle" font-size="12" font-weight="normal" fill="#1565C0">动态链接 / 返回地址</text><rect x="70" y="240" width="280" height="60" rx="6" ry="6" fill="#BBDEFB" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="210" y="265" text-anchor="middle" font-size="15" font-weight="700" fill="#0D47A1">本地方法栈</text><text x="210" y="288" text-anchor="middle" font-size="12" font-weight="normal" fill="#1565C0">Native 方法调用</text><rect x="70" y="320" width="280" height="60" rx="6" ry="6" fill="#BBDEFB" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="210" y="345" text-anchor="middle" font-size="15" font-weight="700" fill="#0D47A1">程序计数器 (PC Register)</text><text x="210" y="368" text-anchor="middle" font-size="12" font-weight="normal" fill="#1565C0">当前指令地址</text><rect x="70" y="400" width="280" height="40" rx="6" ry="6" fill="#E1F5FE" stroke="#607D8B" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="210" y="425" text-anchor="middle" font-size="12" font-weight="600" fill="#607D8B">不会 OOM（仅 SOF）</text><rect x="420" y="90" width="340" height="360" rx="10" ry="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="590" y="115" text-anchor="middle" font-size="17" font-weight="700" fill="#FF9800">线程共享（Shared）</text><rect x="450" y="140" width="280" height="130" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="590" y="165" text-anchor="middle" font-size="15" font-weight="700" fill="#E65100">堆 (Heap)</text><text x="590" y="190" text-anchor="middle" font-size="12" font-weight="normal" fill="#BF360C">新生代：Eden + S0 + S1</text><text x="590" y="210" text-anchor="middle" font-size="12" font-weight="normal" fill="#BF360C">老年代：Old Gen</text><text x="590" y="234" text-anchor="middle" font-size="12" font-weight="normal" fill="#BF360C">对象实例 / 数组</text><text x="590" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#f44336">GC 主战场</text><rect x="450" y="290" width="280" height="100" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="590" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#E65100">方法区 (Method Area)</text><text x="590" y="340" text-anchor="middle" font-size="12" font-weight="normal" fill="#BF360C">类信息 / 常量池 / 静态变量</text><text x="590" y="360" text-anchor="middle" font-size="12" font-weight="normal" fill="#BF360C">JIT 编译代码</text><text x="590" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#9C27B0">JDK8+: 元空间(Metaspace)</text><rect x="450" y="410" width="280" height="30" rx="6" ry="6" fill="#FFF8E1" stroke="#607D8B" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="590" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#f44336">可能 OOM</text></svg>
