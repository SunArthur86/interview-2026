<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#9C27B0"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">常用 Linux 命令全景图 (分类与组合)</text><ellipse cx="400" cy="85" rx="80" ry="25" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="91" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle" fill="#9C27B0" font-weight="700">Linux Kernel 内核</text><path d="M200 110 L 200 130" fill="none" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/><path d="M400 110 L 400 130" fill="none" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/><path d="M600 110 L 600 130" fill="none" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/><rect x="100" y="135" width="200" height="260" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="200" y="160" font-family="system-ui,sans-serif" font-size="15" text-anchor="middle" fill="#2196F3" font-weight="700">文件与权限操作</text><line x1="130" y1="170" x2="270" y2="170" stroke="#2196F3" stroke-width="1"/><rect x="120" y="185" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#2196F3"/><text x="200" y="203" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">ls / cd / pwd (基础)</text><rect x="120" y="225" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#2196F3"/><text x="200" y="243" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">cp / mv / rm (增删改)</text><rect x="120" y="265" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#2196F3"/><text x="200" y="283" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">find / locate (查找)</text><rect x="120" y="305" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#2196F3"/><text x="200" y="323" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">chmod 755 / chown</text><text x="200" y="360" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#f44336" font-weight="700">⚠ rm -rf 慎用</text><rect x="300" y="135" width="200" height="260" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="160" font-family="system-ui,sans-serif" font-size="15" text-anchor="middle" fill="#FF9800" font-weight="700">内容查看与检索</text><line x1="330" y1="170" x2="470" y2="170" stroke="#FF9800" stroke-width="1"/><rect x="320" y="185" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#FF9800"/><text x="400" y="203" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">cat / head (正查)</text><rect x="320" y="225" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#FF9800"/><text x="400" y="243" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">tail -f (动态日志)</text><rect x="320" y="265" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#FF9800"/><text x="400" y="283" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">grep -rn "keyword"</text><rect x="320" y="305" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#FF9800"/><text x="400" y="323" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">awk / sed (高级处理)</text><text x="400" y="360" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50" font-weight="700">✔ 管道符 | 组合使用</text><rect x="500" y="135" width="200" height="260" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="600" y="160" font-family="system-ui,sans-serif" font-size="15" text-anchor="middle" fill="#4CAF50" font-weight="700">系统与进程管理</text><line x1="530" y1="170" x2="670" y2="170" stroke="#4CAF50" stroke-width="1"/><rect x="520" y="185" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#4CAF50"/><text x="600" y="203" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">ps -ef / kill -9</text><rect x="520" y="225" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#4CAF50"/><text x="600" y="243" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">top / htop (资源)</text><rect x="520" y="265" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#4CAF50"/><text x="600" y="283" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">df / iostat (磁盘)</text><rect x="520" y="305" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#4CAF50"/><text x="600" y="323" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333">netstat / curl (网络)</text><text x="600" y="360" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0" font-weight="700">🔥 排查利器</text><rect x="10" y="410" width="780" height="80" rx="5" fill="#FFFFFF" stroke="#ECEFF1"/><text x="400" y="435" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#607D8B" font-weight="700">经典组合实战：CPU负载高但无计算消耗</text><text x="400" y="458" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" fill="#333"><tspan>top</tspan><tspan dx="5" fill="#607D8B">(定进程)</tspan><tspan dx="15">|</tspan><tspan dx="15">ps -mp pid</tspan><tspan dx="5" fill="#607D8B">(定线程)</tspan><tspan dx="15">|</tspan><tspan dx="15">iostat -x 1</tspan><tspan dx="5" fill="#f44336">(确认I/O瓶颈)</tspan></text><text x="400" y="478" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" fill="#9C27B0">本质：使用文本命令作为系统遥控器精准控制资源</text></svg>
