<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="max-width:100%;height:auto;font-family:system-ui,-apple-system,'PingFang SC',sans-serif;">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#666"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4CAF50"/>
    </marker>
    <marker id="arro" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f44336"/>
    </marker>
  </defs>

  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">分布式锁有哪些实现方案？</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#607D8B">通过互斥机制保证多进程互斥访问共享资源。</text>
  <rect x="70" y="130" width="220" height="80" rx="10" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="180" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#C62828">Redis SETNX + EX</text>
  <text x="180" y="184" text-anchor="middle" font-size="11" fill="#C62828">性能高 · 可能丢锁</text>
  <rect x="290" y="130" width="220" height="80" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">Redisson 看门狗</text>
  <text x="400" y="184" text-anchor="middle" font-size="11" fill="#2E7D32">自动续期 · 推荐方案</text>
  <rect x="510" y="130" width="220" height="80" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="620" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">ZooKeeper 临时节点</text>
  <text x="620" y="184" text-anchor="middle" font-size="11" fill="#1565C0">强一致 · CP</text>
  <text x="400" y="295" text-anchor="middle" font-size="13" fill="#546E7A" font-weight="700">加锁流程（Redis 为例）</text>
  <rect x="100" y="320" width="140" height="40" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="170" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#1565C0">1.SET key NX PX</text>
  <line x1="240" y1="340" x2="260" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="260" y="320" width="140" height="40" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="330" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">2.执行业务</text>
  <line x1="400" y1="340" x2="420" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="420" y="320" width="140" height="40" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="490" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">3.看门狗续期</text>
  <line x1="560" y1="340" x2="580" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="580" y="320" width="140" height="40" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="650" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#2E7D32">4.Lua 释放锁</text>
  <text x="60" y="410" font-size="11" fill="#455A64">• Redis最快但主从切换可能丢锁</text>
  <text x="60" y="428" font-size="11" fill="#455A64">• ZK最可靠但性能稍差</text>
  <text x="60" y="446" font-size="11" fill="#455A64">• DB最简单但性能瓶颈大</text>
  <text x="400" y="486" text-anchor="middle" font-size="10" fill="#999" font-style="italic">三要素：互斥（NX）+ 过期（PX）+ 唯一释放（Lua 校验）</text>
</svg>
