<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">线程同步机制与设计理念分类</text><rect x="60" y="70" width="340" height="260" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" stroke-dasharray="4 2"/><text x="230" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">具体同步机制 (控制手段)</text><rect x="80" y="120" width="140" height="60" rx="8" fill="#fff" stroke="#2196F3" stroke-width="1.5"/><text x="150" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2196F3">互斥锁/自旋锁</text><text x="150" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">保证临界区原子性</text><rect x="240" y="120" width="140" height="60" rx="8" fill="#fff" stroke="#2196F3" stroke-width="1.5"/><text x="310" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2196F3">读写锁</text><text x="310" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">读读共享/读写互斥</text><rect x="80" y="200" width="140" height="60" rx="8" fill="#fff" stroke="#2196F3" stroke-width="1.5"/><text x="150" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2196F3">条件变量</text><text x="150" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">等待与通知通信</text><rect x="240" y="200" width="140" height="60" rx="8" fill="#fff" stroke="#2196F3" stroke-width="1.5"/><text x="310" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2196F3">信号量</text><text x="310" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">控制并发线程数</text><text x="230" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">底层实现基础</text><text x="230" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#9C27B0">synchronized关键字 / Lock接口</text><rect x="400" y="70" width="340" height="260" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4 2"/><text x="570" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">设计理念 (设计哲学)</text><rect x="420" y="120" width="140" height="60" rx="8" fill="#fff" stroke="#9C27B0" stroke-width="1.5"/><text x="490" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#9C27B0">悲观锁</text><text x="490" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">操作前必上锁</text><text x="490" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">适用写多场景</text><rect x="580" y="120" width="140" height="60" rx="8" fill="#fff" stroke="#9C27B0" stroke-width="1.5"/><text x="650" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#9C27B0">乐观锁(CAS)</text><text x="650" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">不加锁,更新判断</text><text x="650" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">适用读多场景</text><rect x="420" y="220" width="300" height="90" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/><text x="570" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#333">核心对比点</text><text x="570" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">Sync: JVM层、自动释放、不可中断</text><text x="570" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">ReentrantLock: API层、手动释放、超时</text><rect x="60" y="360" width="680" height="100" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="400" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">高并发实战应用</text><line x1="180" y1="400" x2="180" y2="450" stroke="#4CAF50" stroke-width="2"/><line x1="400" y1="400" x2="400" y2="450" stroke="#4CAF50" stroke-width="2"/><line x1="620" y1="400" x2="620" y2="450" stroke="#4CAF50" stroke-width="2"/><text x="120" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#333">抢购场景</text><text x="120" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">tryLock(timeout)</text><text x="290" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#333">避免无限阻塞</text><text x="290" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">防止线程雪崩</text><text x="510" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#333">获取失败降级</text><text x="510" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">返回系统繁忙</text><text x="680" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#333">CAS应对</text><text x="680" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">ABA问题(加版本号)</text><path d="M 375 280 Q 410 280 415 150" fill="none" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arr)"/><text x="430" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B">映射</text><path d="M 225 220 Q 300 220 380 150" fill="none" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arr)"/></svg>
