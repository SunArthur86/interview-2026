<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">IO 复用机制演进 (select/poll/epoll)</text><g><rect x="100" y="70" width="140" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="170" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">应用进程</text><rect x="440" y="70" width="140" height="50" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="510" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">内核缓冲区</text></g><line x1="240" y1="95" x2="440" y2="95" stroke="#607D8B" stroke-width="2"/><polygon points="400,80 440,95 400,110" fill="#FF9800"/><text x="340" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">阶段2: 数据拷贝 (同步阻塞)</text><line x1="440" y1="120" x2="240" y2="120" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="340" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#FF9800">recvfrom 拷贝数据</text><g transform="translate(0, 160)"><rect x="100" y="0" width="140" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="170" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">单线程轮询</text><line x1="170" y1="50" x2="170" y2="90" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="50" y="90" width="240" height="200" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="170" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">select / poll 机制</text><text x="170" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">限制与缺陷:</text><text x="170" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555"><tspan x="170" dy="0">1. fd集合跨态拷贝开销</tspan><tspan x="170" dy="16">2. 内核线性遍历检查</tspan><tspan x="170" dy="16">3. 无差别轮询消耗大</tspan></text><rect x="60" y="235" width="220" height="40" rx="5" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/><text x="170" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">select 尤其存在 1024 上限</text></g><g transform="translate(380, 160)"><rect x="100" y="0" width="140" height="50" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="170" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">事件驱动回调</text><line x1="170" y1="50" x2="170" y2="90" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><rect x="50" y="90" width="240" height="200" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="170" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">epoll 机制</text><text x="170" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555">核心优势:</text><text x="170" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#555"><tspan x="170" dy="0">1. 红黑树管理监听fd</tspan><tspan x="170" dy="16">2. 就绪链表直接返回</tspan><tspan x="170" dy="16">3. 避免无差别遍历 O(1)</tspan></text><rect x="60" y="235" width="220" height="40" rx="5" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/><text x="170" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">支撑 Redis / Nginx 高并发</text></g><g transform="translate(270, 490)"><rect width="20" height="10" fill="#FFEBEE" stroke="#f44336"/><text x="30" y="9" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#333">性能瓶颈</text><rect x="100" width="20" height="10" fill="#E8F5E9" stroke="#4CAF50"/><text x="130" y="9" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#333">高性能优势</text></g></svg>
