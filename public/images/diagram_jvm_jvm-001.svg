<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">NIO 多路复用模型 (Selector)</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="50" y="122" width="120" height="36" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="110" y="144" text-anchor="middle" font-size="12" font-weight="700" fill="#0D47A1">Client 1 (Channel)</text><line x1="170" y1="140" x2="320" y2="250" stroke="#2196F3" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="50" y="172" width="120" height="36" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="110" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#0D47A1">Client 2 (Channel)</text><line x1="170" y1="190" x2="320" y2="250" stroke="#2196F3" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="50" y="222" width="120" height="36" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="110" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#0D47A1">Client 3 (Channel)</text><line x1="170" y1="240" x2="320" y2="250" stroke="#2196F3" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="50" y="272" width="120" height="36" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="110" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#0D47A1">Client 4 (Channel)</text><line x1="170" y1="290" x2="320" y2="250" stroke="#2196F3" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="320" y="200" width="180" height="100" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="410" y="230" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100">Selector</text><text x="410" y="252" text-anchor="middle" font-size="12" font-weight="normal" fill="#BF360C">(事件多路复用器)</text><text x="410" y="275" text-anchor="middle" font-size="11" font-weight="normal" fill="#5D4037" font-style="italic">OP_ACCEPT/READ/WRITE</text><line x1="500" y1="250" x2="580" y2="250" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow)"/><rect x="580" y="200" width="170" height="100" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="665" y="230" text-anchor="middle" font-size="15" font-weight="700" fill="#1B5E20">EventLoop</text><text x="665" y="252" text-anchor="middle" font-size="12" font-weight="normal" fill="#2E7D32">(单线程/线程池)</text><text x="665" y="275" text-anchor="middle" font-size="11" font-weight="normal" fill="#388E3C" font-style="italic">非阻塞 Dispatch</text><line x1="665" y1="300" x2="665" y2="360" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/><rect x="580" y="360" width="170" height="60" rx="6" ry="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="665" y="385" text-anchor="middle" font-size="13" font-weight="700" fill="#4A148C">Handler 处理读写</text><text x="665" y="405" text-anchor="middle" font-size="11" font-weight="normal" fill="#6A1B9A">基于 Buffer</text><rect x="40" y="440" width="350" height="50" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="215" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#f44336">BIO：一连接一线程，阻塞</text><text x="215" y="480" text-anchor="middle" font-size="11" font-weight="normal" fill="#B71C1C">线程数 == 连接数，浪费</text><rect x="410" y="440" width="350" height="50" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="585" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#4CAF50">NIO：单线程管多连接</text><text x="585" y="480" text-anchor="middle" font-size="11" font-weight="normal" fill="#1B5E20">无事件时去服务其他连接</text></svg>
