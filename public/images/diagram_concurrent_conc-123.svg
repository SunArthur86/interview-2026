<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr"markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">ZooKeeper 投票机制 (Leader Election)</text><ellipse cx="400" cy="70" rx="60" ry="20" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="400" y="74" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#1565C0">集群启动/崩溃恢复</text><rect x="170" y="110" width="460" height="50" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#6A1B9A">阶段一：自荐投票 (投自己)</text><text x="400" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#8E24AA">选票包含: myid (SID) + zxid (事务ID)</text><polygon points="400,195 460,225 400,255 340,225" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="221" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#E65100">PK规则</text><text x="400" y="237" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#EF6C00">ZXID大者优先?</text><polygon points="400,305 480,355 400,405 320,355" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="351" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#E65100">过半机制</text><text x="400" y="367" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#EF6C00">票数 > N/2 ?</text><rect x="170" y="450" width="220" height="35" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="280" y="472" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2E7D32">当选 Leader</text><rect x="410" y="450" width="220" height="35" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="520" y="472" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#C62828">继续下一轮投票</text><line x1="400" y1="90" x2="400" y2="105" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="400" y1="160" x2="400" y2="190" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="400" y1="255" x2="400" y2="300" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><line x1="350" y1="400" x2="290" y2="445" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><line x1="450" y1="400" x2="510" y2="445" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><rect x="450" y="210" width="120" height="30" rx="4" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/><text x="510" y="229" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#37474F">次比 myid (SID)</text><line x1="460" y1="225" x2="448" y2="225" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/></svg>
