<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">一致性算法</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：分布式系统通过投票和提案机制在多个节点间达成数据一致。</text>
<!-- BODY_TOP=110 -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<text x="400" y="126" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="700">CAP 定理</text>
<circle cx="200" cy="160" r="36" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="200" y="154" font-size="14" fill="#2196F3" text-anchor="middle" font-weight="700">C</text>
<text x="200" y="172" font-size="10" fill="#37404F" text-anchor="middle">一致性</text>
<circle cx="120" cy="288.0" r="36" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="120" y="282.0" font-size="14" fill="#4CAF50" text-anchor="middle" font-weight="700">A</text>
<text x="120" y="300.0" font-size="10" fill="#37404F" text-anchor="middle">可用性</text>
<circle cx="280" cy="288.0" r="36" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="280" y="282.0" font-size="14" fill="#FF9800" text-anchor="middle" font-weight="700">P</text>
<text x="280" y="300.0" font-size="10" fill="#37404F" text-anchor="middle">分区容错</text>
<line x1="200" y1="196" x2="145" y2="263.0" stroke="#607D8B" stroke-width="1.5"/>
<line x1="200" y1="196" x2="255" y2="263.0" stroke="#607D8B" stroke-width="1.5"/>
<line x1="156" y1="288.0" x2="244" y2="288.0" stroke="#607D8B" stroke-width="1.5"/>
<text x="200" y="380" font-size="11" fill="#f44336" text-anchor="middle" font-weight="700">三选二（网络分区必选 P）</text>
<rect x="400" y="150" width="340" height="170" rx="8" fill="#9C27B011" stroke="#9C27B0" stroke-width="2"/>
<text x="570" y="176" font-size="14" fill="#9C27B0" text-anchor="middle" font-weight="700">BASE (AP 系统妥协)</text>
<circle cx="420" cy="202" r="14" fill="#9C27B0"/>
<text x="420" y="207" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="700">BA</text>
<text x="445" y="207" font-size="12" fill="#37404F">Basically Available 基本可用</text>
<circle cx="420" cy="238" r="14" fill="#9C27B0"/>
<text x="420" y="243" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="700">S</text>
<text x="445" y="243" font-size="12" fill="#37404F">Soft State 软状态</text>
<circle cx="420" cy="274" r="14" fill="#9C27B0"/>
<text x="420" y="279" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="700">E</text>
<text x="445" y="279" font-size="12" fill="#37404F">Eventually Consistent 最终一致</text>
<text x="570" y="350" font-size="13" fill="#2196F3" text-anchor="middle" font-weight="700">一致性级别（弱→强）</text>
<rect x="410" y="370" width="70" height="40" rx="6" fill="#4CAF5022" stroke="#4CAF50"/>
<text x="445" y="395" font-size="11" fill="#4CAF50" text-anchor="middle" font-weight="700">弱一致</text>
<rect x="490" y="370" width="70" height="40" rx="6" fill="#2196F322" stroke="#2196F3"/>
<text x="525" y="395" font-size="11" fill="#2196F3" text-anchor="middle" font-weight="700">最终一致</text>
<line x1="484" y1="390" x2="490" y2="390" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="570" y="370" width="70" height="40" rx="6" fill="#FF980022" stroke="#FF9800"/>
<text x="605" y="395" font-size="11" fill="#FF9800" text-anchor="middle" font-weight="700">强一致</text>
<line x1="564" y1="390" x2="570" y2="390" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="650" y="370" width="70" height="40" rx="6" fill="#f4433622" stroke="#f44336"/>
<text x="685" y="395" font-size="11" fill="#f44336" text-anchor="middle" font-weight="700">线性一致</text>
<line x1="644" y1="390" x2="650" y2="390" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="450" font-size="13" fill="#4CAF50" text-anchor="middle" font-weight="700">一致性协议：Paxos / Raft (CP)  |  Gossip (AP)  |  2PC/3PC/TCC/Saga 分布式事务</text>
</svg>