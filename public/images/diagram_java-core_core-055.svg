<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">为什么 TIME_WAIT 等待的时间是 2MSL？</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：2MSL等待确保被动关闭方收到最后的ACK并清除旧连接报文。</text>
<!-- BODY_TOP=110 -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<line x1="200" y1="140" x2="200" y2="450" stroke="#2196F3" stroke-width="2" stroke-dasharray="4,3"/>
<line x1="600" y1="140" x2="600" y2="450" stroke="#FF9800" stroke-width="2" stroke-dasharray="4,3"/>
<rect x="130" y="116" width="140" height="38" rx="8" fill="#2196F3"/>
<text x="200" y="140" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="700">主动方</text>
<rect x="530" y="116" width="140" height="38" rx="8" fill="#FF9800"/>
<text x="600" y="140" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="700">被动方</text>
<line x1="200" y1="190" x2="600" y2="190" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="182" font-size="12" fill="#f44336" text-anchor="middle" font-weight="700">FIN=1, seq=u</text>
<line x1="600" y1="260" x2="200" y2="260" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="252" font-size="12" fill="#FF9800" text-anchor="middle" font-weight="700">ACK=1, ack=u+1  (被动方进入 CLOSE_WAIT)</text>
<line x1="600" y1="340" x2="200" y2="340" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="332" font-size="12" fill="#9C27B0" text-anchor="middle" font-weight="700">FIN=1, seq=w  (被动方处理完毕)</text>
<line x1="200" y1="410" x2="600" y2="410" stroke="#2196F3" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="402" font-size="12" fill="#2196F3" text-anchor="middle" font-weight="700">ACK=1, ack=w+1  (TIME_WAIT 2MSL 后关闭)</text>
<text x="400" y="470" font-size="13" fill="#4CAF50" text-anchor="middle" font-weight="700">四次挥手 = 全双工关闭，TIME_WAIT 防止报文滞留</text>
</svg>