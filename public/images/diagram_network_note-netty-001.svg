  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Netty 是什么？为什么需要它？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">Netty 是基于 Java NIO 的异步事件驱动网络框架，它把&quot;高性能、可维护&quot;的网络服务器/客户端开发从一件只有网络专家才能做对的事，变成一件普通工程师…</text>

  <text x="400" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">一句话：异步 + 事件驱动 + 基于 NIO 的网络框架</text>
  <text x="40" y="125" font-size="13" font-weight="700" fill="#37474F">解决的三大领域复杂性</text>
