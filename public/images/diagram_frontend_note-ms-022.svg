  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">前端护栏：1.预检(输入校验) 2.过程监控(中间结果质量信号) 3.后检(产出校验/Diff展示) 4.人在回路(确认/拒绝) 5.反馈闭环(评分/修正)。</text>

