<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">两种网络模型的对比？</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：OSI是理论标准七层，TCP/IP是事实标准四层。</text>
<!-- BODY_TOP=110 -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<rect x="240" y="116" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="127" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">OSI模型为理论参考，</text>
<text x="400" y="145" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">分为七层</text>
<rect x="240" y="180" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
<text x="400" y="191" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">TCP/IP模型为互联网实</text>
<text x="400" y="209" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">际使用，分为四层</text>
<rect x="240" y="244" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="400" y="255" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">TCP/IP应用层包含OSI</text>
<text x="400" y="273" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">的上三层功能</text>
<rect x="240" y="308" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-width="2"/>
<text x="400" y="319" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">TCP/IP网络接口层包含</text>
<text x="400" y="337" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">OSI的下两层功能</text>
<rect x="240" y="372" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#f44336" stroke-width="2"/>
<text x="400" y="383" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">两者在传输层和网络层</text>
<text x="400" y="401" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">功能基本一致</text>
<rect x="240" y="436" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#607D8B" stroke-width="2"/>
<text x="400" y="447" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">OSI分7层，TCP/IP分4</text>
<text x="400" y="465" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">层</text>
<line x1="400" y1="156" x2="400" y2="180" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="220" x2="400" y2="244" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="284" x2="400" y2="308" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="348" x2="400" y2="372" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="412" x2="400" y2="436" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
</svg>