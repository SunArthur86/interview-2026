<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">Java IO 演进：BIO → NIO → AIO</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="220" height="320" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="150" y="125" text-anchor="middle" font-size="18" font-weight="700" fill="#f44336">BIO</text><text x="150" y="148" text-anchor="middle" font-size="11" font-weight="normal" fill="#B71C1C" font-style="italic">(Blocking IO)</text><text x="150" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#B71C1C">同步阻塞</text><text x="150" y="210" text-anchor="middle" font-size="11" font-weight="normal" fill="#B71C1C">一连接一线程</text><text x="150" y="235" text-anchor="middle" font-size="11" font-weight="normal" fill="#B71C1C">读写时线程阻塞</text><text x="150" y="260" text-anchor="middle" font-size="11" font-weight="normal" fill="#B71C1C">线程浪费严重</text><text x="150" y="295" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">JDK 1.4 之前</text><text x="150" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#4CAF50">连接数少</text><text x="150" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#4CAF50">架构简单</text><rect x="290" y="100" width="220" height="320" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="18" font-weight="700" fill="#FF9800">NIO</text><text x="400" y="148" text-anchor="middle" font-size="11" font-weight="normal" fill="#BF360C" font-style="italic">(Non-blocking IO)</text><text x="400" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#BF360C">同步非阻塞</text><text x="400" y="210" text-anchor="middle" font-size="11" font-weight="normal" fill="#BF360C">Channel + Buffer</text><text x="400" y="235" text-anchor="middle" font-size="11" font-weight="normal" fill="#BF360C">Selector 多路复用</text><text x="400" y="260" text-anchor="middle" font-size="11" font-weight="normal" fill="#BF360C">一线程管多连接</text><text x="400" y="295" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">JDK 1.4+</text><text x="400" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#4CAF50">高并发场景</text><text x="400" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#4CAF50">Netty 基础</text><rect x="540" y="100" width="220" height="320" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="650" y="125" text-anchor="middle" font-size="18" font-weight="700" fill="#4CAF50">AIO</text><text x="650" y="148" text-anchor="middle" font-size="11" font-weight="normal" fill="#1B5E20" font-style="italic">(Asynchronous IO)</text><text x="650" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#1B5E20">异步非阻塞</text><text x="650" y="210" text-anchor="middle" font-size="11" font-weight="normal" fill="#1B5E20">Future / Callback</text><text x="650" y="235" text-anchor="middle" font-size="11" font-weight="normal" fill="#1B5E20">OS 回调完成</text><text x="650" y="260" text-anchor="middle" font-size="11" font-weight="normal" fill="#1B5E20">真正异步</text><text x="650" y="295" text-anchor="middle" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">JDK 1.7+</text><text x="650" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#4CAF50">连接数海量</text><text x="650" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#FF9800">Linux 支持弱</text><line x1="260" y1="260" x2="290" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><line x1="510" y1="260" x2="540" y2="260" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><text x="400" y="450" text-anchor="middle" font-size="12" font-weight="600" fill="#9C27B0" font-style="italic">核心演进：减少线程阻塞 → 提升并发能力</text></svg>
