<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">MySQL SQL 查询语句执行流程</text><g font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle"><rect x="250" y="60" width="300" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="400" y="85" fill="#2196F3">客户端发送 SQL 查询请求</text><path d="M 400 100 L 400 130" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)" fill="none"/><rect x="250" y="130" width="300" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="400" y="155" fill="#4CAF50">1. 连接器 (权限校验, 维持连接)</text><path d="M 400 170 L 400 200" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)" fill="none"/><rect x="250" y="200" width="300" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" stroke-dasharray="4"/><text x="400" y="225" fill="#607D8B">2. 查询缓存 (MySQL 8.0已移除)</text><path d="M 400 240 L 400 270" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)" fill="none"/><rect x="250" y="270" width="300" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="400" y="295" fill="#2196F3">3. 分析器 (词法/语法分析)</text><path d="M 400 310 L 400 340" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)" fill="none"/><rect x="250" y="340" width="300" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="365" fill="#FF9800">4. 优化器 (生成最优执行计划)</text><path d="M 400 380 L 400 410" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)" fill="none"/><rect x="100" y="410" width="240" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="220" y="435" fill="#2196F3">5. 执行器 (调用接口)</text><rect x="460" y="410" width="240" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="580" y="435" fill="#9C27B0">6. 存储引擎 (InnoDB/取数据)</text><path d="M 340 430 L 460 430" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)" fill="none"/></g></svg>
