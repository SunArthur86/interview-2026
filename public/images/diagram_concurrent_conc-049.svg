<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker><marker id="arrRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#f44336"/></marker><marker id="arrGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#4CAF50"/></marker></defs><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java 线程核心方法与状态流转</text><rect x="300" y="220" width="200" height="60" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="400" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">运行状态</text><text x="400" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">CPU 调度执行中</text><rect x="50" y="220" width="150" height="60" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="125" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#607D8B">阻塞/就绪</text><text x="125" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#666">sleep / yield</text><line x1="200" y1="250" x2="300" y2="250" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="250" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">时间到/恢复</text><line x1="300" y1="250" x2="200" y2="250" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="250" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">让步/限时休眠</text><text x="125" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#4CAF50">不释放锁！</text><rect x="600" y="220" width="150" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="675" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">等待队列</text><text x="675" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#666">wait / join</text><line x1="500" y1="250" x2="600" y2="250" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/><text x="550" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#9C27B0">主动等待</text><line x1="600" y1="250" x2="500" y2="250" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/><text x="550" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#9C27B0">notify 唤醒</text><text x="675" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">释放锁！</text><rect x="300" y="60" width="200" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">优雅停止/通知</text><text x="400" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">interrupt() 机制</text><line x1="400" y1="120" x2="400" y2="220" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/><text x="420" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">遇阻塞抛异常</text><text x="420" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">仅设标志位需自查</text><rect x="300" y="380" width="200" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="400" y="405" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">终止/消亡</text><text x="400" y="425" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">run 方法正常结束</text><line x1="400" y1="340" x2="400" y2="380" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/></svg>
