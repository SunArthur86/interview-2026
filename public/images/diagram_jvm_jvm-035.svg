<rect x="200" y="130" width="400" height="70" rx="6" ry="6" fill="#f4433618" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="200" y="130" width="400" height="28" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="400" y="149" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Bootstrap ClassLoader</text><text x="400" y="176" text-anchor="middle" font-size="11" font-weight="600" fill="#B71C1C">启动类加载器 (C++)</text><text x="400" y="192" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F" font-style="italic">加载 JAVA_HOME/lib/rt.jar</text><rect x="200" y="230" width="400" height="70" rx="6" ry="6" fill="#FF980018" stroke="#FF9800" stroke-width="2" opacity="1.0"/><rect x="200" y="230" width="400" height="28" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="400" y="249" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Extension ClassLoader</text><text x="400" y="276" text-anchor="middle" font-size="11" font-weight="600" fill="#E65100">扩展类加载器 (Java)</text><text x="400" y="292" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F" font-style="italic">加载 JAVA_HOME/lib/ext</text><rect x="200" y="330" width="400" height="70" rx="6" ry="6" fill="#4CAF5018" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="200" y="330" width="400" height="28" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="400" y="349" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Application ClassLoader</text><text x="400" y="376" text-anchor="middle" font-size="11" font-weight="600" fill="#1B5E20">应用类加载器 (Java)</text><text x="400" y="392" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F" font-style="italic">加载 classpath 用户类</text><rect x="200" y="430" width="400" height="70" rx="6" ry="6" fill="#9C27B018" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><rect x="200" y="430" width="400" height="28" rx="6" ry="6" fill="#9C27B0" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="400" y="449" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Custom ClassLoader</text><text x="400" y="476" text-anchor="middle" font-size="11" font-weight="600" fill="#4A148C">自定义类加载器</text><text x="400" y="492" text-anchor="middle" font-size="11" font-weight="normal" fill="#37474F" font-style="italic">继承 ClassLoader 重写 findClass</text><line x1="300" y1="430" x2="300" y2="200" stroke="#2196F3" stroke-width="2.5" marker-end="url(#arrow)"/><text x="280" y="320" text-anchor="end" font-size="12" font-weight="700" fill="#2196F3">1. 委派父类加载</text><text x="280" y="338" text-anchor="end" font-size="11" font-weight="normal" fill="#2196F3" font-style="italic">(自底向上)</text><line x1="500" y1="200" x2="500" y2="430" stroke="#f44336" stroke-width="2.5" marker-end="url(#arrowR)"/><text x="520" y="320" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">2. 父失败则子加载</text><text x="520" y="338" text-anchor="start" font-size="11" font-weight="normal" fill="#f44336" font-style="italic">(自顶向下)</text><line x1="400" y1="530" x2="400" y2="505" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><text x="400" y="555" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">收到加载请求 loadClass()</text><rect x="40" y="100" width="150" height="70" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="115" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#4CAF50">安全性</text><text x="115" y="145" text-anchor="middle" font-size="10" font-weight="normal" fill="#1B5E20">防核心 API</text><text x="115" y="160" text-anchor="middle" font-size="10" font-weight="normal" fill="#1B5E20">被篡改</text><rect x="610" y="100" width="150" height="70" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="685" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#FF9800">唯一性</text><text x="685" y="145" text-anchor="middle" font-size="10" font-weight="normal" fill="#BF360C">避免重复</text><text x="685" y="160" text-anchor="middle" font-size="10" font-weight="normal" fill="#BF360C">加载同一名</text></svg>
