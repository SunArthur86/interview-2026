<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java多线程创建机制与规范</text><rect x="60" y="60" width="340" height="300" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" stroke-dasharray="4 2"/><text x="230" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">核心创建方式 (逐步演进)</text><rect x="80" y="110" width="140" height="60" rx="8" fill="#fff" stroke="#2196F3" stroke-width="1.5"/><text x="150" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2196F3">继承 Thread</text><text x="150" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">单继承局限</text><rect x="240" y="110" width="140" height="60" rx="8" fill="#fff" stroke="#2196F3" stroke-width="1.5"/><text x="310" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2196F3">实现 Runnable</text><text x="310" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">脱离单继承限制</text><rect x="160" y="200" width="140" height="60" rx="8" fill="#fff" stroke="#2196F3" stroke-width="1.5"/><text x="230" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2196F3">实现 Callable</text><text x="230" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">支持返回值/抛异常</text><rect x="160" y="280" width="140" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><text x="230" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#4CAF50">使用线程池</text><text x="230" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">复用线程(推荐规范)</text><path d="M 150 170 Q 200 190 210 200" fill="none" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 310 170 Q 260 190 250 200" fill="none" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="230" y1="260" x2="230" y2="280" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="420" y="60" width="320" height="180" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="580" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">执行原理 (必须牢记)</text><polygon points="540,120 620,150 540,180 460,150" fill="#fff" stroke="#9C27B0" stroke-width="1.5"/><text x="540" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">调用 start() ?</text><text x="540" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#9C27B0">JVM调用新线程</text><rect x="440" y="200" width="100" height="30" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1"/><text x="490" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">普通调用 run()</text><rect x="580" y="200" width="120" height="30" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/><text x="640" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#4CAF50">启动新线程执行</text><line x1="510" y1="180" x2="490" y2="200" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="570" y1="180" x2="630" y2="200" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="420" y="260" width="320" height="100" rx="10" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="580" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">严禁 new Thread()</text><text x="580" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#666">缺乏对任务创建和销毁的控制</text><text x="580" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">将耗尽系统资源导致 OOM</text><rect x="60" y="380" width="680" height="80" rx="10" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/><text x="400" y="410" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#607D8B">线程生命周期状态机</text><text x="400" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#666">NEW ➜ RUNNABLE ➜ (BLOCKED / WAITING / TIMED_WAITING) ➜ TERMINATED</text><path d="M 225 280 Q 350 230 440 150" fill="none" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arr)"/></svg>
