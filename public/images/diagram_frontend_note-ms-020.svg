<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">AI-Native 桌面产品从 Demo 到商用，前端最容易在哪些点翻车…</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">翻车点：1.长任务稳定性(超时/断线/内存泄漏) 2.产物质量不稳定(幻觉/格式错误) 3.权限安全(文件误操作) 4.性能(大文件/多任务卡顿) 5.多窗口…</text>

  <rect x="40" y="110" width="230" height="85" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="155.0" y="149.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">长任务稳定性</text>
  <text x="155.0" y="166.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">超时/断线/内存泄漏</text>
  <rect x="290" y="110" width="230" height="85" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="405.0" y="149.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">产物质量</text>
  <text x="405.0" y="166.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">幻觉/格式错误</text>
  <rect x="540" y="110" width="230" height="85" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="655.0" y="149.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">权限安全</text>
  <text x="655.0" y="166.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">文件误操作</text>
  <rect x="40" y="220" width="230" height="85" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="155.0" y="259.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">性能</text>
  <text x="155.0" y="276.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">大文件/多任务卡顿</text>
  <rect x="290" y="220" width="230" height="85" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="405.0" y="259.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">多窗口状态</text>
  <text x="405.0" y="276.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">竞态条件</text>
  <text x="40" y="430" font-size="12" font-weight="700" fill="#37474F">Demo → 商用：这五点是规模化时最易翻车的环节</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#f44336"/>
  <text x="100" y="482" font-size="11" fill="#37474F">长任务</text>
  <rect x="143" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="163" y="482" font-size="11" fill="#37474F">产物</text>
  <rect x="199" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="219" y="482" font-size="11" fill="#37474F">权限</text>
  <rect x="255" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="275" y="482" font-size="11" fill="#37474F">性能</text>
</svg>