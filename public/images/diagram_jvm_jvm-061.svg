<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">空间分配担保机制</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="720" height="60" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#37474F">Minor GC 前的检查机制</text><text x="400" y="145" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">确保老年代能容纳新生代晋升对象，避免 Promotion Failed</text><rect x="60" y="200" width="200" height="60" rx="6" ry="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" opacity="1.0"/><text x="160" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#2196F3">Minor GC 前</text><text x="160" y="245" text-anchor="middle" font-size="11" font-weight="normal" fill="#0D47A1">检查老年代可用</text><line x1="260" y1="230" x2="300" y2="230" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="300" y="200" width="200" height="60" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="400" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">计算: 是否 &gt;=</text><text x="400" y="245" text-anchor="middle" font-size="11" font-weight="normal" fill="#BF360C">所有新生代对象?</text><line x1="500" y1="230" x2="540" y2="230" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="540" y="180" width="110" height="40" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><text x="595" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#4CAF50">是 → 安全</text><rect x="540" y="240" width="110" height="40" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="595" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#f44336">否 → 风险</text><rect x="60" y="320" width="350" height="130" rx="6" ry="6" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="235" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#f44336">不允许冒险时:</text><text x="80" y="370" text-anchor="start" font-size="12" font-weight="700" fill="#B71C1C">→ 触发 Full GC</text><text x="80" y="390" text-anchor="start" font-size="10" font-weight="normal" fill="#607D8B" font-style="italic">(HandlePromotionFailure=false)</text><rect x="430" y="320" width="350" height="130" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="605" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#FF9800">允许冒险时:</text><text x="450" y="370" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">→ 检查历次平均晋升大小</text><text x="450" y="390" text-anchor="start" font-size="11" font-weight="normal" fill="#BF360C">   &gt;= 老年代连续空间?</text><text x="450" y="415" text-anchor="start" font-size="11" font-weight="700" fill="#4CAF50">   是 → 尝试 Minor GC</text><text x="450" y="435" text-anchor="start" font-size="11" font-weight="700" fill="#f44336">   否 → Full GC</text></svg>
