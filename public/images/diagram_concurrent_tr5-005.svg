<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Disruptor 无锁高并发核心设计</text><rect x="20" y="60" width="360" height="260" rx="12" fill="#ECEFF1" stroke="#607D8B" stroke-dasharray="4,4"/><text x="200" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">传统阻塞队列</text><rect x="100" y="110" width="200" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="200" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">加锁同步</text><rect x="100" y="170" width="200" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="200" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">频繁创建对象和GC</text><rect x="100" y="230" width="200" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B"/><text x="200" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">伪共享导致缓存失效</text><rect x="420" y="60" width="360" height="260" rx="12" fill="#E3F2FD" stroke="#2196F3" stroke-dasharray="4,4"/><text x="600" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">Disruptor 核心设计</text><rect x="500" y="110" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="600" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">CAS无锁与序号屏障</text><rect x="500" y="170" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="600" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">环形数组预分配内存</text><rect x="500" y="230" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="600" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">缓存行填充消除伪共享</text><line x1="600" y1="110" x2="600" y2="110" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><line x1="600" y1="150" x2="600" y2="170" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><line x1="600" y1="210" x2="600" y2="230" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><rect x="100" y="350" width="600" height="80" rx="8" fill="#F3E5F5" stroke="#9C27B0"/><text x="400" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">RingBuffer 内存结构 (大小为2的N次方)</text><line x1="400" y1="380" x2="400" y2="420" stroke="#9C27B0" stroke-width="1" stroke-dasharray="4,4"/><rect x="115" y="390" width="80" height="30" rx="8" fill="#FFF3E0" stroke="#FF9800"/><text x="155" y="410" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Event 0</text><rect x="200" y="390" width="80" height="30" rx="8" fill="#FFF3E0" stroke="#FF9800"/><text x="240" y="410" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Event 1</text><rect x="285" y="390" width="80" height="30" rx="8" fill="#FFF3E0" stroke="#FF9800"/><text x="325" y="410" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Event 2</text><rect x="435" y="390" width="80" height="30" rx="8" fill="#FFF3E0" stroke="#FF9800"/><text x="475" y="410" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Event N-1</text><rect x="520" y="390" width="80" height="30" rx="8" fill="#FFF3E0" stroke="#FF9800"/><text x="560" y="410" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">回绕复用</text><text x="400" y="465" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">生产者通过 CAS 申请序号 ( seq & (size-1) )，消费者基于序号屏障消费。</text></svg>
