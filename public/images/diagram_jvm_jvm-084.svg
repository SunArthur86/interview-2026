<rect x="40" y="90" width="720" height="50" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="400" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">场景 → 收集器 → 堆大小 → 关键参数 → 监控</text><text x="400" y="132" text-anchor="middle" font-size="11" font-weight="normal" fill="#BF360C" font-style="italic">迭代调优：监控 → 分析 → 调整 → 验证</text><rect x="100" y="170" width="130" height="130" rx="6" ry="6" fill="#2196F318" stroke="#2196F3" stroke-width="2" opacity="1.0"/><rect x="100" y="170" width="130" height="30" rx="6" ry="6" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="165" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">1. 场景</text><text x="165" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#2196F3">业务特征</text><text x="165" y="250" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">吞吐 / 延迟 / 内存</text><line x1="230" y1="235" x2="250" y2="235" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="250" y="170" width="130" height="130" rx="6" ry="6" fill="#4CAF5018" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="250" y="170" width="130" height="30" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="315" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">2. 收集器</text><text x="315" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#4CAF50">GC 选择</text><text x="315" y="250" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">Parallel/G1/ZGC</text><line x1="380" y1="235" x2="400" y2="235" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="400" y="170" width="130" height="130" rx="6" ry="6" fill="#FF980018" stroke="#FF9800" stroke-width="2" opacity="1.0"/><rect x="400" y="170" width="130" height="30" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="465" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">3. 堆大小</text><text x="465" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#FF9800">Xms=Xmx</text><text x="465" y="250" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">物理内存 1/2~2/3</text><line x1="530" y1="235" x2="550" y2="235" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/><rect x="550" y="170" width="130" height="130" rx="6" ry="6" fill="#9C27B018" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><rect x="550" y="170" width="130" height="30" rx="6" ry="6" fill="#9C27B0" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="615" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">4. 关键参数</text><text x="615" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#9C27B0">监控诊断</text><text x="615" y="250" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F">GC 日志/HeapDumpOnOOM</text><rect x="40" y="330" width="720" height="240" rx="6" ry="6" fill="#FAFAFA" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="355" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">收集器选择矩阵</text><rect x="60" y="380" width="160" height="170" rx="6" ry="6" fill="#66BB6A22" stroke="#66BB6A" stroke-width="2" opacity="1.0"/><rect x="60" y="380" width="160" height="28" rx="6" ry="6" fill="#66BB6A" stroke="#66BB6A" stroke-width="1.5" opacity="1.0"/><text x="140" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Parallel</text><text x="140" y="428" text-anchor="middle" font-size="11" font-weight="700" fill="#66BB6A">高吞吐</text><text x="140" y="452" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">批处理/离线计算</text><text x="140" y="488" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B">推荐场景</text><text x="140" y="505" text-anchor="middle" font-size="9" font-weight="normal" fill="#37474F">批处理/离线计算</text><text x="140" y="535" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">JDK8 默认</text><rect x="230" y="380" width="160" height="170" rx="6" ry="6" fill="#FF704322" stroke="#FF7043" stroke-width="2" opacity="1.0"/><rect x="230" y="380" width="160" height="28" rx="6" ry="6" fill="#FF7043" stroke="#FF7043" stroke-width="1.5" opacity="1.0"/><text x="310" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">G1</text><text x="310" y="428" text-anchor="middle" font-size="11" font-weight="700" fill="#FF7043">可预测停顿</text><text x="310" y="452" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">服务端主流</text><text x="310" y="488" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B">推荐场景</text><text x="310" y="505" text-anchor="middle" font-size="9" font-weight="normal" fill="#37474F">服务端主流</text><text x="310" y="535" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">JDK9+ 默认</text><rect x="400" y="380" width="160" height="170" rx="6" ry="6" fill="#42A5F522" stroke="#42A5F5" stroke-width="2" opacity="1.0"/><rect x="400" y="380" width="160" height="28" rx="6" ry="6" fill="#42A5F5" stroke="#42A5F5" stroke-width="1.5" opacity="1.0"/><text x="480" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">ZGC</text><text x="480" y="428" text-anchor="middle" font-size="11" font-weight="700" fill="#42A5F5">亚毫秒停顿</text><text x="480" y="452" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">低延迟/大堆</text><text x="480" y="488" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B">推荐场景</text><text x="480" y="505" text-anchor="middle" font-size="9" font-weight="normal" fill="#37474F">低延迟/大堆</text><text x="480" y="535" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">JDK15+ 生产</text><rect x="570" y="380" width="160" height="170" rx="6" ry="6" fill="#AB47BC22" stroke="#AB47BC" stroke-width="2" opacity="1.0"/><rect x="570" y="380" width="160" height="28" rx="6" ry="6" fill="#AB47BC" stroke="#AB47BC" stroke-width="1.5" opacity="1.0"/><text x="650" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Shenandoah</text><text x="650" y="428" text-anchor="middle" font-size="11" font-weight="700" fill="#AB47BC">并发整理</text><text x="650" y="452" text-anchor="middle" font-size="10" font-weight="normal" fill="#37474F" font-style="italic">RedHat 主推</text><text x="650" y="488" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B">推荐场景</text><text x="650" y="505" text-anchor="middle" font-size="9" font-weight="normal" fill="#37474F">RedHat 主推</text><text x="650" y="535" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">JDK12+ 可选</text></svg>
