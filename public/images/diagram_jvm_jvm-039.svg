<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">GC Roots 可达性分析（如何确定垃圾）</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="100" width="200" height="280" rx="8" ry="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" opacity="1.0"/><text x="140" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#2196F3">GC Roots</text><text x="140" y="160" text-anchor="start" font-size="11" font-weight="normal" fill="#0D47A1">• 虚拟机栈中引用对象</text><text x="140" y="190" text-anchor="start" font-size="11" font-weight="normal" fill="#0D47A1">• 本地方法栈 JNI 引用</text><text x="140" y="220" text-anchor="start" font-size="11" font-weight="normal" fill="#0D47A1">• 方法区静态字段引用</text><text x="140" y="250" text-anchor="start" font-size="11" font-weight="normal" fill="#0D47A1">• 方法区常量引用</text><text x="140" y="280" text-anchor="start" font-size="11" font-weight="normal" fill="#0D47A1">• 同步锁 synchronized</text><text x="140" y="310" text-anchor="start" font-size="11" font-weight="normal" fill="#0D47A1">• JVM 内部引用</text><rect x="280" y="110" width="480" height="280" rx="8" ry="8" fill="#FAFAFA" stroke="#607D8B" stroke-width="1.5" opacity="1.0" stroke-dasharray="5,3"/><text x="520" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#607D8B">对象引用图 (Object Graph)</text><circle cx="360" cy="180" r="40" fill="#4CAF50" fill-opacity="0.4" stroke="#37474F" stroke-width="2"/><text x="360" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">A</text><circle cx="450" cy="240" r="36" fill="#4CAF50" fill-opacity="0.4" stroke="#37474F" stroke-width="2"/><text x="450" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">B</text><circle cx="550" cy="180" r="36" fill="#4CAF50" fill-opacity="0.4" stroke="#37474F" stroke-width="2"/><text x="550" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">C</text><line x1="396" y1="190" x2="422" y2="226" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/><line x1="476" y1="220" x2="524" y2="198" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/><line x1="240" y1="220" x2="326" y2="184" stroke="#2196F3" stroke-width="2" marker-end="url(#arrow)"/><text x="280" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#4CAF50">可达</text><circle cx="380" cy="330" r="32" fill="#f44336" fill-opacity="0.4" stroke="#37474F" stroke-width="2" stroke-dasharray="3,2"/><text x="380" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">D</text><circle cx="460" cy="330" r="32" fill="#f44336" fill-opacity="0.4" stroke="#37474F" stroke-width="2" stroke-dasharray="3,2"/><text x="460" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">E</text><line x1="410" y1="330" x2="432" y2="330" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,3"/><line x1="360" y1="215" x2="372" y2="305" stroke="#f44336" stroke-width="2" marker-end="url(#arrowR)" stroke-dasharray="4,3"/><text x="345" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#f44336">断开</text><text x="560" y="340" text-anchor="middle" font-size="11" font-weight="normal" fill="#f44336" font-style="italic">D-E 环</text><text x="560" y="358" text-anchor="middle" font-size="11" font-weight="normal" fill="#f44336">无 GC Root 路径</text><rect x="30" y="420" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="430" width="16" height="16" rx="3" fill="#2196F3" stroke="#37474F" stroke-width="1"/><text x="62.0" y="443" font-size="12" fill="#37474F" text-anchor="start">GC Roots 起点</text><rect x="280.0" y="430" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="302.0" y="443" font-size="12" fill="#37474F" text-anchor="start">存活 (Reachable)</text><rect x="520.0" y="430" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="542.0" y="443" font-size="12" fill="#37474F" text-anchor="start">垃圾 (Unreachable)</text>
