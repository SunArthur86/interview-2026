<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#fafafa"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/>
    </marker>
  </defs>

  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Spark 架构：Worker、Executor 与 Task 层级关系</text>

  <rect x="50" y="80" width="700" height="350" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="400" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">Cluster Manager (集群资源管理)</text>

  <rect x="80" y="130" width="640" height="280" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="400" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">Worker Node (物理节点/JVM进程)</text>

  <rect x="100" y="180" width="260" height="210" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="230" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">Executor 1 (计算进程)</text>
  
  <rect x="120" y="230" width="100" height="40" rx="5" fill="#ffffff" stroke="#607D8B" stroke-width="1.5"/>
  <text x="170" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">Task (线程)</text>
  
  <rect x="240" y="230" width="100" height="40" rx="5" fill="#ffffff" stroke="#607D8B" stroke-width="1.5"/>
  <text x="290" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">Task (线程)</text>
  
  <rect x="120" y="290" width="100" height="40" rx="5" fill="#ffffff" stroke="#607D8B" stroke-width="1.5"/>
  <text x="170" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">Task (线程)</text>
  
  <rect x="240" y="290" width="100" height="40" rx="5" fill="#ffffff" stroke="#607D8B" stroke-width="1.5"/>
  <text x="290" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">Task (线程)</text>

  <rect x="120" y="340" width="220" height="30" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="230" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#FF9800">Cores=5 吞吐量最佳</text>

  <rect x="440" y="180" width="260" height="210" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="570" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">Executor 2 (计算进程)</text>
  
  <rect x="460" y="230" width="100" height="40" rx="5" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/>
  <text x="510" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">Task (线程)</text>
  <text x="510" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#f44336">对应 Partition 1</text>

  <rect x="580" y="230" width="100" height="40" rx="5" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/>
  <text x="630" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">Task (线程)</text>
  <text x="630" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#f44336">对应 Partition 2</text>

  <rect x="460" y="340" width="220" height="30" rx="5" fill="#FFEBEE" stroke="#f44336" stroke-width="1.5"/>
  <text x="570" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">总 Task 数 = 总 Partition 数</text>

  <rect x="20" y="460" width="760" height="30" rx="5" fill="#ffffff" stroke="#ECEFF1"/>
  <rect x="30" y="470" width="15" height="10" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="50" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">执行容器</text>
  <rect x="130" y="470" width="15" height="10" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="150" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">调优建议</text>
  <rect x="230" y="470" width="15" height="10" fill="#F3E5F5" stroke="#9C27B0"/>
  <text x="250" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">物理节点</text>
  <rect x="330" y="470" width="15" height="10" fill="#FFEBEE" stroke="#f44336"/>
  <text x="350" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">核心法则</text>
</svg>
