<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">多模态输入同时有网页、文档和本地截图时，桌面端该怎样做上下文管理？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">把来源对象、提取结果和当前任务引用拆开，用户能看到哪些素材正在被消费，大对象优先存引用和摘要。</text>

  <rect x="80" y="90" width="640" height="56" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="400.0" y="115.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">来源对象层</text>
  <text x="400.0" y="132.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">原始文件/网页/截图</text>
  <line x1="400" y1="146" x2="400" y2="160" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="80" y="160" width="640" height="56" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="400.0" y="185.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">提取结果层</text>
  <text x="400.0" y="202.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">文本/向量/结构化</text>
  <line x1="400" y1="216" x2="400" y2="230" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="80" y="230" width="640" height="56" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="400.0" y="255.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">任务引用层</text>
  <text x="400.0" y="272.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">当前任务消费的子集</text>
  <line x1="400" y1="286" x2="400" y2="300" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="80" y="300" width="640" height="56" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="400.0" y="325.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">引用+摘要</text>
  <text x="400.0" y="342.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">大对象不重复拷贝</text>
  <text x="40" y="380" font-size="12" font-weight="700" fill="#37474F">核心要点</text>
  <circle cx="48" cy="397" r="3" fill="#2196F3"/>
  <text x="58" y="400" font-size="11" fill="#37474F">来源对象/提取结果/任务引用三层拆开</text>
  <circle cx="48" cy="417" r="3" fill="#2196F3"/>
  <text x="58" y="420" font-size="11" fill="#37474F">用户可见哪些素材正被消费</text>
  <circle cx="48" cy="437" r="3" fill="#2196F3"/>
  <text x="58" y="440" font-size="11" fill="#37474F">大对象存引用和摘要不重复拷贝</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">来源对象层</text>
  <rect x="157" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="177" y="482" font-size="11" fill="#37474F">提取结果层</text>
  <rect x="234" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="254" y="482" font-size="11" fill="#37474F">任务引用层</text>
  <rect x="311" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="331" y="482" font-size="11" fill="#37474F">引用+摘要</text>
</svg>