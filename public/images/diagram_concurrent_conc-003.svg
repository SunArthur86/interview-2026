<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L8,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">TCP 四次挥手流程与状态转换</text><text x="130" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">主动关闭方 (Client)</text><text x="670" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#FF9800">被动关闭方 (Server)</text><line x1="130" y1="90" x2="130" y2="420" stroke="#E3F2FD" stroke-width="3" stroke-dasharray="5,5"/><line x1="670" y1="90" x2="670" y2="420" stroke="#FFF3E0" stroke-width="3" stroke-dasharray="5,5"/><ellipse cx="130" cy="110" rx="50" ry="22" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="130" y="115" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#2196F3" font-weight="700">ESTABLISHED</text><ellipse cx="670" cy="110" rx="50" ry="22" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="670" y="115" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#FF9800" font-weight="700">ESTABLISHED</text><path d="M180 165 Q 400 140 620 165" fill="none" stroke="#f44336" stroke-width="2.5" marker-end="url(#arr)"/><text x="400" y="145" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#f44336" font-weight="700">FIN (1) + 序号 u</text><rect x="50" y="180" width="160" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="130" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#2196F3" font-weight="700">FIN_WAIT_1</text><text x="130" y="214" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#607D8B">等待确认</text><path d="M620 205 Q 400 230 180 205" fill="none" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arr)"/><text x="400" y="225" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#4CAF50" font-weight="700">ACK (2) + 序号 u+1</text><rect x="50" y="250" width="160" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="130" y="268" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#2196F3" font-weight="700">FIN_WAIT_2</text><text x="130" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#607D8B">半关闭 (只收不发)</text><rect x="590" y="180" width="160" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="670" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#FF9800" font-weight="700">CLOSE_WAIT</text><text x="670" y="214" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#607D8B">处理残留数据...</text><path d="M620 275 Q 400 250 180 275" fill="none" stroke="#f44336" stroke-width="2.5" marker-end="url(#arr)"/><text x="400" y="255" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#f44336" font-weight="700">FIN (3) + 序号 v</text><rect x="590" y="250" width="160" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="670" y="268" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#FF9800" font-weight="700">LAST_ACK</text><text x="670" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#607D8B">等待最后确认</text><path d="M180 315 Q 400 340 620 315" fill="none" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arr)"/><text x="400" y="335" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#4CAF50" font-weight="700">ACK (4) + 序号 v+1</text><rect x="50" y="360" width="160" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="130" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#f44336" font-weight="700">TIME_WAIT</text><text x="130" y="394" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#607D8B">等待 2MSL (防报文迷现)</text><ellipse cx="670" cy="380" rx="50" ry="22" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="670" y="385" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#607D8B" font-weight="700">CLOSED</text><ellipse cx="130" cy="430" rx="50" ry="22" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="130" y="435" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#607D8B" font-weight="700">CLOSED</text><path d="M130 400 L 130 408" fill="none" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="10" y="460" width="780" height="30" rx="5" fill="#FFFFFF" stroke="#ECEFF1"/><circle cx="30" cy="475" r="6" fill="#f44336"/><text x="42" y="479" font-family="system-ui,sans-serif" font-size="11" fill="#333">FIN报文 (发起关闭)</text><circle cx="180" cy="475" r="6" fill="#4CAF50"/><text x="192" y="479" font-family="system-ui,sans-serif" font-size="11" fill="#333">ACK报文 (确认收到)</text><path d="M310 470 L 320 480 L 310 480 Z" fill="#F3E5F5"/><text x="330" y="479" font-family="system-ui,sans-serif" font-size="11" fill="#9C27B0">本质: 全双工需双向独立关闭 (挂电话: A说完了->B知道了->B说完了->A知道了)</text></svg>
