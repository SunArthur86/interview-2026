<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#fafafa"/>
  <text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">阻塞队列四类方法与状态机制</text>

  <g font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">
    <ellipse cx="400" cy="70" rx="60" ry="20" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
    <text x="400" y="75" font-weight="700" fill="#2196F3">队列满或空状态</text>
    
    <path d="M 400 90 L 180 150 L 280 230 L 400 90 L 520 150 L 620 230 L 400 90 L 520 150 L 520 230 L 400 90" fill="none" stroke="none"/>
    <path d="M 400 90 L 160 160" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>
    <path d="M 400 90 L 320 160" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>
    <path d="M 400 90 L 480 160" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>
    <path d="M 400 90 L 640 160" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="50" y="170" width="160" height="110" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
    <text x="130" y="190" font-weight="700" fill="#f44336">抛出异常组</text>
    <text x="130" y="212" fill="#555">add(e)</text>
    <text x="130" y="230" fill="#555">remove()</text>
    <text x="130" y="248" fill="#555">element()</text>
    <text x="130" y="268" fill="#888" font-size="10">失败即抛出异常</text>

    <rect x="220" y="170" width="160" height="110" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
    <text x="300" y="190" font-weight="700" fill="#FF9800">返回特殊值组</text>
    <text x="300" y="212" fill="#555">offer(e)</text>
    <text x="300" y="230" fill="#555">poll()</text>
    <text x="300" y="248" fill="#555">peek()</text>
    <text x="300" y="268" fill="#888" font-size="10">失败返回false/null</text>

    <rect x="420" y="170" width="160" height="110" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
    <text x="500" y="190" font-weight="700" fill="#9C27B0">阻塞组</text>
    <text x="500" y="212" fill="#555">put(e)</text>
    <text x="500" y="230" fill="#555">take()</text>
    <text x="500" y="268" fill="#888" font-size="10">不满足条件无限等待</text>

    <rect x="590" y="170" width="160" height="110" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
    <text x="670" y="190" font-weight="700" fill="#4CAF50">超时组</text>
    <text x="670" y="212" fill="#555">offer(e, time, unit)</text>
    <text x="670" y="230" fill="#555">poll(time, unit)</text>
    <text x="670" y="268" fill="#888" font-size="10">限时阻塞后退出</text>

    <path d="M 130 280 L 130 320" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>
    <path d="M 300 280 L 300 320" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>
    <path d="M 500 280 L 500 320" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>
    <path d="M 670 280 L 670 320" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/>

    <polygon points="130,320 190,360 130,400 70,360" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
    <text x="130" y="356" font-weight="700" fill="#f44336">IllegalStateException</text>
    <text x="130" y="374" font-size="11" fill="#f44336">NoSuchElementException</text>

    <polygon points="300,320 360,360 300,400 240,360" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
    <text x="300" y="356" font-weight="700" fill="#FF9800">返回</text>
    <text x="300" y="374" font-size="11" fill="#FF9800">false / null</text>

    <polygon points="500,320 560,360 500,400 440,360" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
    <text x="500" y="356" font-weight="700" fill="#9C27B0">线程状态变为</text>
    <text x="500" y="374" font-size="11" fill="#9C27B0">WAITING (死锁风险)</text>

    <polygon points="670,320 730,360 670,400 610,360" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
    <text x="670" y="356" font-weight="700" fill="#4CAF50">等待超时</text>
    <text x="670" y="374" font-size="11" fill="#4CAF50">退出并返回</text>
  </g>

  <g font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">
    <text x="400" y="460" fill="#333" font-weight="700">实战避坑：第三方回调慎用 put() 阻塞</text>
    <text x="400" y="480" fill="#666">推荐使用 offer(timeout) 防止支付回调超时重试导致重复订单</text>
  </g>
</svg>
