<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#f44336"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">死锁产生与预防机制</text><g font-family="system-ui,-apple-system,sans-serif"><text x="220" y="80" font-size="15" font-weight="700" text-anchor="middle" fill="#f44336">死锁产生条件</text><rect x="120" y="100" width="200" height="260" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="220" y="130" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">1. 互斥条件</text><text x="220" y="148" font-size="11" text-anchor="middle" fill="#333">资源独占使用</text><text x="220" y="185" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">2. 请求与保持</text><text x="220" y="203" font-size="11" text-anchor="middle" fill="#333">保持已锁资源</text><text x="220" y="240" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">3. 不剥夺条件</text><text x="220" y="258" font-size="11" text-anchor="middle" fill="#333">不能强行抢夺</text><text x="220" y="295" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">4. 循环等待</text><text x="220" y="313" font-size="11" text-anchor="middle" fill="#333">死循环链条</text><text x="220" y="340" font-size="12" font-weight="700" text-anchor="middle" fill="#607D8B">* 四者缺一不可</text><text x="580" y="80" font-size="15" font-weight="700" text-anchor="middle" fill="#4CAF50">破坏预防策略</text><rect x="480" y="100" width="200" height="260" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="580" y="130" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">固定加锁顺序</text><text x="580" y="148" font-size="11" text-anchor="middle" fill="#333">破除循环等待</text><text x="580" y="185" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">tryLock设置超时</text><text x="580" y="203" font-size="11" text-anchor="middle" fill="#333">破除不剥夺条件</text><text x="580" y="240" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">一次性申请资源</text><text x="580" y="258" font-size="11" text-anchor="middle" fill="#333">破除请求与保持</text><rect x="520" y="285" width="120" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="580" y="303" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">JStack排查</text><text x="580" y="319" font-size="11" text-anchor="middle" fill="#9C27B0">查看堆栈状态</text><path d="M320,230 L480,230" stroke="#607D8B" stroke-width="2" stroke-dasharray="5" marker-end="url(#arr)"/><text x="400" y="225" font-size="12" font-weight="700" text-anchor="middle" fill="#607D8B">应对方案</text><rect x="150" y="390" width="150" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="225" y="408" font-size="12" font-weight="700" text-anchor="middle" fill="#2196F3">线程A (持锁A)</text><text x="225" y="424" font-size="11" text-anchor="middle" fill="#2196F3">请求锁B失败</text><rect x="500" y="390" width="150" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="575" y="408" font-size="12" font-weight="700" text-anchor="middle" fill="#2196F3">线程B (持锁B)</text><text x="575" y="424" font-size="11" text-anchor="middle" fill="#2196F3">请求锁A失败</text><path d="M300,410 L500,410" stroke="#f44336" stroke-width="2.5" marker-end="url(#arr)"/><path d="M500,420 L300,420" stroke="#f44336" stroke-width="2.5" marker-end="url(#arr)"/><text x="400" y="460" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">致命风险：无限互相等待</text></g></svg>
