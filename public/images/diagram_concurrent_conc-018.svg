<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">重量级锁底座：ObjectMonitor 数据流</text><g font-family="system-ui,-apple-system,sans-serif"><rect x="300" y="60" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="400" y="85" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">_owner (持锁线程)</text><rect x="100" y="150" width="160" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="180" y="170" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">竞争失败线程</text><text x="180" y="187" font-size="11" text-anchor="middle" fill="#f44336">内核态阻塞</text><rect x="540" y="150" width="160" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="620" y="170" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">调用wait()线程</text><text x="620" y="187" font-size="11" text-anchor="middle" fill="#FF9800">Waiting状态</text><polygon points="400,200 460,240 400,280 340,240" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="245" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">OS Mutex</text><text x="400" y="260" font-size="11" text-anchor="middle" fill="#9C27B0">开销大</text><rect x="100" y="320" width="160" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="180" y="340" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">_cxq (EntryList)</text><text x="180" y="357" font-size="11" text-anchor="middle" fill="#2196F3">单向链表/LIFO栈</text><rect x="540" y="320" width="160" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="620" y="340" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">_WaitSet</text><text x="620" y="357" font-size="11" text-anchor="middle" fill="#2196F3">等待唤醒队列</text><path d="M400,100 L400,145" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><path d="M320,130 L210,150" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="260" y="135" font-size="11" text-anchor="middle" fill="#f44336">持锁失败</text><path d="M480,130 L590,150" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><text x="540" y="135" font-size="11" text-anchor="middle" fill="#FF9800">释放锁/等待</text><path d="M180,190 L180,320" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><path d="M620,190 L620,320" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/><path d="M250,340 L340,240" stroke="#607D8B" stroke-width="2" stroke-dasharray="4" marker-end="url(#arr)"/><path d="M550,340 L460,240" stroke="#607D8B" stroke-width="2" stroke-dasharray="4" marker-end="url(#arr)"/><rect x="280" y="410" width="240" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="400" y="430" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">致命开销：用户态 <-> 内核态切换</text><text x="400" y="448" font-size="11" text-anchor="middle" fill="#f44336">适合高并发/长临界区场景</text></g><g font-family="system-ui,-apple-system,sans-serif" transform="translate(50, 470)"><rect x="0" y="0" width="12" height="12" fill="#2196F3"/><text x="18" y="10" font-size="12" text-anchor="start" fill="#333">数据结构</text><rect x="100" y="0" width="12" height="12" fill="#4CAF50"/><text x="118" y="10" font-size="12" text-anchor="start" fill="#333">持锁主体</text><rect x="200" y="0" width="12" height="12" fill="#f44336"/><text x="218" y="10" font-size="12" text-anchor="start" fill="#333">高耗操作</text></g></svg>
