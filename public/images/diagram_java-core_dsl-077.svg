<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">React Hooks</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：Hooks 是函数组件中使用状态和副作用的机制，解决类组件逻辑复用难问题。</text>
<!-- BODY_TOP=110 -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#455A64"/>
</marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/>
</marker>
</defs>
<rect x="240" y="116" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#2196F3" stroke-width="2"/>
<text x="400" y="113" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">规则：只能在顶层调用</text>
<text x="400" y="131" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">，不可在循环/条件判</text>
<text x="400" y="149" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">断中使用（依赖调用顺</text>
<text x="400" y="167" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">序）。</text>
<rect x="240" y="194" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
<text x="400" y="200" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">useState：返回数组便</text>
<text x="400" y="218" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">于解构赋值，避免对象</text>
<text x="400" y="236" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">重命名冲突。</text>
<rect x="240" y="272" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#FF9800" stroke-width="2"/>
<text x="400" y="278" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">useEffect：处理副作</text>
<text x="400" y="296" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">用，第二个参数依赖数</text>
<text x="400" y="314" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">组决定是否执行。</text>
<rect x="240" y="350" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#9C27B0" stroke-width="2"/>
<text x="400" y="338" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">性能：useMemo 缓存计</text>
<text x="400" y="356" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">算值，useCallback 缓</text>
<text x="400" y="374" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">存函数，useMemo/useE</text>
<text x="400" y="392" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">ffect 区别在于返回值</text>
<text x="400" y="410" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">和触发时机。</text>
<rect x="240" y="428" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#f44336" stroke-width="2"/>
<text x="400" y="425" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">阻塞：useLayoutEffec</text>
<text x="400" y="443" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">t 同步执行阻塞渲染，</text>
<text x="400" y="461" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">useEffect 异步执行不</text>
<text x="400" y="479" font-size="15" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">阻塞。</text>
<line x1="400" y1="164" x2="400" y2="194" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="242" x2="400" y2="272" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="320" x2="400" y2="350" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="400" y1="398" x2="400" y2="428" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
</svg>