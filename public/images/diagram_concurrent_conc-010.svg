<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#607D8B"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#fafafa"/>

  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java线程调度与状态转换机制</text>
  <text x="400" y="55" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">老师(OS)点名让学生(线程)轮流回答，高优先级多被点</text>

  <!-- 新建 -->
  <ellipse cx="100" cy="150" rx="45" ry="30" fill="#ECEFF1" stroke="#607D8B"/>
  <text x="100" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">NEW</text>

  <path d="M 145 150 L 225 150" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="185" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">start()</text>

  <!-- RUNNABLE 大组 (Ready / Running) -->
  <rect x="230" y="100" width="260" height="120" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="360" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">RUNNABLE (Java视角统一)</text>
  
  <rect x="245" y="130" width="100" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="295" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">就绪 Ready</text>
  <text x="295" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">等待时间片</text>

  <rect x="375" y="130" width="100" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="425" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">运行 Running</text>
  <text x="425" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">占用 CPU</text>

  <!-- 状态切换双向箭头 -->
  <path d="M 345 150 L 375 150" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="360" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#FF9800">调度</text>
  <path d="M 375 175 L 345 175" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="360" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#607D8B">yield()</text>

  <!-- 死亡出口 -->
  <path d="M 425 190 L 425 290 L 600 290 L 600 335" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="510" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">执行完毕</text>

  <ellipse cx="600" cy="365" rx="50" ry="30" fill="#FFEBEE" stroke="#f44336"/>
  <text x="600" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">TERMINATED</text>

  <!-- 阻塞出口 -->
  <path d="M 295 190 L 295 290 L 130 290 L 130 335" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="200" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">wait()/sleep()</text>

  <rect x="60" y="335" width="140" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0"/>
  <text x="130" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">BLOCKED</text>
  <text x="130" y="378" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">交出 CPU 资源</text>

  <path d="M 130 335 L 130 260 L 245 190" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="170" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#4CAF50">解除阻塞</text>

  <!-- 右侧注解区 -->
  <rect x="510" y="100" width="250" height="100" rx="8" fill="#fafafa" stroke="#ECEFF1" stroke-dasharray="4"/>
  <text x="635" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">Java线程调度核心规则</text>
  <line x1="530" y1="135" x2="740" y2="135" stroke="#ECEFF1"/>
  <text x="530" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="start" fill="#333">1. 抢占式调度 (OS分配时间片)</text>
  <text x="530" y="173" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="start" fill="#333">2. 优先级依赖OS，跨平台失效</text>
  <text x="530" y="191" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="start" fill="#333">3. yield() 仅暗示让出，非强制</text>

  <!-- 底部对照比较 -->
  <rect x="40" y="430" width="340" height="50" rx="8" fill="#FFEBEE" stroke="#f44336"/>
  <text x="210" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">协同式调度</text>
  <text x="210" y="473" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">线程自行执行完通知OS (死循环会独占CPU)</text>

  <rect x="420" y="430" width="340" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="590" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">抢占式调度 (Java采用)</text>
  <text x="590" y="473" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">系统分配时间片，时间用尽强制切换</text>
</svg>
