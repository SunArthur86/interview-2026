<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">ConcurrentHashMap 计数架构与 size() 局限</text><rect x="50" y="60" width="700" height="160" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="400" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#2196F3" text-anchor="middle">并发计数机制 (参考 LongAdder)</text><rect x="120" y="115" width="160" height="80" rx="4" fill="#ffffff" stroke="#2196F3"/><text x="200" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">baseCount</text><text x="200" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B" text-anchor="middle">基础数值 (低竞争CAS成功)</text><rect x="320" y="115" width="160" height="80" rx="4" fill="#ffffff" stroke="#2196F3"/><text x="400" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">CounterCell[0]</text><text x="400" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B" text-anchor="middle">线程Hash分片槽</text><rect x="520" y="115" width="160" height="80" rx="4" fill="#ffffff" stroke="#2196F3"/><text x="600" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#333" text-anchor="middle">CounterCell[1]</text><text x="600" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B" text-anchor="middle">线程Hash分片槽</text><line x1="400" y1="230" x2="400" y2="270" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><polygon points="400,270 470,310 400,350 330,310" fill="#FFF3E0" stroke="#FF9800"/><text x="400" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FF9800" text-anchor="middle">size() / sum()</text><text x="400" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">遍历求和</text><line x1="400" y1="350" x2="400" y2="380" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><rect x="100" y="380" width="600" height="45" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="400" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f44336" text-anchor="middle">致命风险：不加锁的弱一致性快照</text><text x="400" y="418" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">并发修改导致返回的值仅是近似历史状态，非精确值</text><rect x="100" y="445" width="280" height="30" rx="4" fill="#ECEFF1" stroke="#607D8B"/><text x="240" y="465" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B" text-anchor="middle">替代方案: mappingCount() (依然不精确)</text><rect x="420" y="445" width="280" height="30" rx="4" fill="#E8F5E9" stroke="#4CAF50"/><text x="560" y="465" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4CAF50" text-anchor="middle">推荐方案: 业务层使用外部 AtomicLong 维护</text><rect x="20" y="485" width="15" height="10" fill="#E3F2FD" stroke="#2196F3"/><text x="45" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">核心机制</text><rect x="110" y="485" width="15" height="10" fill="#FFEBEE" stroke="#f44336"/><text x="135" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">设计风险</text><rect x="200" y="485" width="15" height="10" fill="#E8F5E9" stroke="#4CAF50"/><text x="225" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">正确解决</text></svg>
