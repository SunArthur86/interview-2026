<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">分代收集算法核心思想</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="720" height="70" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#37474F">核心：不同生命周期对象采用不同回收策略</text><text x="400" y="138" text-anchor="middle" font-size="11" font-weight="normal" fill="#607D8B" font-style="italic">&quot;朝生夕灭&quot; → 复制  |  &quot;长命百岁&quot; → 标记整理</text><rect x="40" y="180" width="350" height="220" rx="8" ry="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="40" y="180" width="350" height="36" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="215" y="204" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">新生代 (Young)</text><text x="60" y="245" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">特点：</text><text x="80" y="268" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• 98% 对象朝生夕灭</text><text x="80" y="290" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">• Minor GC 频繁但快</text><text x="60" y="320" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">算法：复制 (Copying)</text><text x="80" y="343" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">Eden + S0 + S1 (8:1:1)</text><text x="80" y="365" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">只需浪费 10% 内存</text><text x="80" y="387" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">S0/S1 来回复制存活</text><rect x="410" y="180" width="350" height="220" rx="8" ry="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="410" y="180" width="350" height="36" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="585" y="204" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">老年代 (Old)</text><text x="430" y="245" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">特点：</text><text x="450" y="268" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• 存活率高</text><text x="450" y="290" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">• GC 频率低但慢</text><text x="430" y="320" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">算法：标记-清除 / 整理</text><text x="450" y="343" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">CMS: 标记-清除</text><text x="450" y="365" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">Serial Old: 标记-整理</text><text x="450" y="387" text-anchor="start" font-size="11" font-weight="normal" fill="#B71C1C">避免复制大对象开销</text><line x1="390" y1="290" x2="410" y2="290" stroke="#FF9800" stroke-width="2" marker-end="url(#arrow)"/><text x="400" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#FF9800">晋升</text><rect x="30" y="400" width="740" height="50" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/><rect x="40.0" y="410" width="16" height="16" rx="3" fill="#4CAF50" stroke="#37474F" stroke-width="1"/><text x="62.0" y="423" font-size="12" fill="#37474F" text-anchor="start">新生代/复制</text><rect x="280.0" y="410" width="16" height="16" rx="3" fill="#f44336" stroke="#37474F" stroke-width="1"/><text x="302.0" y="423" font-size="12" fill="#37474F" text-anchor="start">老年代/标记整理</text><rect x="520.0" y="410" width="16" height="16" rx="3" fill="#FF9800" stroke="#37474F" stroke-width="1"/><text x="542.0" y="423" font-size="12" fill="#37474F" text-anchor="start">晋升 Promotion</text>
</svg>
