<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java 并发协同工具核心对比</text><rect x="30" y="50" width="180" height="180" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="120" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">Synchronized</text><text x="120" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">机制：JVM 关键字</text><text x="120" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">特征：自动释放锁</text><text x="120" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">场景：单例双重检查</text><text x="120" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">性能：JVM 底层极致优化</text><text x="120" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">无法中断/超时控制</text><rect x="230" y="50" width="180" height="180" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="320" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">ReentrantLock</text><text x="320" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">机制：JUC API (AQS)</text><text x="320" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">特征：手动 finally 释放</text><text x="320" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">场景：复杂的阻塞同步</text><text x="320" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">灵活：支持公平/中断/多路</text><text x="320" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">tryLock() 高级特性</text><rect x="430" y="50" width="180" height="180" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="520" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">Semaphore</text><text x="520" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">机制：基于许可计数</text><text x="520" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">特征：允许多线程访问</text><text x="520" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">场景：数据库连接池</text><text x="520" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">限流：控制最大并发数</text><text x="520" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">非互斥协同利器</text><rect x="630" y="50" width="140" height="180" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="700" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">Atomic 原子类</text><text x="700" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">机制：无锁 CAS</text><text x="700" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">特征：非阻塞自旋</text><text x="700" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">场景：全局序列号生成</text><text x="700" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">性能：单变量极高并发</text><text x="700" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">高冲突下 CPU 飙升</text><rect x="30" y="270" width="740" height="200" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="400" y="295" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">并发协同工具选型决策</text><polygon points="400,320 250,380 400,440 550,380" fill="#fafafa" stroke="#607D8B" stroke-width="2"/><text x="400" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#333">业务并发需求判定</text><line x1="250" y1="380" x2="120" y2="380" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><text x="185" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">单变量更新</text><text x="120" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">Atomic (CAS)</text><line x1="325" y1="380" x2="220" y2="450" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/><text x="270" y="430" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">控制并发数</text><text x="160" y="470" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">Semaphore (限流)</text><line x1="475" y1="380" x2="580" y2="450" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/><text x="530" y="430" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#9C27B0">互斥同步且需特殊控制</text><text x="640" y="470" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#9C27B0">ReentrantLock (灵活)</text><line x1="550" y1="380" x2="680" y2="380" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/><text x="615" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">一般互斥同步</text><text x="680" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#2196F3">Synchronized (自动)</text></svg>
