<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="max-width:100%;height:auto;font-family:system-ui,-apple-system,'PingFang SC',sans-serif;">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#666"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4CAF50"/>
    </marker>
    <marker id="arro" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f44336"/>
    </marker>
  </defs>

  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">如何保证MQ中消息的顺序性？</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#607D8B">通过哈希分区保证存储有序，通过内存队列分片保证消费有序。</text>
  <rect x="45" y="210" width="130" height="60" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="110" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Producer</text>
  <text x="110" y="254" text-anchor="middle" font-size="11" fill="#1565C0">相同 key</text>
  <text x="400" y="135" text-anchor="middle" font-size="12" fill="#666" font-weight="700">Topic（多分区）</text>
  <rect x="290" y="148" width="220" height="44" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="320" y="170" text-anchor="start" font-size="11" font-weight="700" fill="#2E7D32">Partition-0</text>
  <text x="510" y="170" text-anchor="end" font-size="10" fill="#2E7D32">msg1 → msg2 → msg3</text>
  <rect x="290" y="218" width="220" height="44" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="320" y="240" text-anchor="start" font-size="11" font-weight="700" fill="#E65100">Partition-1</text>
  <text x="510" y="240" text-anchor="end" font-size="10" fill="#E65100">msg4 → msg5</text>
  <rect x="290" y="288" width="220" height="44" rx="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="320" y="310" text-anchor="start" font-size="11" font-weight="700" fill="#6A1B9A">Partition-2</text>
  <text x="510" y="310" text-anchor="end" font-size="10" fill="#6A1B9A">msg6</text>
  <text x="220" y="200" font-size="10" font-weight="600" fill="#FF9800">hash(key) % N</text>
  <line x1="240" y1="240" x2="285" y2="195" stroke="#FF9800" stroke-width="2" marker-end="url(#arro)"/>
  <line x1="240" y1="240" x2="285" y2="240" stroke="#FF9800" stroke-width="2" marker-end="url(#arro)"/>
  <line x1="240" y1="240" x2="285" y2="285" stroke="#FF9800" stroke-width="2" marker-end="url(#arro)"/>
  <rect x="630" y="210" width="100" height="60" rx="10" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="680" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#C62828">Consumer</text>
  <text x="680" y="254" text-anchor="middle" font-size="11" fill="#C62828">单线程</text>
  <line x1="510" y1="200" x2="630" y2="230" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="510" y1="240" x2="630" y2="250" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="510" y1="290" x2="630" y2="270" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="100" y="380" width="600" height="80" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/>
  <text x="400" y="405" text-anchor="middle" font-size="12" font-weight="700" fill="#37474F">有序性保障原则</text>
  <text x="400" y="428" text-anchor="middle" font-size="11" fill="#37474F">① 同 key 进同 Partition  ② Partition 内单 Consumer 单线程消费</text>
  <text x="400" y="448" text-anchor="middle" font-size="11" fill="#37474F">③ 全局有序只能单 Partition，吞吐大降</text>
  <text x="400" y="486" text-anchor="middle" font-size="10" fill="#999" font-style="italic">局部有序 vs 全局有序：业务上 99% 场景只需分区内有序</text>
</svg>
