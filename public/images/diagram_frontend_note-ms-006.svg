<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">桌面端长任务执行时，前端怎样做通知、回看和继续执行？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">任务中心统一管理进行中/待确认/已完成，系统通知只提示关键结果，用户点回通知能回到原任务和上下文。</text>

  <rect x="280" y="90" width="240" height="60" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="400.0" y="117.0" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">任务中心</text>
  <text x="400.0" y="134.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">统一管理</text>
  <rect x="40" y="200" width="175" height="65" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="127.5" y="229.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">进行中</text>
  <text x="127.5" y="246.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Running</text>
  <line x1="400" y1="150" x2="127" y2="200" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="230" y="200" width="175" height="65" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="317.5" y="229.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">待确认</text>
  <text x="317.5" y="246.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Pending</text>
  <line x1="400" y1="150" x2="317" y2="200" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="420" y="200" width="175" height="65" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="507.5" y="229.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">已完成</text>
  <text x="507.5" y="246.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Done</text>
  <line x1="400" y1="150" x2="507" y2="200" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="610" y="200" width="175" height="65" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="697.5" y="229.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">失败</text>
  <text x="697.5" y="246.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Failed</text>
  <line x1="400" y1="150" x2="697" y2="200" stroke="#f44336" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="40" y="320" font-size="13" font-weight="700" fill="#37474F">通知 &amp; 回看原则</text>
  <rect x="40" y="340" width="240" height="60" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="160.0" y="367.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">系统通知</text>
  <text x="160.0" y="384.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">只提示关键结果</text>
  <rect x="295" y="340" width="240" height="60" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="415.0" y="367.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">点击通知</text>
  <text x="415.0" y="384.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">回到原任务上下文</text>
  <rect x="550" y="340" width="240" height="60" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="670.0" y="367.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">失败后</text>
  <text x="670.0" y="384.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">允许补材料重跑</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="100" y="482" font-size="11" fill="#37474F">任务中心</text>
  <rect x="150" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="170" y="482" font-size="11" fill="#37474F">进行</text>
  <rect x="206" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="226" y="482" font-size="11" fill="#37474F">完成</text>
  <rect x="262" y="470" width="14" height="14" rx="3" fill="#f44336"/>
  <text x="282" y="482" font-size="11" fill="#37474F">失败</text>
</svg>