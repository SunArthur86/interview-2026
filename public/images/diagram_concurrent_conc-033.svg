<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700">什么是进程调度 (调度层次与算法)</text><rect x="40" y="60" width="180" height="70" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="130" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9C27B0">高级调度 (作业调度)</text><text x="130" y="104" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#9C27B0">外存 -> 内存</text><text x="130" y="118" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9C27B0">频率最低 (分钟级)</text><rect x="310" y="60" width="180" height="70" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FF9800">中级调度 (内存调度)</text><text x="400" y="104" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#FF9800">内存 <-> 外存 (挂起)</text><text x="400" y="118" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#FF9800">频率中等</text><rect x="580" y="60" width="180" height="70" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="670" y="86" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4CAF50">低级调度 (进程调度)</text><text x="670" y="104" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4CAF50">分配 CPU</text><text x="670" y="118" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4CAF50">频率最高 (毫秒级)</text><path d="M 220 95 L 310 95" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 490 95 L 580 95" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><rect x="240" y="180" width="320" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="400" y="205" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#2196F3">就绪进程队列 (Ready Queue)</text><path d="M 670 130 L 670 155 L 400 155 L 400 180" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arr)"/><rect x="180" y="280" width="180" height="50" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="270" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f44336">先来先服务 (FCFS)</text><text x="270" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f44336">简单，易护航</text><rect x="440" y="280" width="180" height="50" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="530" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#9C27B0">时间片轮转 (RR)</text><text x="530" y="318" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9C27B0">适合分时系统</text><rect x="310" y="360" width="180" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="380" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#FF9800">多级反馈队列</text><text x="400" y="398" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#FF9800">现代OS综合最优</text><path d="M 400 220 L 270 280" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 400 220 L 530 280" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 320 330 L 380 360" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 480 330 L 420 360" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><rect x="40" y="440" width="720" height="40" rx="4" fill="#ECEFF1"/><text x="400" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">核心评价指标：CPU利用率 | 系统吞吐量 | 周转时间 | 响应时间 | 公平性</text></svg>
