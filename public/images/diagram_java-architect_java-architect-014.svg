<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】Spring Cloud 服务注册、发现与配置治理</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：服务注册与发现的本质是&quot;把实例地址从静态配置变成运行时动态注册表&quot;——每个实例启动时向注册中心上报 IP:Port+元数…</text>
