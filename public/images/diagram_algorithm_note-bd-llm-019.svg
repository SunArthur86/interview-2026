<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">给定一个字符串流，实现一个滑动窗口，返回当前窗口内的最长不重复子串长度。</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">用双指针维护滑动窗口+HashMap记录字符最后出现位置，O(n)时间复杂度。</text>

  <rect x="560" y="100" width="160" height="60" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="640.0" y="135.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">右指针 right++</text>
  <rect x="80" y="100" width="160" height="60" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="160.0" y="135.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">左指针 left</text>
  <rect x="280" y="230" width="240" height="70" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="400.0" y="270.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">滑动窗口[left,right]</text>
  <rect x="80" y="360" width="200" height="60" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="180.0" y="395.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">HashMap 记位置</text>
  <rect x="520" y="360" width="200" height="60" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="620.0" y="395.0" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">更新 maxLen</text>
  <line x1="240" y1="130" x2="360" y2="260" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
  <text x="300.0" y="190.0" text-anchor="middle" font-size="11" font-weight="600" fill="#4CAF50">扩展</text>
  <line x1="160" y1="130" x2="300" y2="260" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="230.0" y="190.0" text-anchor="middle" font-size="11" font-weight="600" fill="#2196F3">收缩</text>
  <line x1="280" y1="300" x2="180" y2="360" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="230.0" y="325.0" text-anchor="middle" font-size="11" font-weight="600" fill="#9C27B0">查重</text>
  <line x1="520" y1="300" x2="600" y2="360" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/>
  <text x="560.0" y="325.0" text-anchor="middle" font-size="11" font-weight="600" fill="#f44336">更新</text>
  <text x="40" y="455" font-size="12" font-weight="700" fill="#37474F">关键点：左右双指针维护窗口</text>
  
</svg>