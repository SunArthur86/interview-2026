<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">AtomicLong 与 LongAdder 竞争机制对比</text><rect x="40" y="50" width="340" height="400" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="210" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#f44336" text-anchor="middle">AtomicLong (单点排队)</text><text x="210" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f44336" text-anchor="middle">基于 CAS 单点竞争，高并发自旋失败</text><rect x="100" y="250" width="220" height="60" rx="4" fill="#ffffff" stroke="#f44336" stroke-width="2"/><text x="210" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#f44336" text-anchor="middle">volatile long value</text><text x="210" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">内存地址单一</text><line x1="120" y1="120" x2="190" y2="245" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><line x1="210" y1="120" x2="210" y2="245" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><line x1="300" y1="120" x2="230" y2="245" stroke="#f44336" stroke-width="2" marker-end="url(#arr)"/><text x="120" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f44336" text-anchor="middle">Thread 1</text><text x="210" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f44336" text-anchor="middle">Thread 2</text><text x="300" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f44336" text-anchor="middle">Thread N</text><text x="210" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">每次操作均能获取精确值</text><rect x="420" y="50" width="340" height="400" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="590" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4CAF50" text-anchor="middle">LongAdder (多核分片)</text><text x="590" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4CAF50" text-anchor="middle">分散热点，Cell[] 填充避免伪共享</text><rect x="480" y="250" width="100" height="50" rx="4" fill="#ffffff" stroke="#4CAF50"/><text x="530" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#333" text-anchor="middle">base</text><rect x="600" y="250" width="100" height="50" rx="4" fill="#ffffff" stroke="#4CAF50"/><text x="650" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#333" text-anchor="middle">Cell[0]</text><rect x="600" y="320" width="100" height="50" rx="4" fill="#ffffff" stroke="#4CAF50"/><text x="650" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#333" text-anchor="middle">Cell[1]</text><line x1="500" y1="150" x2="520" y2="245" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><line x1="600" y1="150" x2="630" y2="245" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><line x1="680" y1="150" x2="670" y2="315" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/><text x="500" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4CAF50" text-anchor="middle">Thread A</text><text x="600" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4CAF50" text-anchor="middle">Thread B</text><text x="680" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4CAF50" text-anchor="middle">Thread C</text><rect x="480" y="400" width="220" height="25" rx="4" fill="#FFF3E0" stroke="#FF9800"/><text x="590" y="417" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#FF9800" text-anchor="middle">sum() 遍历求和存在微小误差</text><rect x="20" y="485" width="15" height="10" fill="#FFEBEE" stroke="#f44336"/><text x="45" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">单点瓶颈</text><rect x="110" y="485" width="15" height="10" fill="#E8F5E9" stroke="#4CAF50"/><text x="135" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">高并发优化</text><rect x="200" y="485" width="15" height="10" fill="#FFF3E0" stroke="#FF9800"/><text x="225" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="start">设计代价</text></svg>
