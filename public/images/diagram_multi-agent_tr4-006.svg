<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">在 AutoGen 的多 Agent 对话模式中，如何定义“可终止对话”…</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">通过关键词、次数或外部干预设定停止熔断机制。</text>

  <rect x="120" y="100" width="200" height="60" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="220.0" y="135.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">Agent A</text>
  <rect x="480" y="100" width="200" height="60" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="580.0" y="135.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">Agent B</text>
  <line x1="320" y1="120" x2="480" y2="120" stroke="#2196F3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="400.0" y="115.0" text-anchor="middle" font-size="11" font-weight="600" fill="#2196F3">消息</text>
  <line x1="480" y1="140" x2="320" y2="140" stroke="#FF9800" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="400.0" y="135.0" text-anchor="middle" font-size="11" font-weight="600" fill="#FF9800">回复</text>
  <text x="400" y="190" text-anchor="middle" font-size="12" fill="#666">循环对话中…</text>
  <text x="40" y="240" font-size="13" font-weight="700" fill="#C62828">终止条件 (避免死循环)</text>
  <rect x="40" y="260" width="360" height="55" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="220.0" y="284.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">关键词匹配</text>
  <text x="220.0" y="301.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">遇 TERMINATE</text>
  <rect x="420" y="260" width="360" height="55" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="600.0" y="284.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">最大轮数</text>
  <text x="600.0" y="301.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">硬止损</text>
  <rect x="40" y="325" width="360" height="55" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="220.0" y="349.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">仲裁者</text>
  <text x="220.0" y="366.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">人类/Manager</text>
  <rect x="420" y="325" width="360" height="55" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="600.0" y="349.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">无新进展</text>
  <text x="600.0" y="366.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">收敛检测</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">A</text>
  <rect x="129" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="149" y="482" font-size="11" fill="#37474F">B</text>
  <rect x="178" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="198" y="482" font-size="11" fill="#37474F">关键词</text>
  <rect x="241" y="470" width="14" height="14" rx="3" fill="#f44336"/>
  <text x="261" y="482" font-size="11" fill="#37474F">止损</text>
</svg>