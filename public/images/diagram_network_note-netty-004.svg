<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Netty 的异步和事件驱动机制是怎样的？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">「异步」让线程发起 I/O 后不等结果就去做别的（结果用 Future/回调领取）；「事件驱动」让系统通过事件（连接建立、数据到达、异常发生）来触发逻辑，而不…</text>

  <rect x="40" y="100" width="350" height="60" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="215.0" y="127.0" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">异步 Async</text>
  <text x="215.0" y="144.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">发起 I/O 不阻塞</text>
  <rect x="410" y="100" width="350" height="60" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="585.0" y="127.0" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">事件驱动 Event-driven</text>
  <text x="585.0" y="144.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">状态变化触发逻辑</text>
  <rect x="40" y="200" width="340" height="55" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="210.0" y="224.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">连接建立</text>
  <text x="210.0" y="241.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">channelActive</text>
  <line x1="400" y1="160" x2="210" y2="200" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="400" y="200" width="340" height="55" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="570.0" y="224.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">数据到达</text>
  <text x="570.0" y="241.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">channelRead</text>
  <line x1="400" y1="160" x2="570" y2="200" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="40" y="270" width="340" height="55" rx="8" fill="#f44336" stroke="#f44336" stroke-width="2"/>
  <text x="210.0" y="294.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">写出完成</text>
  <text x="210.0" y="311.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">channelReadComplete</text>
  <line x1="400" y1="160" x2="210" y2="270" stroke="#f44336" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="400" y="270" width="340" height="55" rx="8" fill="#607D8B" stroke="#607D8B" stroke-width="2"/>
  <text x="570.0" y="294.5" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">异常发生</text>
  <text x="570.0" y="311.5" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">exceptionCaught</text>
  <line x1="400" y1="160" x2="570" y2="270" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="40" y="430" font-size="12" font-weight="700" fill="#37474F">结合：以任意顺序响应任意时间点的事件 = 网络编程核心需求</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">异步</text>
  <rect x="136" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="156" y="482" font-size="11" fill="#37474F">事件驱动</text>
  <rect x="206" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="226" y="482" font-size="11" fill="#37474F">连接</text>
  <rect x="262" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="282" y="482" font-size="11" fill="#37474F">读</text>
</svg>