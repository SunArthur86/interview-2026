<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】本地缓存与多级缓存一致性</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：多级缓存的本质是&quot;用空间换时间，用层级换性能&quot;。L1 本地缓存（Caffeine，应用内存，纳秒级）→ L2 集中式缓存…</text>
