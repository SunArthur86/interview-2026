<rect x="60" y="400" width="80" height="50" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="100" y="425" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">加载</text>
