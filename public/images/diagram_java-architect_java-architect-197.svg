<text x="190" y="425" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">验证</text>
<line x1="140" y1="425" x2="150" y2="425" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="240" y="400" width="80" height="50" rx="8" fill="#9C27B022" stroke="#9C27B0" stroke-width="2"/>
<text x="280" y="425" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">准备</text>
<line x1="230" y1="425" x2="240" y2="425" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="330" y="400" width="80" height="50" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="370" y="425" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">解析</text>
<line x1="320" y1="425" x2="330" y2="425" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="420" y="400" width="80" height="50" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="460" y="425" font-size="12" fill="#263238" text-anchor="middle" dominant-baseline="middle" font-weight="600">初始化</text>
<line x1="410" y1="425" x2="420" y2="425" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
</svg>