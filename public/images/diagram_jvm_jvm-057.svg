<rect x="40" y="130" width="720" height="100" rx="8" ry="8" fill="#4CAF5018" stroke="#4CAF50" stroke-width="2" opacity="1.0"/><rect x="40" y="130" width="180" height="100" rx="6" ry="6" fill="#4CAF50" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="130" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Minor GC</text><text x="130" y="190" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">新生代 GC</text><text x="130" y="212" text-anchor="middle" font-size="10" font-weight="normal" fill="#FFFFFF" font-style="italic">复制算法</text><text x="250" y="165" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">触发条件</text><text x="250" y="188" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">(Eden 满)</text><text x="560" y="165" text-anchor="start" font-size="12" font-weight="700" fill="#4CAF50">性能</text><text x="560" y="188" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">频繁 / 快 (&lt;50ms)</text><rect x="40" y="250" width="720" height="100" rx="8" ry="8" fill="#FF980018" stroke="#FF9800" stroke-width="2" opacity="1.0"/><rect x="40" y="250" width="180" height="100" rx="6" ry="6" fill="#FF9800" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="130" y="285" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Major GC</text><text x="130" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">老年代 GC</text><text x="130" y="332" text-anchor="middle" font-size="10" font-weight="normal" fill="#FFFFFF" font-style="italic">标记-清除/整理</text><text x="250" y="285" text-anchor="start" font-size="12" font-weight="700" fill="#FF9800">触发条件</text><text x="250" y="308" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">(Old 满)</text><text x="560" y="285" text-anchor="start" font-size="12" font-weight="700" fill="#FF9800">性能</text><text x="560" y="308" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">慢 (CMS 等同 Major)</text><rect x="40" y="370" width="720" height="100" rx="8" ry="8" fill="#9C27B018" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><rect x="40" y="370" width="180" height="100" rx="6" ry="6" fill="#9C27B0" stroke="#9C27B0" stroke-width="1.5" opacity="1.0"/><text x="130" y="405" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Mixed GC</text><text x="130" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">混合 GC</text><text x="130" y="452" text-anchor="middle" font-size="10" font-weight="normal" fill="#FFFFFF" font-style="italic">回收新生代+部分老年代</text><text x="250" y="405" text-anchor="start" font-size="12" font-weight="700" fill="#9C27B0">触发条件</text><text x="250" y="428" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">(G1 特有)</text><text x="560" y="405" text-anchor="start" font-size="12" font-weight="700" fill="#9C27B0">性能</text><text x="560" y="428" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">G1 回收 Region</text><rect x="40" y="490" width="720" height="100" rx="8" ry="8" fill="#f4433618" stroke="#f44336" stroke-width="2" opacity="1.0"/><rect x="40" y="490" width="180" height="100" rx="6" ry="6" fill="#f44336" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="130" y="525" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Full GC</text><text x="130" y="550" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">全堆 GC</text><text x="130" y="572" text-anchor="middle" font-size="10" font-weight="normal" fill="#FFFFFF" font-style="italic">STW 整个堆</text><text x="250" y="525" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">触发条件</text><text x="250" y="548" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">(System.gc/担保失败)</text><text x="560" y="525" text-anchor="start" font-size="12" font-weight="700" fill="#f44336">性能</text><text x="560" y="548" text-anchor="start" font-size="11" font-weight="normal" fill="#37474F">最慢 (秒级)</text></svg>
