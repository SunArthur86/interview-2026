<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700">Java 线程的生命周期 (Thread.State)</text><ellipse cx="120" cy="100" rx="60" ry="30" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="120" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#2196F3">NEW</text><text x="120" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#2196F3">(对象创建未启动)</text><rect x="280" y="70" width="120" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="340" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4CAF50">RUNNABLE</text><text x="340" y="118" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4CAF50">(就绪 / 运行)</text><polygon points="600,60 670,100 600,140 530,100" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="600" y="104" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#FF9800">BLOCKED</text><ellipse cx="600" cy="220" rx="80" ry="35" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="600" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9C27B0">WAITING</text><text x="600" y="234" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9C27B0">(被动等待唤醒)</text><ellipse cx="270" cy="220" rx="90" ry="35" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="270" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9C27B0">TIMED_WAITING</text><text x="270" y="234" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9C27B0">(限时等待)</text><ellipse cx="435" cy="400" rx="100" ry="35" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="435" y="396" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#607D8B">TERMINATED</text><text x="435" y="414" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#607D8B">(生命周期结束)</text><path d="M 180 100 L 280 100" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 470 260 L 410 365" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 400 100 L 530 100" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 570 140 L 340 185" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 670 100 L 670 185" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 530 220 L 360 220" stroke="#9C27B0" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 520 220 L 400 220" stroke="#9C27B0" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 340 185 L 570 140" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 340 130 L 270 185" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><path d="M 270 185 L 340 130" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><rect x="10" y="450" width="780" height="40" rx="4" fill="#ECEFF1"/><text x="400" y="475" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#607D8B">状态转换触发说明：</text><text x="250" y="475" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#FF9800">等待Monitor锁</text><text x="510" y="475" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#9C27B0">wait() / join() / park()</text></svg>
