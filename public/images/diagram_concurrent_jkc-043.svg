<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#fafafa"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/>
    </marker>
  </defs>

  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Cassandra 无中心化架构与数据路由</text>

  <ellipse cx="400" cy="240" rx="80" ry="35" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="400" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">Client</text>
  <text x="400" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#2196F3">发起读写请求</text>

  <ellipse cx="260" cy="120" rx="70" ry="35" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="260" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">Coordinator</text>
  <text x="260" y="133" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#9C27B0">任意节点接入</text>

  <path d="M 330 220 L 280 150" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 390 120 L 450 120 L 450 180" fill="none" stroke="#607D8B" stroke-width="2" marker-end="url(#arr)"/>

  <ellipse cx="550" cy="120" rx="70" ry="35" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="550" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">Gossip</text>
  <text x="550" y="133" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#FF9800">P2P发现拓扑</text>

  <circle cx="200" cy="350" r="40" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="200" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">Node 1</text>
  <text x="200" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#4CAF50">Token[0-50]</text>

  <circle cx="400" cy="400" r="40" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="400" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4CAF50">Node 2</text>
  <text x="400" y="410" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#4CAF50">Token[51-100]</text>

  <circle cx="600" cy="350" r="40" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/>
  <text x="600" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#f44336">Node 3</text>
  <text x="600" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">写入热点风险</text>

  <path d="M 230 380 L 370 400" fill="none" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arr)"/>
  <path d="M 430 400 L 570 380" fill="none" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arr)"/>
  <path d="M 570 340 L 230 340" fill="none" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arr)"/>

  <rect x="80" y="440" width="140" height="40" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/>
  <text x="150" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">Row Key</text>
  <text x="150" y="470" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">(Murmur3Hash)</text>
  <path d="M 220 460 L 280 410" fill="none" stroke="#607D8B" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>

  <rect x="500" y="440" width="200" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1"/>
  <text x="600" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">时间戳作Key导致</text>
  <text x="600" y="470" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#f44336">单点OOM与热点</text>

  <rect x="20" y="470" width="760" height="30" rx="5" fill="#ffffff" stroke="#ECEFF1"/>
  <rect x="30" y="480" width="15" height="10" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="50" y="490" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">节点状态</text>
  <rect x="130" y="480" width="15" height="10" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="150" y="490" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">协议交互</text>
  <rect x="230" y="480" width="15" height="10" fill="#F3E5F5" stroke="#9C27B0"/>
  <text x="250" y="490" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">协调路由</text>
  <rect x="330" y="480" width="15" height="10" fill="#FFEBEE" stroke="#f44336"/>
  <text x="350" y="490" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">架构风险</text>
</svg>
