<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">Java 四大线程池与生产规范</text><rect x="30" y="60" width="370" height="280" rx="10" fill="#ECEFF1" stroke="#607D8B" stroke-width="2"/><text x="215" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#607D8B">Executors 预定义 (生产慎用)</text><rect x="50" y="100" width="150" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/><text x="125" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">newFixedThreadPool</text><text x="125" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">固定线程数</text><text x="125" y="147" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#f44336">无界队列 OOM!</text><rect x="220" y="100" width="150" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/><text x="295" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">newCachedThreadPool</text><text x="295" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">缓存无限线程</text><text x="295" y="147" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#f44336">MAX线程 OOM!</text><rect x="50" y="170" width="150" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/><text x="125" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">newSingleThreadExec</text><text x="125" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">单线程串行</text><text x="125" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#f44336">无界队列 OOM!</text><rect x="220" y="170" width="150" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/><text x="295" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#FF9800">ScheduledThreadPool</text><text x="295" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#333">定时/周期任务</text><text x="295" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#4CAF50">DelayQueue 安全</text><path d="M 400 200 L 430 200" stroke="#607D8B" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="415" y="193" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">规范</text><rect x="440" y="60" width="330" height="280" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="605" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4CAF50">ThreadPoolExecutor 手动创建</text><rect x="460" y="100" width="290" height="30" rx="4" fill="#fff" stroke="#4CAF50" stroke-width="1"/><text x="605" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">corePoolSize = N / N+1</text><rect x="460" y="140" width="290" height="30" rx="4" fill="#fff" stroke="#4CAF50" stroke-width="1"/><text x="605" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">maximumPoolSize = 2N (IO密集)</text><rect x="460" y="180" width="290" height="30" rx="4" fill="#fff" stroke="#4CAF50" stroke-width="1"/><text x="605" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">keepAliveTime = 60s</text><rect x="460" y="220" width="290" height="30" rx="4" fill="#fff" stroke="#4CAF50" stroke-width="1"/><text x="605" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">workQueue = ArrayBlockingQueue</text><rect x="460" y="260" width="290" height="30" rx="4" fill="#fff" stroke="#4CAF50" stroke-width="1"/><text x="605" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">handler = CallerRunsPolicy</text><text x="605" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#4CAF50">有界队列强制控流，杜绝内存溢出</text><rect x="30" y="370" width="370" height="110" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="215" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">线程数配置原则</text><text x="215" y="425" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">CPU 密集型任务： N + 1</text><text x="215" y="445" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">避免过多线程引起频繁上下文切换</text><text x="215" y="465" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#607D8B">(N 代表服务器的 CPU 核心数)</text><rect x="440" y="370" width="330" height="110" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="605" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">拒绝策略触发条件</text><text x="605" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">当【有界队列已满】且</text><text x="605" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#333">【活动线程达到最大限制】时触发</text><text x="605" y="465" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle" fill="#607D8B">AbortPolicy抛异常 / CallerRunsPolicy回退</text></svg>
