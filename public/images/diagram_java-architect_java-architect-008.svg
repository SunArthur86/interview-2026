<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
<rect width="800" height="500" fill="#FAFBFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2196F3"/>
<rect x="0" y="0" width="8" height="64" fill="#FF9800"/>
<text x="28" y="40" font-size="22" font-weight="700" fill="#FFFFFF" text-rendering="geometricPrecision">【Java 后端架构师】锁升级、AQS 与高并发临界区优化</text>
<text x="28" y="552" font-size="0"></text>
<text x="28" y="92" font-size="14" fill="#37474F" font-style="italic">核心：锁升级的本质是&quot;用最小开销拿到锁&quot;——无竞争用 CAS（偏向锁/轻量级锁），短竞争自旋等待（轻量级锁），长竞争才进入内核…</text>
<!-- BODY_TOP=110 -->
<rect x="40" y="114" width="720" height="59" rx="8" fill="#2196F322" stroke="#2196F3" stroke-width="2"/>
<text x="56" y="144" font-size="15" fill="#2196F3" font-weight="700" dominant-baseline="middle">乐观 vs 悲观</text>
<text x="170" y="134" font-size="13" fill="#263238" dominant="middle">乐观锁：CAS / 版本号（适合读多）   悲观锁：synchro</text>
<text x="170" y="150" font-size="13" fill="#263238" dominant="middle">nized / ReentrantLock（适合写多）</text>
<rect x="40" y="189" width="720" height="59" rx="8" fill="#4CAF5022" stroke="#4CAF50" stroke-width="2"/>
<text x="56" y="218" font-size="15" fill="#4CAF50" font-weight="700" dominant-baseline="middle">公平 vs 非公平</text>
<text x="170" y="210" font-size="13" fill="#263238" dominant="middle">公平锁：FIFO 排队，无饥饿   非公平锁：可插队，吞吐</text>
<text x="170" y="226" font-size="13" fill="#263238" dominant="middle">量高</text>
<rect x="40" y="264" width="720" height="59" rx="8" fill="#FF980022" stroke="#FF9800" stroke-width="2"/>
<text x="56" y="294" font-size="15" fill="#FF9800" font-weight="700" dominant-baseline="middle">独占 vs 共享</text>
<text x="170" y="284" font-size="13" fill="#263238" dominant="middle">独占锁：ReentrantLock / synchronized   共享锁：Rea</text>
<text x="170" y="300" font-size="13" fill="#263238" dominant="middle">dWriteLock / Semaphore</text>
<rect x="40" y="339" width="720" height="59" rx="8" fill="#9C27B022" stroke="#9C27B0" stroke-width="2"/>
<text x="56" y="368" font-size="15" fill="#9C27B0" font-weight="700" dominant-baseline="middle">可重入 vs 不可重入</text>
<text x="170" y="360" font-size="13" fill="#263238" dominant="middle">可重入锁：同线程可多次获取，避免死锁   不可重入：</text>
<text x="170" y="376" font-size="13" fill="#263238" dominant="middle">再次获取会自死锁</text>
<rect x="40" y="414" width="720" height="59" rx="8" fill="#f4433622" stroke="#f44336" stroke-width="2"/>
<text x="56" y="444" font-size="15" fill="#f44336" font-weight="700" dominant-baseline="middle">自旋锁</text>
<text x="170" y="434" font-size="13" fill="#263238" dominant="middle">忙等待不阻塞，适合临界区短   自适应自旋：JVM 根据</text>
<text x="170" y="450" font-size="13" fill="#263238" dominant="middle">历史决定时长</text>
</svg>