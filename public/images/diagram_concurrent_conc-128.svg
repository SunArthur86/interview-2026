<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><rect width="800" height="500" fill="#fafafa"/><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle">线程池的7个核心参数架构图</text><text x="400" y="55" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="400" text-anchor="middle" fill="#607D8B">ThreadPoolExecutor 的基础构造与生命周期</text><ellipse cx="400" cy="100" rx="60" ry="20" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="400" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#9C27B0">ThreadPoolExecutor</text><rect x="80" y="160" width="200" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="180" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">corePoolSize</text><text x="180" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">核心常备线程数</text><rect x="520" y="160" width="200" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="620" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#2196F3">maximumPoolSize</text><text x="620" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">最大承载线程量</text><rect x="80" y="240" width="200" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="180" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">keepAliveTime & unit</text><text x="180" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">非核心线程存活时间</text><rect x="300" y="240" width="200" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="400" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FF9800">workQueue</text><text x="400" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">任务阻塞缓冲队列</text><rect x="520" y="240" width="200" height="40" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="2"/><text x="620" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">handler (拒绝策略)</text><text x="620" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">Abort/Caller/Discard等</text><rect x="300" y="160" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="400" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#4CAF50">threadFactory</text><text x="400" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" fill="#607D8B">线程创建工厂</text><line x1="340" y1="120" x2="180" y2="155" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="400" y1="120" x2="400" y2="155" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="460" y1="120" x2="620" y2="155" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><line x1="180" y1="200" x2="180" y2="235" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="400" y1="200" x2="400" y2="235" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><line x1="620" y1="200" x2="620" y2="235" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/><rect x="60" y="320" width="340" height="70" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1" stroke-dasharray="5"/><text x="230" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#607D8B">配置策略 (按任务类型)</text><text x="230" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">CPU 密集型: N + 1 (减少上下文切换)</text><text x="230" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#4CAF50">IO 密集型: N * 2 (提高 CPU 利用率)</text><rect x="420" y="320" width="320" height="70" rx="8" fill="#FFEBEE" stroke="#f44336" stroke-width="1" stroke-dasharray="5"/><text x="580" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#f44336">致命风险：避免使用 Executors</text><text x="580" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">FixedPool: 无界队列堆积引发 OOM</text><text x="580" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#607D8B">CachedPool: 最大线程无限制引发 OOM</text><g transform="translate(50, 440)"><rect width="12" height="12" fill="#4CAF50" rx="2"/><text x="18" y="11" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333">基础设置</text><rect x="80" width="12" height="12" fill="#2196F3" rx="2"/><text x="98" y="11" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333">核心容量</text><rect x="160" width="12" height="12" fill="#FF9800" rx="2"/><text x="178" y="11" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333">存活与缓冲</text><rect x="260" width="12" height="12" fill="#f44336" rx="2"/><text x="278" y="11" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333">兜底过载保护</text><rect x="380" width="12" height="12" fill="#9C27B0" rx="2"/><text x="398" y="11" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333">抽象/调度层</text></g></svg>
