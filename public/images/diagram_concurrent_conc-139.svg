<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10 Z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">线程池 (ThreadPoolExecutor) 任务提交架构</text><rect x="220" y="70" width="360" height="70" rx="8" fill="#F3E5F5" stroke="#9C27B0"/><text x="400" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">ThreadPoolExecutor</text><text x="400" y="114" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">corePoolSize: 核心线程数 (常驻)</text><text x="400" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">maximumPoolSize: 最大线程数</text><ellipse cx="100" cy="105" rx="60" ry="25" fill="#ECEFF1" stroke="#607D8B"/><text x="100" y="109" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">Task 提交</text><line x1="160" y1="105" x2="215" y2="105" stroke="#607D8B" marker-end="url(#arr)"/><line x1="400" y1="140" x2="400" y2="175" stroke="#607D8B" marker-end="url(#arr)"/><polygon points="400,175 460,220 400,265 340,220" fill="#FFF3E0" stroke="#FF9800"/><text x="400" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">核心线程满?</text><text x="400" y="232" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">(corePoolSize)</text><line x1="340" y1="220" x2="180" y2="220" stroke="#607D8B" marker-end="url(#arr)"/><rect x="60" y="200" width="120" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="120" y="224" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">创建核心线程</text><line x1="460" y1="220" x2="620" y2="220" stroke="#607D8B" marker-end="url(#arr)"/><polygon points="700,175 760,220 700,265 640,220" fill="#FFF3E0" stroke="#FF9800"/><text x="700" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">任务队列满?</text><text x="700" y="232" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">(有界队列)</text><line x1="640" y1="220" x2="560" y2="220" stroke="#607D8B" marker-end="url(#arr)"/><rect x="440" y="200" width="120" height="40" rx="8" fill="#E3F2FD" stroke="#2196F3"/><text x="500" y="224" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">加入队列排队</text><line x1="700" y1="265" x2="700" y2="300" stroke="#607D8B" marker-end="url(#arr)"/><polygon points="700,300 760,345 700,390 640,345" fill="#FFF3E0" stroke="#FF9800"/><text x="700" y="341" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">达到最大线程?</text><text x="700" y="357" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">(maxPoolSize)</text><line x1="640" y1="345" x2="560" y2="345" stroke="#607D8B" marker-end="url(#arr)"/><rect x="440" y="325" width="120" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50"/><text x="500" y="349" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">创建非核心线程</text><line x1="700" y1="390" x2="700" y2="420" stroke="#607D8B" marker-end="url(#arr)"/><rect x="640" y="420" width="120" height="40" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="700" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#f44336">触发拒绝策略</text><rect x="60" y="290" width="320" height="170" rx="8" fill="#FFEBEE" stroke="#f44336"/><text x="220" y="312" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f44336">实战调优核心法则</text><text x="220" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">1. 拒绝 Executors，使用有界队列防 OOM</text><text x="220" y="356" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">2. CPU 密集型：N + 1 (减少切换)</text><text x="220" y="376" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">3. IO 密集型：2N 或 N*(1+耗时比)</text><text x="220" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">4. 核心：CallerRunsPolicy 降级</text><text x="220" y="416" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#333">5. 坑：无界队列堆积导致 RT 飙升</text><rect x="40" y="475" width="60" height="15" rx="4" fill="#9C27B0"/><text x="110" y="487" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">线程池配置</text><rect x="200" y="475" width="60" height="15" rx="4" fill="#FF9800"/><text x="270" y="487" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">判断逻辑</text><rect x="360" y="475" width="60" height="15" rx="4" fill="#2196F3"/><text x="430" y="487" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">缓冲/排队</text><rect x="520" y="475" width="60" height="15" rx="4" fill="#4CAF50"/><text x="590" y="487" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">执行动作</text><rect x="660" y="475" width="60" height="15" rx="4" fill="#f44336"/><text x="730" y="487" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="start" fill="#333">拒绝/异常</text></svg>
