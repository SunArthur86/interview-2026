<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">虚拟内存：地址映射与缺页调度架构图</text><text x="180" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#9C27B0" text-anchor="middle">进程虚拟地址空间 (独立隔离)</text><rect x="60" y="95" width="240" height="160" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/><rect x="80" y="110" width="200" height="25" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="180" y="127" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">进程 A (连续虚拟页)</text><rect x="80" y="150" width="90" height="25" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="125" y="167" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">虚拟页 VP0</text><rect x="170" y="150" width="90" height="25" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="215" y="167" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">虚拟页 VP1</text><rect x="80" y="190" width="90" height="25" rx="4" fill="#FFEBEE" stroke="#f44336" stroke-width="1"/><text x="125" y="207" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">虚拟页 VP2</text><rect x="170" y="190" width="90" height="25" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="215" y="207" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">虚拟页 VP3</text><text x="215" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f44336" text-anchor