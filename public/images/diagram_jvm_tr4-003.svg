<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#37474F"/></marker>
  <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f44336"/></marker>
  <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/></marker>
  <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2196F3"/></marker>
</defs>
<text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">G1 Mixed GC 触发条件与 Region 回收</text>
<line x1="40" y1="56" x2="760" y2="56" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
<rect x="40" y="90" width="720" height="60" rx="6" ry="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="400" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">Mixed GC = 年轻代 GC + 部分老年代 Region</text><text x="400" y="138" text-anchor="middle" font-size="11" font-weight="normal" fill="#BF360C" font-style="italic">基于停顿预测模型，按收益排序回收</text><rect x="40" y="170" width="720" height="130" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">触发条件</text><rect x="60" y="215" width="160" height="70" rx="6" ry="6" fill="#f4433622" stroke="#f44336" stroke-width="2" opacity="1.0"/><text x="140" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#f44336">Heap Use &gt; 45%</text><text x="140" y="265" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">-XX:InitiatingHeapOccupancyPercent</text><rect x="230" y="215" width="160" height="70" rx="6" ry="6" fill="#FF980022" stroke="#FF9800" stroke-width="2" opacity="1.0"/><text x="310" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#FF9800">预测到期</text><text x="310" y="265" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">G1 自动判断</text><rect x="400" y="215" width="160" height="70" rx="6" ry="6" fill="#9C27B022" stroke="#9C27B0" stroke-width="2" opacity="1.0"/><text x="480" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#9C27B0">Mixed GC 后</text><text x="480" y="265" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">上年老年代回收不充分</text><rect x="570" y="215" width="160" height="70" rx="6" ry="6" fill="#607D8B22" stroke="#607D8B" stroke-width="2" opacity="1.0"/><text x="650" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#607D8B">显式调用</text><text x="650" y="265" text-anchor="middle" font-size="9" font-weight="normal" fill="#607D8B" font-style="italic">System.gc() (humorous)</text><rect x="40" y="320" width="720" height="240" rx="6" ry="6" fill="#FAFAFA" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="400" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">Region 回收优先级 (Garbage First)</text><rect x="70" y="380" width="70" height="45" rx="6" ry="6" fill="#DCEDC8" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="105.0" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#37474F">S</text><rect x="150" y="380" width="70" height="45" rx="6" ry="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" opacity="1.0"/><text x="185.0" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#37474F">E</text><rect x="230" y="380" width="70" height="45" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="265.0" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#37474F">O(80%)</text><rect x="270" y="368" width="30" height="18" rx="3" ry="3" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="285" y="380" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFFFF">1st</text><rect x="310" y="380" width="70" height="45" rx="6" ry="6" fill="#FFCDD2" stroke="#f44336" stroke-width="1.5" opacity="1.0"/><text x="345.0" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#37474F">O(70%)</text><rect x="350" y="368" width="30" height="18" rx="3" ry="3" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="365" y="380" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFFFF">2nd</text><rect x="390" y="380" width="70" height="45" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="425.0" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#37474F">O(60%)</text><rect x="430" y="368" width="30" height="18" rx="3" ry="3" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="445" y="380" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFFFF">3rd</text><rect x="470" y="380" width="70" height="45" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="505.0" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#37474F">O(50%)</text><rect x="510" y="368" width="30" height="18" rx="3" ry="3" fill="#2196F3" stroke="#2196F3" stroke-width="1.5" opacity="1.0"/><text x="525" y="380" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFFFF">skip</text><rect x="550" y="380" width="70" height="45" rx="6" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" opacity="1.0"/><text x="585.0" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#37474F">H</text><rect x="630" y="380" width="70" height="45" rx="6" ry="6" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5" opacity="1.0"/><text x="665.0" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#37474F">U</text><text x="400" y="455" text-anchor="middle" font-size="12" font-weight="700" fill="#37474F">回收规则:</text><text x="60" y="480" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">1. 在 -XX:MaxGCPauseMillis 内尽可能回收收益最高的 Region</text><text x="60" y="500" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">2. 回收 = 复制存活对象到空 Region (无碎片)</text><text x="60" y="520" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">3. CSet (Collection Set) 选择高 garbage 比例的 Region</text><text x="60" y="540" text-anchor="start" font-size="11" font-weight="normal" fill="#1B5E20">4. -XX:G1MixedGCCountTarget 控制混合回收次数</text></svg>
