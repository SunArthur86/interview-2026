<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#666"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2196F3"/></marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="#fafafa" stroke="#e0e0e0"/>
  <text x="400" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">你会用哪些指标判断桌面 AI 产品前端做得好不好？</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#78909C">三类指标：体验指标(TTI/流畅度/响应时间)、业务指标(任务完成率/产物采纳率/用户留存)、AI质量指标(准确率/幻觉率/用户满意度)。</text>

  <rect x="40" y="100" width="360" height="90" rx="8" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
  <text x="220.0" y="142.0" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">体验指标</text>
  <text x="220.0" y="159.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">TTI/FCP/延迟/帧率</text>
  <rect x="420" y="100" width="360" height="90" rx="8" fill="#4CAF50" stroke="#4CAF50" stroke-width="2"/>
  <text x="600.0" y="142.0" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">业务指标</text>
  <text x="600.0" y="159.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">完成率/采纳/留存</text>
  <rect x="40" y="220" width="360" height="90" rx="8" fill="#9C27B0" stroke="#9C27B0" stroke-width="2"/>
  <text x="220.0" y="262.0" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">AI 质量指标</text>
  <text x="220.0" y="279.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">准确率/幻觉/满意度</text>
  <rect x="420" y="220" width="360" height="90" rx="8" fill="#FF9800" stroke="#FF9800" stroke-width="2"/>
  <text x="600.0" y="262.0" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">工程指标</text>
  <text x="600.0" y="279.0" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">错误/崩溃/API成功</text>
  <text x="40" y="482" font-size="11" font-weight="600" fill="#455A64">图例：</text>
  <rect x="80" y="470" width="14" height="14" rx="3" fill="#2196F3"/>
  <text x="100" y="482" font-size="11" fill="#37474F">体验</text>
  <rect x="136" y="470" width="14" height="14" rx="3" fill="#4CAF50"/>
  <text x="156" y="482" font-size="11" fill="#37474F">业务</text>
  <rect x="192" y="470" width="14" height="14" rx="3" fill="#9C27B0"/>
  <text x="212" y="482" font-size="11" fill="#37474F">AI</text>
  <rect x="248" y="470" width="14" height="14" rx="3" fill="#FF9800"/>
  <text x="268" y="482" font-size="11" fill="#37474F">工程</text>
</svg>