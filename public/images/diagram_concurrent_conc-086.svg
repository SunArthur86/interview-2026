<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#333" text-anchor="middle">可重入锁 (Reentrant Lock) 原理机制</text><ellipse cx="150" cy="80" rx="60" ry="25" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/><text x="150" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">同一线程(Owner)</text><line x1="210" y1="80" x2="265" y2="80" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="270" y="55" width="120" height="50" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/><text x="330" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">第1次获取锁</text><text x="330" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">state = 1</text><line x1="390" y1="80" x2="445" y2="80" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="450" y="55" width="120" height="50" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/><text x="510" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">第2次重入</text><text x="510" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">state = 2</text><line x1="570" y1="80" x2="625" y2="80" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><rect x="630" y="55" width="120" height="50" fill="#ECEFF1" stroke="#607D8B" stroke-width="2" rx="8"/><text x="690" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">退出同步块</text><text x="690" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">state = 1</text><line x1="690" y1="105" x2="690" y2="145" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><polygon points="690,150 640,180 690,210 740,180" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/><text x="690" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="middle">彻底释放?</text><text x="690" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">state == 0</text><path d="M 640 180 Q 400 280 330 180" stroke="#f44336" stroke-width="1.5" fill="none" stroke-dasharray="5" marker-end="url(#arr)"/><text x="480" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f44336" text-anchor="middle">否: 继续持有锁</text><line x1="690" y1="210" x2="690" y2="260" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr)"/><text x="720" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4CAF50" text-anchor="middle">是</text><rect x="630" y="260" width="120" height="40" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="8"/><text x="690" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">真正释放锁</text><rect x="50" y="140" width="240" height="120" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="8"/><text x="170" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9C27B0" text-anchor="middle">synchronized 实现</text><text x="65" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">基于 Monitor (ObjectMonitor)</text><text x="65" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- _owner: 记录持有线程</text><text x="65" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- _recursions: 记录重入次数</text><text x="65" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">JVM底层C++自动维护</text><rect x="50" y="280" width="240" height="120" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="8"/><text x="170" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9C27B0" text-anchor="middle">ReentrantLock 实现</text><text x="65" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">基于 AQS 框架</text><text x="65" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- exclusiveOwnerThread</text><text x="65" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">- state: 记录重入次数</text><text x="65" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">需在 finally 手动 unlock()</text><rect x="310" y="320" width="360" height="80" fill="#FFEBEE" stroke="#f44336" stroke-width="2" stroke-dasharray="5" rx="8"/><text x="490" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f44336" text-anchor="middle">⚠️ 避坑指南：死锁风险</text><text x="325" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">可重入只能防止线程自己阻塞自己。</text><text x="325" y="383" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#333" text-anchor="start">若嵌套请求对方持有的锁，仍会产生死锁！</text></svg>
