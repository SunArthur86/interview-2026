<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#fafafa"/><defs><marker id="arr"markerWidth="10"markerHeight="10"refX="8"refY="5"markerUnits="strokeWidth"orient="auto"><path d="M0,0 L0,10 L9,5 z" fill="#607D8B"/></marker></defs><text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#333">线程池核心原理与实现分类</text><rect x="40" y="60" width="300" height="150" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/><text x="190" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#9C27B0">池化思想与价值</text><g font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#333"><circle cx="65" cy="120" r="4" fill="#9C27B0"/><text x="80" y="124">降低资源消耗 (减少创建销毁开销)</text><circle cx="65" cy="150" r="4" fill="#9C27B0"/><text x="80" y="154">提高响应速度 (任务直达空闲线程)</text><circle cx="65" cy="180" r="4" fill="#9C27B0"/><text x="80" y="184">提高可管理性 (统一监控与并发控制)</text></g><path d="M 200 210 L 200 250 L 400 250 L 400 290" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arr)"/><text x="300" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle" fill="#2196F3">核心抽象任务流转机制</text><rect x="350" y="60" width="400" height="150" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/><text x="550" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2196F3">内部任务流转机制</text><g font-family="system-ui,-apple-system,sans-serif" font-size="12"><rect x="370" y="105" width="90" height="40" rx="8" fill="#fafafa" stroke="#2196F3"/><text x="415" y="130" text-anchor="middle">任务Task</text><path d="M 460 125 L 490 125" stroke="#2196F3" stroke-width="1.5" marker-end="url(#arr)"/><rect x="490" y="105" width="100" height="40" rx="8" fill="#fafafa" stroke="#2196F3"/><text x="540" y="125" text-anchor="middle">核心线程满?</text><path d="M 590 125 L 620 125" stroke="#2196F3" stroke-width="1.5" marker-end="url(#arr)"/><rect x="620" y="105" width="100" height="40" rx="8" fill="#fafafa" stroke="#2196F3"/><text x="670" y="125" text-anchor="middle">队列与拒绝</text><text x="540" y="170" text-anchor="middle" fill="#607D8B">execute() vs submit() 接口差异</text></g><rect x="200" y="290" width="400" height="60" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/><text x="400" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle" fill="#607D8B">Executors 工厂创建 (实战中因 OOM 风险禁用)</text><text x="400" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">推荐直接使用原生 ThreadPoolExecutor 构造函数</text><path d="M 250 350 L 150 390" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 350 350 L 350 390" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 450 350 L 550 390" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><path d="M 550 350 L 750 390" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr)"/><g font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect x="60" y="395" width="130" height="65" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/><text x="125" y="418" text-anchor="middle" font-weight="600">FixedThreadPool</text><text x="125" y="435" text-anchor="middle">定长线程</text><text x="125" y="450" text-anchor="middle" fill="#f44336">无界队列OOM</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect x="200" y="395" width="130" height="65" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/><text x="265" y="418" text-anchor="middle" font-weight="600">CachedThreadPool</text><text x="265" y="435" text-anchor="middle">弹性伸缩缓存</text><text x="265" y="450" text-anchor="middle" fill="#f44336">无限线程OOM</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect x="490" y="395" width="130" height="65" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/><text x="555" y="418" text-anchor="middle" font-weight="600">ScheduledThreadPool</text><text x="555" y="435" text-anchor="middle">支持定时周期</text><text x="555" y="450" text-anchor="middle" fill="#607D8B">DelayedQueue</text></g><g font-family="system-ui,-apple-system,sans-serif" font-size="11"><rect x="650" y="395" width="130" height="65" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/><text x="715" y="418" text-anchor="middle" font-weight="600">SingleThread</text><text x="715" y="435" text-anchor="middle">单线程串行</text><text x="715" y="450" text-anchor="middle" fill="#607D8B">保证顺序执行</text></g></svg>
